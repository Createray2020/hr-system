<!-- 在所有 script 載入之前就決定版本，避免電腦版 layout 閃現 -->
<script>
(function() {
  const isMobileDevice = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const isSmallScreen  = window.innerWidth <= 768;
  const preferMobile   = localStorage.getItem('preferred_version') === 'mobile';

  if (isMobileDevice || isSmallScreen || preferMobile) {
    document.documentElement.setAttribute('data-layout', 'mobile');
  }
})();
</script>

<!-- data-layout=mobile 時直接隱藏電腦版元素 -->
<style>
html[data-layout="mobile"] body {
  background: #0F1117!important;
}
html[data-layout="mobile"] #sidebar,
html[data-layout="mobile"] .sidebar,
html[data-layout="mobile"] nav.sidebar,
html[data-layout="mobile"] .main-header,
html[data-layout="mobile"] header {
  display: none!important;
}
html[data-layout="mobile"] .main-content,
html[data-layout="mobile"] .content-area,
html[data-layout="mobile"] main {
  margin-left: 0!important;
  padding: 0!important;
  max-width: 100%!important;
  width: 100%!important;
}
html[data-layout="mobile"] #desktop-announcements {
  display: none!important;
}
html[data-layout="mobile"] #mobile-announcements-page {
  display: block!important;
}
</style>

<style>
/* ── Desktop layout ── */
.ann-layout{display:grid;grid-template-columns:360px 1fr;gap:20px;height:calc(100vh - 148px)}
.ann-list-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-y:auto;display:flex;flex-direction:column}
.ann-search{padding:14px;border-bottom:1px solid var(--border)}
.ann-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.ann-cats{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.cat-pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text-dim);background:transparent;transition:all .15s}
.cat-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ann-items{flex:1;overflow-y:auto}
.ann-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative}
.ann-item:hover{background:rgba(255,255,255,.03)}
.ann-item.active{background:rgba(91,141,239,.08);border-left:3px solid var(--accent)}
.priority-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--radius) 0 0 var(--radius)}
.ann-item.active .priority-bar{display:none}
.ann-item-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.ann-item-title{font-size:13px;font-weight:500;line-height:1.4;flex:1}
.ann-item-meta{font-size:11px;color:var(--text-dim);display:flex;gap:8px;align-items:center}
.ann-pin{color:var(--orange);font-size:11px}
.ann-detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-y:auto;padding:32px}
.ann-detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-dim)}
.ann-detail-title{font-size:22px;font-weight:700;line-height:1.4;margin-bottom:16px}
.ann-detail-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.ann-content{font-size:14px;line-height:1.8;white-space:pre-wrap;color:var(--text)}
.priority-badge{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.p-urgent{background:rgba(248,113,113,.15);color:#F87171}
.p-high{background:rgba(251,146,60,.15);color:#FB923C}
.p-normal{background:rgba(91,141,239,.15);color:#7FBBFF}
.p-low{background:rgba(107,114,128,.15);color:#9CA3AF}
.ann-back-btn{display:none;align-items:center;gap:6px;margin-bottom:16px;color:var(--accent);cursor:pointer;font-size:13px;background:none;border:none}
@media(max-width:900px){
  .ann-layout{grid-template-columns:1fr;height:auto}
  .ann-list-panel{height:auto;max-height:none}
  .ann-detail-panel{display:none}
  .ann-detail-panel.mobile-open{display:block}
  .ann-back-btn{display:inline-flex}
}
</style>

<!-- 公告詳情底部 Sheet -->

<script>
// ── Shared constants ──
const CAT_LABEL   = { general:'一般', company:'公司公告', hr:'人事通知', event:'活動訊息', system:'系統通知' };
const PRIO_LABEL  = { urgent:'緊急', high:'高', normal:'一般', low:'低' };
const PRIO_COLOR  = { urgent:'#F87171', high:'#FB923C', normal:'#5B8DEF', low:'#6B7280' };

function fmtTime(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts);
  if (diff < 3600000)   return Math.floor(diff/60000)   + ' 分鐘前';
  if (diff < 86400000)  return Math.floor(diff/3600000)  + ' 小時前';
  if (diff < 604800000) return Math.floor(diff/86400000) + ' 天前';
  return new Date(ts).toLocaleDateString('zh-TW');
}

// ── Desktop ──
let allAnn = [], currentCat = '', currentId = null;

function filterAnn() {
  const q = document.getElementById('ann-search').value.toLowerCase();
  const filtered = allAnn.filter(a =>
    (!currentCat || a.category === currentCat) &&
    (!q || a.title.toLowerCase().includes(q) || (a.content||'').toLowerCase().includes(q))
  );
  renderList(filtered);
}

function renderList(items) {
  const el = document.getElementById('ann-items');
  if (!items.length) {
    el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-dim);font-size:13px">沒有符合條件的公告</div>';
    return;
  }
  el.innerHTML = items.map(a => {
    const pColor  = PRIO_COLOR[a.priority] || '#5B8DEF';
    const isActive = a.id === currentId;
    return `<div class="ann-item ${isActive?'active':''}" onclick="openDesktopAnn('${a.id}')">
      ${!isActive ? `<div class="priority-bar" style="background:${pColor}"></div>` : ''}
      <div class="ann-item-header">
        <div class="ann-item-title">${a.is_pinned?'<span class="ann-pin">📌 </span>':''}${a.title}</div>
      </div>
      <div class="ann-item-meta">
        <span>${CAT_LABEL[a.category]||a.category}</span>
        <span>·</span>
        <span>${fmtTime(a.published_at)}</span>
        ${a.view_count?`<span>· 👁 ${a.view_count}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

async function openDesktopAnn(id) {
  currentId = id;
  filterAnn();
  const detail = document.getElementById('ann-detail');
  detail.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim)">載入中…</div>';
  detail.classList.add('mobile-open');
  try {
    const empId = window.currentUser?.id || '';
    const data  = await api(`/api/announcements?id=${id}${empId?'&employee_id='+empId:''}`);
    const pClass = 'p-' + (data.priority||'normal');
    detail.innerHTML = `
      <button class="ann-back-btn" onclick="closeDesktopDetail()">← 返回列表</button>
      <div class="ann-detail-title">${data.is_pinned?'📌 ':''}${data.title}</div>
      <div class="ann-detail-meta">
        <span class="priority-badge ${pClass}">${PRIO_LABEL[data.priority]||data.priority}</span>
        <span style="font-size:12px;color:var(--text-dim)">${CAT_LABEL[data.category]||data.category}</span>
        <span style="font-size:12px;color:var(--text-dim)">發布：${data.author?.name||'系統'}</span>
        <span style="font-size:12px;color:var(--text-dim)">${data.published_at?new Date(data.published_at).toLocaleString('zh-TW'):''}</span>
        ${data.expires_at?`<span style="font-size:12px;color:var(--orange)">到期：${new Date(data.expires_at).toLocaleDateString('zh-TW')}</span>`:''}
      </div>
      <div class="ann-content">${data.content}</div>`;
  } catch(e) {
    detail.innerHTML = `<div style="text-align:center;padding:40px;color:#F87171">載入失敗：${e.message}</div>`;
  }
}

function closeDesktopDetail() {
  currentId = null;
  document.getElementById('ann-detail').classList.remove('mobile-open');
  filterAnn();
}

document.getElementById('ann-cats').addEventListener('click', e => {
  const pill = e.target.closest('.cat-pill');
  if (!pill) return;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  currentCat = pill.dataset.cat;
  filterAnn();
});

// ── Mobile ──
let mobAnnData = [];
let mobCurrentCategory = 'all';

async function loadMobAnnouncements() {
  const role = window.currentUser?.role || 'employee';
  try {
    const res  = await fetch(`/api/announcements?role=${role}`);
    const data = await res.json();
    mobAnnData = data || [];
    renderMobList(mobAnnData);
  } catch(e) {
    document.getElementById('mob-ann-list').innerHTML =
      '<div style="text-align:center;padding:40px;color:#F87171;font-size:13px">載入失敗</div>';
  }
}

function filterMobCategory(cat, btn) {
  mobCurrentCategory = cat;
  document.querySelectorAll('.mob-cat-btn').forEach(b => {
    b.style.background = 'rgba(255,255,255,.08)';
    b.style.color      = 'rgba(255,255,255,.6)';
  });
  btn.style.background = '#5B8DEF';
  btn.style.color      = '#fff';
  const filtered = cat === 'all' ? mobAnnData : mobAnnData.filter(a => a.category === cat);
  renderMobList(filtered);
}

function renderMobList(list) {
  const container = document.getElementById('mob-ann-list');
  if (!list.length) {
    container.innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:rgba(255,255,255,.3)">
        <div style="font-size:36px;margin-bottom:10px">📢</div>
        <div style="font-size:13px">沒有符合條件的公告</div>
      </div>`;
    return;
  }
  const PRIORITY_LABEL = { urgent:'緊急', high:'重要', normal:'', low:'' };
  container.innerHTML = list.map(ann => {
    const color   = PRIO_COLOR[ann.priority] || '#5B8DEF';
    const preview = (ann.content||'').slice(0,55) + ((ann.content||'').length>55?'...':'');
    const timeAgo = fmtTime(ann.published_at);
    const prioLbl = PRIORITY_LABEL[ann.priority];
    return `<div onclick="openMobDetail('${ann.id}')"
      style="margin:0 16px 10px;background:rgba(255,255,255,.04);
        border:0.5px solid rgba(255,255,255,.08);border-left:3px solid ${color};
        border-radius:12px;padding:14px;cursor:pointer">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
        <div style="font-size:14px;font-weight:500;color:#fff;flex:1;line-height:1.4">
          ${ann.is_pinned?'📌 ':''}${ann.title}
        </div>
        ${prioLbl?`<span style="background:${color};color:#fff;padding:2px 7px;
          border-radius:4px;font-size:10px;font-weight:600;flex-shrink:0">${prioLbl}</span>`:''}
      </div>
      <div style="font-size:12px;color:rgba(255,255,255,.45);margin-bottom:8px;line-height:1.5">
        ${preview}
      </div>
      <div style="font-size:11px;color:rgba(255,255,255,.3);display:flex;gap:8px;flex-wrap:wrap">
        <span>${CAT_LABEL[ann.category]||ann.category}</span>
        <span>•</span>
        <span>${timeAgo}</span>
        <span style="margin-left:auto">${ann.view_count||0} 次查看</span>
      </div>
    </div>`;
  }).join('');
}

async function openMobDetail(id) {
  const empId = window.currentUser?.id || '';
  const bg    = document.getElementById('mob-ann-sheet-bg');
  const sheet = document.getElementById('mob-ann-sheet');
  const cont  = document.getElementById('mob-ann-sheet-content');
  cont.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,.4)">載入中…</div>';
  bg.style.display = '';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    sheet.style.transform = 'translateY(0)';
  }));
  try {
    const res = await fetch(`/api/announcements?id=${id}${empId?'&employee_id='+empId:''}`);
    const ann = await res.json();
    const color = PRIO_COLOR[ann.priority] || '#5B8DEF';
    const PRIO_LBL = { urgent:'緊急', high:'重要', normal:'一般', low:'一般' };
    cont.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="background:${color};color:#fff;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600">
          ${PRIO_LBL[ann.priority]||'一般'}
        </span>
        ${ann.is_pinned?'<span style="font-size:12px;color:rgba(255,255,255,.6)">📌 置頂</span>':''}
      </div>
      <div style="font-size:18px;font-weight:600;color:#fff;margin-bottom:10px;line-height:1.4">
        ${ann.title}
      </div>
      <div style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px;
        display:flex;flex-wrap:wrap;gap:10px">
        <span>👤 ${ann.author?.name||'系統'}</span>
        <span>📅 ${ann.published_at?new Date(ann.published_at).toLocaleDateString('zh-TW'):''}</span>
        <span>👁 ${ann.view_count||0} 次查看</span>
      </div>
      <div style="border-top:0.5px solid rgba(255,255,255,.08);padding-top:14px;
        font-size:14px;color:rgba(255,255,255,.85);line-height:1.8;white-space:pre-wrap">
        ${ann.content}
      </div>`;
  } catch(e) {
    cont.innerHTML = '<div style="text-align:center;padding:40px;color:#F87171">載入失敗</div>';
  }
}

function closeMobSheet() {
  const sheet = document.getElementById('mob-ann-sheet');
  sheet.style.transform = 'translateY(100%)';
  setTimeout(() => {
    document.getElementById('mob-ann-sheet-bg').style.display = 'none';
  }, 300);
}

// ── Desktop load (waits for window.api) ──
async function loadDesktopAnn(retries = 0) {
  if (!window.api) {
    if (retries < 20) setTimeout(() => loadDesktopAnn(retries + 1), 300);
    return;
  }
  const role = window.currentUser?.role || '';
  try {
    allAnn = await api(`/api/announcements${role?'?role='+role:''}`);
    filterAnn();
    const openId = new URLSearchParams(location.search).get('id');
    if (openId) openDesktopAnn(openId);
  } catch(e) {
    document.getElementById('ann-items').innerHTML =
      `<div style="text-align:center;padding:30px;color:#F87171;font-size:13px">載入失敗：${e.message}</div>`;
  }
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  const isMobile = document.documentElement.getAttribute('data-layout') === 'mobile';

  if (isMobile) {
    // 等 currentUser 載入後再執行
    const tryLoad = setInterval(() => {
      if (window.currentUser) {
        clearInterval(tryLoad);
        loadMobAnnouncements();
      }
    }, 200);
    // 最多等 3 秒
    setTimeout(() => {
      clearInterval(tryLoad);
      loadMobAnnouncements();
    }, 3000);
  } else {
    loadDesktopAnn();
  }
});
</script>
