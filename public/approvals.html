<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">

<title>審批管理 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Tabs ── */
.tab-bar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:16px;width:fit-content;flex-wrap:wrap}
.tab-btn{padding:7px 16px;border-radius:7px;border:none;background:transparent;color:var(--text-dim);font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text);background:var(--surface2)}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;background:#F87171;color:#fff;border-radius:9px;font-size:10px;font-weight:700;padding:0 4px;margin-left:4px}
/* ── Type cards ── */
.category-group{margin-bottom:20px}
.category-label{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.type-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s}
.type-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.25)}
.type-icon{font-size:26px;margin-bottom:6px}
.type-name{font-size:13px;font-weight:600;margin-bottom:4px}
.type-desc{font-size:11px;color:var(--text-dim);line-height:1.5}
/* ── Status badges ── */
.badge-pending{background:rgba(251,191,36,.12);color:#FBB724;border:1px solid rgba(251,191,36,.25)}
.badge-in_progress{background:rgba(91,141,239,.12);color:#7EB3FF;border:1px solid rgba(91,141,239,.25)}
.badge-completed{background:rgba(74,222,128,.12);color:#4ADE80;border:1px solid rgba(74,222,128,.25)}
.badge-rejected{background:rgba(248,113,113,.12);color:#F87171;border:1px solid rgba(248,113,113,.25)}
.badge-cancelled{background:rgba(122,133,160,.1);color:#7A85A0;border:1px solid rgba(122,133,160,.2)}
/* ── Step dots ── */
.step-dots{display:inline-flex;align-items:center;gap:0}
.sdot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:var(--surface);flex-shrink:0}
.sdot.done{background:#4ADE80;border-color:#4ADE80}
.sdot.active{background:#5B8DEF;border-color:#5B8DEF}
.sdot.rejected{background:#F87171;border-color:#F87171}
.sline{width:14px;height:2px;background:var(--border)}
.sline.done{background:#4ADE80}
/* ── Timeline ── */
.timeline{display:flex;flex-direction:column}
.tl-step{display:flex;gap:12px;position:relative}
.tl-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:30px}
.tl-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:2px solid var(--border);font-weight:600}
.tl-dot.waiting{background:var(--surface2);color:var(--text-dim)}
.tl-dot.in_progress{background:rgba(91,141,239,.15);border-color:#5B8DEF;color:#5B8DEF}
.tl-dot.approved{background:rgba(74,222,128,.15);border-color:#4ADE80;color:#4ADE80}
.tl-dot.rejected{background:rgba(248,113,113,.15);border-color:#F87171;color:#F87171}
.tl-vline{width:2px;flex:1;min-height:14px;background:var(--border);margin:3px 0}
.tl-vline.done{background:#4ADE80}
.tl-body{flex:1;padding-top:4px;padding-bottom:14px}
.tl-step-name{font-size:13px;font-weight:600;margin-bottom:2px}
.tl-meta{font-size:11px;color:var(--text-dim);line-height:1.6}
.tl-note-box{font-size:12px;background:var(--surface2);border-radius:6px;padding:7px 10px;margin-top:6px;color:var(--text-dim)}
/* ── Detail ── */
.form-display{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:var(--surface2);border-radius:8px;padding:12px 14px;margin-bottom:14px}
.fd-item .fd-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.fd-item .fd-val{font-size:13px;font-weight:500}
.fd-full{grid-column:span 2}
.section-sep{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.action-area{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:14px}
/* ── Pending cards ── */
.pending-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:border-color .15s}
.pending-card:hover{border-color:var(--accent)}
.pc-body{flex:1;min-width:0}
.pc-title{font-size:14px;font-weight:600;margin-bottom:3px}
.pc-meta{font-size:12px;color:var(--text-dim);line-height:1.6}
.pc-actions{display:flex;gap:6px;flex-shrink:0;margin-top:2px}
/* ── Config ── */
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:0.5px solid var(--border)}
.cfg-row:last-child{border-bottom:none}
.cfg-steps{display:flex;align-items:center;gap:4px}
.cfg-pill{display:flex;align-items:center;gap:4px;padding:3px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:11px}
.cfg-pill select{background:transparent;border:none;color:var(--text);font-size:11px;padding:0;cursor:pointer;outline:none}
/* ── Btn-reject ── */
.btn-reject{background:rgba(248,113,113,.12);color:#F87171;border:1px solid rgba(248,113,113,.25)}
.btn-reject:hover{background:rgba(248,113,113,.22)}
/* ── 我的申請 — 三段摺疊區塊（desktop table 風格） ── */
.mine-section{margin-bottom:8px}
.mine-section-header{width:100%;display:flex;align-items:center;justify-content:space-between;background:transparent;border:none;padding:12px 8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);font-family:'Noto Sans TC',sans-serif}
.mine-section-header:hover{background:rgba(255,255,255,.03)}
.mine-section-title{display:flex;align-items:center;gap:10px}
.mine-section-count{background:rgba(255,255,255,.08);color:var(--text-dim);font-size:12px;font-weight:500;padding:2px 10px;border-radius:10px;font-family:'DM Mono',monospace;min-width:28px;text-align:center}
.mine-section-chevron{transition:transform .2s;font-size:12px;color:var(--text-dim);display:inline-block}
.mine-section.collapsed .mine-section-chevron{transform:rotate(-90deg)}
.mine-section-body{padding:4px 0}
/* ── 全部申請 — 二級 Tab 主分類 ── */
.approval-tabs{display:flex;gap:8px;margin-bottom:12px;border-bottom:1px solid var(--border)}
.approval-tabs button{background:none;border:none;padding:10px 16px;cursor:pointer;font-size:14px;color:var(--text-dim);border-bottom:2px solid transparent;font-family:'Noto Sans TC',sans-serif}
.approval-tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
</style>
</head>

      <div class="stat-card orange"><div class="stat-label">待我審批</div><div class="stat-value" id="st-pending">—</div><div class="stat-hint">筆</div></div>
      <div class="stat-card green"><div class="stat-label">本月完成</div><div class="stat-value" id="st-done">—</div><div class="stat-hint">筆</div></div>
      <div class="stat-card red"><div class="stat-label">已退回</div><div class="stat-value" id="st-rejected">—</div><div class="stat-hint">筆</div></div>

    <div class="tab-bar">

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap=document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el=document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}

const fmtDate = s => s ? s.slice(0,10) : '—';
const fmtDT = s => {
  if (!s) return '—';
  const d = new Date(s);
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};

let allConfigs = [], myRequests = [], pendingItems = [], allRequests = [];
let allExpenseCategories = [];  // Phase 5b:expense_reimbursement 表單下拉動態來源(active 類別)
let allUnpaidPeriods = [];      // 階段 B:expense_reimbursement target_period 下拉(當月+前3月、扣 paid/locked)
let currentTab = 'mine', currentConfig = null;

const ROLE_LABELS = { manager:'直屬主管', ceo:'執行長', hr:'人資', admin:'管理員', chairman:'董事長' };
const STATUS_LABELS = { pending:'待審核', in_progress:'審核中', completed:'已完成', rejected:'已退回', cancelled:'已取消', draft:'草稿' };
const STATUS_CLS    = { pending:'badge-pending', in_progress:'badge-in_progress', completed:'badge-completed', rejected:'badge-rejected', cancelled:'badge-cancelled', draft:'badge-cancelled' };
const CAT_ICONS     = { 人事:'🧑‍💼', 出勤:'⏱️', 財務:'💰', 採購:'🛒', 行政:'📋' };

// ── Feature A:附件功能(複用 leave-attachments bucket、對齊 employee-leave.html 上傳 pattern)──
const ATTACHMENT_EXTS = ['pdf','xlsx','xls','docx','doc','png','jpg','jpeg','gif','webp'];
const ATTACHMENT_MAX_BYTES = 10 * 1024 * 1024;
const ATTACHMENT_MAX_COUNT = 10;
let pendingAttachments = [];  // 送單表單暫存:上傳完成的附件 metadata 陣列
let currentDetailData = null; // Feature B:renderDetail 快取最後一次載入的 detail 物件、供匯出交辦單用

function _esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
// ASCII-safe storage key:Supabase Storage 對非 ASCII / 部分特殊字元(中文、括號、#、%
// 等)會回 Invalid key,故 storage key 嚴格 sanitize。基礎名稱(去副檔名)只留
// [A-Za-z0-9._-]、其餘換 _、collapse 連續 _、trim 頭尾 _,空字串時 fallback 'file';
// 副檔名轉小寫只留 [a-z0-9],非法用 'bin'。原始檔名(含中文)仍存 metadata.name 顯示用。
function _safeFilename(name) {
  const raw = String(name || '');
  const dot = raw.lastIndexOf('.');
  let base = dot > 0 ? raw.slice(0, dot) : raw;
  let ext  = dot > 0 ? raw.slice(dot + 1) : '';
  base = base.replace(/[^A-Za-z0-9._-]+/g, '_').replace(/_+/g, '_').replace(/^_+|_+$/g, '');
  if (!base) base = 'file';
  if (base.length > 80) base = base.slice(0, 80);
  ext = ext.toLowerCase().replace(/[^a-z0-9]/g, '');
  if (!ext) ext = 'bin';
  return `${base}.${ext}`;
}
async function uploadApprovalAttachment(file) {
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  if (!ATTACHMENT_EXTS.includes(ext)) {
    throw new Error(`不支援的檔案類型:${file.name}(僅接受 PDF/Excel/Word/圖片)`);
  }
  if (file.size > ATTACHMENT_MAX_BYTES) {
    throw new Error(`檔案過大:${file.name}(上限 10MB)`);
  }
  const uid = window.currentUser?.id;
  if (!uid) throw new Error('使用者未載入、無法上傳');
  const safeName = _safeFilename(file.name);
  const path = `${uid}/${Date.now()}_${safeName}`;
  const sb = window._supabase;
  if (!sb) throw new Error('Storage client 未載入');
  const { error: upErr } = await sb.storage
    .from('leave-attachments').upload(path, file, { upsert: true });
  if (upErr) throw new Error(`${file.name}:${upErr.message}`);
  return {
    path,
    name: file.name,
    mime: file.type || null,
    size: file.size,
    uploaded_at: new Date().toISOString(),
    uploaded_by: uid,
  };
}

// ── 「我的申請」三段摺疊分類 ──
const MINE_PENDING_STATUSES = new Set(['pending', 'in_progress']);
const MINE_DRAFT_STATUSES   = new Set(['draft']);
const MINE_DONE_STATUSES    = new Set(['completed', 'rejected', 'cancelled']);
function classifyMineStatus(status) {
  if (MINE_PENDING_STATUSES.has(status)) return 'pending';
  if (MINE_DRAFT_STATUSES.has(status))   return 'draft';
  if (MINE_DONE_STATUSES.has(status))    return 'done';
  return 'done'; // 未知狀態保底歸已完成
}
function toggleMineSection(section) {
  const sec = document.querySelector(`.mine-section[data-section="${section}"]`);
  if (!sec) return;
  const body = sec.querySelector('.mine-section-body');
  const collapsed = sec.classList.toggle('collapsed');
  body.style.display = collapsed ? 'none' : '';
}

// B20:輪詢等待 layout.js 設好 window.currentUser、避免 race
// (對齊 dashboard / leave-admin / calendar / orgchart / resigned-archive /
//  attendance-locations-admin 既有 5 page 內聯模板、不改 global / module 結構)
// 取代原本 await new Promise(r => setTimeout(r, 600)) 死等 stop-gap、layout.js
// 載 user 偶爾 >600ms 時整頁卡白(根因:loadMyRequests / loadPendingApprovals
// 內部 early return + loadAllRequests 在 canViewAllApprovals(undefined) gate 後不 fire)。
async function waitForCurrentUser(maxMs = 5000) {
  const step = 100;
  for (let i = 0; i < maxMs / step; i++) {
    if (window.currentUser) return window.currentUser;
    await new Promise(r => setTimeout(r, step));
  }
  return null;
}

window.onload = async () => {
  const badge = document.getElementById('db-status');
  const u = await waitForCurrentUser();
  if (!u) {
    badge.textContent = '● 未登入';
    badge.style.cssText = 'background:rgba(248,113,113,.1);color:#F87171;border-color:rgba(248,113,113,.2)';
    toast('使用者資訊載入失敗、請重新登入', 'error');
    return;
  }
  try {
    await Promise.all([loadConfigs(), loadMyRequests(), loadPendingApprovals()]);
    if (Roles.canViewAllApprovals(u)) {
      document.getElementById('tab-all-btn').style.display = '';
      applyAllTabToStatusSelect(currentAllTab);  // 初始化 status select 對齊預設 tab
      loadAllRequests();
    }
    if (Roles.canEditApprovalConfig(u)) {
      document.getElementById('tab-config-btn').style.display = '';
    }
    badge.textContent = '● Supabase 已連線';
    badge.style.cssText = 'background:rgba(74,222,128,.1);color:#4ADE80;border-color:rgba(74,222,128,.2)';
  } catch(e) {
    badge.textContent = '● 連線失敗';
    badge.style.cssText = 'background:rgba(248,113,113,.1);color:#F87171;border-color:rgba(248,113,113,.2)';
    toast('載入失敗：'+e.message, 'error');
  }
};

function resolveSelectOptions(f) {

    const names = (allExpenseCategories || []).map(c => c.name);

// ─────────────────────────────────────────
// 階段 B:expense_reimbursement target_period 下拉資料來源
// 候選 = 當月 + 前 3 月(共 4 個 YYYY-MM、跨年自動處理、新到舊)
// 撈 payroll_periods 該幾年的清單,過濾 status IN ('paid','locked')
// 「尚未建立 period」的月份視為可選(status=null)
// ─────────────────────────────────────────
function buildCandidateMonths_(today) {
  const t = today || new Date();
  const out = [];
  for (let i = 0; i < 4; i++) {
    const d = new Date(t.getFullYear(), t.getMonth() - i, 1);
    out.push({
      year: d.getFullYear(),
      month: d.getMonth() + 1,
      ym: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`,
    });
  }
  return out;
}
async function fetchPeriodsForCandidates_(candidates) {
  const years = [...new Set(candidates.map(c => c.year))];
  const statusByYM = {};
  for (const y of years) {
    try {
      const rows = await api(`/api/salary?_resource=periods&year=${y}`);
      for (const r of (rows || [])) {
        const ym = `${r.year}-${String(r.month).padStart(2, '0')}`;
        statusByYM[ym] = r.status;
      }
    } catch (e) { /* 該年無 period / API 失敗 → 該月份視為未建立、可選 */ }
  }
  return statusByYM;
}
function buildUnpaidPeriods_(candidates, statusByYM) {
  const FROZEN = new Set(['paid', 'locked']);
  return candidates
    .map(c => ({
      value: c.ym, year: c.year, month: c.month,
      status: statusByYM[c.ym] || null,
      label: `${c.year}年${c.month}月（${c.ym}）`,
    }))
    .filter(p => !FROZEN.has(p.status));
}
async function loadUnpaidPeriods_() {
  const candidates = buildCandidateMonths_();
  const statusByYM = await fetchPeriodsForCandidates_(candidates);
  return buildUnpaidPeriods_(candidates, statusByYM);
}

// expense_reimbursement 表單:當填/改費用日期 → 自動帶歸屬薪資月份
function wireTargetPeriodAutoFill_() {
  const dateEl   = document.getElementById('ff-expense_date');
  const periodEl = document.getElementById('ff-target_period');
  if (!dateEl || !periodEl) return;
  const apply = () => {
    const periods = allUnpaidPeriods || [];
    if (!periods.length) return;
    const v = dateEl.value;
    let target = null;
    if (v && v.length >= 7) {
      const ym = v.slice(0, 7);
      target = periods.find(p => p.value === ym) || null;
    }
    if (!target) target = periods[0];  // 最近的未發放月(已新到舊排序)
    if (target) periodEl.value = target.value;
  };
  dateEl.addEventListener('change', apply);
  apply();
}

async function loadConfigs() {
  allConfigs = await api('/api/approvals?type=configs');
  // Phase 5b:同時 cache active expense_categories(失敗 → 空陣列,selectType 走 fallback)
  try {
    const r = await api('/api/expense-categories');
    allExpenseCategories = r?.categories || [];
  } catch(e) { allExpenseCategories = []; }
  // 階段 B:預載未發放月份清單(供 expense_reimbursement target_period 下拉)
  try { allUnpaidPeriods = await loadUnpaidPeriods_(); }
  catch(e) { allUnpaidPeriods = []; }

  ['mine-type-f','all-type-f'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '<option value="">全部類型</option>' + opts;
  });
  renderTypeCategories();
}

async function loadPendingApprovals() {
  const effRole = Roles.effectiveApprovalRole(window.currentUser);
  if (!effRole) return;
  try {
    pendingItems = await api(`/api/approvals?type=pending&role=${effRole}`);
    renderPending();
    const cnt = pendingItems.length;
    const badge = document.getElementById('pending-badge');
    badge.textContent = cnt; badge.style.display = cnt > 0 ? '' : 'none';
    document.getElementById('st-pending').textContent = cnt;

    const list = document.getElementById('pending-list');
    if (list) list.innerHTML = `<div style="text-align:center;color:#F87171;padding:20px">載入失敗:${e.message}</div>`;
    throw e;

}

function updateStats() {
  const now = new Date();
  const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('st-mine').textContent = myRequests.length;
  document.getElementById('st-done').textContent = myRequests.filter(r => r.status === 'completed' && (r.updated_at||'').startsWith(ym)).length;
  document.getElementById('st-rejected').textContent = myRequests.filter(r => r.status === 'rejected').length;
}

/* ── My requests ─────────────────────────────────────────────────────────── */
function renderMine() {
  const search = document.getElementById('mine-search').value.toLowerCase();
  const typeF  = document.getElementById('mine-type-f').value;
  const statF  = document.getElementById('mine-status-f').value;

  // 沿用原 filter(search / type / status select)
  const filtered = myRequests.filter(r => {
    if (typeF && r.request_type !== typeF) return false;
    if (statF && r.status !== statF) return false;
    if (search && !(r.title||'').toLowerCase().includes(search)) return false;
    return true;
  });

  // 過濾後再依 classifyMineStatus 分三組
  const groups = { pending: [], draft: [], done: [] };
  for (const r of filtered) {
    groups[classifyMineStatus(r.status)].push(r);
  }

  const renderRow = (r) => {
    const c = allConfigs.find(x => x.request_type === r.request_type);
    return `<tr style="cursor:pointer" onclick="openDetail('${r.id}')">
      <td><span style="font-size:16px">${c?.icon||'📋'}</span> <span style="font-size:12px">${c?.type_name||r.request_type}</span></td>
      <td style="font-weight:500">${r.title}</td>
      <td style="font-size:12px;color:var(--text-dim)">${fmtDate(r.created_at)}</td>
      <td>${stepDots(r.current_step, r.total_steps, r.status)}</td>
      <td>${statusBadge(r.status)}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openDetail('${r.id}')">詳情</button></td>
    </tr>`;
  };
  const emptyRow = '<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:20px">目前無資料</td></tr>';

  // 待處理 / 已完成:永遠顯示 section、空 → placeholder
  for (const key of ['pending', 'done']) {
    const list = groups[key];
    document.getElementById(`mine-tbody-${key}`).innerHTML =
      list.length ? list.map(renderRow).join('') : emptyRow;
    document.getElementById(`mine-count-${key}`).textContent = list.length;
  }

  // 草稿:空則整段隱藏、有資料才顯示(收起/展開狀態保留)
  const draftList = groups.draft;
  const draftSection = document.getElementById('mine-section-draft');
  document.getElementById('mine-count-draft').textContent = draftList.length;
  if (draftList.length) {
    draftSection.style.display = '';
    document.getElementById('mine-tbody-draft').innerHTML = draftList.map(renderRow).join('');
  } else {
    draftSection.style.display = 'none';
    document.getElementById('mine-tbody-draft').innerHTML = '';
  }
}

        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();quickApprove('${r?.id}','${step.step_number}')">✓ 通過</button>
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openDetail('${r?.id||''}')">查看</button>
        ${delBtn}
      </div>
    </div>`;
  }).join('');
}

/* ── All requests ────────────────────────────────────────────────────────── */
function renderAll() {
  const search = document.getElementById('all-search').value.toLowerCase();
  const typeF  = document.getElementById('all-type-f').value;
  const statF  = document.getElementById('all-status-f').value;
  // 主分類:依 currentAllTab 過濾 status 範圍(null = 不過濾)
  const tabStatuses = ALL_TAB_STATUS_MAP[currentAllTab];
  const rows = allRequests.filter(r => {
    // tab 層主分類
    if (tabStatuses !== null && !tabStatuses.includes(r.status)) return false;
    // 次級 status select:'__tab_default' = 不再做細篩(沿用 tabStatuses 範圍);''=全部;其他 = 具體 status
    if (statF && statF !== '__tab_default' && r.status !== statF) return false;
    if (typeF && r.request_type !== typeF) return false;
    if (search && !(r.title||'').toLowerCase().includes(search) && !(r.employees?.name||'').toLowerCase().includes(search)) return false;
    return true;
  });
  const tbody = document.getElementById('all-tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-dim);padding:20px">無資料</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const c   = allConfigs.find(x => x.request_type === r.request_type);
    const emp = r.employees;
    const delBtn = canDeleteRow(r)
      ? `<button class="btn btn-ghost btn-sm" style="color:#F87171;border:1px solid rgba(248,113,113,.3);margin-left:4px" onclick="event.stopPropagation();openDeleteApproval('${r.id}')">🗑</button>`
      : '';
    return `<tr style="cursor:pointer" onclick="openDetail('${r.id}')">
      <td><span style="font-size:15px">${c?.icon||'📋'}</span> <span style="font-size:12px">${c?.type_name||r.request_type}</span></td>
      <td style="font-weight:500">${r.title}</td>
      <td><div class="emp-cell"><div class="avatar" style="width:28px;height:28px;font-size:12px">${emp?.avatar||emp?.name?.[0]||'?'}</div><div class="emp-name" style="font-size:12px">${emp?.name||'—'}</div></div></td>
      <td style="font-size:12px">${emp?.dept_name||r.dept||emp?.dept||'—'}</td>
      <td style="font-size:12px;color:var(--text-dim)">${fmtDate(r.created_at)}</td>
      <td>${stepDots(r.current_step, r.total_steps, r.status)}</td>
      <td>${statusBadge(r.status)}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openDetail('${r.id}')">詳情</button>${delBtn}</td>
    </tr>`;
  }).join('');
}

/* ── New request ─────────────────────────────────────────────────────────── */
// Batch 7 收尾(2026-06-09):加班類 picker 過濾掉,改走 /overtime.html;
// 配合 api/approvals.js OVERTIME_TYPES_BLOCKED + migrations/20260609_disable_overtime_approval_configs.sql 三層守門
const APPROVAL_PICKER_BLOCKLIST = ['overtime', 'overtime_pay'];
function renderTypeCategories() {

  allConfigs
    .filter(c => !APPROVAL_PICKER_BLOCKLIST.includes(c.request_type))
    .forEach(c => { if (!groups[c.category]) groups[c.category] = []; groups[c.category].push(c); });
  document.getElementById('type-categories').innerHTML = Object.entries(groups).map(([cat, items]) => `
    <div class="category-group">
      <div class="category-label">${CAT_ICONS[cat]||'📌'} ${cat}</div>
      <div class="type-grid">
        ${items.map(c => `
          <div class="type-card" onclick="selectType('${c.request_type}')">

function openNewRequestModal() {
  if (!allConfigs.length) { toast('申請類型載入中，請稍候', 'warn'); return; }
  document.getElementById('new-type-modal').classList.add('open');
}

function selectType(requestType) {
  currentConfig = allConfigs.find(c => c.request_type === requestType);
  if (!currentConfig) return;
  closeModal('new-type-modal');
  document.getElementById('form-title').textContent = currentConfig.icon + ' ' + currentConfig.type_name;

  const fields = FORM_SCHEMA[requestType] || [];
  let html = `<div style="background:rgba(91,141,239,.06);border:1px solid rgba(91,141,239,.15);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--text-dim)">${currentConfig.description}</div>`;
  fields.forEach(f => {
    const req = f.required ? '<span style="color:var(--red)"> *</span>' : '';
    let input;
    if (f.type === 'select') {
      // Phase 5b:選項解析統一走 resolveSelectOptions(options_source / f.options 內含分流)
      // 階段 B:unpaid_periods 例外、由 allUnpaidPeriods 直接吃(value≠label)
      let optsHtml;
      if (f.options_source === 'unpaid_periods') {
        optsHtml = (allUnpaidPeriods || [])
          .map(p => `<option value="${p.value}">${p.label}</option>`)
          .join('');
      } else {
        const opts = resolveSelectOptions(f);
        optsHtml = opts.map(o=>`<option value="${o}">${o}</option>`).join('');
      }
      input = `<select class="form-select" id="ff-${f.id}"><option value="">— 請選擇 —</option>${optsHtml}</select>`;
    } else if (f.type === 'textarea') {
      input = `<textarea class="form-input" id="ff-${f.id}" rows="2" style="resize:vertical"${f.placeholder?` placeholder="${f.placeholder}"`:''}></textarea>`;
    } else {
      input = `<input class="form-input" type="${f.type}" id="ff-${f.id}"${f.placeholder?` placeholder="${f.placeholder}"`:''}${f.type==='number'?' min="0"':''}>`;
    }
    html += `<div class="form-row"><label class="form-label">${f.label}${req}</label>${input}</div>`;
  });

  // 注意:加班申請(overtime / overtime_pay)已移除自此頁,
  // 改走 /overtime.html(Batch 7,接通 overtime_requests + 兩段式上限 + comp_time_balance)。

  html += `<div class="form-row"><label class="form-label">備注（選填）</label><textarea class="form-input" id="ff-note" rows="2" placeholder="補充說明…"></textarea></div>`;

  // Feature A:夾帶附件(可多檔、複用 leave-attachments bucket)
  html += `<div class="form-row">
    <label class="form-label">夾帶附件（PDF/Excel/Word/圖片，單檔≤10MB、最多 ${ATTACHMENT_MAX_COUNT} 檔）</label>
    <input type="file" class="form-input" id="ff-attachments" multiple
           accept=".pdf,.xlsx,.xls,.docx,.doc,.png,.jpg,.jpeg,.gif,.webp"
           onchange="onAttachmentPick(this)">
    <div id="ff-attachments-preview" style="font-size:11px;color:var(--text-dim);margin-top:6px"></div>
  </div>`;

  // 重置 pending(避免上次未送出的殘留)
  pendingAttachments = [];

  document.getElementById('form-body').innerHTML = html;
  document.getElementById('new-form-modal').classList.add('open');

  // 階段 B:expense_reimbursement → 依費用日自動帶歸屬薪資月份
  if (requestType === 'expense_reimbursement') {
    wireTargetPeriodAutoFill_();
  }
}

// Feature A:選檔 → 逐檔上傳 → 顯示已選清單;上傳期間 disable 送出鈕
async function onAttachmentPick(input) {
  const preview = document.getElementById('ff-attachments-preview');
  const submitBtn = document.querySelector('#new-form-modal .btn-primary');
  const files = Array.from(input.files || []);
  if (!files.length) return;
  if (pendingAttachments.length + files.length > ATTACHMENT_MAX_COUNT) {
    toast(`一次最多 ${ATTACHMENT_MAX_COUNT} 檔`, 'warn');
    input.value = '';
    return;
  }
  if (submitBtn) submitBtn.disabled = true;
  if (preview) preview.innerHTML = '上傳中…';
  try {
    for (const f of files) {
      const meta = await uploadApprovalAttachment(f);
      pendingAttachments.push(meta);
    }
  } catch (e) {
    alert(`上傳失敗:${e.message}`);
  } finally {
    renderAttachmentPreview();
    if (submitBtn) submitBtn.disabled = false;
    input.value = '';
  }
}

function renderAttachmentPreview() {
  const preview = document.getElementById('ff-attachments-preview');
  if (!preview) return;
  if (!pendingAttachments.length) { preview.innerHTML = ''; return; }
  preview.innerHTML = pendingAttachments.map((a, i) =>
    `<div style="display:flex;align-items:center;gap:8px;padding:3px 0">
      <span>📎 ${_esc(a.name)} <span style="opacity:.6">(${Math.round((a.size||0)/1024)} KB)</span></span>
      <button class="btn btn-ghost" style="font-size:10px;padding:1px 6px" onclick="removePendingAttachment(${i})">✕ 移除</button>
    </div>`).join('');
}

function removePendingAttachment(i) {
  pendingAttachments.splice(i, 1);
  renderAttachmentPreview();
}

async function submitRequest() {
  if (!currentConfig) return;
  const fields = FORM_SCHEMA[currentConfig.request_type] || [];
  for (const f of fields) {
    if (f.required) {
      const v = document.getElementById('ff-'+f.id)?.value?.trim();
      if (!v) { toast(`請填寫「${f.label}」`, 'warn'); document.getElementById('ff-'+f.id)?.focus(); return; }
    }
  }
  const form_data = {};
  fields.forEach(f => { const el = document.getElementById('ff-'+f.id); if (el) form_data[f.id] = el.value; });

  const note = document.getElementById('ff-note')?.value || '';
  // 防連點:送出期間 disable 按鈕(對齊 onAttachmentPick 寫法);finally 解開
  const btn = document.querySelector('button[onclick="submitRequest()"]');
  if (btn) btn.disabled = true;
  try {
    await api('/api/approvals', { method:'POST', body: JSON.stringify({
      action: 'create', request_type: currentConfig.request_type,
      applicant_id: window.currentUser?.id,
      form_data, note,
      attachments: pendingAttachments,
    })});
    pendingAttachments = [];
    closeModal('new-form-modal');
    await loadMyRequests();
    toast('✅ 申請已送出，等待審批', 'success');
  } catch(e) { toast('送出失敗：'+e.message, 'error'); }
  finally { if (btn) btn.disabled = false; }
}

/* ── Detail modal ────────────────────────────────────────────────────────── */
async function openDetail(id) {
  if (!id) return;
  document.getElementById('detail-title').textContent = '載入中…';
  document.getElementById('detail-body').innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-dim)">載入中…</div>';
  document.getElementById('detail-actions').innerHTML = '<button class="btn btn-ghost" onclick="closeModal(\'detail-modal\')">關閉</button>';
  document.getElementById('detail-modal').classList.add('open');
  try {
    const data = await api(`/api/approvals?id=${id}`);
    renderDetail(data);
  } catch(e) {
    document.getElementById('detail-body').innerHTML = `<div style="padding:20px;color:var(--red)">載入失敗：${e.message}</div>`;
  }
}

function renderDetail(data) {
  const cfg   = allConfigs.find(c => c.request_type === data.request_type);
  const emp   = data.employees;
  const steps = data.steps || [];
  // Feature B:快取 detail 物件、匯出交辦單時不必重 fetch
  currentDetailData = data;
  document.getElementById('detail-title').textContent = (cfg?.icon||'📋') + ' ' + data.title;

  // hoist:effRole / currentStep / isMyStep 供下方附件 / 補件 / approve box 三處共用
  const effRole = Roles.effectiveApprovalRole(window.currentUser);
  const currentStep = steps.find(s => s.status === 'in_progress');
  const isMyStep = currentStep && (currentStep.approver_role === effRole || (effRole==='chairman' && currentStep.approver_role==='ceo'));
  // 補件權限(同後端 add_attachment OR gate 的「approver / backoffice」分支;
  // 申請人不在前端 UI 顯示、但後端依然允許,符合 Ray spec)
  const canAttachMore = (Roles.isBackofficeRole?.(window.currentUser) || isMyStep)
                     && !['cancelled','completed','rejected'].includes(data.status);

  // Info header
  let html = `<div class="emp-modal-header" style="margin-bottom:14px">
    <div class="avatar">${emp?.avatar||emp?.name?.[0]||'?'}</div>
    <div>
      <div style="font-weight:600">${emp?.name||'—'}</div>
      <div style="font-size:12px;color:var(--text-dim)">${emp?.dept_name||emp?.dept||data.dept||'—'} · ${emp?.position||'—'}</div>
    </div>
    <div style="margin-left:auto;text-align:right;margin-right:8px">
      <div style="font-size:10px;color:var(--text-dim)">申請時間</div>
      <div style="font-size:12px;font-family:'DM Mono',monospace">${fmtDate(data.created_at)}</div>
    </div>
    ${statusBadge(data.status)}
  </div>`;

  // Form data
  const fields = FORM_SCHEMA[data.request_type] || [];
  if (fields.length) {
    const fd = data.form_data || {};
    html += `<div class="section-sep">申請內容</div><div class="form-display">`;
    fields.forEach(f => {
      const val = fd[f.id];
      const isLong = f.type === 'textarea' || String(val||'').length > 22;
      html += `<div class="fd-item${isLong?' fd-full':''}">
        <div class="fd-label">${f.label}</div>
        <div class="fd-val">${val || '—'}</div>
      </div>`;
    });
    html += `</div>`;
  }
  if (data.note) html += `<div style="font-size:12px;color:var(--text-dim);background:var(--surface2);border-radius:6px;padding:8px 12px;margin-bottom:12px">備注：${data.note}</div>`;

  // P7.2:audit history(read-only、parse admin_audit_note)
  if (data.admin_audit_note && data.admin_audit_note.trim()) {
    const lines = data.admin_audit_note.split('\n').filter(l => l.trim());
    if (lines.length > 0) {
      html += `<div class="section-sep">📋 修改紀錄</div>
        <div style="font-size:12px;background:rgba(0,0,0,.12);border-radius:6px;padding:10px 12px;margin-bottom:12px;font-family:'DM Mono',monospace;line-height:1.7;color:var(--text-dim);white-space:pre-wrap">
          ${lines.map(l => `<div>${l.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`).join('')}
        </div>`;
    }
  }

  // Feature A:附件區塊(僅在有附件 OR 可補件時 render;兩者都無 → 不出空區塊)
  const atts = Array.isArray(data.attachments) ? data.attachments : [];
  // 移除附件權限:後端三選一 gate 的 client mirror(實際以後端判定為準)
  const isBackoffice = Roles.isBackofficeRole?.(window.currentUser);
  const applicantEditable = window.currentUser?.id === data.applicant_id
                         && !['completed','rejected','cancelled'].includes(data.status);
  if (atts.length > 0 || canAttachMore) {
    html += `<div class="section-sep">📎 附件（${atts.length}）</div>`;
    if (atts.length > 0) {
      html += `<div style="background:rgba(0,0,0,.08);border-radius:6px;padding:10px 12px;margin-bottom:8px;font-size:12px">
        ${atts.map(a => {
          const canRemove = isBackoffice || a.uploaded_by === window.currentUser?.id || applicantEditable;
          const rmBtn = canRemove
            ? `<button class="btn btn-ghost" style="font-size:10px;padding:1px 6px;color:#F87171;border:1px solid rgba(248,113,113,.4);margin-left:auto" onclick="removeApprovalAttachment('${_esc(data.id)}','${_esc(a.path)}')" title="移除附件">✕</button>`
            : '';
          return `<div style="padding:4px 0;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
            <a href="javascript:void(0)" onclick="openApprovalAttachment('${_esc(data.id)}','${_esc(a.path)}')" style="color:#7FBBFF;text-decoration:underline">📄 ${_esc(a.name)}</a>
            <span style="color:var(--text-dim);font-size:11px">${a.size?Math.round(a.size/1024)+' KB · ':''}${a.uploaded_at?fmtDate(a.uploaded_at):''}${a.uploaded_by?' · '+_esc(a.uploaded_by):''}</span>
            ${rmBtn}
          </div>`;
        }).join('')}
      </div>`;
    }
    if (canAttachMore) {
      html += `<div style="margin-bottom:12px">
        <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px">補件(PDF/Excel/Word/圖片,單檔≤10MB)</label>
        <input type="file" class="form-input" multiple
               accept=".pdf,.xlsx,.xls,.docx,.doc,.png,.jpg,.jpeg,.gif,.webp"
               onchange="onAttachmentAdd('${_esc(data.id)}', this)">
      </div>`;
    }
  }

  // Timeline
  html += `<div class="section-sep">審批流程</div><div class="timeline">`;
  steps.forEach((step, i) => {
    const isLast = i === steps.length - 1;
    const st = step.status;
    // B12:'skipped' 為系統自動跳過(例:sole-manager dept、無人可批),用 ⊘ 區隔於 ○(waiting)
    const dotIco = st==='approved'?'✓': st==='rejected'?'✗': st==='in_progress'?'⏳': st==='skipped'?'⊘':'○';
    const lineDone = st === 'approved';
    const approverName = step.employees?.name;
    html += `<div class="tl-step">
      <div class="tl-left">
        <div class="tl-dot ${st}">${dotIco}</div>
        ${!isLast?`<div class="tl-vline${lineDone?' done':''}"></div>`:''}
      </div>
      <div class="tl-body">
        <div class="tl-step-name">步驟 ${step.step_number}：${step.step_name}</div>
        <div class="tl-meta">
          負責：${ROLE_LABELS[step.approver_role]||step.approver_role}
          ${approverName?` · 審批人：${approverName}`:''}
          ${step.handled_at?` · ${fmtDT(step.handled_at)}`:''}
        </div>
        ${step.note?`<div class="tl-note-box">💬 ${step.note}</div>`:''}
      </div>
    </div>`;
  });
  html += `</div>`;

  // Approve action box (for current approver)
  // (effRole / currentStep / isMyStep 已在 renderDetail 開頭 hoist)
  if (isMyStep) {
    html += `<div class="action-area">
      <div style="font-size:13px;font-weight:500;margin-bottom:10px">📝 步驟 ${currentStep.step_number}：${currentStep.step_name}</div>
      <div class="form-row" style="margin-bottom:0">
        <label class="form-label">審批意見（選填）</label>
        <textarea class="form-input" id="approve-note" rows="2" placeholder="填寫備注或退回原因…"></textarea>
      </div>
    </div>`;
  }

  document.getElementById('detail-body').innerHTML = html;

  // P7.2:append admin-edit-area HTML(預設 hide、點「⚙ 進階編輯」展開)
  // 動態 render schema-driven inputs(用 FORM_SCHEMA)
  const aeFields = FORM_SCHEMA[data.request_type] || [];
  const aeFd = data.form_data || {};
  let aeInputsHtml = '';
  aeFields.forEach(f => {
    const val = aeFd[f.id] ?? '';
    let input;
    if (f.type === 'select') {
      // Phase 5b:同走 resolveSelectOptions;先前寫死 f.options.map 對 options_source 欄位會炸
      // 階段 B:unpaid_periods 例外、由 allUnpaidPeriods 直接吃(value≠label)
      let aeOptsHtml;
      if (f.options_source === 'unpaid_periods') {
        aeOptsHtml = (allUnpaidPeriods || [])
          .map(p => `<option value="${p.value}"${val===p.value?' selected':''}>${p.label}</option>`)
          .join('');
      } else {
        aeOptsHtml = resolveSelectOptions(f).map(o=>`<option value="${o}"${val===o?' selected':''}>${o}</option>`).join('');
      }
      input = `<select class="form-select" id="ae-${f.id}">
        <option value="">— 請選擇 —</option>
        ${aeOptsHtml}
      </select>`;
    } else if (f.type === 'textarea') {
      input = `<textarea class="form-input" id="ae-${f.id}" rows="2" style="resize:vertical">${String(val).replace(/&/g,'&amp;').replace(/</g,'&lt;')}</textarea>`;
    } else {
      const escVal = String(val).replace(/"/g,'&quot;');
      input = `<input class="form-input" type="${f.type}" id="ae-${f.id}" value="${escVal}">`;
    }
    aeInputsHtml += `<div class="form-row"><label class="form-label">${f.label}</label>${input}</div>`;
  });

  const aeArea = `
    <div id="admin-edit-area" style="display:none;margin-top:14px;padding:14px;background:rgba(251,146,60,.04);border:1px solid rgba(251,146,60,.25);border-radius:8px">
      <div style="font-size:11px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:#FB923C;margin-bottom:8px">⚙ 進階編輯 — 修改申請內容</div>
      <div style="font-size:11px;color:#7FBBFF;background:rgba(91,141,239,.06);border:1px solid rgba(91,141,239,.2);padding:6px 10px;border-radius:4px;margin-bottom:12px">
        ℹ 改 form_data 不重觸發 punch_correction 自動寫 attendance / 通知重發。所有變更記錄到 admin_audit_note。<br>
        ℹ 不開放改 status / step / 申請類型 / 申請人(走既有審批 / 退回 / 取消 flow)。
      </div>
      ${aeInputsHtml || '<div style="color:var(--text-dim);font-size:12px">此申請類型無可編輯欄位</div>'}
    </div>`;
  document.getElementById('detail-body').insertAdjacentHTML('beforeend', aeArea);

  // Actions
  const uid = window.currentUser?.id;
  const isApplicant = data.applicant_id === uid;
  const canCancel = isApplicant && ['pending','in_progress'].includes(data.status);
  let actions = `<button class="btn btn-ghost" onclick="closeModal('detail-modal')">關閉</button>`;
  if (canCancel) {
    actions = `<button class="btn btn-ghost" onclick="cancelRequest('${data.id}')">🚫 取消申請</button>` + actions;
  }
  if (isMyStep) {
    actions += `<button class="btn btn-reject" onclick="rejectStep('${data.id}','${currentStep.step_number}')">✗ 退回</button>
                <button class="btn btn-primary" onclick="approveStep('${data.id}','${currentStep.step_number}')">✓ 審批通過</button>`;
  }
  // P7.2:HR / admin / CEO / chairman 看到「⚙ 進階編輯」(status 非 cancelled / completed 才有意義)
  const canAdminEdit = Roles.isBackofficeRole?.(window.currentUser)
                    && !['cancelled','completed'].includes(data.status)
                    && (FORM_SCHEMA[data.request_type]?.length > 0);
  if (canAdminEdit) {
    actions += `<button class="btn btn-ghost" style="border:1px solid rgba(251,146,60,.4);color:#FB923C" onclick="openAdminEditApproval('${data.id}')">⚙ 進階編輯</button>`;
  }
  // 軟刪除按鈕:
  //   - admin/chairman 任何狀態(沿用、含 completed,清測試紀錄)
  //   - 其他後台角色(hr/ceo)只 pending/in_progress(對齊列表行刪除鈕的範圍)
  const canFullDelete = window.Roles?.canDeleteRecord?.(window.currentUser);
  const canBackofficeDelete = isBackoffice && ['pending','in_progress'].includes(data.status);
  if (canFullDelete || canBackofficeDelete) {
    actions += `<button class="btn btn-danger" onclick="openDeleteApproval('${data.id}')">🗑 刪除紀錄</button>`;
  }
  // Feature B:核准完成後可匯出交辦單(列印 → PDF / 紙本傳遞)
  if (data.status === 'completed') {
    actions += `<button class="btn btn-ghost" style="border:1px solid rgba(127,187,255,.4);color:#7FBBFF" onclick="exportApprovalHandoff()">📄 匯出交辦單</button>`;
  }
  // 撤回核准(限 admin/chairman/ceo、completed 才出):resignation / punch_correction
  // 因 cascade 由後端擋(回 422),前端不再 client-side filter、讓後端訊息透回
  const isExecutive = window.Roles?.isExecutive?.(window.currentUser);
  if (isExecutive && data.status === 'completed') {
    actions += `<button class="btn btn-ghost" style="border:1px solid rgba(248,113,113,.5);color:#F87171" onclick="revokeApproval('${_esc(data.id)}')">↩ 撤回核准</button>`;
  }
  // Phase 5:離職核准完成 → 顯示「離職檢核」入口(HR-only gate 由 /resignation-checklist.html 自身擋)
  if (data.request_type === 'resignation' && data.status === 'completed') {
    actions += `<a class="btn btn-primary" href="/resignation-checklist.html?employee_id=${encodeURIComponent(data.applicant_id)}">📋 離職檢核</a>`;
  }
  document.getElementById('detail-actions').innerHTML = actions;
}

// Phase 4b:把實際 POST 抽成 _doApprove,讓 approveStep 變 router(expense_reimbursement
// 最後一步先預檢隔月薪資期間 status;已結算跳 settlement modal,帶 settlement_mode 送出)。
async function _doApprove(requestId, stepNumber, note, settlementMode) {
  try {
    const body = {
      action:'approve', request_id:requestId, step_number:parseInt(stepNumber),
      approver_id: window.currentUser?.id, note,
    };
    if (settlementMode) body.settlement_mode = settlementMode;
    await api('/api/approvals', { method:'POST', body: JSON.stringify(body) });
    closeModal('detail-modal');
    await Promise.all([loadMyRequests(), loadPendingApprovals()]);
    if (currentTab === 'all') loadAllRequests();
    toast('✅ 已審批通過', 'success');
  } catch(e) { toast('操作失敗：'+e.message, 'error'); }
}

let _pendingApprove = null;

function openSettlementModal({ requestId, stepNumber, note, ym, status }) {
  _pendingApprove = { requestId, stepNumber, note };
  const isExec = !!window.Roles?.isExecutive?.(window.currentUser);
  const fd = (currentDetailData && currentDetailData.form_data) || {};
  const cat = fd.expense_category || '請款';
  const amt = Number(fd.amount) || 0;
  const statusZh = { approved:'已審批', paid:'已發薪', locked:'已鎖定' }[status] || status;
  let bodyHtml =
    `隔月（${ym}）薪資期間目前為「${statusZh}」。<br>` +
    `本筆「${cat}」NT$${amt.toLocaleString()} 要如何處理？`;
  const acts = [];
  acts.push(`<button class="btn btn-primary" onclick="confirmSettlement('defer')">遞延到下一個未結算月份</button>`);
  if (isExec && status === 'approved') {
    acts.push(`<button class="btn btn-reject" onclick="confirmSettlement('force')">強制併入本期（${ym}）[FORCE]</button>`);
  } else if (status !== 'approved') {
    bodyHtml += `<br><small style="color:#888">本期已發薪/鎖定,僅能遞延。</small>`;
  }
  acts.push(`<button class="btn btn-ghost" onclick="closeModal('settlement-modal')">取消</button>`);
  document.getElementById('settlement-body').innerHTML = bodyHtml;
  document.getElementById('settlement-actions').innerHTML = acts.join('');
  document.getElementById('settlement-modal').classList.add('open');
}

function confirmSettlement(mode) {
  const c = _pendingApprove; _pendingApprove = null;
  closeModal('settlement-modal');
  if (c) _doApprove(c.requestId, c.stepNumber, c.note, mode);
}

async function approveStep(requestId, stepNumber) {
  const note = document.getElementById('approve-note')?.value || '';
  const d = currentDetailData || {};
  const isLast = parseInt(stepNumber) === Number(d.total_steps);
  if (d.request_type === 'expense_reimbursement' && isLast) {
    // 算隔月 period id(Taipei、12 月跨年)
    const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' });
    const [yy, mm] = today.split('-').map(Number);
    const ny = mm === 12 ? yy + 1 : yy;
    const nm = mm === 12 ? 1 : mm + 1;
    const pid = `PP_${ny}_${String(nm).padStart(2,'0')}`;
    const ym  = `${ny}-${String(nm).padStart(2,'0')}`;
    try {
      const p = await api(`/api/salary/periods/${pid}`);
      if (['approved','paid','locked'].includes(p.status)) {
        openSettlementModal({ requestId, stepNumber, note, ym, status: p.status });
        return;
      }
    } catch(e) {
      // 404(期間未建)/ 403(權限不足)/ 網路 → fallback 直接核准,後端 defer
    }
  }
  _doApprove(requestId, stepNumber, note);
}

async function rejectStep(requestId, stepNumber) {
  const note = document.getElementById('approve-note')?.value || '';
  if (!note && !confirm('確定要退回此申請嗎？（建議填寫退回原因）')) return;
  try {
    await api('/api/approvals', { method:'POST', body: JSON.stringify({
      action:'reject', request_id:requestId, step_number:parseInt(stepNumber),
      approver_id: window.currentUser?.id, note,
    })});
    closeModal('detail-modal');
    await Promise.all([loadMyRequests(), loadPendingApprovals()]);
    if (currentTab === 'all') loadAllRequests();
    toast('已退回申請', 'warn');
  } catch(e) { toast('操作失敗：'+e.message, 'error'); }
}

async function quickApprove(requestId, stepNumber) {

    await api('/api/approvals', { method:'POST', body: JSON.stringify({

    })});

async function cancelRequest(requestId) {

// Feature A:開附件(走後端 sign_attachment_url、拿 60 秒 signed URL 開新分頁)
async function openApprovalAttachment(requestId, path) {
  if (!requestId || !path) return;
  try {
    const r = await api('/api/approvals', { method:'POST', body: JSON.stringify({
      action: 'sign_attachment_url', request_id: requestId, path,
    })});
    if (r.signedUrl) window.open(r.signedUrl, '_blank');
    else toast('無法產生附件連結', 'error');
  } catch (e) { toast('附件開啟失敗：' + e.message, 'error'); }
}

// 移除附件:呼叫後端 remove_attachment(三選一 gate、後端判定為準),成功後重 render detail
async function removeApprovalAttachment(requestId, path) {
  if (!requestId || !path) return;
  if (!confirm('確定刪除這個附件?')) return;
  try {
    await api('/api/approvals', { method:'POST', body: JSON.stringify({
      action: 'remove_attachment', request_id: requestId, path,
    })});
    toast('已移除附件', 'success');
    await openDetail(requestId);
  } catch (e) { toast('移除失敗：' + e.message, 'error'); }
}

// 撤回核准(completed → in_progress、退回最後核准步驟、限 admin/chairman/ceo)
// resignation / punch_correction 被後端 422 擋(cascade 連動),錯誤訊息透回給 user
async function revokeApproval(requestId) {
  if (!requestId) return;
  const reason = prompt('請輸入撤回理由(必填、會記錄在審計紀錄)：');
  if (reason === null) return;
  const trimmed = String(reason).trim();
  if (!trimmed) { toast('需填撤回理由', 'warn'); return; }
  try {
    await api('/api/approvals', { method:'POST', body: JSON.stringify({
      action: 'revoke_approval', request_id: requestId, reason: trimmed,
    })});
    toast('已撤回核准、退回重新審核', 'success');
    closeModal('detail-modal');
    await Promise.all([loadMyRequests(), loadPendingApprovals()]);
    if (currentTab === 'all') loadAllRequests();
  } catch (e) { toast('撤回失敗：' + e.message, 'error'); }
}

// Feature A:補件(approver / backoffice 用)— 上傳後呼叫 add_attachment、重 render detail
async function onAttachmentAdd(requestId, input) {
  const files = Array.from(input.files || []);
  if (!files.length) return;
  if (files.length > ATTACHMENT_MAX_COUNT) {
    toast(`一次最多 ${ATTACHMENT_MAX_COUNT} 檔`, 'warn');
    input.value = '';
    return;
  }
  input.disabled = true;
  let success = 0;
  try {
    for (const f of files) {
      const meta = await uploadApprovalAttachment(f);
      await api('/api/approvals', { method:'POST', body: JSON.stringify({
        action: 'add_attachment', request_id: requestId, attachment: meta,
      })});
      success++;
    }
    toast(`已新增 ${success} 個附件`, 'success');
    await openDetail(requestId);  // 重 render 拿到最新 attachments 清單
  } catch (e) {
    toast(`補件失敗(已成功 ${success} 個):` + e.message, 'error');
    if (success > 0) await openDetail(requestId);  // 部分成功也要更新 UI
  } finally {
    input.disabled = false;
    input.value = '';
  }
}

// 用 currentDetailData 組一份獨立 HTML、新分頁 + window.print() → 存 PDF / 列印。
// 不裝任何 lib、不嵌簽 URL(60 秒會過期)、附件只列清單。

function _fmtDateStrForHandoff(s) {
  if (!s) return '—';
  const d = new Date(s);
  if (isNaN(d)) return String(s);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function _stepResultLabel(st) {
  if (st === 'approved') return '同意';
  if (st === 'rejected') return '駁回';
  if (st === 'skipped')  return '系統略過';
  if (st === 'in_progress') return '進行中';
  if (st === 'waiting')  return '等待中';
  return st || '—';
}

// ───── P7.2 Admin Edit approval_requests ─────

function openAdminEditApproval(requestId) {
  // 隱藏 approve action area(避免衝突)
  const aa = document.querySelector('#detail-body .action-area');
  if (aa) aa.style.display = 'none';
  // 顯示 admin-edit-area
  const ae = document.getElementById('admin-edit-area');
  if (ae) ae.style.display = '';
  // 替換 detail-actions
  document.getElementById('detail-actions').innerHTML = `
    <button class="btn btn-ghost" onclick="closeAdminEditApproval('${requestId}')">取消編輯</button>
    <button class="btn btn-primary" onclick="saveAdminEditApproval('${requestId}')">確認編輯</button>
  `;
}

function closeAdminEditApproval(requestId) {
  // 重新 call openDetail 回到原狀
  openDetail(requestId);
}

async function saveAdminEditApproval(requestId) {
  // 找原 row(用 myRequests / allRequests / pendingItems 並聯)
  const existing = myRequests.find(r => r.id === requestId)
                || allRequests.find(r => r.id === requestId)
                || pendingItems.find(p => p.approval_requests?.id === requestId)?.approval_requests;
  if (!existing) {
    // fallback:重抓 detail
    try {
      const fresh = await api(`/api/approvals?id=${requestId}`);
      return saveAdminEditApprovalWithRow(requestId, fresh);
    } catch(e) { toast('找不到 row、重抓失敗：' + e.message, 'error'); return; }
  }
  return saveAdminEditApprovalWithRow(requestId, existing);
}

async function saveAdminEditApprovalWithRow(requestId, existing) {
  const fields = FORM_SCHEMA[existing.request_type] || [];
  if (!fields.length) { toast('無可編輯欄位', 'warn'); return; }

  // 收集當前 form_data
  const newFormData = { ...(existing.form_data || {}) };  // 保留 existing 內 schema 之外的欄位
  for (const f of fields) {
    const el = document.getElementById('ae-' + f.id);
    if (el) newFormData[f.id] = el.value;
  }

  // diff:只送有實際變化
  const oldStr = JSON.stringify(existing.form_data || {});
  const newStr = JSON.stringify(newFormData);
  if (oldStr === newStr) { toast('沒有變更', 'warn'); return; }

  // 列出變更 keys for confirm
  const changedKeys = [];
  const allKeys = new Set([...Object.keys(existing.form_data || {}), ...Object.keys(newFormData)]);
  for (const k of allKeys) {
    if (JSON.stringify(existing.form_data?.[k]) !== JSON.stringify(newFormData[k])) {
      changedKeys.push(k);
    }
  }
  if (!confirm(`確認以 admin_edit 修改申請 form_data:\n\n變更欄位：${changedKeys.join(', ')}\n\n所有變更會記錄到 admin_audit_note (audit)。`)) return;

  try {
    const r = await api('/api/approvals', {
      method: 'POST',
      body: JSON.stringify({ action: 'admin_edit', id: requestId, form_data: newFormData }),
    });
    if (r && r.ok === false) {
      toast('編輯失敗：' + (r.error || r.detail || 'unknown'), 'error');
      return;
    }
    toast('已編輯');
    closeModal('detail-modal');
    await Promise.all([loadMyRequests(), loadPendingApprovals()]);
    if (currentTab === 'all') await loadAllRequests();
  } catch(e) {
    toast('編輯失敗：' + e.message, 'error');
  }
}

// ── 軟刪除申請(限 admin/chairman、必填理由)──────────────────────────────────
// prompt + confirm 兩階段、UX 簡單版;後端 /api/approvals action=delete 寫 deleted_at/by/reason
// + admin_audit_note。刪除後該 row 不再出現於 list / detail / pending(SELECT 全加 .is(deleted_at,null))
async function openDeleteApproval(id) {
  const reason = prompt(
    '請輸入刪除理由(必填):\n常見:測試資料 / 重複申請 / 申請錯誤',
    '重複申請,刪除重複筆',
  );
  if (!reason || !reason.trim()) return;
  const trimmed = reason.trim();
  if (!confirm(`確定刪除此申請?\n理由:${trimmed}\n\n⚠ 軟刪除後將從所有列表隱藏、包括統計、待審、稽核。需 DB 手動還原。`)) return;
  try {
    const r = await api('/api/approvals', {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', id, reason: trimmed }),
    });
    if (r && r.ok === false) {
      toast('刪除失敗：' + (r.error || r.detail || 'unknown'), 'error');
      return;
    }
    toast('🗑 已刪除');
    closeModal('detail-modal');
    await Promise.all([loadMyRequests(), loadPendingApprovals()]);
    if (currentTab === 'all') await loadAllRequests();
  } catch(e) {
    toast('刪除失敗：' + e.message, 'error');
  }
}

/* ── Config editor ───────────────────────────────────────────────────────── */
function renderConfigEditor() {
  if (!allConfigs.length) return;
  const groups = {};
  allConfigs.forEach(c => { if (!groups[c.category]) groups[c.category] = []; groups[c.category].push(c); });
  let html = '';
  Object.entries(groups).forEach(([cat, items]) => {
    html += `<div style="padding:9px 16px;background:var(--surface2);font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.8px;text-transform:uppercase;color:var(--text-dim)">${CAT_ICONS[cat]||''} ${cat}</div>`;
    items.forEach(c => {
      const stepsHtml = (c.steps||[]).map((s, i) => {
        const arrow = i > 0 ? '<span style="color:var(--text-dim);font-size:11px;margin:0 2px">→</span>' : '';
        return `${arrow}<div class="cfg-pill"><span style="color:var(--text-dim)">${i+1}.</span>
          <select id="cfs-${c.id}-${s.step}" onchange="markDirty('${c.id}')">
            ${['manager','ceo','hr'].map(r=>`<option value="${r}"${s.role===r?' selected':''}>${ROLE_LABELS[r]}</option>`).join('')}
          </select>
        </div>`;
      }).join('');
      html += `<div class="cfg-row">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px">${c.icon}</span>
          <span style="font-size:13px;font-weight:500">${c.type_name}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="cfg-steps">${stepsHtml}</div>
          <button class="btn btn-primary btn-sm" id="cfsbtn-${c.id}" onclick="saveConfig('${c.id}')" style="display:none">儲存</button>
        </div>
      </div>`;
    });
  });
  document.getElementById('config-list').innerHTML = html;
}

function markDirty(configId) {
  const btn = document.getElementById('cfsbtn-'+configId);
  if (btn) btn.style.display = '';
}

async function saveConfig(configId) {
  const cfg = allConfigs.find(c => c.id === configId);
  if (!cfg) return;
  const newSteps = cfg.steps.map(s => ({
    ...s, role: document.getElementById(`cfs-${configId}-${s.step}`).value,
  }));
  try {
    await api('/api/approvals', { method:'POST', body: JSON.stringify({ action:'update_config', config_id:configId, steps:newSteps })});
    const ci = allConfigs.findIndex(c => c.id === configId);
    if (ci >= 0) allConfigs[ci].steps = newSteps;
    document.getElementById('cfsbtn-'+configId).style.display = 'none';
    toast('✅ 流程設定已儲存', 'success');
  } catch(e) { toast('儲存失敗：'+e.message, 'error'); }
}

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function statusBadge(status) {
  return `<span class="badge ${STATUS_CLS[status]||'badge-cancelled'}" style="font-size:11px">${STATUS_LABELS[status]||status}</span>`;
}

function stepDots(current, total, status) {
  let h = '<div class="step-dots">';
  const n = total || 3;
  for (let i = 1; i <= n; i++) {
    if (i > 1) h += `<div class="sline${i <= current && status !== 'rejected' ? ' done' : ''}"></div>`;
    let cls = '';
    if (status === 'completed') cls = 'done';
    else if (status === 'rejected' && i === current) cls = 'rejected';
    else if (i < current) cls = 'done';
    else if (i === current && !['cancelled'].includes(status)) cls = 'active';
    h += `<div class="sdot ${cls}"></div>`;
  }
  return h + '</div>';
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
