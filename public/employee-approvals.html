<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0F1117;color:#E8EAF0;font-family:'Noto Sans TC',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
.mobile-app{max-width:430px;margin:0 auto;min-height:100vh;background:#0F1117;display:flex;flex-direction:column}
.mobile-header{padding:52px 20px 12px}
.page-title-lg{font-size:22px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:12px;color:rgba(255,255,255,.4)}
.scroll-content{flex:1;overflow-y:auto;padding-bottom:100px}

/* ── Tabs ── */
.m-tabs{display:flex;gap:0;background:rgba(255,255,255,.04);border-radius:12px;margin:0 16px 16px;padding:4px}
.m-tab{flex:1;padding:8px 0;text-align:center;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.4);font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;font-weight:500}
.m-tab.active{background:rgba(255,255,255,.08);color:#E8EAF0}

/* ── 申請類型挑選 ── */
.type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:0 16px 16px}
.type-card{background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 12px;cursor:pointer;transition:all .15s;text-align:center}
.type-card:active{transform:scale(.97);background:rgba(91,141,239,.08);border-color:#5B8DEF}
.type-icon{font-size:26px;margin-bottom:6px}
.type-label{font-size:13px;font-weight:600;color:#E8EAF0;margin-bottom:2px}
.type-cat{font-size:10px;color:rgba(255,255,255,.35);font-family:'DM Mono',monospace;letter-spacing:.6px}

/* ── 申請列表卡片 ── */
.req-card{margin:0 16px 10px;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;cursor:pointer;transition:all .15s}
.req-card:active{transform:scale(.99);background:rgba(255,255,255,.06)}
.req-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.req-title{font-size:14px;font-weight:600;color:#E8EAF0}
.req-time{font-size:11px;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace;margin-top:2px}
.status-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;flex-shrink:0;margin-left:8px}
.s-pending{background:rgba(251,146,60,.12);color:#FB923C}
.s-in_progress{background:rgba(91,141,239,.12);color:#7FBBFF}
.s-completed{background:rgba(74,222,128,.12);color:#4ADE80}
.s-rejected{background:rgba(248,113,113,.12);color:#F87171}
.s-cancelled{background:rgba(122,133,160,.12);color:#7A85A0}
.req-meta{font-size:12px;color:rgba(255,255,255,.55);line-height:1.5}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;z-index:100;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{width:100%;max-width:430px;background:#171A24;border-radius:20px 20px 0 0;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{padding:20px 20px 12px;border-bottom:0.5px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:transparent;border:none;color:rgba(255,255,255,.5);font-size:22px;cursor:pointer;padding:0;width:30px;height:30px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px 24px;border-top:0.5px solid rgba(255,255,255,.06);display:flex;gap:10px}

.m-form-row{margin-bottom:14px}
.m-label{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:6px;display:block}
.m-input,.m-select,.m-textarea{width:100%;background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-size:14px;color:#E8EAF0;font-family:'Noto Sans TC',sans-serif;outline:none;-webkit-appearance:none}
.m-input:focus,.m-select:focus,.m-textarea:focus{border-color:rgba(91,141,239,.5)}
.m-textarea{resize:none;min-height:80px}

.btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:#5B8DEF;color:#fff}
.btn-ghost{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:0.5px solid rgba(255,255,255,.1)}
.btn-danger{background:rgba(248,113,113,.15);color:#F87171;border:0.5px solid rgba(248,113,113,.3)}

.empty-state{text-align:center;padding:48px 20px;color:rgba(255,255,255,.3)}
.empty-icon{font-size:40px;margin-bottom:10px}

/* ── 詳情區 ── */
.detail-section{padding:12px 0;border-bottom:0.5px solid rgba(255,255,255,.05)}
.detail-section:last-child{border-bottom:0}
.detail-label{font-size:10px;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace;letter-spacing:.6px;margin-bottom:4px;text-transform:uppercase}
.detail-value{font-size:13px;color:#E8EAF0;line-height:1.5}

/* 流程步驟 */
.flow-step{display:flex;gap:10px;align-items:flex-start;padding:8px 0}
.flow-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1.5px solid;flex-shrink:0}
.flow-dot-done{background:rgba(74,222,128,.15);border-color:#4ADE80;color:#4ADE80}
.flow-dot-current{background:rgba(251,146,60,.15);border-color:#FB923C;color:#FB923C}
.flow-dot-wait{background:rgba(122,133,160,.08);border-color:rgba(122,133,160,.3);color:rgba(255,255,255,.3)}
.flow-dot-reject{background:rgba(248,113,113,.15);border-color:#F87171;color:#F87171}
.flow-text{flex:1}
.flow-name{font-size:13px;color:#E8EAF0;font-weight:500}
.flow-status{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}

/* ── Toast ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#171A24;color:#E8EAF0;padding:12px 20px;border-radius:12px;font-size:13px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.4);border:0.5px solid rgba(255,255,255,.1);opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{border-left:3px solid #4ADE80}
.toast.error{border-left:3px solid #F87171}
.toast.warn{border-left:3px solid #FB923C}

/* ── 我的申請 — 三段摺疊區塊（待處理 / 草稿 / 已完成） ── */
.mine-section{margin-bottom:4px}
.mine-section-header{width:100%;display:flex;align-items:center;justify-content:space-between;background:transparent;border:none;padding:14px 16px 10px;cursor:pointer;font-size:13px;font-weight:600;color:#E8EAF0;font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent}
.mine-section-header:active{background:rgba(255,255,255,.03)}
.mine-section-title{display:flex;align-items:center;gap:8px}
.mine-section-count{background:rgba(255,255,255,.08);color:rgba(255,255,255,.55);font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;min-width:22px;text-align:center;font-family:'DM Mono',monospace}
.mine-section-chevron{transition:transform .2s;font-size:11px;color:rgba(255,255,255,.5);display:inline-block}
.mine-section.collapsed .mine-section-chevron{transform:rotate(-90deg)}
.mine-section-body{padding:0}

/* ── Bottom Nav(對齊其他 mobile 頁的 class 命名) ── */
.mobile-bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0a0c12;border-top:0.5px solid rgba(255,255,255,.08);display:flex;padding:10px 0 24px;z-index:50}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-decoration:none}
.mobile-nav-item .nav-icon{font-size:22px;opacity:.35;transition:opacity .15s}
.mobile-nav-item .nav-label{font-size:10px;color:rgba(255,255,255,.35);transition:color .15s}

.mobile-nav-item.active .nav-label{color:#5B8DEF}

/* ── FAB(浮動新增按鈕) ── */
.fab{position:fixed;bottom:90px;right:calc(50% - 215px + 16px);width:56px;height:56px;border-radius:28px;background:#5B8DEF;color:#fff;border:none;font-size:26px;font-weight:300;cursor:pointer;box-shadow:0 4px 16px rgba(91,141,239,.4);z-index:40;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.94)}
@media (max-width:430px){.fab{right:16px}}
</style>
</head>

<script>

let currentUser = null;
let API = '';
let allConfigs = [];     // 全部申請類型(含 icon, type_name, category)
let allExpenseCategories = [];  // Phase 5b:expense_reimbursement 下拉 active 類別 cache
let allUnpaidPeriods = [];      // 階段 B:expense_reimbursement target_period 下拉(當月+前3月、扣 paid/locked)

  pending:'待審核', in_progress:'審核中',

};

  'pending_mgr', 'pending_ceo',    // leave_requests
]);

  'approved', 'archived', 'terminated',    // leave_requests(rejected/cancelled 兩表共用、Set 自動去重)

function isManagerOrBackoffice(u) { return isBackoffice(u) || (u && u.is_manager === true); }

// ── Feature A:附件功能(複用 leave-attachments bucket、對齊 employee-leave.html 上傳 pattern)──

async function apiFetch(path, opts={}) {
  const { data: { session } } = await _sb.auth.getSession();
  const res = await fetch(API + path, {
    headers: {
      'Content-Type':'application/json',
      ...(session ? {'Authorization':`Bearer ${session.access_token}`} : {})
    },
    ...opts
  });
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function switchTab(t) {

  document.querySelectorAll('.scroll-content').forEach(s => s.style.display = 'none');

// ─────────────────────────────────────────
// 階段 B:expense_reimbursement target_period 下拉資料來源
// 候選 = 當月 + 前 3 月(共 4 個 YYYY-MM、跨年自動處理、新到舊)
// 撈 payroll_periods 該幾年的清單,過濾 status IN ('paid','locked')
// 「尚未建立 period」的月份視為可選(status=null)
// ─────────────────────────────────────────
function buildCandidateMonths_(today) {
  const t = today || new Date();
  const out = [];
  for (let i = 0; i < 4; i++) {
    const d = new Date(t.getFullYear(), t.getMonth() - i, 1);
    out.push({
      year: d.getFullYear(),
      month: d.getMonth() + 1,
      ym: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`,
    });
  }
  return out;
}
async function fetchPeriodsForCandidates_(candidates) {
  const years = [...new Set(candidates.map(c => c.year))];
  const statusByYM = {};
  for (const y of years) {
    try {
      const rows = await apiFetch(`/api/salary?_resource=periods&year=${y}`);
      for (const r of (rows || [])) {
        const ym = `${r.year}-${String(r.month).padStart(2, '0')}`;
        statusByYM[ym] = r.status;
      }
    } catch (e) { /* 該年無 period / API 失敗 → 該月份視為未建立、可選 */ }
  }
  return statusByYM;
}
function buildUnpaidPeriods_(candidates, statusByYM) {
  const FROZEN = new Set(['paid', 'locked']);
  return candidates
    .map(c => ({
      value: c.ym, year: c.year, month: c.month,
      status: statusByYM[c.ym] || null,
      label: `${c.year}年${c.month}月（${c.ym}）`,
    }))
    .filter(p => !FROZEN.has(p.status));
}
async function loadUnpaidPeriods_() {
  const candidates = buildCandidateMonths_();
  const statusByYM = await fetchPeriodsForCandidates_(candidates);
  return buildUnpaidPeriods_(candidates, statusByYM);
}

// expense_reimbursement 表單:當填/改費用日期 → 自動帶歸屬薪資月份
function wireTargetPeriodAutoFill_() {
  const dateEl   = document.getElementById('ff-expense_date');
  const periodEl = document.getElementById('ff-target_period');
  if (!dateEl || !periodEl) return;
  const apply = () => {
    const periods = allUnpaidPeriods || [];
    if (!periods.length) return;
    const v = dateEl.value;
    let target = null;
    if (v && v.length >= 7) {
      const ym = v.slice(0, 7);
      target = periods.find(p => p.value === ym) || null;
    }
    if (!target) target = periods[0];  // 最近的未發放月(已新到舊排序)
    if (target) periodEl.value = target.value;
  };
  dateEl.addEventListener('change', apply);
  apply();  // 初次也跑(若 expense_date 為空,預設選最近未發放月)
}

async function loadAll() {

      apiFetch('/api/approvals?type=configs'),
      apiFetch('/api/leaves?_resource=leave_types').catch(() => []),

    try { allUnpaidPeriods = await loadUnpaidPeriods_(); }

function renderMineList() {
  // 依 status 歸三類、各段保留後端順序(created_at DESC)
  const groups = { pending: [], draft: [], done: [] };
  for (const r of myRequests) {
    groups[classifyMineStatus(r.status)].push(r);
  }

  const renderCard = (r) => {
    const cfg = allConfigs.find(c => c.request_type === r.request_type);
    const icon = cfg?.icon || '📄';
    return `
      <div class="req-card" onclick="openDetail('${r.id}')">
        <div class="req-top">
          <div>
            <div class="req-title">${icon} ${cfg?.type_name || r.request_type}</div>
            <div class="req-time">${fmtDate(r.created_at)}</div>
          </div>
          <span class="status-badge s-${r.status}">${STATUS_LABELS[r.status] || r.status}</span>
        </div>
        <div class="req-meta">第 ${r.current_step} / ${r.total_steps} 步 · ${formatFormSummary(r)}</div>
      </div>`;
  };
  const emptyHtml = '<div class="empty-state" style="padding:24px 20px">目前無資料</div>';

  // 待處理 / 已完成:永遠顯示 section、空 → placeholder
  for (const key of ['pending', 'done']) {
    const list = groups[key];
    document.getElementById(`mine-list-${key}`).innerHTML =
      list.length ? list.map(renderCard).join('') : emptyHtml;
    document.getElementById(`mine-count-${key}`).textContent = list.length;
  }

  // 草稿:空則整段隱藏、有資料才顯示(收起/展開狀態保留)
  const draftList = groups.draft;
  const draftSection = document.getElementById('mine-section-draft');
  document.getElementById('mine-count-draft').textContent = draftList.length;
  if (draftList.length) {
    draftSection.style.display = '';
    document.getElementById('mine-list-draft').innerHTML = draftList.map(renderCard).join('');
  } else {
    draftSection.style.display = 'none';
    document.getElementById('mine-list-draft').innerHTML = '';
  }
}

function fmtLeaveRange(start_at, end_at, hours) {
  if (!start_at || !end_at) return `${hours || 0}h`;
  const s = new Date(start_at);
  const e = new Date(end_at);
  const fmt = (d) => `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  return `${fmt(s)} ~ ${fmt(e)} (${hours || 0}h)`;
}

async function openLeaveAttachment(path) {
  if (!path) return;
  // 完整 URL(http/https)直接開、不需簽(例如員工貼的 Google Drive folder URL)
  if (path.startsWith('http://') || path.startsWith('https://')) {
    window.open(path, '_blank');
    return;
  }
  // 相對 path → supabase storage path、client-side 簽 60 秒 signed URL
  try {
    const { data, error } = await _sb.storage
      .from('leave-attachments')
      .createSignedUrl(path, 60);
    if (error) throw error;
    if (data?.signedUrl) {
      window.open(data.signedUrl, '_blank');
    } else {
      toast('無法產生附件連結', 'error');
    }
  } catch(e) {
    toast('附件載入失敗:' + e.message, 'error');
  }
}

      <div class="detail-value">${escapeHtml(typeName)}${lt?.is_paid === false ? ' (無薪)' : ''}${lt?.pay_rate != null && lt.pay_rate > 0 && lt.pay_rate < 1 ? ` (${Math.round(Number(lt.pay_rate) * 100)}% 薪)` : ''}</div>

      const proofLabel = { required: '待補(尚未提交)', submitted: '已提交', expired: '已過期(需 HR 終止)' }[leave.proof_status] || leave.proof_status;
      const proofColor = leave.proof_status === 'expired' ? '#F87171' : leave.proof_status === 'submitted' ? '#4ADE80' : '#FB923C';
      html += `<div class="detail-section">
        <div class="detail-label">證明文件</div>
        <div class="detail-value" style="color:${proofColor}">${proofLabel}${leave.proof_url ? ` · <a href="javascript:void(0)" data-attachment-path="${escapeHtml(leave.proof_url)}" onclick="openLeaveAttachment(this.dataset.attachmentPath); return false;" style="color:#5B8DEF;text-decoration:underline">查看附件</a>` : ''}${leave.proof_due_at && leave.proof_status === 'required' ? ` · 期限 ${fmtDate(leave.proof_due_at)}` : ''}</div>

      html += `<div class="detail-section">
        <div class="detail-label">附件</div>

    if (leave.mgr_decision) {

      html += `<div class="detail-section">
        <div class="detail-label">主管審核</div>
        <div class="detail-value" style="color:${mgrColor}">${leave.mgr_decision === 'approved' ? '✓ 已通過' : '✕ 已退回'}${leave.mgr_reviewed_at ? ' · ' + fmtDate(leave.mgr_reviewed_at) : ''}${leave.mgr_reject_reason ? ' · ' + escapeHtml(leave.mgr_reject_reason) : ''}</div>
      </div>`;
    }
    if (leave.ceo_decision) {
      const ceoColor = leave.ceo_decision === 'approved' ? '#4ADE80' : '#F87171';
      html += `<div class="detail-section">
        <div class="detail-label">執行長審核</div>
        <div class="detail-value" style="color:${ceoColor}">${leave.ceo_decision === 'approved' ? '✓ 已通過' : '✕ 已退回'}${leave.ceo_reviewed_at ? ' · ' + fmtDate(leave.ceo_reviewed_at) : ''}${leave.ceo_reject_reason ? ' · ' + escapeHtml(leave.ceo_reject_reason) : ''}</div>

    // footer button
    const footer = document.getElementById('detail-footer');
    let btns = '';
    const callerEffRole = currentUser.is_manager ? 'manager'
                       : (currentUser.role === 'chairman' ? 'ceo' : currentUser.role);
    const canApproveThis = (leave.status === 'pending_mgr' && callerEffRole === 'manager')
                        || (leave.status === 'pending_ceo' && (callerEffRole === 'ceo'));
    const proofExpired = leave.proof_status === 'expired';

    if (canApproveThis) {
      btns += `<button class="btn btn-ghost" onclick="rejectLeave()">退回</button>`;
      if (proofExpired) {
        btns += `<button class="btn btn-primary" disabled style="opacity:.4;cursor:not-allowed" title="證明已過期、需 HR 終止">核准</button>`;
      } else {
        btns += `<button class="btn btn-primary" onclick="approveLeave()">核准</button>`;
      }
    }
    if (!btns) btns = `<button class="btn btn-ghost" onclick="closeModal('detail-modal')">關閉</button>`;
    footer.innerHTML = btns;
  } catch(e) {
    document.getElementById('detail-body').innerHTML =
      `<div class="empty-state">載入失敗:${escapeHtml(e.message)}</div>`;
  }

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  const h = String(d.getHours()).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  return `${m}/${day} ${h}:${min}`;
}

function formatFormSummary(r) {
  const fd = r.form_data || {};
  // 挑前 2 個有值的欄位
  const entries = Object.entries(fd).filter(([k,v]) => v).slice(0,2);
  if (entries.length === 0) return r.note || '—';
  return entries.map(([k,v]) => v).join(' · ');
}

function openForm() {
  if (!currentConfig) return;
  // Feature A:重置 pendingAttachments(避免上次未送出的殘留)
  pendingAttachments = [];
  document.getElementById('form-title').textContent = `${currentConfig.icon} ${currentConfig.type_name}`;
  const fields = FORM_SCHEMA[currentConfig.request_type] || [];

  let html = '';
  for (const f of fields) {
    const id = 'ff-' + f.id;
    if (f.type === 'textarea') {
      html += `<div class="m-form-row"><label class="m-label">${f.label}${f.required?'':''}</label>
        <textarea class="m-textarea" id="${id}" placeholder="${f.placeholder||''}"></textarea></div>`;
    } else if (f.type === 'select') {
      // Phase 5b:options_source='expense_categories' → 動態吃 cache;空 → fallback 硬編
      // 階段 B:options_source='unpaid_periods' → value/label 來自 allUnpaidPeriods
      let optsHtml;
      if (f.options_source === 'unpaid_periods') {
        optsHtml = (allUnpaidPeriods || [])
          .map(p => `<option value="${p.value}">${p.label}</option>`)
          .join('');
      } else {
        let optionVals;
        if (f.options_source === 'expense_categories') {
          const names = (allExpenseCategories || []).map(c => c.name);
          optionVals = names.length ? names : ['交通','餐費','材料','住宿','其他'];
        } else {

  if (currentConfig.request_type === 'expense_reimbursement') {
    wireTargetPeriodAutoFill_();

}

// Feature A:選檔 → 逐檔上傳 → 顯示已選清單;上傳期間 disable 送出鈕
async function onAttachmentPick(input) {
  const preview = document.getElementById('ff-attachments-preview');
  const submitBtn = document.querySelector('#form-modal .btn-primary');
  const files = Array.from(input.files || []);
  if (!files.length) return;
  if (pendingAttachments.length + files.length > ATTACHMENT_MAX_COUNT) {
    toast(`一次最多 ${ATTACHMENT_MAX_COUNT} 檔`, 'warn');
    input.value = '';
    return;
  }
  if (submitBtn) submitBtn.disabled = true;
  if (preview) preview.innerHTML = '上傳中…';
  try {
    for (const f of files) {
      const meta = await uploadApprovalAttachment(f);
      pendingAttachments.push(meta);
    }
  } catch (e) {
    alert(`上傳失敗:${e.message}`);
  } finally {
    renderAttachmentPreview();
    if (submitBtn) submitBtn.disabled = false;
    input.value = '';
  }
}

function renderAttachmentPreview() {
  const preview = document.getElementById('ff-attachments-preview');
  if (!preview) return;
  if (!pendingAttachments.length) { preview.innerHTML = ''; return; }
  preview.innerHTML = pendingAttachments.map((a, i) =>
    `<div style="display:flex;align-items:center;gap:8px;padding:3px 0">
      <span>📎 ${escapeHtml(a.name)} <span style="opacity:.6">(${Math.round((a.size||0)/1024)} KB)</span></span>
      <button class="btn btn-ghost" style="font-size:10px;padding:1px 8px;flex:none;width:auto" onclick="removePendingAttachment(${i})">✕ 移除</button>
    </div>`).join('');
}

function removePendingAttachment(i) {
  pendingAttachments.splice(i, 1);
  renderAttachmentPreview();
}

async function submitRequest() {
  if (!currentConfig) return;
  const fields = FORM_SCHEMA[currentConfig.request_type] || [];
  for (const f of fields) {
    if (f.required) {
      const v = document.getElementById('ff-'+f.id)?.value?.trim();
      if (!v) { toast(`請填寫「${f.label}」`, 'warn'); document.getElementById('ff-'+f.id)?.focus(); return; }
    }
  }
  const form_data = {};
  fields.forEach(f => {
    const el = document.getElementById('ff-'+f.id);
    if (el) form_data[f.id] = el.value;
  });
  const note = document.getElementById('ff-note')?.value || '';

  try {
    await apiFetch('/api/approvals', { method:'POST', body: JSON.stringify({
      action:'create', request_type: currentConfig.request_type,
      applicant_id: currentUser.id, form_data, note,
      attachments: pendingAttachments,
    })});
    pendingAttachments = [];
    closeModal('form-modal');
    toast('✅ 申請已送出', 'success');
    await loadMine();
  } catch(e) { toast('送出失敗:' + e.message, 'error'); }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Feature A 上傳 helper(對齊 approvals.html L306-334、但用本頁 _sb / currentUser)──
// ASCII-safe storage key(對齊 approvals.html L306-322):中文 / 括號 / # / % 會被
// Supabase Storage 拒收(Invalid key),storage key 嚴格 sanitize 成 [A-Za-z0-9._-]、
// 副檔名轉小寫只留 [a-z0-9];原始檔名留 metadata.name 顯示用、不影響 UI。
function _safeFilename(name) {
  const raw = String(name || '');
  const dot = raw.lastIndexOf('.');
  let base = dot > 0 ? raw.slice(0, dot) : raw;
  let ext  = dot > 0 ? raw.slice(dot + 1) : '';
  base = base.replace(/[^A-Za-z0-9._-]+/g, '_').replace(/_+/g, '_').replace(/^_+|_+$/g, '');
  if (!base) base = 'file';
  if (base.length > 80) base = base.slice(0, 80);
  ext = ext.toLowerCase().replace(/[^a-z0-9]/g, '');
  if (!ext) ext = 'bin';
  return `${base}.${ext}`;
}
async function uploadApprovalAttachment(file) {
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  if (!ATTACHMENT_EXTS.includes(ext)) {
    throw new Error(`不支援的檔案類型:${file.name}(僅接受 PDF/Excel/Word/圖片)`);
  }
  if (file.size > ATTACHMENT_MAX_BYTES) {
    throw new Error(`檔案過大:${file.name}(上限 10MB)`);
  }
  if (!currentUser?.id) throw new Error('使用者未載入、無法上傳');
  const safeName = _safeFilename(file.name);
  const path = `${currentUser.id}/${Date.now()}_${safeName}`;
  const { error: upErr } = await _sb.storage
    .from('leave-attachments').upload(path, file, { upsert: true });
  if (upErr) throw new Error(`${file.name}:${upErr.message}`);
  return {
    path,
    name: file.name,
    mime: file.type || null,
    size: file.size,
    uploaded_at: new Date().toISOString(),
    uploaded_by: currentUser.id,
  };
}

// 撤回核准(completed → in_progress、退回最後核准步驟、限 admin/chairman/ceo)
// resignation / punch_correction 後端 422 擋(cascade 連動),錯誤訊息透回給 user
async function revokeApproval(requestId) {
  if (!requestId) return;
  const reason = prompt('請輸入撤回理由(必填、會記錄在審計紀錄):');
  if (reason === null) return;
  const trimmed = String(reason).trim();
  if (!trimmed) { toast('需填撤回理由', 'warn'); return; }
  try {
    await apiFetch('/api/approvals', { method:'POST', body: JSON.stringify({
      action: 'revoke_approval', request_id: requestId, reason: trimmed,
    })});
    toast('已撤回核准、退回重新審核', 'success');
    closeModal('detail-modal');
    await loadAll();
  } catch (e) { toast('撤回失敗:' + e.message, 'error'); }

// Feature A:補件(申請人 / approver / backoffice 用)— 上傳後呼叫 add_attachment、重 render detail
async function onAttachmentAdd(requestId, input) {
  const files = Array.from(input.files || []);
  if (!files.length) return;
  if (files.length > ATTACHMENT_MAX_COUNT) {
    toast(`一次最多 ${ATTACHMENT_MAX_COUNT} 檔`, 'warn');
    input.value = '';
    return;
  }
  input.disabled = true;
  let success = 0;
  try {
    for (const f of files) {
      const meta = await uploadApprovalAttachment(f);
      await apiFetch('/api/approvals', { method:'POST', body: JSON.stringify({
        action: 'add_attachment', request_id: requestId, attachment: meta,
      })});
      success++;
    }
    toast(`已新增 ${success} 個附件`, 'success');
    await openDetail(requestId);  // 重 render 拿到最新 attachments 清單
  } catch (e) {
    toast(`補件失敗(已成功 ${success} 個):` + e.message, 'error');
    if (success > 0) await openDetail(requestId);
  } finally {
    input.disabled = false;
    input.value = '';
  }
}

// 用 currentDetailData 組一份獨立 HTML、新分頁 + window.print() → 存 PDF / 列印。

function _fmtDateStrForHandoff(s) {
  if (!s) return '—';
  const d = new Date(s);
  if (isNaN(d)) return String(s);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function _stepResultLabel(st) {
  if (st === 'approved') return '同意';
  if (st === 'rejected') return '駁回';
  if (st === 'skipped')  return '系統略過';
  if (st === 'in_progress') return '進行中';
  if (st === 'waiting')  return '等待中';
  return st || '—';
}

function exportApprovalHandoff() {

  }

  const cfgName = cfg ? `${cfg.icon || ''} ${cfg.type_name}` : data.request_type;
  const emp = data.employees || {};
  const steps = (data.steps || []).slice().sort((a, b) => (a.step_number||0) - (b.step_number||0));
  const atts = Array.isArray(data.attachments) ? data.attachments : [];
  const fields = FORM_SCHEMA[data.request_type] || [];
  const fd = data.form_data || {};
  const me = currentUser || {};
  const docTitle = `交辦單_${data.id}`;

  let formRows;

      `<tr><th>${escapeHtml(f.label)}</th><td>${escapeHtml(fd[f.id] ?? '—')}</td></tr>`

      : '<tr><td colspan="2" style="text-align:center;color:#999">(無表單欄位)</td></tr>';
  }

  const stepApprover = (step) => {
    if (step.employees?.name) {

      return escapeHtml(step.employees.name + pos);
    }
    return escapeHtml(step.approver_id || '—');
  };
  const stepRows = steps.length
    ? steps.map(s => `<tr>
        <td style="text-align:center">${s.step_number}</td>
        <td>${escapeHtml(s.step_name || '—')}</td>
        <td>${escapeHtml(ROLE_LABELS[s.approver_role] || s.approver_role || '—')}</td>
        <td>${stepApprover(s)}</td>

      </tr>`).join('')
    : '<tr><td colspan="7" style="text-align:center;color:#999">(無歷程)</td></tr>';

  const attRows = atts.length
    ? atts.map(a => `<tr>
        <td>📎 ${escapeHtml(a.name || '—')}</td>
        <td>${escapeHtml(a.uploaded_by || '—')}</td>

// Phase 4b:把實際 POST 抽成 _doApprove,approveStep 變 router(expense_reimbursement
// 最後一步先預檢隔月期間 status、已結算用 confirm/alert 帶 settlement_mode 送出)。
async function _doApprove(stepNum, note, settlementMode) {
  try {
    const body = {
      action:'approve', request_id: currentDetailId, step_number: stepNum,
      approver_id: currentUser.id, note,
    };
    if (settlementMode) body.settlement_mode = settlementMode;
    await apiFetch('/api/approvals', { method:'POST', body: JSON.stringify(body) });
    closeModal('detail-modal');
    toast('✅ 已核准', 'success');
    await Promise.all([loadMine(), loadPending()]);
  } catch(e) { toast('核准失敗:' + e.message, 'error'); }
}

async function approveStep(stepNum) {
  const note = prompt('審批備注(選填):') || '';
  const d = currentDetailData || {};
  const isLast = Number(stepNum) === Number(d.total_steps);
  let settlementMode;
  if (d.request_type === 'expense_reimbursement' && isLast) {
    // 算隔月 period id(Taipei、12 月跨年)
    const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' });
    const [yy, mm] = today.split('-').map(Number);
    const ny = mm === 12 ? yy + 1 : yy;
    const nm = mm === 12 ? 1 : mm + 1;
    const pid = `PP_${ny}_${String(nm).padStart(2,'0')}`;
    const ym  = `${ny}-${String(nm).padStart(2,'0')}`;
    try {
      const p = await apiFetch(`/api/salary/periods/${pid}`);
      if (['approved','paid','locked'].includes(p.status)) {
        const isExec = !!currentUser && ['admin','chairman','ceo'].includes(currentUser.role);
        if (p.status === 'approved' && isExec) {
          const force = confirm(`隔月(${ym})薪資已審批結算。\n\n確定 = 強制併入本期(${ym})[FORCE]\n取消 = 自動遞延到下一個未結算月份`);
          settlementMode = force ? 'force' : 'defer';
        } else {
          alert(`隔月(${ym})薪資已結算,本筆將自動遞延到下一個未結算月份。`);
          settlementMode = 'defer';
        }
      }
    } catch(e) {
      // 404 / 403 / 網路 → settlementMode 留 undefined,後端 cascade 走 defer
    }
  }
  _doApprove(stepNum, note, settlementMode);
}

async function rejectStep(stepNum) {
  const note = prompt('退回原因(必填):');
  if (!note) { toast('需填寫退回原因', 'warn'); return; }
  try {
    await apiFetch('/api/approvals', { method:'POST', body: JSON.stringify({
      action:'reject', request_id: currentDetailId, step_number: stepNum,
      approver_id: currentUser.id, note,
    })});
    closeModal('detail-modal');
    toast('已退回', 'success');
    await Promise.all([loadMine(), loadPending()]);
  } catch(e) { toast('退回失敗:' + e.message, 'error'); }
}

async function approveLeave() {
  let override_reason = '';
  if (currentDetailLeave?.late_application) {
    override_reason = prompt('遲報申請、需填寫核可原因:') || '';
    if (!override_reason.trim()) {
      toast('遲報申請需填寫核可原因', 'warn');
      return;
    }
  }
  try {
    await apiFetch(`/api/leaves/${encodeURIComponent(currentDetailId)}`, {
      method: 'PUT',
      body: JSON.stringify({
        decision: 'approve',
        ...(override_reason.trim() ? { override_reason: override_reason.trim() } : {}),
      })
    });
    closeModal('detail-modal');
    toast('✅ 已核准', 'success');
    await loadPending();
  } catch(e) { toast('核准失敗:' + e.message, 'error'); }
}

async function rejectLeave() {
  const reason = prompt('退回原因(必填):');
  if (!reason || !reason.trim()) {
    toast('需填寫退回原因', 'warn');
    return;
  }
  try {
    await apiFetch(`/api/leaves/${encodeURIComponent(currentDetailId)}`, {
      method: 'PUT',
      body: JSON.stringify({
        decision: 'reject',
        reject_reason: reason.trim(),
      })
    });
    closeModal('detail-modal');
    toast('已退回', 'success');
    await loadPending();
  } catch(e) { toast('退回失敗:' + e.message, 'error'); }
}
