<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>請假 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .balance-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .bal-card{background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:10px;padding:14px}
  .bal-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace}
  .bal-num{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;margin-top:4px}
  .bal-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
  .form-card{background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:10px;padding:18px;margin-bottom:18px}
  .pill{padding:3px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace}
  /* Phase 1.4: stage badge classes(對齊 utils.js stageBadgeClass)*/
  .badge-pending{background:rgba(251,191,36,.15);color:#FBBF24}
  .badge-approved{background:rgba(74,222,128,.15);color:#4ADE80}
  .badge-archived{background:rgba(74,222,128,.10);color:#86efac}
  .badge-rejected{background:rgba(248,113,113,.12);color:#F87171}
  .badge-cancelled{background:rgba(107,114,128,.15);color:#9CA3AF}
  .leave-row{display:grid;grid-template-columns:90px 100px 1fr 70px 100px;gap:10px;padding:10px 12px;border-bottom:0.5px solid rgba(255,255,255,.06);align-items:center;font-size:13px}
  .leave-row.head{font-weight:600;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:11px;background:rgba(0,0,0,.15)}
  .est-hint{font-size:13px;color:#7FBBFF;background:rgba(91,141,239,.08);padding:8px 12px;border-radius:6px;margin-top:8px}
  .lt-hint{font-size:12px;color:rgba(255,255,255,.55);margin-top:6px;line-height:1.5}
  .lt-hint .lt-advance{color:#7FBBFF}
  .lt-hint .lt-proof{color:#FBBF24;display:block}
  .late-warn{font-size:13px;color:#FB923C;background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.25);padding:8px 12px;border-radius:6px;margin-top:8px}
  .hard-warn{font-size:13px;color:#F87171;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);padding:8px 12px;border-radius:6px;margin-top:8px}
  .mini-tag{padding:2px 6px;border-radius:3px;font-size:10px;font-family:'DM Mono',monospace;margin-left:4px}
  .mini-tag-late{background:rgba(251,146,60,.15);color:#FB923C}
  .mini-tag-proof{background:rgba(251,191,36,.15);color:#FBBF24}
</style>
</head>
<body data-page="leave">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">請假</div>
        <div class="page-sub">查餘額、申請假單、撤回</div>
      </div>
    </div>

    <div class="section-h" style="font-size:14px;color:var(--text-dim);margin-bottom:8px">我的特休</div>
    <div class="balance-grid">
      <div class="bal-card"><div class="bal-label">法定天數</div><div class="bal-num" id="b-legal">—</div></div>
      <div class="bal-card"><div class="bal-label">實給</div><div class="bal-num" id="b-granted">—</div></div>
      <div class="bal-card"><div class="bal-label">已用</div><div class="bal-num" id="b-used">—</div></div>
      <div class="bal-card"><div class="bal-label">剩餘</div><div class="bal-num" id="b-remaining" style="color:#4ADE80">—</div><div class="bal-sub" id="b-period">—</div></div>
    </div>

    <div class="section-h" style="font-size:14px;color:var(--text-dim);margin-bottom:8px">補休</div>
    <div class="bal-card" style="margin-bottom:18px;color:var(--text-dim);font-size:13px">補休餘額請至「補休」頁面查詢。</div>

    <div class="section-h" style="font-size:14px;color:var(--text-dim);margin-bottom:8px">申請假單</div>
    <div class="form-card">
      <div style="display:grid;grid-template-columns:160px 1fr 1fr;gap:12px">
        <div class="form-row">
          <label class="form-label">類型</label>
          <select class="form-select" id="f-type" onchange="onTypeOrTimeChange()">
            <option value="">載入中…</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">開始時間</label>
          <input type="datetime-local" class="form-input" id="f-start" oninput="onTypeOrTimeChange()">
        </div>
        <div class="form-row">
          <label class="form-label">結束時間</label>
          <input type="datetime-local" class="form-input" id="f-end" oninput="onTypeOrTimeChange()">
        </div>
      </div>
      <div class="lt-hint" id="lt-hint" style="display:none"></div>
      <div class="form-row" style="margin-top:8px">
        <label class="form-label">理由</label>
        <input type="text" class="form-input" id="f-reason" placeholder="例:出國 / 看醫生 / 婚假">
      </div>
      <!-- soft late 時顯示 -->
      <div class="form-row" id="late-reason-row" style="display:none;margin-top:8px">
        <label class="form-label" style="color:#FB923C">遲報原因 (必填)</label>
        <input type="text" class="form-input" id="f-late-reason" placeholder="例:臨時家裡有事、無法事先通知">
      </div>
      <div class="est-hint" id="est-hint" style="display:none"></div>
      <div class="late-warn" id="late-warn" style="display:none"></div>
      <div class="hard-warn" id="hard-warn" style="display:none"></div>
      <div style="display:flex;justify-content:flex-end;margin-top:12px">
        <button class="btn btn-primary" id="submit-btn" onclick="submitRequest()">送出申請</button>
      </div>
    </div>

    <div class="section-h" style="font-size:14px;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;gap:10px">
      我的假單
      <select class="form-select" id="f-year" onchange="loadList()" style="width:100px"></select>
    </div>
    <div class="table-wrap">
      <div class="leave-row head">
        <div>類型</div><div>狀態</div><div>時間</div><div>時數</div><div>操作</div>
      </div>
      <div id="leave-list"></div>
    </div>
  </main>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDt(iso){ if(!iso) return '—'; const d=new Date(iso); const pad=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }

// 假別中文名統一從 /api/leaves?_resource=leave_types 動態拿(見 public/js/utils.js)

let currentYear = new Date().getFullYear();

function buildYearOptions() {
  const sel = document.getElementById('f-year');
  const y = new Date().getFullYear();
  sel.innerHTML = [y-1, y, y+1].map(x => `<option value="${x}"${x===currentYear?' selected':''}>${x}</option>`).join('');
}

async function load(retries = 0) {
  if (!window.api || !window.currentUser) {
    if (retries < 25) return setTimeout(()=>load(retries+1), 200);
    return;
  }
  // 載入假別中文名(idempotent)+ 完整 row(advance/proof 等)
  await window.HR_Utils?.loadLeaveTypeLabels?.();
  populateTypeOptions();
  await Promise.all([loadBalance(), loadList()]);
}

function populateTypeOptions() {
  const sel = document.getElementById('f-type');
  const types = window.HR_Utils?.leaveTypes?.() || [];
  if (!types.length) {
    sel.innerHTML = '<option value="">（無可用假別）</option>';
    return;
  }
  // 依 display_order 排(utils.js cache 已 sorted)、value=code、label=name_zh
  sel.innerHTML = '<option value="">請選擇假別</option>'
    + types.map(t => `<option value="${escHtml(t.code)}">${escHtml(t.name_zh)}</option>`).join('');
}

async function loadBalance() {
  try {
    const r = await api(`/api/leaves?annual_balance=true&employee_id=${currentUser.id}`);
    const b = r.balance || {};
    if (!b.has_record) {
      document.getElementById('b-legal').textContent = '—';
      document.getElementById('b-granted').textContent = '—';
      document.getElementById('b-used').textContent = '—';
      document.getElementById('b-remaining').textContent = '無紀錄';
      document.getElementById('b-period').textContent = '請洽 HR';
      return;
    }
    document.getElementById('b-legal').textContent    = b.legal_days;
    document.getElementById('b-granted').textContent  = b.granted_days;
    document.getElementById('b-used').textContent     = b.used_days;
    document.getElementById('b-remaining').textContent = b.remaining_days;
    document.getElementById('b-period').textContent   = `週期到 ${b.period_end}`;
  } catch(e) { toast('餘額載入失敗:'+e.message, 'error'); }
}

async function loadList() {
  currentYear = parseInt(document.getElementById('f-year').value);
  try {
    const r = await api(`/api/leaves?employee_id=${currentUser.id}&year=${currentYear}`);
    renderList(r.requests || []);
  } catch(e) { toast('載入假單失敗:'+e.message, 'error'); }
}

function renderList(rows) {
  const wrap = document.getElementById('leave-list');
  if (!rows.length) {
    wrap.innerHTML = `<div style="padding:30px;text-align:center;color:var(--text-dim);font-size:13px">無假單</div>`;
    return;
  }
  const SU = window.HR_Utils;
  wrap.innerHTML = rows.map(r => {
    const tName = SU.leaveTypeLabel(r.leave_type);
    const hours = r.finalized_hours ?? r.hours ?? '—';
    // pending / pending_mgr / pending_ceo 都算「未走完」、員工本人可撤回
    const cancellable = ['pending','pending_mgr','pending_ceo'].includes(r.status)
                        && r.employee_id === currentUser.id;
    const lateTag = r.late_application ? `<span class="mini-tag mini-tag-late">⚠ 補申請</span>` : '';
    const proofTag = r.proof_status === 'required'
      ? `<span class="mini-tag mini-tag-proof" title="需於 ${fmtDt(r.proof_due_at)} 前補繳">⏳ 待補證明</span>` : '';
    const proofBtn = (r.proof_status === 'required' && r.employee_id === currentUser.id)
      ? `<button class="btn btn-ghost btn-sm" onclick="uploadProof('${escHtml(r.id)}')">📎 提交證明</button>` : '';
    const cancelBtn = cancellable
      ? `<button class="btn btn-ghost btn-sm" onclick="cancelOne('${escHtml(r.id)}')">撤回</button>` : '';
    return `
      <div class="leave-row">
        <div>${escHtml(tName)}${lateTag}${proofTag}</div>
        <div><span class="pill ${SU.stageBadgeClass(r.status)}">${escHtml(SU.stageLabel(r.status))}</span></div>
        <div style="font-size:12px">${fmtDt(r.start_at)} ~ ${fmtDt(r.end_at)}</div>
        <div style="font-family:'DM Mono',monospace">${hours}h</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${proofBtn}${cancelBtn}</div>
      </div>
    `;
  }).join('');
}

let _est_timer = null;
function onTypeOrTimeChange() {
  clearTimeout(_est_timer);
  _est_timer = setTimeout(_doEstimateAndCheck, 250);
}
function _doEstimateAndCheck() {
  const SU = window.HR_Utils;
  const code = document.getElementById('f-type').value;
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;

  // 假別 hint(advance + proof)
  const ltHint = document.getElementById('lt-hint');
  const lt = SU.leaveType(code);
  if (lt) {
    const adv = SU.advanceHintText(lt);
    const proof = SU.proofHintText(lt);
    ltHint.innerHTML = `<span class="lt-advance">⏰ ${escHtml(adv)}</span>`
                     + (proof ? `<span class="lt-proof">📎 ${escHtml(proof)}</span>` : '');
    ltHint.style.display = '';
  } else {
    ltHint.style.display = 'none';
  }

  // 粗估時數
  const hint = document.getElementById('est-hint');
  if (!start || !end) {
    hint.style.display = 'none';
  } else {
    const startMs = new Date(start).getTime();
    const endMs   = new Date(end).getTime();
    if (endMs <= startMs) { hint.textContent='結束時間需晚於開始'; hint.style.display=''; }
    else {
      const rough = Math.round((endMs - startMs) / 360000) / 10;
      hint.textContent = `(粗估 ${rough} 小時;實際以伺服端依當下排班計算為準)`;
      hint.style.display='';
    }
  }

  // advance time client-side check
  const lateWarn = document.getElementById('late-warn');
  const hardWarn = document.getElementById('hard-warn');
  const lateRow  = document.getElementById('late-reason-row');
  const submitBtn = document.getElementById('submit-btn');
  lateWarn.style.display = 'none';
  hardWarn.style.display = 'none';
  lateRow.style.display = 'none';
  submitBtn.disabled = false;
  if (lt && start) {
    const r = SU.checkAdvanceClient(lt, new Date(start).toISOString(), new Date());
    if (!r.ok) {
      hardWarn.textContent = `❌ 未達前置時間:${SU.advanceHintText(lt)}(目前距假期 ${Math.floor(r.gapHours)} 小時、不足 ${r.advanceHours} 小時)、無法送出`;
      hardWarn.style.display = '';
      submitBtn.disabled = true;
    } else if (r.late) {
      lateWarn.textContent = `⚠ 未達建議前置時間(目前距假期 ${Math.floor(r.gapHours)} 小時、建議 ${r.advanceHours} 小時)、請補充遲報原因`;
      lateWarn.style.display = '';
      lateRow.style.display = '';
    }
  }
}

async function submitRequest() {
  const SU = window.HR_Utils;
  const leave_type = document.getElementById('f-type').value;
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;
  const reason = document.getElementById('f-reason').value.trim();
  const lateReasonEl = document.getElementById('f-late-reason');
  const lateRow = document.getElementById('late-reason-row');
  if (!leave_type) { toast('請選擇假別','error'); return; }
  if (!start || !end) { toast('請填開始 / 結束時間','error'); return; }
  if (new Date(end).getTime() <= new Date(start).getTime()) {
    toast('結束時間需晚於開始','error'); return;
  }
  // soft late 時 late_reason 必填
  let late_reason = null;
  if (lateRow.style.display !== 'none') {
    late_reason = lateReasonEl.value.trim();
    if (!late_reason) { toast('請填遲報原因','error'); lateReasonEl.focus(); return; }
  }
  try {
    const startIso = new Date(start).toISOString();
    const endIso   = new Date(end).toISOString();
    const r = await api('/api/leaves', { method:'POST', body: JSON.stringify({
      leave_type, start_at: startIso, end_at: endIso, reason: reason || null,
      late_reason,
    })});
    if (!r.ok) {
      const msg = r.reason === 'ADVANCE_TIME_NOT_MET'
        ? `未達前置時間(需 ${r.advance_hours} 小時、距假期僅 ${Math.floor(r.gap_hours)} 小時)`
        : r.reason === 'LATE_REASON_REQUIRED'
        ? '請填遲報原因'
        : (r.reason || 'unknown');
      toast('申請失敗:' + msg, 'error');
      if (r.reason === 'LATE_REASON_REQUIRED') lateReasonEl.focus();
      return;
    }
    toast('已送出申請,等待主管審核');
    document.getElementById('f-reason').value = '';
    if (lateReasonEl) lateReasonEl.value = '';
    await load();
  } catch(e) {
    toast('申請失敗:'+e.message, 'error');
  }
}

async function cancelOne(id) {
  if (!confirm('確定撤回此假單?')) return;
  try {
    // Phase 1.3:員工本人撤回走 DELETE(canCancel 檢查 actor.id===employee_id + pending_*)
    await api(`/api/leaves/${encodeURIComponent(id)}`, { method:'DELETE' });
    toast('已撤回');
    await loadList();
  } catch(e) { toast('撤回失敗:'+e.message, 'error'); }
}

async function uploadProof(id) {
  const url = prompt('請貼上證明文件的 URL(先把證明上傳到雲端再貼連結):');
  if (!url || !url.trim()) return;
  try {
    const r = await api(`/api/leaves/${encodeURIComponent(id)}`, {
      method: 'PUT',
      body: JSON.stringify({ action: 'submit_proof', proof_url: url.trim() }),
    });
    if (r && r.ok === false) { toast('提交失敗:' + (r.reason || r.error || 'unknown'), 'error'); return; }
    toast('已提交證明');
    await loadList();
  } catch(e) { toast('提交失敗:'+e.message, 'error'); }
}

buildYearOptions();
load();
</script>

<script src="/js/roles.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/pwa.js"></script>
<script>PWA.init();</script>
</body>
</html>
