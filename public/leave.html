<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>請假 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .balance-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .bal-card{background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:10px;padding:14px}
  .bal-label{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace}
  .bal-num{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;margin-top:4px}
  .bal-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
  .form-card{background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:10px;padding:18px;margin-bottom:18px}
  .pill{padding:3px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace}
  .p-pending{background:rgba(251,191,36,.15);color:#FBBF24}
  .p-approved{background:rgba(74,222,128,.15);color:#4ADE80}
  .p-rejected{background:rgba(248,113,113,.12);color:#F87171}
  .p-cancelled{background:rgba(107,114,128,.15);color:#9CA3AF}
  .leave-row{display:grid;grid-template-columns:90px 80px 1fr 70px 80px;gap:10px;padding:10px 12px;border-bottom:0.5px solid rgba(255,255,255,.06);align-items:center;font-size:13px}
  .leave-row.head{font-weight:600;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:11px;background:rgba(0,0,0,.15)}
  .est-hint{font-size:13px;color:#7FBBFF;background:rgba(91,141,239,.08);padding:8px 12px;border-radius:6px;margin-top:8px}
</style>
</head>
<body data-page="leave">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">請假</div>
        <div class="page-sub">查餘額、申請假單、撤回</div>
      </div>
    </div>

    <div class="section-h" style="font-size:14px;color:var(--text-dim);margin-bottom:8px">我的特休</div>
    <div class="balance-grid">
      <div class="bal-card"><div class="bal-label">法定天數</div><div class="bal-num" id="b-legal">—</div></div>
      <div class="bal-card"><div class="bal-label">實給</div><div class="bal-num" id="b-granted">—</div></div>
      <div class="bal-card"><div class="bal-label">已用</div><div class="bal-num" id="b-used">—</div></div>
      <div class="bal-card"><div class="bal-label">剩餘</div><div class="bal-num" id="b-remaining" style="color:#4ADE80">—</div><div class="bal-sub" id="b-period">—</div></div>
    </div>

    <div class="section-h" style="font-size:14px;color:var(--text-dim);margin-bottom:8px">補休</div>
    <div class="bal-card" style="margin-bottom:18px;color:var(--text-dim);font-size:13px">補休餘額管理在 Batch 6 上線(目前佔位)</div>

    <div class="section-h" style="font-size:14px;color:var(--text-dim);margin-bottom:8px">申請假單</div>
    <div class="form-card">
      <div style="display:grid;grid-template-columns:160px 1fr 1fr;gap:12px">
        <div class="form-row">
          <label class="form-label">類型</label>
          <select class="form-select" id="f-type" onchange="estimate()">
            <option value="annual">特休 (annual)</option>
            <option value="sick">病假 (sick)</option>
            <option value="personal">事假 (personal)</option>
            <option value="maternity">產假 (maternity)</option>
            <option value="funeral">喪假 (funeral)</option>
            <option value="marriage">婚假 (marriage)</option>
            <option value="comp">補休 (comp)</option>
            <option value="public">公假 (public)</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">開始時間</label>
          <input type="datetime-local" class="form-input" id="f-start" oninput="estimate()">
        </div>
        <div class="form-row">
          <label class="form-label">結束時間</label>
          <input type="datetime-local" class="form-input" id="f-end" oninput="estimate()">
        </div>
      </div>
      <div class="form-row" style="margin-top:8px">
        <label class="form-label">理由</label>
        <input type="text" class="form-input" id="f-reason" placeholder="例:出國 / 看醫生 / 婚假">
      </div>
      <div class="est-hint" id="est-hint" style="display:none"></div>
      <div style="display:flex;justify-content:flex-end;margin-top:12px">
        <button class="btn btn-primary" onclick="submitRequest()">送出申請</button>
      </div>
    </div>

    <div class="section-h" style="font-size:14px;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;gap:10px">
      我的假單
      <select class="form-select" id="f-year" onchange="loadList()" style="width:100px"></select>
    </div>
    <div class="table-wrap">
      <div class="leave-row head">
        <div>類型</div><div>狀態</div><div>時間</div><div>時數</div><div>操作</div>
      </div>
      <div id="leave-list"></div>
    </div>
  </main>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDt(iso){ if(!iso) return '—'; const d=new Date(iso); const pad=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }

const TYPE_NAME = { annual:'特休', sick:'病假', personal:'事假', maternity:'產假', funeral:'喪假', marriage:'婚假', comp:'補休', public:'公假' };

let currentYear = new Date().getFullYear();

function buildYearOptions() {
  const sel = document.getElementById('f-year');
  const y = new Date().getFullYear();
  sel.innerHTML = [y-1, y, y+1].map(x => `<option value="${x}"${x===currentYear?' selected':''}>${x}</option>`).join('');
}

async function load(retries = 0) {
  if (!window.api || !window.currentUser) {
    if (retries < 25) return setTimeout(()=>load(retries+1), 200);
    return;
  }
  await Promise.all([loadBalance(), loadList()]);
}

async function loadBalance() {
  try {
    const r = await api(`/api/leaves?annual_balance=true&employee_id=${currentUser.id}`);
    const b = r.balance || {};
    if (!b.has_record) {
      document.getElementById('b-legal').textContent = '—';
      document.getElementById('b-granted').textContent = '—';
      document.getElementById('b-used').textContent = '—';
      document.getElementById('b-remaining').textContent = '無紀錄';
      document.getElementById('b-period').textContent = '請洽 HR';
      return;
    }
    document.getElementById('b-legal').textContent    = b.legal_days;
    document.getElementById('b-granted').textContent  = b.granted_days;
    document.getElementById('b-used').textContent     = b.used_days;
    document.getElementById('b-remaining').textContent = b.remaining_days;
    document.getElementById('b-period').textContent   = `週期到 ${b.period_end}`;
  } catch(e) { toast('餘額載入失敗:'+e.message, 'error'); }
}

async function loadList() {
  currentYear = parseInt(document.getElementById('f-year').value);
  try {
    const r = await api(`/api/leaves?employee_id=${currentUser.id}&year=${currentYear}`);
    renderList(r.requests || []);
  } catch(e) { toast('載入假單失敗:'+e.message, 'error'); }
}

function renderList(rows) {
  const wrap = document.getElementById('leave-list');
  if (!rows.length) {
    wrap.innerHTML = `<div style="padding:30px;text-align:center;color:var(--text-dim);font-size:13px">無假單</div>`;
    return;
  }
  wrap.innerHTML = rows.map(r => {
    const tName = TYPE_NAME[r.leave_type] || r.leave_type;
    const hours = r.finalized_hours ?? r.hours ?? '—';
    const canCancel = r.status === 'pending' && r.employee_id === currentUser.id;
    return `
      <div class="leave-row">
        <div>${escHtml(tName)}</div>
        <div><span class="pill p-${escHtml(r.status)}">${escHtml(r.status)}</span></div>
        <div style="font-size:12px">${fmtDt(r.start_at)} ~ ${fmtDt(r.end_at)}</div>
        <div style="font-family:'DM Mono',monospace">${hours}h</div>
        <div>${canCancel ? `<button class="btn btn-ghost btn-sm" onclick="cancelOne('${escHtml(r.id)}')">撤回</button>` : ''}</div>
      </div>
    `;
  }).join('');
}

let _est_timer = null;
async function estimate() {
  clearTimeout(_est_timer);
  _est_timer = setTimeout(_doEstimate, 250);
}
async function _doEstimate() {
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;
  const hint  = document.getElementById('est-hint');
  if (!start || !end) { hint.style.display='none'; return; }
  // 簡單預估:用 client time 算粗略時數;實際以 server 算為準
  const startMs = new Date(start).getTime();
  const endMs   = new Date(end).getTime();
  if (endMs <= startMs) { hint.textContent='結束時間需晚於開始'; hint.style.display=''; return; }
  const rough = Math.round((endMs - startMs) / 360000) / 10;
  hint.textContent = `(粗估 ${rough} 小時;實際以伺服端依當下排班計算為準)`;
  hint.style.display='';
}

async function submitRequest() {
  const leave_type = document.getElementById('f-type').value;
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;
  const reason = document.getElementById('f-reason').value.trim();
  if (!start || !end) { toast('請填開始 / 結束時間','error'); return; }
  if (new Date(end).getTime() <= new Date(start).getTime()) {
    toast('結束時間需晚於開始','error'); return;
  }
  try {
    const startIso = new Date(start).toISOString();
    const endIso   = new Date(end).toISOString();
    const r = await api('/api/leaves', { method:'POST', body: JSON.stringify({
      leave_type, start_at: startIso, end_at: endIso, reason: reason || null,
    })});
    if (!r.ok) { toast('申請失敗:'+(r.reason||'unknown'), 'error'); return; }
    toast('已送出申請,等待主管審核');
    document.getElementById('f-reason').value = '';
    await load();
  } catch(e) {
    toast('申請失敗:'+e.message, 'error');
  }
}

async function cancelOne(id) {
  if (!confirm('確定撤回此假單?')) return;
  try {
    await api(`/api/leaves/${encodeURIComponent(id)}`, { method:'PUT', body: JSON.stringify({ decision: 'cancel' })});
    toast('已撤回');
    await loadList();
  } catch(e) { toast('撤回失敗:'+e.message, 'error'); }
}

buildYearOptions();
load();
</script>

<script src="/js/roles.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/pwa.js"></script>
<script>PWA.init();</script>
</body>
</html>
