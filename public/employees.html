<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>員工資料 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:28px}
  .emp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;cursor:pointer;transition:all .2s}
  .emp-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .emp-card-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .avatar-lg{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#3B5FD4,#7B6CF6);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
  .emp-card-name{font-size:16px;font-weight:600}
  .emp-card-pos{font-size:12px;color:var(--text-dim)}
  .emp-card-info{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .emp-card-item{font-size:12px;color:var(--text-dim)}
  .emp-card-item span{color:var(--text);font-weight:500}
  .detail-section{margin-bottom:20px}
  .detail-section-title{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .detail-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .detail-item .d-label{font-size:11px;color:var(--text-dim);margin-bottom:2px}
  .detail-item .d-value{font-size:14px}
  .salary-display{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent2)}
  .view-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .view-btn{padding:7px 12px;background:transparent;border:none;cursor:pointer;font-size:15px;color:var(--text-dim);transition:all .15s}
  .view-btn:hover{background:var(--surface2)}
  .view-btn.active{background:var(--accent);color:#fff}
  .readonly-field{background:var(--surface)!important;color:var(--text-dim)!important;cursor:default}
  .salary-summary{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
  .sal-item .sal-label{font-size:10px;color:var(--text-dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
  .sal-item .sal-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace}
  .sal-total .sal-label{color:var(--accent2)}
  .sal-total .sal-val{color:var(--accent2);font-size:16px}
  .check-row{display:flex;align-items:center;gap:8px;padding-top:28px}
  .check-row input[type=checkbox]{width:16px;height:16px;cursor:pointer}
  .check-row label{font-size:13px;cursor:pointer}
  .seniority-badge{display:inline-block;padding:3px 10px;background:rgba(91,141,239,.12);color:var(--accent2);border-radius:20px;font-size:12px;font-weight:500;font-family:'DM Mono',monospace}
  .emp-type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px}
  .emp-type-full{background:rgba(91,141,239,.15);color:#7EB3FF;border:1px solid rgba(91,141,239,.3)}
  .emp-type-part{background:rgba(255,160,80,.15);color:#FFA050;border:1px solid rgba(255,160,80,.3)}
  .radio-row{display:flex;align-items:center;gap:16px;padding-top:6px}
  .radio-row label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
  .radio-row input[type=radio]{cursor:pointer}
  th.sortable{cursor:pointer;user-select:none}
  th.sortable:hover{color:var(--text)}
  .si{margin-left:2px;font-size:9px;color:var(--text-dim)}
  th.sorted-asc .si,th.sorted-desc .si{color:var(--accent2)}
  /* ── Spreadsheet view ── */
  .sheet-wrap{overflow:auto;max-height:calc(100vh - 260px);border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
  .sheet-table{border-collapse:collapse;table-layout:fixed;width:max-content;min-width:100%}
  .sheet-table th,.sheet-table td{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:0;height:34px;white-space:nowrap;overflow:hidden;position:relative}
  .sheet-table tr:first-child th{border-top:none}
  .sheet-table td:first-child,.sheet-table th:first-child{border-left:none}
  .sheet-table thead th{background:var(--surface2);font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.4px;color:var(--text-dim);text-transform:uppercase;position:sticky;top:0;z-index:2;padding:0 8px;user-select:none}
  .sheet-table th:first-child,.sheet-table td:first-child{position:sticky;left:0;z-index:1;background:var(--surface2)}
  .sheet-table thead th:first-child{z-index:3}
  .sheet-table tbody tr:nth-child(even) td{background:rgba(255,255,255,.018)}
  .sheet-table tbody tr:nth-child(even) td:first-child{background:rgba(255,255,255,.035)}
  .sheet-table tbody tr.row-resigned td{opacity:.45}
  .ci{padding:0 8px;height:34px;display:flex;align-items:center;font-size:12px;cursor:text;gap:4px}
  .ci.ro{cursor:default}.ci.acc{color:var(--accent2);font-family:'DM Mono',monospace;font-weight:600}.ci.mn{font-family:'DM Mono',monospace}
  .cell-edit-wrap{height:34px;display:flex;align-items:stretch}
  .cell-input{width:100%;background:var(--bg);border:2px solid var(--accent);color:var(--text);font-size:12px;font-family:'Noto Sans TC',sans-serif;padding:0 6px;outline:none;box-sizing:border-box}
  .cell-input.mn{font-family:'DM Mono',monospace}
  @keyframes fok{0%,100%{background:transparent}40%{background:rgba(76,175,80,.28)}}
  @keyframes ferr{0%,100%{background:transparent}40%{background:rgba(244,67,54,.28)}}
  .f-ok{animation:fok .65s ease}.f-err{animation:ferr .65s ease}
  .rh{position:absolute;top:0;right:0;width:5px;height:100%;cursor:col-resize;z-index:4}
  .rh:hover{background:var(--accent);opacity:.5}
  .cbadge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600}
  .cb-active{background:rgba(76,175,80,.2);color:#81C784}.cb-inactive{background:rgba(255,152,0,.2);color:#FFB74D}.cb-resigned{background:rgba(180,180,180,.15);color:#9E9E9E}
  .cb-full{color:#7EB3FF}.cb-part{color:#FFA050}
  .col-sort{margin-left:2px;font-size:9px;color:var(--text-dim)}
  th.sorted-asc .col-sort,th.sorted-desc .col-sort{color:var(--accent2)}
  .sheet-footer{padding:10px 0 0;display:flex;align-items:center;gap:12px}
  .save-hint{font-size:11px;color:var(--text-dim)}
  .btn-reject{background:rgba(248,113,113,.12);color:#F87171;border:1px solid rgba(248,113,113,.25)}
  .btn-reject:hover{background:rgba(248,113,113,.22)}
  .ins-change-table{width:100%;font-size:13px;border-collapse:collapse;margin-bottom:16px}
  .ins-change-table th{background:var(--surface2);padding:8px 12px;text-align:left;font-weight:500}
  .ins-change-table td{padding:8px 12px;border-bottom:0.5px solid var(--border)}
</style>
</head>
<body data-page="employees">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">員工資料</div>
        <div class="page-sub">管理所有員工個人與職務資訊</div>
      </div>
      <div class="header-actions">
        <div class="view-toggle">
          <button class="view-btn active" id="view-card" onclick="setView('card')" title="卡片檢視">🃏</button>
          <button class="view-btn" id="view-list" onclick="setView('list')" title="列表檢視">📋</button>
          <button class="view-btn" id="view-table" onclick="setView('table')" title="試算表">📊</button>
        </div>
        <div class="btn-group">
          <button class="btn btn-ghost btn-sm" onclick="exportEmpTemplate()" title="下載匯入範本">📄 範本</button>
          <button class="btn btn-ghost btn-sm" onclick="exportEmpData()" title="匯出員工資料">📤 匯出</button>
          <label class="btn btn-ghost btn-sm" title="匯入員工資料" style="cursor:pointer">📥 匯入<input type="file" accept=".xlsx,.xls" style="display:none" onchange="importEmpExcel(this)"></label>
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">＋ 新增員工</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card green"><div class="stat-label">在職員工</div><div class="stat-value" id="st-active">—</div><div class="stat-hint">人</div></div>
      <div class="stat-card blue"><div class="stat-label">部門數量</div><div class="stat-value" id="st-dept">—</div><div class="stat-hint">個部門</div></div>
      <div class="stat-card orange"><div class="stat-label">本月新進</div><div class="stat-value" id="st-new">—</div><div class="stat-hint">人</div></div>
      <div class="stat-card red"><div class="stat-label">已離職</div><div class="stat-value" id="st-resigned">—</div><div class="stat-hint">人</div></div>
    </div>

    <!-- Filter + View toggle -->
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="搜尋姓名、Email…" oninput="renderList()">
      <select id="dept-filter" onchange="renderList()">
        <option value="">全部部門</option>
      </select>
      <select id="status-filter" onchange="renderList()">
        <option value="active">在職</option>
        <option value="">全部</option>
        <option value="resigned">已離職</option>
      </select>
    </div>

    <!-- Card view -->
    <div id="view-card-content">
      <div class="emp-grid" id="emp-grid"></div>
      <div id="card-empty" class="empty-state" style="display:none"><div class="icon">👤</div><div>找不到符合的員工</div></div>
    </div>

    <!-- List view -->
    <div id="view-list-content" style="display:none">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>員工</th>
            <th class="sortable" onclick="sortEmployees('emp_no')">編號<span class="si" id="si-emp_no">↕</span></th>
            <th class="sortable" onclick="sortEmployees('dept')">部門<span class="si" id="si-dept">↕</span></th>
            <th class="sortable" onclick="sortEmployees('position')">職稱<span class="si" id="si-position">↕</span></th>
            <th class="sortable" onclick="sortEmployees('grade')">職等/職級<span class="si" id="si-grade">↕</span></th>
            <th>電子郵件</th>
            <th class="sortable" onclick="sortEmployees('hire_date')">到職日<span class="si" id="si-hire_date">↕</span></th>
            <th class="sortable" onclick="sortEmployees('total')">月薪合計<span class="si" id="si-total">↕</span></th>
            <th class="sortable" onclick="sortEmployees('status')">狀態<span class="si" id="si-status">↕</span></th>
            <th>操作</th>
          </tr></thead>
          <tbody id="emp-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Spreadsheet view -->
    <div id="view-table-content" style="display:none">
      <div class="sheet-wrap" id="sht-sheet-wrap">
        <table class="sheet-table" id="sht-sheet-table">
          <colgroup id="sht-colgroup"></colgroup>
          <thead><tr id="sht-head-row"></tr></thead>
          <tbody id="sht-sheet-body"></tbody>
        </table>
      </div>
      <div class="sheet-footer">
        <span id="sht-save-status" class="save-hint"></span>
      </div>
    </div>
  </main>
</div>

<!-- 員工編輯 Modal -->
<div class="modal-bg" id="emp-modal">
  <div class="modal modal-lg">
    <div class="modal-title" id="emp-modal-title">員工詳細資料</div>

    <!-- 基本資料 -->
    <div class="detail-section">
      <div class="detail-section-title">基本資料</div>
      <div class="detail-grid">
        <div class="form-row"><label class="form-label">姓名 *</label><input class="form-input" id="f-name"></div>
        <div class="form-row"><label class="form-label">員工編號</label><input class="form-input readonly-field" id="f-emp-no" placeholder="選雇用類型+入職日後自動產生" readonly></div>
        <div class="form-row"><label class="form-label">電子郵件</label><input class="form-input" id="f-email" type="email"></div>
        <div class="form-row"><label class="form-label">電話</label><input class="form-input" id="f-phone"></div>
        <div class="form-row"><label class="form-label">身分證字號</label><input class="form-input" id="f-id-num"></div>
        <div class="form-row"><label class="form-label">生日</label><input class="form-input" id="f-birth" type="date"></div>
        <div class="form-row" style="grid-column:span 2"><label class="form-label">地址</label><input class="form-input" id="f-address"></div>
      </div>
    </div>

    <hr class="form-divider">

    <!-- 職務資訊 -->
    <div class="detail-section">
      <div class="detail-section-title">職務資訊</div>
      <div class="detail-grid">
        <div class="form-row" style="grid-column:span 2"><label class="form-label">雇用類型 *</label>
          <div class="radio-row">
            <label><input type="radio" name="f-emp-type" id="f-type-full" value="full_time" checked onchange="onEmpTypeOrHireChange()"> 正職（full_time）</label>
            <label><input type="radio" name="f-emp-type" id="f-type-part" value="part_time" onchange="onEmpTypeOrHireChange()"> 兼職（part_time）</label>
            <label style="margin-left:8px;padding-left:8px;border-left:1px solid var(--border)">
              <input type="checkbox" id="f-no-insurance"> 無勞健保投保
            </label>
          </div>
        </div>
        <div class="form-row"><label class="form-label">部門 *</label>
          <select class="form-select" id="f-dept">
            <option value="">載入中…</option>
          </select>
        </div>
        <div class="form-row"><label class="form-label">職稱 *</label><input class="form-input" id="f-position"></div>
        <div class="form-row"><label class="form-label">角色</label>
          <select class="form-select" id="f-role">
            <option value="employee">一般員工</option>
            <option value="manager">主管</option>
            <option value="hr">人資</option>
            <option value="ceo">執行長</option>
            <option value="chairman">董事長</option>
            <option value="admin">管理員</option>
          </select>
        </div>
        <div class="form-row"><label class="form-label">職等</label>
          <select class="form-select" id="f-grade" onchange="onGradeChange()">
            <option value="">— 選擇職等 —</option>
            <option value="一等">一等</option>
            <option value="二等">二等</option>
            <option value="三等">三等</option>
          </select>
        </div>
        <div class="form-row"><label class="form-label">職級</label>
          <select class="form-select" id="f-grade-level" onchange="onGradeLevelChange()">
            <option value="">— 先選職等 —</option>
          </select>
        </div>
        <div class="check-row">
          <input type="checkbox" id="f-is-manager" onchange="onGradeLevelChange()">
          <label for="f-is-manager">擔任主管職</label>
          <span id="mgr-note" style="font-size:11px;color:var(--text-dim);margin-left:4px"></span>
        </div>
        <div class="form-row"><label class="form-label">到職日</label><input class="form-input" id="f-hire" type="date" oninput="onEmpTypeOrHireChange(); document.getElementById('f-seniority').textContent=calcSeniority(this.value)"></div>
        <div class="form-row"><label class="form-label">離職日期</label><input class="form-input" id="f-resign-date" type="date"></div>
        <div class="form-row"><label class="form-label">狀態</label>
          <select class="form-select" id="f-status">
            <option value="active">在職</option><option value="inactive">暫停</option><option value="resigned">已離職</option>
          </select>
        </div>
        <div class="form-row"><label class="form-label">年資</label>
          <div style="padding-top:8px"><span id="f-seniority" class="seniority-badge">—</span></div>
        </div>
      </div>
    </div>

    <hr class="form-divider">

    <!-- 薪資結構（唯讀） -->
    <div class="detail-section">
      <div class="detail-section-title">薪資結構（自動計算）</div>
      <div class="salary-summary">
        <div class="sal-item">
          <div class="sal-label">底薪</div>
          <div class="sal-val" id="disp-base">$30,000</div>
        </div>
        <div class="sal-item">
          <div class="sal-label">職等加給</div>
          <div class="sal-val" id="disp-grade-allow">—</div>
        </div>
        <div class="sal-item">
          <div class="sal-label">全勤獎金</div>
          <div class="sal-val" id="disp-att-bonus">—</div>
          <div id="att-bonus-hint" style="display:none;font-size:11px;color:var(--text-dim);margin-top:2px">主管／特定職級不計全勤</div>
        </div>
        <div class="sal-item" id="disp-mgr-wrap">
          <div class="sal-label">主管加給</div>
          <div class="sal-val" id="disp-mgr-allow">—</div>
        </div>
        <div class="sal-item sal-total" style="grid-column:span 4;border-top:1px solid var(--border);padding-top:10px;margin-top:4px">
          <div class="sal-label">月薪合計</div>
          <div class="sal-val" id="disp-total">—</div>
        </div>
      </div>
      <!-- 額外加給（可編輯） -->
      <div class="detail-grid" style="margin-top:12px">
        <div class="form-row">
          <label class="form-label">額外加給</label>
          <input class="form-input" type="number" id="f-extra-allow" min="0" placeholder="0"
                 oninput="onExtraAllowChange()">
        </div>
        <div class="form-row">
          <label class="form-label">加給說明</label>
          <input class="form-input" id="f-extra-allow-note" placeholder="例：交通補貼、技術加給">
        </div>
      </div>
    </div>

    <hr class="form-divider">

    <!-- 薪資帳戶 -->
    <div class="detail-section">
      <div class="detail-section-title">薪資帳戶</div>
      <div class="form-row"><label class="form-label">銀行帳號</label><input class="form-input" id="f-bank"></div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-resign" onclick="resignEmployee()" style="margin-right:auto">離職</button>
      <button class="btn btn-warn btn-sm" id="btn-reset-pw" onclick="resetEmpPassword()" style="display:none" title="重設為預設密碼 123456">🔑 重設密碼</button>
      <button class="btn btn-ghost" onclick="closeModal('emp-modal')">取消</button>
      <button class="btn btn-primary" id="emp-save-btn" onclick="saveEmployee()">儲存</button>
    </div>
  </div>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}

let allEmployees  = [];
let allSalaryGrades = [];
let allDepts      = [];
let editingId     = null;
let currentMode   = 'card';
let sortField = '', sortDir = '';

const GRADE_ORDER  = { '一等':1, '二等':2, '三等':3 };
const STATUS_ORDER = { 'active':0, 'inactive':1, 'resigned':2 };

function sortEmployees(field) {
  if (sortField === field) {
    sortDir = sortDir === 'asc' ? 'desc' : sortDir === 'desc' ? '' : 'asc';
    if (!sortDir) sortField = '';
  } else {
    sortField = field; sortDir = 'asc';
  }
  renderList();
}

function getSorted(rows) {
  if (!sortField || !sortDir) return rows;
  return [...rows].sort((a, b) => {
    let cmp = 0;
    if (sortField === 'total') {
      cmp = calcTotal(a) - calcTotal(b);
    } else if (sortField === 'grade') {
      const ga = GRADE_ORDER[a.grade] ?? 0, gb = GRADE_ORDER[b.grade] ?? 0;
      cmp = ga !== gb ? ga - gb : (a.grade_level ?? 0) - (b.grade_level ?? 0);
    } else if (sortField === 'status') {
      cmp = (STATUS_ORDER[a.status] ?? 3) - (STATUS_ORDER[b.status] ?? 3);
    } else {
      const av = a[sortField] ?? '', bv = b[sortField] ?? '';
      cmp = typeof av === 'number' && typeof bv === 'number'
        ? av - bv
        : String(av).localeCompare(String(bv), 'zh-TW');
    }
    return sortDir === 'asc' ? cmp : -cmp;
  });
}

function updateEmpSortIndicators() {
  ['emp_no','dept','position','grade','hire_date','total','status'].forEach(f => {
    const el = document.getElementById('si-'+f);
    if (!el) return;
    const th = el.closest('th');
    th.classList.remove('sorted-asc','sorted-desc');
    if (sortField === f) {
      el.textContent = sortDir === 'asc' ? '↑' : sortDir === 'desc' ? '↓' : '↕';
      if (sortDir) th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    } else {
      el.textContent = '↕';
    }
  });
}

/* ── Grade level map ── */
const GRADE_LEVELS = { '一等': [1,2,3], '二等': [1,2,3], '三等': [1,2,3,4,5] };

window.onload = async () => {
  await new Promise(r => setTimeout(r, 600));
  try {
    await Promise.all([loadEmployees(), loadSalaryGrades(), loadDepts()]);
  } catch(e) { toast('載入失敗：'+e.message,'error'); }
};

async function loadSalaryGrades() {
  try { allSalaryGrades = await api('/api/salary-grade'); } catch(e) { allSalaryGrades = []; }
}

async function loadDepts() {
  try {
    const depts = await api('/api/departments');
    allDepts = depts;
    const opts = depts.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
    document.getElementById('f-dept').innerHTML    = opts;

async function loadEmployees() {
  allEmployees = await api('/api/employees');
  updateStats();
  renderList();

function updateStats() {
  const active   = allEmployees.filter(e=>e.status==='active');
  const resigned = allEmployees.filter(e=>e.status==='resigned');
  const depts    = [...new Set(allEmployees.map(e=>e.dept))];
  const now = new Date();
  const newHires = active.filter(e => {
    const h = new Date(e.hire_date);
    return h.getFullYear()===now.getFullYear() && h.getMonth()===now.getMonth();
  });
  document.getElementById('st-active').textContent   = active.length;
  document.getElementById('st-dept').textContent     = depts.length;
  document.getElementById('st-new').textContent      = newHires.length;
  document.getElementById('st-resigned').textContent = resigned.length;
}

function fillDeptFilter() {
  const depts = [...new Set(allEmployees.map(e=>e.dept))];
  const sel = document.getElementById('dept-filter');
  sel.innerHTML = '<option value="">全部部門</option>' +
    depts.map(d=>`<option value="${d}">${d}</option>`).join('');
}

function getFiltered() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const dept   = document.getElementById('dept-filter').value;
  const status = document.getElementById('status-filter').value;
  return allEmployees.filter(e => {
    if (status && e.status !== status) return false;
    if (dept && e.dept !== dept) return false;
    if (search && !e.name.includes(search) && !(e.email||'').includes(search)) return false;
    return true;
  });
}

function noAttBonus(e) {
  return ['manager','ceo','chairman'].includes(e.role) || e.is_manager === true;
}

function calcTotal(e) {
  if (e.employment_type === 'part_time') return null;
  const base = Number(e.base_salary       || 30000);
  const ga   = Number(e.grade_allowance   || 0);
  const ab   = noAttBonus(e) ? 0 : Number(e.attendance_bonus  || 0);
  const ma   = Number(e.manager_allowance || 0);
  const ea   = Number(e.extra_allowance   || 0);
  return base + ga + ab + ma + ea;
}

function onExtraAllowChange() {
  // Recompute the displayed total when extra_allowance input changes
  const row    = currentGradeRow();
  const base   = 30000;
  const ga     = row?.grade_allowance   || 0;
  const isMgr  = document.getElementById('f-is-manager').checked;
  const role   = document.getElementById('f-role').value;
  const skipAb = ['manager','ceo','chairman'].includes(role) || isMgr;
  const ab     = skipAb ? 0 : (row?.attendance_bonus || 0);
  const canMgr = row ? !!row.can_be_manager : false;
  const ma     = (isMgr && canMgr) ? (row?.manager_allowance || 0) : 0;
  const ea     = parseFloat(document.getElementById('f-extra-allow').value) || 0;
  const total  = base + ga + ab + ma + ea;
  document.getElementById('disp-total').textContent = '$' + total.toLocaleString();
}

function setView(mode) {
  currentMode = mode;
  ['card','list','table'].forEach(m => {
    document.getElementById('view-'+m+'-content').style.display = m === mode ? '' : 'none';
    document.getElementById('view-'+m).classList.toggle('active', m === mode);
  });
  if (mode === 'table') renderStaffTable();
  else if (mode === 'list') renderTable();
  else renderCards();
}

/* ── Employment type + emp_no auto-generation ── */
function generateEmpNo(employmentType, hireDate) {
  if (!hireDate) return '';
  const type = employmentType === 'part_time' ? '02' : '01';
  const d  = new Date(hireDate);
  const yy = String(d.getFullYear()).slice(-2);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return type + yy + mm + dd;
}

function getSelectedEmpType() {
  return document.getElementById('f-type-part').checked ? 'part_time' : 'full_time';
}

function onEmpTypeOrHireChange() {
  // Only auto-generate in add mode (editingId === null)
  if (editingId !== null) return;
  const hireDate = document.getElementById('f-hire').value;
  const empType  = getSelectedEmpType();
  const base = generateEmpNo(empType, hireDate);
  if (!base) { document.getElementById('f-emp-no').value = ''; return; }

  // Check for duplicate among existing employees and append A/B/C suffix
  const existing = allEmployees
    .map(e => e.emp_no || '')
    .filter(n => n === base || n.startsWith(base) && n.length === base.length + 1);

  if (!existing.includes(base)) {
    document.getElementById('f-emp-no').value = base;
  } else {
    // Find next available suffix A-Z
    let suffix = '';
    for (let i = 0; i < 26; i++) {
      const candidate = base + String.fromCharCode(65 + i);
      if (!existing.includes(candidate)) { suffix = String.fromCharCode(65 + i); break; }
    }
    document.getElementById('f-emp-no').value = base + suffix;
  }
}

/* ── Grade / Level UI helpers ── */
function currentGradeRow() {
  const grade = document.getElementById('f-grade').value;
  const level = parseInt(document.getElementById('f-grade-level').value) || null;
  return allSalaryGrades.find(r => r.grade === grade && r.grade_level === level) || null;
}

function onGradeChange() {
  const grade = document.getElementById('f-grade').value;
  const levels = GRADE_LEVELS[grade] || [];
  const sel = document.getElementById('f-grade-level');
  sel.innerHTML = levels.length
    ? levels.map(l=>`<option value="${l}">${l} 級</option>`).join('')
    : '<option value="">— 先選職等 —</option>';
  onGradeLevelChange();
}

function onGradeLevelChange() {
  const grade = document.getElementById('f-grade').value;
  const level = parseInt(document.getElementById('f-grade-level').value) || null;
  const isManager = document.getElementById('f-is-manager').checked;
  const role  = document.getElementById('f-role').value;

  const row = allSalaryGrades.find(r => r.grade === grade && r.grade_level === level);

  const base   = 30000;
  const ga     = row ? (row.grade_allowance  || 0) : 0;
  const skipAb = ['manager','ceo','chairman'].includes(role) || isManager;
  const ab     = skipAb ? 0 : (row ? (row.attendance_bonus || 0) : 0);
  const canMgr = row ? !!row.can_be_manager : false;
  const ma     = (isManager && canMgr) ? (row?.manager_allowance || 0) : 0;

  // Update manager checkbox availability
  const mgrNote = document.getElementById('mgr-note');
  if (row) {
    document.getElementById('f-is-manager').disabled = !canMgr;
    mgrNote.textContent = canMgr ? '' : '（此職等職級不可擔任主管）';
    if (!canMgr) document.getElementById('f-is-manager').checked = false;
  } else {
    document.getElementById('f-is-manager').disabled = true;
    mgrNote.textContent = '';
  }

  // Update display
  document.getElementById('disp-grade-allow').textContent = ga  ? '$'+ga.toLocaleString()  : '—';
  document.getElementById('disp-att-bonus').textContent   = ab  ? '$'+ab.toLocaleString()  : '—';
  document.getElementById('att-bonus-hint').style.display = skipAb ? 'block' : 'none';
  document.getElementById('disp-mgr-allow').textContent   = ma  ? '$'+ma.toLocaleString()  : '—';
  document.getElementById('disp-mgr-wrap').style.opacity  = isManager && canMgr ? '1' : '0.4';

  const total = row ? base + ga + ab + ma : null;
  document.getElementById('disp-total').textContent = total ? '$'+total.toLocaleString() : '—';
}

function calcSeniority(hireDate) {
  if (!hireDate) return '—';
  const start = new Date(hireDate);
  const now   = new Date();
  let years  = now.getFullYear() - start.getFullYear();
  let months = now.getMonth() - start.getMonth();
  if (months < 0) { years--; months += 12; }
  if (years < 0) return '未到職';
  return years > 0 ? `${years}年${months}月` : `${months}月`;
}

function openEditModal(id) {
  const e = allEmployees.find(x=>x.id===id);
  if (!e) return;
  editingId = id;
  document.getElementById('emp-modal-title').textContent = `✏️ 編輯員工：${e.name}`;

  document.getElementById('f-name').value        = e.name        || '';
  document.getElementById('f-emp-no').value      = e.emp_no      || '';
  // Employment type radios
  const isPart = e.employment_type === 'part_time';
  document.getElementById('f-type-full').checked    = !isPart;
  document.getElementById('f-type-part').checked    =  isPart;
  document.getElementById('f-no-insurance').checked = (e.has_insurance === false);
  document.getElementById('f-email').value       = e.email       || '';
  document.getElementById('f-phone').value       = e.phone       || '';
  document.getElementById('f-id-num').value      = e.id_number   || '';
  document.getElementById('f-birth').value       = e.birth_date  || '';
  document.getElementById('f-address').value     = e.address     || '';
  document.getElementById('f-dept').value        = e.dept        || '';
  document.getElementById('f-position').value    = e.position    || '';
  document.getElementById('f-role').value        = e.role        || 'employee';
  document.getElementById('f-hire').value        = e.hire_date   || '';
  document.getElementById('f-resign-date').value = e.resign_date || '';
  document.getElementById('f-status').value      = e.status      || 'active';
  document.getElementById('f-bank').value        = e.bank_account|| '';

  // Grade fields
  document.getElementById('f-grade').value = e.grade || '';
  onGradeChange(); // rebuild grade_level options first
  if (e.grade_level) document.getElementById('f-grade-level').value = e.grade_level;
  document.getElementById('f-is-manager').checked = !!e.is_manager;
  onGradeLevelChange(); // update display

  // Extra allowance
  document.getElementById('f-extra-allow').value      = e.extra_allowance      || '';
  document.getElementById('f-extra-allow-note').value = e.extra_allowance_note || '';

  // Seniority
  document.getElementById('f-seniority').textContent = calcSeniority(e.hire_date);

  // Resign button: only for active employees
  document.getElementById('btn-resign').style.display = e.status === 'active' ? '' : 'none';

  // Reset-password button: only for hr/chairman/admin
  const adminRole = window.currentUser?.role;
  document.getElementById('btn-reset-pw').style.display =
    ['hr','chairman','admin'].includes(adminRole) ? '' : 'none';

  document.getElementById('emp-modal').classList.add('open');
}

/* ── Save ── */
async function saveEmployee() {
  const payload = {
    name:            document.getElementById('f-name').value.trim(),
    emp_no:          document.getElementById('f-emp-no').value.trim() || null,
    employment_type: getSelectedEmpType(),
    email:        document.getElementById('f-email').value.trim()  || null,
    phone:        document.getElementById('f-phone').value.trim()  || null,
    id_number:    document.getElementById('f-id-num').value.trim() || null,
    birth_date:   document.getElementById('f-birth').value         || null,
    address:      document.getElementById('f-address').value.trim()|| null,
    dept:         document.getElementById('f-dept').value,
    position:     document.getElementById('f-position').value.trim(),
    role:         document.getElementById('f-role').value,
    grade:             document.getElementById('f-grade').value         || null,
    grade_level:       parseInt(document.getElementById('f-grade-level').value) || null,
    is_manager:        document.getElementById('f-is-manager').checked,
    base_salary:       30000,
    grade_allowance:   currentGradeRow()?.grade_allowance  ?? 0,
    attendance_bonus:  (() => {
      const r2 = document.getElementById('f-role').value;
      const m2 = document.getElementById('f-is-manager').checked;
      if (['manager','ceo','chairman'].includes(r2) || m2) return 0;
      return currentGradeRow()?.attendance_bonus ?? 0;
    })(),
    manager_allowance: (() => {
      const row = currentGradeRow();
      return (document.getElementById('f-is-manager').checked && row?.can_be_manager)
        ? (row?.manager_allowance ?? 0) : 0;
    })(),
    extra_allowance:      parseFloat(document.getElementById('f-extra-allow').value) || 0,
    extra_allowance_note: document.getElementById('f-extra-allow-note').value.trim() || null,
    has_insurance:        !document.getElementById('f-no-insurance').checked,
    hire_date:    document.getElementById('f-hire').value          || null,
    resign_date:  document.getElementById('f-resign-date').value   || null,
    status:       document.getElementById('f-status').value,
    bank_account: document.getElementById('f-bank').value.trim()   || null,
    avatar:       document.getElementById('f-name').value.trim()[0]|| '?',
  };
  if (!payload.name || !payload.position) { toast('請填寫姓名和職稱','error'); return; }
  try {
    if (editingId) {
      const savedId = editingId;
      const result = await api(`/api/employees/${savedId}`, { method:'PUT', body: JSON.stringify(payload) });
      closeModal('emp-modal');
      await loadEmployees();
      toast('✅ 員工資料已更新','success');
      if (result.insurance_change?.triggered) {
        showInsuranceChangeNotice(result.insurance_change, savedId);
      }
    } else {
      await api('/api/employees', { method:'POST', body: JSON.stringify(payload) });
      closeModal('emp-modal');
      await loadEmployees();
      toast('✅ 員工已新增','success');
    }
  } catch(e) { toast('儲存失敗：'+e.message,'error'); }
}

async function approveInsuranceChange(changeId, empId) {
  const effectiveDate = document.getElementById('change-effective-date').value;
  const note = document.getElementById('change-note').value;
  try {
    await api('/api/insurance', {
      method: 'POST',
      body: JSON.stringify({ action:'approve_change', change_id:changeId, employee_id:empId, effective_date:effectiveDate, note }),
    });
    document.getElementById('insurance-notice-modal').remove();
    toast('✅ 勞健保級距已更新', 'success');
  } catch(e) { toast('更新失敗：' + e.message, 'error'); }
}

async function rejectInsuranceChange(changeId) {
  try {
    await api('/api/insurance', {
      method: 'POST',
      body: JSON.stringify({ action:'reject_change', change_id:changeId }),
    });
  } catch(e) {}
  document.getElementById('insurance-notice-modal').remove();
  toast('已記錄：不變更勞健保級距', 'success');
}

function dismissInsuranceChange() {
  document.getElementById('insurance-notice-modal').remove();
  toast('已暫存，可至勞健保管理頁面處理', 'success');
}

/* ── Reset Password ── */
async function resetEmpPassword() {
  if (!editingId) return;
  const emp = allEmployees.find(e => e.id === editingId);
  if (!emp?.emp_no) { toast('此員工尚未設定員工編號', 'warn'); return; }
  if (!confirm(`確定要將「${emp.name}（${emp.emp_no}）」的密碼重設為 123456 嗎？`)) return;

  const adminEmpNo = window.currentUser?.emp_no;
  if (!adminEmpNo) { toast('無法取得管理員資訊', 'error'); return; }

  try {
    const result = await api('/api/auth?action=reset-password', {
      method: 'POST',
      body: JSON.stringify({ emp_no: emp.emp_no, new_password: '123456', admin_emp_no: adminEmpNo })
    });
    toast(`✅ ${result.message || '密碼已重設為 123456'}`, 'success');
  } catch(e) { toast('重設失敗：' + e.message, 'error'); }
}

/* ── Resign ── */
async function resignEmployee() {
  if (!editingId) return;
  const emp = allEmployees.find(e => e.id === editingId);
  if (!confirm(`確定要將「${emp?.name}」標記為離職？此操作會保留資料但停用帳號。`)) return;
  const today = new Date().toISOString().split('T')[0];
  try {
    await api(`/api/employees/${editingId}`, {
      method: 'PUT',
      body: JSON.stringify({ status: 'resigned', resign_date: today })
    });
    closeModal('emp-modal');
    await loadEmployees();
    toast('已標記為離職', 'success');
  } catch(e) { toast('操作失敗：' + e.message, 'error'); }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* ══════════════════════════════════════════
   Spreadsheet view
══════════════════════════════════════════ */
let shtSortField = '', shtSortDir = '';
let shtEditing   = null;
let shtReady     = false;
let _shtSaveTimer;

const SHEET_COLS = [
  { key:'emp_no',           label:'員工編號', w:102, ro:true, cls:'mn' },
  { key:'name',             label:'姓名',     w:88 },
  { key:'employment_type',  label:'雇用類型', w:84,
    type:'select', opts:['full_time','part_time'],
    disp: v => v==='part_time' ? '<span class="cb-part">兼職</span>' : '<span class="cb-full">正職</span>',
    editVal: v => v },
  { key:'dept',             label:'部門',     w:88,  type:'select-dept' },
  { key:'position',         label:'職稱',     w:108 },
  { key:'grade',            label:'職等',     w:56,
    type:'select', opts:['','一等','二等','三等'] },
  { key:'grade_level',      label:'職級',     w:48,  type:'number', cls:'mn' },
  { key:'hire_date',        label:'入職日期', w:100, type:'date',   cls:'mn' },
  { key:'_seniority',       label:'年資',     w:72,  ro:true,
    compute: e => calcSeniority(e.hire_date) },
  { key:'base_salary',      label:'本薪',     w:86,  type:'number', cls:'mn',
    disp: v => v ? '$'+Number(v).toLocaleString() : '—' },
  { key:'grade_allowance',  label:'職等加給', w:86,  type:'number', cls:'mn',
    disp: v => v ? '+$'+Number(v).toLocaleString() : '—' },
  { key:'attendance_bonus', label:'全勤',     w:72,  type:'number', cls:'mn',
    disp: v => v ? '+$'+Number(v).toLocaleString() : '—' },
  { key:'manager_allowance',label:'主管加給', w:86,  type:'number', cls:'mn',
    disp: v => v ? '+$'+Number(v).toLocaleString() : '—' },
  { key:'extra_allowance',  label:'額外加給', w:86,  type:'number', cls:'mn',
    disp: v => v ? '+$'+Number(v).toLocaleString() : '—' },
  { key:'_total',           label:'月薪合計', w:100, ro:true, cls:'acc mn',
    compute: e => {
      if (e.employment_type === 'part_time')
        return '<span style="color:var(--text-dim);font-size:11px">時薪制</span>';
      const ab = noAttBonus(e) ? 0 : (e.attendance_bonus||0);
      const t = (e.base_salary||0)+(e.grade_allowance||0)+ab+(e.manager_allowance||0)+(e.extra_allowance||0);
      return t ? '$'+t.toLocaleString() : '—';
    }
  },
  { key:'status',           label:'狀態',     w:72,
    type:'select', opts:['active','inactive','resigned'],
    disp: v => {
      const m={active:'在職',inactive:'暫停',resigned:'已離職'};
      const c={active:'cb-active',inactive:'cb-inactive',resigned:'cb-resigned'};
      return `<span class="cbadge ${c[v]||''}">${m[v]||v||'—'}</span>`;
    },
    editVal: v => v },
];

function shtGetRaw(col, emp) {
  if (col.compute) return col.compute(emp);
  return emp[col.key] ?? '';
}

function shtRenderVal(col, emp) {
  const raw = shtGetRaw(col, emp);
  if (col.disp) return col.disp(raw);
  if (raw === '' || raw === null || raw === undefined) return '';
  return String(raw);
}

function renderStaffTable() {
  if (!shtReady) {
    shtBuildColgroup();
    shtBuildHead();
    shtReady = true;
  }
  if (shtEditing) shtCommitEdit(false);
  shtRenderBody();
}

function shtBuildColgroup() {
  document.getElementById('sht-colgroup').innerHTML =
    SHEET_COLS.map(c => `<col style="width:${c.w}px;min-width:${c.w}px">`).join('');
}

function shtBuildHead() {
  const tr = document.getElementById('sht-head-row');
  tr.innerHTML = '';
  SHEET_COLS.forEach((col, i) => {
    const th = document.createElement('th');
    th.style.cursor = 'pointer';
    th.title = `點擊排序：${col.label}`;
    th.appendChild(document.createTextNode(col.label));
    const sp = document.createElement('span');
    sp.className = 'col-sort';
    sp.textContent = '↕';
    th.appendChild(sp);
    th.addEventListener('click', e => {
      if (e.target.classList.contains('rh')) return;
      shtSortByCol(col.key);
    });
    const rh = document.createElement('div');
    rh.className = 'rh';
    th.appendChild(rh);
    shtInitResize(rh, i);
    tr.appendChild(th);
  });
}

function shtInitResize(handle, idx) {
  let sx, sw;
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    sx = e.clientX;
    const col = document.querySelectorAll('#sht-colgroup col')[idx];
    sw = parseInt(col.style.width) || SHEET_COLS[idx].w;
    const mv = ev => {
      const w = Math.max(44, sw + ev.clientX - sx);
      document.querySelectorAll('#sht-colgroup col')[idx].style.width =
      document.querySelectorAll('#sht-colgroup col')[idx].style.minWidth = w + 'px';
    };
    const up = () => { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', up);
  });
}

function shtRenderBody() {
  const tbody = document.getElementById('sht-sheet-body');
  tbody.innerHTML = '';
  const rows = shtGetSorted(getFiltered());
  rows.forEach(emp => {
    const tr = document.createElement('tr');
    tr.dataset.id = emp.id;
    if (emp.status === 'resigned') tr.classList.add('row-resigned');
    SHEET_COLS.forEach(col => {
      const td = document.createElement('td');
      td.dataset.id  = emp.id;
      td.dataset.key = col.key;
      shtRenderCell(td, col, emp);
      if (!col.ro && !col.compute) {
        td.addEventListener('click', () => shtStartEdit(td, col, emp));
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function shtRenderCell(td, col, emp) {
  const div = document.createElement('div');
  div.className = 'ci' + (col.ro || col.compute ? ' ro' : '') + (col.cls ? ' '+col.cls : '');
  div.innerHTML = shtRenderVal(col, emp);
  td.innerHTML = '';
  td.appendChild(div);
}

function shtRefreshComputedCells(tr, emp) {
  if (!tr) return;
  SHEET_COLS.forEach(c => {
    if (!c.compute) return;
    const ct = tr.querySelector(`td[data-key="${c.key}"]`);
    if (ct) shtRenderCell(ct, c, emp);
  });
}

function shtStartEdit(td, col, emp) {
  if (shtEditing && shtEditing.td !== td) shtCommitEdit(true);
  if (shtEditing?.td === td) return;
  const raw = emp[col.key] ?? '';
  let input;
  if (col.type === 'select' || col.type === 'select-dept') {
    input = document.createElement('select');
    input.className = 'cell-input';
    const source = col.type === 'select-dept' ? allDepts.map(d => d.name) : col.opts;
    source.forEach(opt => {
      const o = document.createElement('option');
      o.value = opt;
      o.textContent = col.type === 'select-dept' ? opt
        : (col.editVal ? col.editVal(opt) : opt) || (opt === '' ? '（無）' : opt);
      if (opt === raw) o.selected = true;
      input.appendChild(o);
    });
    input.addEventListener('change', () => shtCommitEdit(true));
  } else if (col.type === 'date') {
    input = document.createElement('input');
    input.type = 'date'; input.value = raw || '';
    input.className = 'cell-input mn';
  } else if (col.type === 'number') {
    input = document.createElement('input');
    input.type = 'number'; input.min = '0'; input.value = raw === '' ? '' : Number(raw);
    input.className = 'cell-input mn';
  } else {
    input = document.createElement('input');
    input.type = 'text'; input.value = String(raw);
    input.className = 'cell-input';
  }
  td.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'cell-edit-wrap';
  wrap.appendChild(input);
  td.appendChild(wrap);
  shtEditing = { td, col, emp, oldRaw: raw };
  input.focus();
  if (input.type === 'text' || input.type === 'number') input.select();
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); shtCommitEdit(true); }
    if (e.key === 'Escape') { e.preventDefault(); shtCancelEdit(); }
  });
  input.addEventListener('blur', () => {
    setTimeout(() => { if (shtEditing?.td === td) shtCommitEdit(true); }, 120);
  });
}

async function shtCommitEdit(doSave) {
  if (!shtEditing) return;
  const ctx = shtEditing;
  shtEditing = null;
  const { td, col, emp } = ctx;
  const input = td.querySelector('input, select');
  const newRaw = input ? input.value : ctx.oldRaw;
  const newVal = col.type === 'number'
    ? (newRaw === '' ? null : parseFloat(newRaw) || 0)
    : (newRaw === '' || newRaw === null ? null : newRaw);
  const updEmp = { ...emp, [col.key]: newVal };
  const ai = allEmployees.findIndex(e => e.id === emp.id);
  if (ai >= 0) allEmployees[ai] = updEmp;
  shtRenderCell(td, col, updEmp);
  shtRefreshComputedCells(td.closest('tr'), updEmp);
  if (col.key === 'status') {
    td.closest('tr').classList.toggle('row-resigned', updEmp.status === 'resigned');
  }
  const unchanged = String(newRaw ?? '') === String(ctx.oldRaw ?? '');
  if (!doSave || unchanged) return;
  shtSetSaveStatus('儲存中…');
  try {
    await api(`/api/employees/${emp.id}`, { method:'PUT', body: JSON.stringify({ [col.key]: newVal }) });
    shtFlash(td, 'ok');
    shtSetSaveStatus('已儲存', 2500);
  } catch(e) {
    shtFlash(td, 'err');
    toast('儲存失敗：' + e.message, 'error');
    shtSetSaveStatus('儲存失敗', 2500);
    if (ai >= 0) allEmployees[ai] = emp;
    shtRenderCell(td, col, emp);
    shtRefreshComputedCells(td.closest('tr'), emp);
  }
}

function shtCancelEdit() {
  if (!shtEditing) return;
  const { td, col, emp } = shtEditing;
  shtEditing = null;
  shtRenderCell(td, col, emp);
}

function shtFlash(td, type) {
  td.classList.remove('f-ok','f-err');
  void td.offsetWidth;
  td.classList.add(type === 'ok' ? 'f-ok' : 'f-err');
}

function shtSetSaveStatus(msg, clearAfter) {
  const el = document.getElementById('sht-save-status');
  if (el) el.textContent = msg;
  clearTimeout(_shtSaveTimer);
  if (clearAfter) _shtSaveTimer = setTimeout(() => { if (el) el.textContent = ''; }, clearAfter);
}

function shtSortByCol(key) {
  if (shtSortField === key) {
    shtSortDir = shtSortDir === 'asc' ? 'desc' : shtSortDir === 'desc' ? '' : 'asc';
    if (!shtSortDir) shtSortField = '';
  } else {
    shtSortField = key; shtSortDir = 'asc';
  }
  shtUpdateSortIndicators();
  shtRenderBody();
}

function shtGetSorted(rows) {
  if (!shtSortField || !shtSortDir) return rows;
  return [...rows].sort((a, b) => {
    let cmp = 0;
    if (shtSortField === '_seniority') {
      cmp = String(a.hire_date||'').localeCompare(String(b.hire_date||''), 'zh-TW');
    } else if (shtSortField === '_total') {
      const aab = noAttBonus(a) ? 0 : (a.attendance_bonus||0);
      const bab = noAttBonus(b) ? 0 : (b.attendance_bonus||0);
      const ta = (a.base_salary||0)+(a.grade_allowance||0)+aab+(a.manager_allowance||0)+(a.extra_allowance||0);
      const tb = (b.base_salary||0)+(b.grade_allowance||0)+bab+(b.manager_allowance||0)+(b.extra_allowance||0);
      cmp = ta - tb;
    } else if (shtSortField === 'grade') {
      const ga = GRADE_ORDER[a.grade]??0, gb = GRADE_ORDER[b.grade]??0;
      cmp = ga !== gb ? ga - gb : (a.grade_level??0) - (b.grade_level??0);
    } else if (shtSortField === 'status') {
      cmp = (STATUS_ORDER[a.status]??3) - (STATUS_ORDER[b.status]??3);
    } else {
      const av = a[shtSortField]??'', bv = b[shtSortField]??'';
      cmp = typeof av === 'number' && typeof bv === 'number'
        ? av - bv : String(av).localeCompare(String(bv), 'zh-TW');
    }
    return shtSortDir === 'asc' ? cmp : -cmp;
  });
}

function shtUpdateSortIndicators() {
  const ths = document.querySelectorAll('#sht-head-row th');
  SHEET_COLS.forEach((col, i) => {
    const th = ths[i]; if (!th) return;
    const sp = th.querySelector('.col-sort'); if (!sp) return;
    th.classList.remove('sorted-asc','sorted-desc');
    if (shtSortField === col.key) {
      sp.textContent = shtSortDir === 'asc' ? '↑' : shtSortDir === 'desc' ? '↓' : '↕';
      if (shtSortDir) th.classList.add(shtSortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    } else {
      sp.textContent = '↕';
    }
  });
}

const EMP_COLUMNS = [
  { key:'emp_no',          label:'員工編號',   required:true,  note:'格式如 E001，唯一識別碼',   example:'E001' },

  { key:'dept',            label:'部門',       required:false, note:'部門名稱，須與系統一致',     example:'研發部' },
  { key:'position',        label:'職稱',       required:false, note:'職位名稱',                  example:'工程師' },
  { key:'grade',           label:'職等',       required:false, note:'一等、二等、三等 或留空',    example:'二等' },
  { key:'grade_level',     label:'職級',       required:false, note:'數字，1–6',                 example:'3',
    validate: v => isNaN(Number(v)) ? '須為數字' : null,

  { key:'hire_date',       label:'入職日期',   required:false, note:'格式 YYYY-MM-DD',           example:'2022-03-01' },
  { key:'base_salary',     label:'本薪',       required:false, note:'數字，新台幣',              example:'35000',
    validate: v => isNaN(Number(v)) ? '須為數字' : null },
  { key:'grade_allowance', label:'職等加給',   required:false, note:'數字，新台幣',              example:'3000',
    validate: v => isNaN(Number(v)) ? '須為數字' : null },
  { key:'attendance_bonus',label:'全勤獎金',   required:false, note:'數字，新台幣',              example:'2000',
    validate: v => isNaN(Number(v)) ? '須為數字' : null },
  { key:'manager_allowance',label:'主管加給',  required:false, note:'數字，新台幣',              example:'5000',
    validate: v => isNaN(Number(v)) ? '須為數字' : null },
  { key:'extra_allowance', label:'其他加給',   required:false, note:'數字，新台幣',              example:'1000',
    validate: v => isNaN(Number(v)) ? '須為數字' : null },
  { key:'email',           label:'Email',      required:false, note:'電子郵件',                  example:'wang@company.com' },
  { key:'phone',           label:'電話',       required:false, note:'聯絡電話',                  example:'0912345678' },

const EMP_PREVIEW_COLS = [
  { key:'emp_no', label:'員工編號' },
  { key:'name',   label:'姓名' },
  { key:'dept',   label:'部門' },
  { key:'position', label:'職稱' },
  { key:'status', label:'狀態' },
];

function exportEmpTemplate() {
  ExcelTools.exportTemplate({ sheetName:'員工資料', filename:'employees', columns: EMP_COLUMNS });
}

function exportEmpData() {
  const rows = allEmployees;
  if (!rows.length) { toast('目前沒有員工資料', 'warn'); return; }
  ExcelTools.exportData(
    { sheetName:'員工資料', filename:'employees', columns: EMP_COLUMNS },
    rows
  );
}

async function importEmpExcel(input) {
  const file = input.files[0]; if (!file) return;
  input.value = '';
  try {
    const result = await ExcelTools.importFile(file, { columns: EMP_COLUMNS });
    ExcelTools.showImportModal(result, { columns: EMP_COLUMNS, previewCols: EMP_PREVIEW_COLS }, async () => {
      let ok = 0, fail = 0;
      for (const row of result.parsed) {
        try {
          const payload = {};
          EMP_COLUMNS.forEach(c => { if (row[c.key] !== null && row[c.key] !== '') payload[c.key] = row[c.key]; });
          ['base_salary','grade_allowance','attendance_bonus','manager_allowance','extra_allowance','grade_level'].forEach(k => {
            if (payload[k] !== undefined) payload[k] = Number(payload[k]) || 0;
          });
          await api('/api/employees', { method:'POST', body: JSON.stringify(payload) });
          ok++;
        } catch(e) { fail++; }
      }
      await loadEmployees();
      toast(`匯入完成：成功 ${ok} 筆${fail ? `，失敗 ${fail} 筆` : ''}`, fail ? 'warn' : 'success');
    });
  } catch(e) { toast('匯入失敗：' + e.message, 'error'); }
}
