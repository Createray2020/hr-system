<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的薪資</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0F1117;color:#E8EAF0;font-family:'Noto Sans TC',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
.mobile-app{max-width:430px;margin:0 auto;min-height:100vh;background:#0F1117;display:flex;flex-direction:column}
.mobile-header{padding:52px 20px 16px}
.page-title-lg{font-size:22px;font-weight:700}
.scroll-content{flex:1;overflow-y:auto;padding:0 0 100px}

/* ── 薪資卡片 ── */
.sal-card{margin:0 16px 12px;border-radius:18px;overflow:hidden;border:0.5px solid rgba(255,255,255,.08)}
.sal-card-header{padding:18px 18px 14px;background:rgba(255,255,255,.04);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.sal-month{font-size:12px;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace;margin-bottom:4px}
.sal-net{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;color:#7FBBFF}
.sal-net-label{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.sal-expand-icon{font-size:18px;color:rgba(255,255,255,.35);transition:transform .25s}
.sal-card.open .sal-expand-icon{transform:rotate(180deg)}
.sal-status{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px;display:inline-block}
.s-paid{background:rgba(74,222,128,.12);color:#4ADE80}
.s-draft{background:rgba(122,133,160,.1);color:rgba(255,255,255,.4)}
.s-confirmed{background:rgba(251,146,60,.12);color:#FB923C}

/* ── 明細展開 ── */
.sal-detail{display:none;background:#0F1117;border-top:0.5px solid rgba(255,255,255,.06);padding:0 18px 16px}
.sal-card.open .sal-detail{display:block}
.sal-section{padding:12px 0 0}
.sal-section-title{font-size:10px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.sal-line{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid rgba(255,255,255,.04);font-size:13px}
.sal-line:last-child{border-bottom:none}
.sal-key{color:rgba(255,255,255,.55)}
.sal-val{font-family:'DM Mono',monospace;font-weight:600}
.sal-val-pos{color:#4ADE80}.sal-val-neg{color:#F87171}
.sal-divider{height:0.5px;background:rgba(255,255,255,.08);margin:10px 0}
.sal-total-line{display:flex;justify-content:space-between;padding:10px 0 4px;font-size:15px;font-weight:700}
.sal-total-key{color:#E8EAF0}
.sal-total-val{font-family:'DM Mono',monospace;color:#7FBBFF;font-size:18px}

/* ── 年度統計 ── */
.year-card{margin:0 16px 12px;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.08);border-radius:16px;padding:16px}
.year-card-label{font-size:11px;color:rgba(255,255,255,.35);font-family:'DM Mono',monospace;letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px}
.year-total{font-size:32px;font-weight:700;font-family:'DM Mono',monospace;color:#7FBBFF;margin-bottom:4px}
.year-label{font-size:12px;color:rgba(255,255,255,.35)}
.year-divider{height:0.5px;background:rgba(255,255,255,.08);margin:12px 0}
.year-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.year-item{background:rgba(255,255,255,.03);border-radius:10px;padding:10px 12px}
.year-item-label{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:3px}
.year-item-val{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;color:#E8EAF0}

.empty-state{text-align:center;padding:60px 20px;color:rgba(255,255,255,.3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.loading-text{text-align:center;padding:40px;color:rgba(255,255,255,.3);font-size:13px}

/* ── 底部導航 ── */
.mobile-bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0a0c12;border-top:0.5px solid rgba(255,255,255,.08);display:flex;padding:10px 0 24px;z-index:50}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-decoration:none}
.mobile-nav-item .nav-icon{font-size:22px;opacity:.35}
.mobile-nav-item .nav-label{font-size:10px;color:rgba(255,255,255,.35)}
.mobile-nav-item.active .nav-icon{opacity:1}
.mobile-nav-item.active .nav-label{color:#5B8DEF}
</style>
</head>
<body>
<div class="mobile-app">
  <div class="mobile-header">
    <div class="page-title-lg">薪資</div>
  </div>

  <div class="scroll-content" id="sal-list">
    <div class="loading-text">載入中…</div>
  </div>

  <nav class="mobile-bottom-nav">
    <a href="/employee-app.html" class="mobile-nav-item">
      <span class="nav-icon">🏠</span><span class="nav-label">首頁</span>
    </a>
    <a href="/employee-schedule.html" class="mobile-nav-item">
      <span class="nav-icon">🗓️</span><span class="nav-label">班表</span>
    </a>
    <a href="/employee-leave.html" class="mobile-nav-item">
      <span class="nav-icon">📋</span><span class="nav-label">請假</span>
    </a>
    <a href="/employee-salary.html" class="mobile-nav-item active">
      <span class="nav-icon">💰</span><span class="nav-label">薪資</span>
    </a>
    <a href="/employee-profile.html" class="mobile-nav-item">
      <span class="nav-icon">👤</span><span class="nav-label">我的</span>
    </a>
  </nav>
</div>

<script>
const SUPABASE_URL      = 'https://scsgqxixmbompnoypuuw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjc2dxeGl4bWJvbXBub3lwdXV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzkxODMsImV4cCI6MjA5MjAxNTE4M30.DRuX4OoQDQSQfvqb71VgSmDysli7e_w8lvsdp3p_VA8';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null, API = '';

async function apiFetch(path, opts={}) {
  const { data: { session } } = await _sb.auth.getSession();
  const res = await fetch(API + path, {
    headers:{'Content-Type':'application/json',...(session?{'Authorization':`Bearer ${session.access_token}`}:{})},
    ...opts
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error||`${res.status}`); }
  return res.json();
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return '$' + Number(n).toLocaleString();
}

function toggleCard(cardEl) {
  cardEl.classList.toggle('open');
}

function renderSalary(rows) {
  const wrap = document.getElementById('sal-list');
  if (!rows.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">💸</div><div>暫無薪資資料</div></div>`;
    return;
  }

  const statusMap = { draft:'待確認', confirmed:'已確認', paid:'已發放' };
  const statusCls = { draft:'s-draft', confirmed:'s-confirmed', paid:'s-paid' };

  let yearTotal = 0;
  const cards = rows.slice(0, 6).map((r, i) => {
    yearTotal += r.net_salary || 0;
    const st = r.status || 'draft';
    return `
    <div class="sal-card${i===0?' open':''}" onclick="toggleCard(this)">
      <div class="sal-card-header">
        <div>
          <div class="sal-month">${r.year}-${String(r.month).padStart(2,'0')} 月薪資</div>
          <div class="sal-net">${fmt(r.net_salary)}</div>
          <div class="sal-net-label">實發薪資</div>
          <span class="sal-status ${statusCls[st]}">${statusMap[st]||st}</span>
        </div>
        <span class="sal-expand-icon">⌄</span>
      </div>
      <div class="sal-detail">
        <div class="sal-section">
          <div class="sal-section-title">收入項目</div>
          <div class="sal-line"><span class="sal-key">本薪</span><span class="sal-val sal-val-pos">${fmt(r.base_salary)}</span></div>
          <div class="sal-line"><span class="sal-key">全勤獎金</span><span class="sal-val sal-val-pos">${fmt(r.bonus)}</span></div>
          <div class="sal-line"><span class="sal-key">加班費</span><span class="sal-val sal-val-pos">${fmt(r.overtime_pay)}</span></div>
          <div class="sal-line"><span class="sal-key">津貼</span><span class="sal-val sal-val-pos">${fmt(r.allowance)}</span></div>
          <div class="sal-line"><span class="sal-key">其他加給</span><span class="sal-val sal-val-pos">${fmt(r.extra_allowance)}</span></div>
        </div>
        <div class="sal-divider"></div>
        <div class="sal-section">
          <div class="sal-section-title">扣除項目</div>
          <div class="sal-line"><span class="sal-key">勞保費</span><span class="sal-val sal-val-neg">-${fmt(r.labor_insurance)?.replace('$','')}</span></div>
          <div class="sal-line"><span class="sal-key">健保費</span><span class="sal-val sal-val-neg">-${fmt(r.health_insurance)?.replace('$','')}</span></div>
          <div class="sal-line"><span class="sal-key">所得稅</span><span class="sal-val sal-val-neg">-${fmt(r.tax)?.replace('$','')}</span></div>
          <div class="sal-line"><span class="sal-key">缺勤扣款</span><span class="sal-val sal-val-neg">-${fmt(r.absence_deduction)?.replace('$','')}</span></div>
        </div>
        <div class="sal-divider"></div>
        <div class="sal-total-line">
          <span class="sal-total-key">實發薪資</span>
          <span class="sal-total-val">${fmt(r.net_salary)}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Year summary
  const yearCard = `
    <div class="year-card">
      <div class="year-card-label">本年度統計</div>
      <div class="year-total">${fmt(yearTotal)}</div>
      <div class="year-label">累計實發薪資</div>
      <div class="year-divider"></div>
      <div class="year-grid">
        <div class="year-item">
          <div class="year-item-label">已發放月份</div>
          <div class="year-item-val">${rows.filter(r=>r.status==='paid').length} 月</div>
        </div>
        <div class="year-item">
          <div class="year-item-label">待確認</div>
          <div class="year-item-val">${rows.filter(r=>r.status!=='paid').length} 月</div>
        </div>
      </div>
    </div>`;

  wrap.innerHTML = cards + yearCard;
}

(async () => {
  API = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? 'http://localhost:3000' : '';
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) { window.location.href = '/login.html'; return; }
  try { currentUser = await apiFetch('/api/employees/me'); }
  catch(e) { window.location.href = '/login.html'; return; }

  try {
    // Fetch all salary records for this employee (sorted newest first by API default)
    const rows = await apiFetch(`/api/salary?employee_id=${currentUser.id}`);
    rows.sort((a, b) => (b.year*100+b.month) - (a.year*100+a.month));
    renderSalary(rows);
  } catch(e) {
    document.getElementById('sal-list').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div>載入失敗</div></div>`;
  }
})();
</script>
</body>
</html>
