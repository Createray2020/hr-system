<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>我的薪資 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/salary-breakdown.js"></script>
<style>
  /* ── Mobile shell（沿用 employee-leave.html pattern）── */
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#0F1117;color:#E8EAF0;font-family:'Noto Sans TC',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
  .mobile-app{max-width:430px;margin:0 auto;min-height:100vh;background:#0F1117;display:flex;flex-direction:column}
  .mobile-header{padding:52px 20px 12px}
  .page-title-lg{font-size:22px;font-weight:700;margin-bottom:4px}
  .page-sub-sm{font-size:12px;color:rgba(255,255,255,.45)}
  .scroll-content{flex:1;overflow-y:auto;padding:0 16px 100px}

  .m-select{width:100%;background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-size:14px;color:#E8EAF0;font-family:'Noto Sans TC',sans-serif;outline:none;-webkit-appearance:none;transition:border-color .2s;margin-top:12px}
  .m-select:focus{border-color:rgba(91,141,239,.5)}
  .m-select option{background:#1E2333}

  /* ── 底部導航 ── */
  .mobile-bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0a0c12;border-top:0.5px solid rgba(255,255,255,.08);display:flex;padding:10px 0 24px;z-index:50}
  .mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-decoration:none}
  .mobile-nav-item .nav-icon{font-size:22px;opacity:.35}
  .mobile-nav-item .nav-label{font-size:10px;color:rgba(255,255,255,.35)}
  .mobile-nav-item.active .nav-icon{opacity:1}
  .mobile-nav-item.active .nav-label{color:#5B8DEF}

  /* ── Toast ── */
  .m-toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
  .m-toast{background:#1E2333;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:10px 20px;font-size:13px;animation:mtin .3s ease;white-space:nowrap}
  @keyframes mtin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .m-toast-success{border-left:3px solid #4ADE80}
  .m-toast-error{border-left:3px solid #F87171}
  .m-toast-warn{border-left:3px solid #FB923C}

  /* ── 薪資 slip（既有樣式、未動）── */
  .num{font-family:'DM Mono',monospace}
  .slip{background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:12px;padding:18px;margin-bottom:18px}
  .slip-h{font-size:14px;font-weight:600;color:rgba(255,255,255,.55);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .slip-row{display:grid;grid-template-columns:1fr 110px;gap:8px;padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,.04);font-size:13px;align-items:center}
  .slip-row.head{font-weight:600;color:rgba(255,255,255,.55);background:rgba(0,0,0,.1);padding:8px 10px;border-radius:6px;margin:8px 0 4px}
  .slip-row .v{text-align:right;font-family:'DM Mono',monospace}
  .slip-row.total{font-weight:700;color:#7FBBFF;font-size:15px;border-top:1px solid rgba(91,141,239,.4);margin-top:8px;padding-top:10px}
  .pos{color:#4ADE80}
  .neg{color:#F87171}
  .pill{padding:3px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace}
  .s-draft{background:rgba(251,191,36,.15);color:#FBBF24}
  .s-confirmed{background:rgba(91,141,239,.15);color:#7FBBFF}
  .s-paid{background:rgba(74,222,128,.15);color:#4ADE80}
  details{margin-top:8px;font-size:12px;color:rgba(255,255,255,.55)}
  details summary{cursor:pointer;padding:6px 0;color:#7FBBFF}
  details > div{padding:6px 0 0 12px}

  .empty{padding:40px 20px;text-align:center;color:rgba(255,255,255,.35)}
</style>
</head>
<body>
<div class="mobile-app">
  <div class="mobile-header">
    <div class="page-title-lg">我的薪資</div>
    <div class="page-sub-sm">月度薪資單</div>
    <select class="m-select" id="f-month" onchange="load()"></select>
  </div>

  <div class="scroll-content">
    <div id="content"></div>
  </div>

  <nav class="mobile-bottom-nav">
    <a href="/employee-app.html" class="mobile-nav-item">
      <span class="nav-icon">🏠</span><span class="nav-label">首頁</span>
    </a>
    <a href="/announcements.html" class="mobile-nav-item">
      <span class="nav-icon">📢</span><span class="nav-label">公告</span>
    </a>
    <a href="/employee-leave.html" class="mobile-nav-item">
      <span class="nav-icon">📋</span><span class="nav-label">請假</span>
    </a>
    <a href="/employee-salary.html" class="mobile-nav-item active">
      <span class="nav-icon">💰</span><span class="nav-label">薪資</span>
    </a>
    <a href="/employee-profile.html" class="mobile-nav-item">
      <span class="nav-icon">👤</span><span class="nav-label">我的</span>
    </a>
  </nav>
</div>

<div class="m-toast-wrap" id="toast-wrap"></div>

<script>
const SUPABASE_URL      = 'https://scsgqxixmbompnoypuuw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjc2dxeGl4bWJvbXBub3lwdXV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzkxODMsImV4cCI6MjA5MjAxNTE4M30.DRuX4OoQDQSQfvqb71VgSmDysli7e_w8lvsdp3p_VA8';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null, API = '';

async function apiFetch(path, opts={}) {
  const { data: { session } } = await _sb.auth.getSession();
  const res = await fetch(API + path, {
    headers:{'Content-Type':'application/json',...(session?{'Authorization':`Bearer ${session.access_token}`}:{})},
    ...opts
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error||`${res.status}`); }
  return res.json();
}

function toast(msg, type='success') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'm-toast m-toast-' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt$(n){ if(n==null) return '—'; return new Intl.NumberFormat('zh-TW',{maximumFractionDigits:0}).format(Number(n)); }
function n0(v){ return v==null?0:Number(v); }

function buildMonthOptions(){
  const sel = document.getElementById('f-month');
  const d = new Date(); const out = [];
  for (let i = 0; i < 12; i++) {
    const v = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    out.push(`<option value="${v}"${i===0?' selected':''}>${v}</option>`);
    d.setMonth(d.getMonth()-1);
  }
  sel.innerHTML = out.join('');
}

async function load(){
  if (!currentUser) return;
  const month = document.getElementById('f-month').value;
  const [y, m] = month.split('-');
  try {
    const r = await apiFetch(`/api/salary?v=2&year=${y}&month=${parseInt(m)}&employee_id=${currentUser.id}`);
    const rec = (r.records || [])[0];
    render(rec);
  } catch(e){
    document.getElementById('content').innerHTML = `<div class="empty">⚠ 載入失敗：${escHtml(e.message)}</div>`;
  }
}

function render(r){
  const wrap = document.getElementById('content');
  if (!r) {
    wrap.innerHTML = `<div class="slip"><div class="slip-h">尚未產生</div><div style="color:rgba(255,255,255,.55);font-size:13px;padding:20px;text-align:center">該月薪資尚未產生,請洽 HR</div></div>`;
    return;
  }

  const month = `${r.year}/${String(r.month).padStart(2,'0')}`;
  const overtimeTotal  = n0(r.overtime_pay_auto) + n0(r.overtime_pay_manual);

  // 共用 helper:回 grossItems / deductItems(已濾 0)+ 各 subtotal + net
  // 含 grade/manager 加給、4 bonus、7 擴充扣除等原本前端漏顯示的欄位
  const SB = window.SalaryBreakdown;
  const { grossItems, grossSubtotal, deductItems, deductSubtotal, net } = SB.buildSalaryBreakdown(r);

  // 全勤獎金加 deduction_rate 後綴(employee-salary 專屬細節、不進共用 helper)
  const grossItemsAug = grossItems.map(it => {
    if (it.key === 'attendance_bonus_actual') {
      const pct = (n0(r.attendance_bonus_deduction_rate) * 100).toFixed(1);
      return { ...it, label: `${it.label}（扣 ${pct}% 後）` };
    }
    return it;
  });

  // 曠職扣款附明細(天數 × 日薪、HR 客觀資訊)
  const deductItemsAug = deductItems.map(it => {
    if (it.key === 'deduct_absence' && n0(r.absence_days) > 0) {
      return { ...it, label: `${it.label}（${r.absence_days} 天 × 日薪 ${fmt$(r.daily_wage_snapshot)}）` };
    }
    return it;
  });

  wrap.innerHTML = `
    <div class="slip">
      <div class="slip-h">
        <span>${month} 薪資單</span>
        <span class="pill s-${escHtml(r.status)}">${escHtml(r.status)}</span>
      </div>

      <div style="margin:6px 0 12px;text-align:center">
        <a href="/payslip.html?employee_id=${encodeURIComponent(currentUser.id)}&year=${r.year}&month=${r.month}"
           target="_blank"
           style="display:inline-block;font-size:12px;color:#7FBBFF;text-decoration:none;padding:6px 14px;border:0.5px solid rgba(127,187,255,.4);border-radius:8px">
          🖨 列印薪資單
        </a>
      </div>

      <div class="slip-row head"><div>收入項目</div><div class="v">金額</div></div>
      ${grossItemsAug.length
        ? grossItemsAug.map(it => `<div class="slip-row"><div>${escHtml(it.label)}</div><div class="v pos">+ ${fmt$(it.value)}</div></div>`).join('')
        : '<div class="slip-row"><div style="color:rgba(255,255,255,.45)">無</div><div class="v">—</div></div>'}

      <div class="slip-row total"><div>應發合計</div><div class="v">${fmt$(grossSubtotal)}</div></div>

      <div class="slip-row head" style="margin-top:14px"><div>扣除項目</div><div class="v">金額</div></div>
      ${deductItemsAug.length
        ? deductItemsAug.map(it => `<div class="slip-row"><div>${escHtml(it.label)}</div><div class="v neg">- ${fmt$(it.value)}</div></div>`).join('')
        : '<div class="slip-row"><div style="color:rgba(255,255,255,.45)">本月無扣項</div><div class="v">—</div></div>'}

      <div class="slip-row total" style="color:#4ADE80"><div>實發合計</div><div class="v">${fmt$(net)}</div></div>

      ${overtimeTotal > 0 ? `
        <details>
          <summary>加班費明細（自動 ${fmt$(r.overtime_pay_auto)} / 手動 ${fmt$(r.overtime_pay_manual)}）</summary>
          <div>自動部分：系統依本月已核准的加班申請計算（採用申請當下的加班費倍率）；手動部分：HR 額外調整的金額。${r.overtime_pay_note ? '<br>備註:' + escHtml(r.overtime_pay_note) : ''}</div>
        </details>` : ''}

      ${n0(r.comp_expiry_payout) > 0 ? `
        <details>
          <summary>補休失效轉錢明細(${fmt$(r.comp_expiry_payout)})</summary>
          <div>補休額度過期未用的部分自動轉為加班費（時薪 × 剩餘時數 × 1.34 倍）。本欄為本月所有失效轉換的合計。</div>
        </details>` : ''}

      ${n0(r.settlement_amount) > 0 ? `
        <details>
          <summary>特休結算明細(${fmt$(r.settlement_amount)})</summary>
          <div>特休年度結算後、未用完的天數轉為現金（剩餘天數 × 日薪）。${r.settlement_note ? '<br>備註:' + escHtml(r.settlement_note) : ''}</div>
        </details>` : ''}

      ${n0(r.attendance_penalty_total) > 0 ? `
        <details>
          <summary>出勤懲處明細(${fmt$(r.attendance_penalty_total)})</summary>
          <div>本月出勤異常（如曠職、嚴重遲到）的扣款合計。已申請豁免並通過的不計入。</div>
        </details>` : ''}
    </div>
  `;
}

(async () => {
  API = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? 'http://localhost:3000' : '';
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) { window.location.href = '/login.html'; return; }
  try { currentUser = await apiFetch('/api/employees/me'); }
  catch(e) { window.location.href = '/login.html'; return; }
  buildMonthOptions();
  await load();
})();
</script>

<script src="/js/pwa.js"></script>
<script>PWA.init();</script>
</body>
</html>
