<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>我的薪資 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .num{font-family:'DM Mono',monospace}
  .slip{background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:12px;padding:18px;margin-bottom:18px}
  .slip-h{font-size:14px;font-weight:600;color:var(--text-dim);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .slip-row{display:grid;grid-template-columns:1fr 120px;gap:8px;padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,.04);font-size:13px;align-items:center}
  .slip-row.head{font-weight:600;color:var(--text-dim);background:rgba(0,0,0,.1);padding:8px 10px;border-radius:6px;margin:8px 0 4px}
  .slip-row .v{text-align:right;font-family:'DM Mono',monospace}
  .slip-row.total{font-weight:700;color:#7FBBFF;font-size:15px;border-top:1px solid rgba(91,141,239,.4);margin-top:8px;padding-top:10px}
  .pos{color:#4ADE80}
  .neg{color:#F87171}
  .pill{padding:3px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace}
  .s-draft{background:rgba(251,191,36,.15);color:#FBBF24}
  .s-confirmed{background:rgba(91,141,239,.15);color:#7FBBFF}
  .s-paid{background:rgba(74,222,128,.15);color:#4ADE80}
  details{margin-top:8px;font-size:12px;color:var(--text-dim)}
  details summary{cursor:pointer;padding:6px 0;color:#7FBBFF}
  details > div{padding:6px 0 0 12px}
</style>
</head>
<body data-page="employee-salary">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">我的薪資</div>
        <div class="page-sub">月度薪資單</div>
      </div>
      <div class="header-actions">
        <select class="form-select" id="f-month" onchange="load()" style="width:140px"></select>
      </div>
    </div>

    <div id="content"></div>
  </main>
</div>

<script>
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt$(n){ if(n==null) return '—'; return new Intl.NumberFormat('zh-TW',{maximumFractionDigits:0}).format(Number(n)); }
function n0(v){ return v==null?0:Number(v); }
function toast(msg){console.log(msg);}

function buildMonthOptions(){
  const sel = document.getElementById('f-month');
  const d = new Date(); const out = [];
  for (let i = 0; i < 12; i++) {
    const v = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    out.push(`<option value="${v}"${i===0?' selected':''}>${v}</option>`);
    d.setMonth(d.getMonth()-1);
  }
  sel.innerHTML = out.join('');
}

async function load(retries=0){
  if(!window.api||!window.currentUser){if(retries<25)return setTimeout(()=>load(retries+1),200);return;}
  const month = document.getElementById('f-month').value;
  const [y, m] = month.split('-');
  try {
    const r = await api(`/api/salary?v=2&year=${y}&month=${parseInt(m)}&employee_id=${currentUser.id}`);
    const rec = (r.records || [])[0];
    render(rec);
  } catch(e){
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">⚠</div><div>載入失敗:${escHtml(e.message)}</div></div>`;
  }
}

function render(r){
  const wrap = document.getElementById('content');
  if (!r) {
    wrap.innerHTML = `<div class="slip"><div class="slip-h">尚未產生</div><div style="color:var(--text-dim);font-size:13px;padding:20px;text-align:center">該月薪資尚未產生,請洽 HR</div></div>`;
    return;
  }

  const month = `${r.year}/${String(r.month).padStart(2,'0')}`;
  const allowanceTotal = n0(r.allowance) + n0(r.extra_allowance);
  const overtimeTotal  = n0(r.overtime_pay_auto) + n0(r.overtime_pay_manual);

  wrap.innerHTML = `
    <div class="slip">
      <div class="slip-h">
        <span>${month} 薪資單</span>
        <span class="pill s-${escHtml(r.status)}">${escHtml(r.status)}</span>
      </div>

      <div class="slip-row head"><div>收入項目</div><div class="v">金額</div></div>
      <div class="slip-row"><div>底薪 (base_salary)</div><div class="v pos">+ ${fmt$(r.base_salary)}</div></div>
      <div class="slip-row"><div>全勤獎金 (扣 ${(n0(r.attendance_bonus_deduction_rate)*100).toFixed(1)}% 後)</div><div class="v pos">+ ${fmt$(r.attendance_bonus_actual)}</div></div>
      <div class="slip-row"><div>津貼 + 額外津貼</div><div class="v pos">+ ${fmt$(allowanceTotal)}</div></div>
      <div class="slip-row"><div>加班費 (auto + manual)</div><div class="v pos">+ ${fmt$(overtimeTotal)}</div></div>
      <div class="slip-row"><div>補休失效轉錢 (comp_expiry_payout)</div><div class="v pos">+ ${fmt$(r.comp_expiry_payout)}</div></div>
      <div class="slip-row"><div>假日工作加給 (holiday_work_pay)</div><div class="v pos">+ ${fmt$(r.holiday_work_pay)}</div></div>
      <div class="slip-row"><div>結算金額 (settlement_amount)</div><div class="v pos">+ ${fmt$(r.settlement_amount)}</div></div>

      <div class="slip-row total"><div>應發合計 (gross_salary)</div><div class="v">${fmt$(r.gross_salary)}</div></div>

      <div class="slip-row head" style="margin-top:14px"><div>扣除項目</div><div class="v">金額</div></div>
      <div class="slip-row"><div>曠職扣款 (${r.absence_days || 0} 天 × 日薪 ${fmt$(r.daily_wage_snapshot)})</div><div class="v neg">- ${fmt$(r.deduct_absence)}</div></div>
      <div class="slip-row"><div>勞保自付</div><div class="v neg">- ${fmt$(r.deduct_labor_ins)}</div></div>
      <div class="slip-row"><div>健保自付</div><div class="v neg">- ${fmt$(r.deduct_health_ins)}</div></div>
      <div class="slip-row"><div>所得稅</div><div class="v neg">- ${fmt$(r.deduct_tax)}</div></div>
      <div class="slip-row"><div>出勤懲處 (attendance_penalty_total)</div><div class="v neg">- ${fmt$(r.attendance_penalty_total)}</div></div>

      <div class="slip-row total" style="color:#4ADE80"><div>實發合計 (net_salary)</div><div class="v">${fmt$(r.net_salary)}</div></div>

      ${overtimeTotal > 0 ? `
        <details>
          <summary>加班費明細(auto:${fmt$(r.overtime_pay_auto)} / manual:${fmt$(r.overtime_pay_manual)})</summary>
          <div>auto 部分由系統依該月 approved overtime_requests 加總(凍結 pay_multiplier);manual 部分由 HR 手動調整。${r.overtime_pay_note ? '<br>備註:' + escHtml(r.overtime_pay_note) : ''}</div>
        </details>` : ''}

      ${n0(r.comp_expiry_payout) > 0 ? `
        <details>
          <summary>補休失效轉錢明細(${fmt$(r.comp_expiry_payout)})</summary>
          <div>由 cron(每天 01:00 expiry-sweep)在補休失效當下算金額(時薪 × 剩餘小時 × 1.34 倍率)。月底 calculator 加總到本欄。</div>
        </details>` : ''}

      ${n0(r.settlement_amount) > 0 ? `
        <details>
          <summary>特休結算明細(${fmt$(r.settlement_amount)})</summary>
          <div>由特休週年滾動 cron 觸發 paid_out 後,月底 calculator 算 remaining_days × 日薪。${r.settlement_note ? '<br>備註:' + escHtml(r.settlement_note) : ''}</div>
        </details>` : ''}

      ${n0(r.attendance_penalty_total) > 0 ? `
        <details>
          <summary>出勤懲處明細(${fmt$(r.attendance_penalty_total)})</summary>
          <div>由 attendance_penalty_records(現金扣款類)加總。已豁免的不計入。</div>
        </details>` : ''}
    </div>
  `;
}

buildMonthOptions();
load();
</script>
<script src="/js/roles.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/pwa.js"></script>
<script>PWA.init();</script>
</body>
</html>
