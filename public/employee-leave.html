<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">

<title>請假</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0F1117;color:#E8EAF0;font-family:'Noto Sans TC',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
.mobile-app{max-width:430px;margin:0 auto;min-height:100vh;background:#0F1117;display:flex;flex-direction:column}
.mobile-header{padding:52px 20px 12px}
.page-title-lg{font-size:22px;font-weight:700;margin-bottom:4px}
.scroll-content{flex:1;overflow-y:auto;padding-bottom:100px}

/* ── Tabs ── */
.m-tabs{display:flex;gap:0;background:rgba(255,255,255,.04);border-radius:12px;margin:0 16px 16px;padding:4px}
.m-tab{flex:1;padding:8px 0;text-align:center;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.4);font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;font-weight:500}
.m-tab.active{background:rgba(255,255,255,.08);color:#E8EAF0}

/* ── 申請表單 ── */
.mobile-card{margin:0 16px 12px;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.08);border-radius:16px;padding:16px}
.card-label{font-size:11px;color:rgba(255,255,255,.35);font-family:'DM Mono',monospace;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.m-form-row{margin-bottom:14px}
.m-label{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:6px;display:block}
.m-input,.m-select,.m-textarea{width:100%;background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-size:14px;color:#E8EAF0;font-family:'Noto Sans TC',sans-serif;outline:none;-webkit-appearance:none;transition:border-color .2s}
.m-input:focus,.m-select:focus,.m-textarea:focus{border-color:rgba(91,141,239,.5)}
.m-textarea{resize:none;min-height:72px}
.m-select option{background:#1E2333}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.days-display{text-align:center;background:rgba(91,141,239,.1);border:0.5px solid rgba(91,141,239,.2);border-radius:10px;padding:10px;margin-bottom:14px}
.days-num{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;color:#7FBBFF;line-height:1}
.days-label{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.submit-btn{width:100%;padding:15px;background:#5B8DEF;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s;margin-top:4px}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── Level 3:班表帶入 ── */
.sched-info{margin-top:8px;padding:10px 12px;background:rgba(91,141,239,.08);border:0.5px solid rgba(91,141,239,.2);border-radius:10px;font-size:12px;color:rgba(255,255,255,.75);line-height:1.5}
.sched-info-label{font-size:10px;color:rgba(91,141,239,.8);font-family:'DM Mono',monospace;letter-spacing:.6px;margin-bottom:4px}
.sched-warn{margin-top:8px;padding:10px 12px;background:rgba(251,146,60,.08);border:0.5px solid rgba(251,146,60,.25);border-radius:10px;font-size:12px;color:#FB923C;line-height:1.5}
.sched-loading{margin-top:8px;font-size:11px;color:rgba(255,255,255,.35);text-align:center;padding:6px}

/* ── 時段選擇 chip ── */
.range-chips{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}
.range-chip{padding:10px 8px;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);border-radius:10px;color:rgba(255,255,255,.55);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-align:center;transition:all .15s}
.range-chip:active{transform:scale(.97)}
.range-chip.selected{background:rgba(91,141,239,.18);border-color:#5B8DEF;color:#fff;font-weight:600}
.range-chip-sub{display:block;font-size:10px;color:rgba(255,255,255,.35);font-family:'DM Mono',monospace;margin-top:2px;letter-spacing:.4px}
.range-chip.selected .range-chip-sub{color:rgba(255,255,255,.6)}

/* ── 自訂時段 ── */
.custom-time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.time-input{width:100%;background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;font-size:13px;color:#E8EAF0;font-family:'DM Mono',monospace;outline:none}
.time-input:focus{border-color:rgba(91,141,239,.5)}
.hours-display{margin-top:8px;font-size:11px;color:rgba(255,255,255,.5);text-align:right;font-family:'DM Mono',monospace}
.hours-display strong{color:#5B8DEF;font-size:13px}

/* ── 假單列表 ── */
.leave-card{margin:0 16px 10px;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.08);border-radius:14px;padding:14px}
.leave-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.leave-type-chip{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.chip-annual{background:rgba(74,222,128,.15);color:#4ADE80}
.chip-sick{background:rgba(251,146,60,.15);color:#FB923C}
.chip-personal{background:rgba(122,133,160,.12);color:#7A85A0}
.chip-maternity{background:rgba(192,132,252,.15);color:#C084FC}
.chip-funeral,.chip-marriage{background:rgba(34,211,238,.12);color:#22D3EE}
.leave-dates{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:8px}
.leave-days-badge{font-size:11px;font-family:'DM Mono',monospace;color:rgba(255,255,255,.4)}

/* ── 審批流程條 ── */
.flow-row{display:flex;align-items:center;gap:4px;margin-top:10px;padding-top:10px;border-top:0.5px solid rgba(255,255,255,.06);overflow-x:auto;scrollbar-width:none}
.flow-row::-webkit-scrollbar{display:none}
.flow-step{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.flow-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1.5px solid}
.flow-dot-done{background:rgba(74,222,128,.2);border-color:#4ADE80;color:#4ADE80}
.flow-dot-current{background:rgba(251,146,60,.2);border-color:#FB923C;color:#FB923C}
.flow-dot-wait{background:rgba(122,133,160,.08);border-color:rgba(122,133,160,.3);color:rgba(255,255,255,.25)}
.flow-dot-reject{background:rgba(248,113,113,.2);border-color:#F87171;color:#F87171}
.flow-name{font-size:9px;color:rgba(255,255,255,.35);text-align:center;max-width:36px;line-height:1.2}
.flow-arrow{font-size:10px;color:rgba(255,255,255,.2);flex-shrink:0;padding-bottom:12px}

.status-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.s-pending{background:rgba(251,146,60,.12);color:#FB923C}
.s-approved{background:rgba(74,222,128,.12);color:#4ADE80}
.s-rejected{background:rgba(248,113,113,.12);color:#F87171}

.empty-state{text-align:center;padding:48px 20px;color:rgba(255,255,255,.3)}
.empty-icon{font-size:40px;margin-bottom:10px}

/* ── Upload Zone ── */
.m-upload-zone{border:1.5px dashed rgba(255,255,255,.15);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.02)}
.m-upload-zone.drag-over{border-color:rgba(91,141,239,.5);background:rgba(91,141,239,.05)}
.m-upload-icon{font-size:22px;margin-bottom:4px}
.m-upload-text{font-size:13px;color:rgba(255,255,255,.45)}
.m-upload-hint{font-size:11px;color:rgba(255,255,255,.25);margin-top:3px}
.m-file-preview{display:flex;align-items:center;gap:10px;background:rgba(91,141,239,.08);border:1px solid rgba(91,141,239,.2);border-radius:10px;padding:10px 12px}
.m-file-name{flex:1;font-size:12px;color:#E8EAF0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-file-clear{background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:15px;padding:2px 5px;border-radius:4px;line-height:1}
.m-file-clear:active{color:#F87171}
.m-attach-required{font-size:11px;color:#FB923C;margin-left:4px}
.m-attach-icon{font-size:13px;color:rgba(255,255,255,.35);margin-left:6px;text-decoration:none}
.m-attach-icon:hover{color:#7FBBFF}

/* ── Toast ── */
.m-toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.m-toast{background:#1E2333;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:10px 20px;font-size:13px;animation:mtin .3s ease;white-space:nowrap}
@keyframes mtin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.m-toast-success{border-left:3px solid #4ADE80}.m-toast-error{border-left:3px solid #F87171}.m-toast-warn{border-left:3px solid #FB923C}

/* Phase 1.4: stage / advance / proof / late UI */
.lt-hint-row{margin-top:8px;padding:8px 10px;background:rgba(91,141,239,.06);border:0.5px solid rgba(91,141,239,.18);border-radius:8px;font-size:11px;line-height:1.6}
.lt-advance{color:#7FBBFF}
.lt-proof{color:#FBBF24;display:block;margin-top:2px}
.late-warn{margin-top:8px;padding:8px 10px;background:rgba(251,146,60,.08);border:0.5px solid rgba(251,146,60,.25);border-radius:8px;font-size:11px;color:#FB923C;line-height:1.5}
.hard-warn{margin-top:8px;padding:8px 10px;background:rgba(248,113,113,.08);border:0.5px solid rgba(248,113,113,.3);border-radius:8px;font-size:11px;color:#F87171;line-height:1.5}
.s-pending_mgr,.s-pending_ceo{background:rgba(251,146,60,.12);color:#FB923C}
.s-archived{background:rgba(74,222,128,.10);color:#86efac}
.s-cancelled{background:rgba(107,114,128,.15);color:#9CA3AF}
/* Phase 1.6:terminated badge(stageBadgeClass 回 badge-terminated)*/
.badge-terminated{background:rgba(107,114,128,.18);color:#F87171;border:1px solid rgba(248,113,113,.35)}
.mini-tag{padding:2px 6px;border-radius:3px;font-size:10px;font-family:'DM Mono',monospace;margin-left:4px}
.mini-tag-late{background:rgba(251,146,60,.15);color:#FB923C}
.mini-tag-proof{background:rgba(251,191,36,.15);color:#FBBF24}
/* Phase 1.5 升級:expired tag 灰底紅字、與 required 黃 ⏳ tag 區分 */
.mini-tag-expired{background:rgba(107,114,128,.18);color:#F87171}

/* ── 底部導航 ── */
.mobile-bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0a0c12;border-top:0.5px solid rgba(255,255,255,.08);display:flex;padding:10px 0 24px;z-index:50}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-decoration:none}
.mobile-nav-item .nav-icon{font-size:22px;opacity:.35}
.mobile-nav-item .nav-label{font-size:10px;color:rgba(255,255,255,.35)}
.mobile-nav-item.active .nav-icon{opacity:1}
.mobile-nav-item.active .nav-label{color:#5B8DEF}
</style>
</head>
<body>
<div class="mobile-app">
  <div class="mobile-header">
    <div class="page-title-lg">請假</div>
  </div>

  <div class="m-tabs">
    <button class="m-tab active" onclick="switchTab('apply', this)">申請假單</button>
    <button class="m-tab" onclick="switchTab('list', this)">我的假單</button>
  </div>

  <!-- 申請表單 -->
  <div class="scroll-content" id="tab-apply">
    <div class="mobile-card">
      <div class="card-label">申請請假</div>

      <div class="m-form-row">
        <label class="m-label">假別</label>
        <select class="m-select" id="f-type" onchange="onTypeChange()">
          <option value="">載入中…</option>
        </select>
        <div class="lt-hint-row" id="lt-hint" style="display:none"></div>
      </div>

      <!-- 病假證明上傳 -->
      <div id="upload-section" class="m-form-row" style="display:none">
        <label class="m-label">病假證明<span class="m-attach-required">（必填）</span></label>
        <div id="upload-zone" class="m-upload-zone"
             onclick="document.getElementById('file-input').click()"
             ondragover="event.preventDefault();this.classList.add('drag-over')"
             ondragleave="this.classList.remove('drag-over')"
             ondrop="onFileDrop(event)">
          <div class="m-upload-icon">📎</div>
          <div class="m-upload-text">點擊上傳病假證明</div>
          <div class="m-upload-hint">JPG、PNG 或 PDF，最大 5MB</div>
        </div>
        <div id="file-preview" class="m-file-preview" style="display:none;margin-top:8px">
          <span id="file-icon">📄</span>
          <span class="m-file-name" id="file-name">—</span>
          <button class="m-file-clear" onclick="clearFile()">✕</button>
        </div>
        <input type="file" id="file-input" accept="image/*,.pdf" style="display:none" onchange="onFileSelect(this.files[0])">
      </div>

      <div class="date-row m-form-row">
        <div>
          <label class="m-label">開始日期</label>
          <input type="date" class="m-input" id="f-start" oninput="onDateChange()">
        </div>
        <div>
          <label class="m-label">結束日期</label>
          <input type="date" class="m-input" id="f-end" oninput="onDateChange()">
        </div>
      </div>

      <!-- 班表預覽 (Level 3:選日期後自動載入) -->
      <div id="sched-preview"></div>

      <!-- 時段選擇 chip (Level 2+3) -->
      <div id="range-section" class="m-form-row" style="display:none">
        <label class="m-label">請假時段</label>
        <div class="range-chips" id="range-chips"></div>

        <!-- 自訂時段(只在 range=custom 時顯示) -->
        <div id="custom-time" class="custom-time-row" style="display:none">
          <div>
            <label class="m-label" style="margin-top:4px">開始時間</label>
            <input type="time" class="time-input" id="f-time-start" step="900" oninput="recalcHours()">
          </div>
          <div>
            <label class="m-label" style="margin-top:4px">結束時間</label>
            <input type="time" class="time-input" id="f-time-end" step="900" oninput="recalcHours()">
          </div>
        </div>

        <div class="hours-display">
          總時數:<strong id="hours-num">0</strong> 小時
        </div>
      </div>

      <div class="m-form-row">
        <label class="m-label">原因（選填）</label>
        <textarea class="m-textarea" id="f-reason" placeholder="請填寫請假原因…"></textarea>
      </div>

      <!-- soft late 時顯示 -->
      <div class="m-form-row" id="late-reason-row" style="display:none">
        <label class="m-label" style="color:#FB923C">遲報原因（必填）</label>
        <textarea class="m-textarea" id="f-late-reason" placeholder="例:臨時家裡有事、無法事先通知"></textarea>
      </div>

      <div class="late-warn" id="late-warn" style="display:none"></div>
      <div class="hard-warn" id="hard-warn" style="display:none"></div>

      <button class="submit-btn" id="submit-btn" onclick="submitLeave()">送出申請</button>
    </div>
  </div>

  <!-- 假單列表 -->
  <div class="scroll-content" id="tab-list" style="display:none">
    <div class="m-tabs" style="margin:0 16px 14px">
      <button class="m-tab active" onclick="filterList('',this)" id="filter-all">全部</button>
      <button class="m-tab" onclick="filterList('pending',this)">申請中</button>
      <button class="m-tab" onclick="filterList('approved',this)">已核准</button>
      <button class="m-tab" onclick="filterList('rejected',this)">已退回</button>
    </div>
    <div id="leave-list"></div>
  </div>

  <!-- 底部導航 -->
  <nav class="mobile-bottom-nav">
    <a href="/employee-app.html" class="mobile-nav-item">
      <span class="nav-icon">🏠</span><span class="nav-label">首頁</span>
    </a>
    <a href="/announcements.html" class="mobile-nav-item">
      <span class="nav-icon">📢</span><span class="nav-label">公告</span>
    </a>
    <a href="/employee-leave.html" class="mobile-nav-item active">
      <span class="nav-icon">📋</span><span class="nav-label">請假</span>
    </a>
    <a href="/employee-salary.html" class="mobile-nav-item">
      <span class="nav-icon">💰</span><span class="nav-label">薪資</span>
    </a>
    <a href="/employee-profile.html" class="mobile-nav-item">
      <span class="nav-icon">👤</span><span class="nav-label">我的</span>
    </a>
  </nav>
</div>

<script>
const SUPABASE_URL      = 'https://scsgqxixmbompnoypuuw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjc2dxeGl4bWJvbXBub3lwdXV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzkxODMsImV4cCI6MjA5MjAxNTE4M30.DRuX4OoQDQSQfvqb71VgSmDysli7e_w8lvsdp3p_VA8';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null, API = '';
let allLeaves = [], currentFilter = '';
let selectedFile = null;

// ─── lib/schedule/break-overlap.js mirror (前後端共用 SOT) ───
// ⚠ SOT 在 lib/schedule/break-overlap.js、改這邊請同步那邊。
//   後端用 ESM 跑、前端用 vanilla JS、故各自一份、語意必須一致。
function classifyShiftBreak(shift) {
  if (!shift) return 'none';
  if (shift.break_start && shift.break_end) return 'fixed';
  if (Number(shift.break_minutes) > 0) return 'flexible';
  return 'none';
}
function timeStringToMs(timeStr, baseDateStr) {
  if (!timeStr) return null;
  const m = String(timeStr).trim().match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
  if (!m) return null;
  const t = Date.parse(`${baseDateStr}T${m[1].padStart(2,'0')}:${m[2]}:00+08:00`);
  return Number.isFinite(t) ? t : null;
}
function calculateBreakOverlapMs(reqStartMs, reqEndMs, baseDateStr, shift) {
  if (!shift?.break_start || !shift?.break_end) return 0;
  const bStart = timeStringToMs(shift.break_start, baseDateStr);
  const bEnd   = timeStringToMs(shift.break_end,   baseDateStr);
  if (bStart == null || bEnd == null || bEnd <= bStart) return 0;
  return Math.max(0, Math.min(reqEndMs, bEnd) - Math.max(reqStartMs, bStart));
}
function calculateSegmentLeaveMinutes({ reqStartMs, reqEndMs, segStartMs, segEndMs, shift, baseDateStr }) {
  const overlapStart = Math.max(reqStartMs, segStartMs);
  const overlapEnd   = Math.min(reqEndMs,   segEndMs);
  const overlap = Math.max(0, overlapEnd - overlapStart);
  if (overlap <= 0) return 0;
  const mode = classifyShiftBreak(shift);
  if (mode === 'none') return overlap / 60000;
  if (mode === 'fixed') {
    // 扣「請假 ∩ 排班 ∩ 午休」、傳 overlap range 而不是 request range(避免多段班重複扣)
    const breakOverlap = calculateBreakOverlapMs(overlapStart, overlapEnd, baseDateStr, shift);
    return Math.max(0, overlap - breakOverlap) / 60000;
  }
  // flexible
  const span = Math.max(1, segEndMs - segStartMs);
  const breakMs = Number(shift.break_minutes || 0) * 60000;
  const work = Math.max(0, span - breakMs);
  return overlap * (work / span) / 60000;
}
function calculateHalfDayBoundaries(shift) {
  if (!shift?.start_time || !shift?.end_time) return null;
  if (shift.shift_types?.is_off || shift.is_off) return null;
  const startStr = String(shift.start_time).slice(0, 5);
  const endStr   = String(shift.end_time).slice(0, 5);
  if (classifyShiftBreak(shift) === 'fixed') {
    return {
      morning:   { start: startStr, end: String(shift.break_start).slice(0, 5) },
      afternoon: { start: String(shift.break_end).slice(0, 5), end: endStr },
    };
  }
  const [sh, sm] = startStr.split(':').map(Number);
  const [eh, em] = endStr.split(':').map(Number);
  const startMin = sh*60 + sm;
  const endMin   = eh*60 + em + (shift.crosses_midnight ? 1440 : 0);
  const midMin = (startMin + endMin) / 2;
  const midH = Math.floor(midMin / 60) % 24;
  const midM = Math.round(midMin % 60);
  const midStr = `${String(midH).padStart(2,'0')}:${String(midM).padStart(2,'0')}`;
  return { morning: { start: startStr, end: midStr }, afternoon: { start: midStr, end: endStr } };
}

function recheckAdvance() {
  const SU = window.HR_Utils;
  const code = document.getElementById('f-type').value;
  const lt = SU?.leaveType?.(code);
  const startAt = getCurrentStartAt();
  const lateWarn = document.getElementById('late-warn');
  const hardWarn = document.getElementById('hard-warn');
  const lateRow  = document.getElementById('late-reason-row');
  const submitBtn = document.getElementById('submit-btn');
  lateWarn.style.display = 'none';
  hardWarn.style.display = 'none';
  lateRow.style.display = 'none';
  submitBtn.disabled = false;
  if (!lt || !startAt) return;
  const r = SU.checkAdvanceClient(lt, startAt, new Date());
  if (!r.ok) {
    hardWarn.textContent = `❌ 未達前置時間:${SU.advanceHintText(lt)}(目前距假期 ${Math.floor(r.gapHours)} 小時、不足 ${r.advanceHours} 小時)、無法送出`;
    hardWarn.style.display = '';
    submitBtn.disabled = true;
  } else if (r.late) {
    lateWarn.textContent = `⚠ 未達建議前置時間(目前距假期 ${Math.floor(r.gapHours)} 小時、建議 ${r.advanceHours} 小時)、請補充遲報原因`;

    lateRow.style.display = '';
  }
}

// ─────────────────────────────────────────────────────────────
// Level 3:智慧帶入班表 + Level 2:時段選擇
// ─────────────────────────────────────────────────────────────
//
// 流程:
//   1. 員工選日期 → onDateChange() → loadSchedules() fetch 當期間班表
//   2. 顯示班表摘要 + 列出時段選項 chip(整天/上半/下半/自訂)
//   3. 員工選 chip 或自訂時段 → recalcHours() 計算實際時數
//   4. submitLeave() 把選擇的時段組成 start_at/end_at 送出
//
// 設計原則:
//   - 多天請假僅支援「整天」(後端 calculateLeaveHours 自動處理 overlap)
//   - 單天請假支援 4 種:整天/上半/下半/自訂
//   - 預設選「整天」(最常見情境、向後相容)
//   - 沒排班那天會擋下、讓員工知道為何不能請
let cachedSchedules = [];   // 當期日期區間的所有 schedules
let selectedRange   = 'full'; // 'full' | 'morning' | 'afternoon' | 'custom'

function fmtTime(t) {
  // '09:00:00' → '09:00'
  if (!t) return '';
  return t.substring(0, 5);
}

async function onDateChange() {
  const s = document.getElementById('f-start').value;
  const e = document.getElementById('f-end').value;
  if (!s || !e) { resetSched(); return; }
  if (new Date(e) < new Date(s)) { resetSched(); return; }
  await loadSchedules(s, e);
  renderSchedPreview();
  renderRangeChips();
  recalcHours();
}

function resetSched() {
  cachedSchedules = [];
  document.getElementById('sched-preview').innerHTML = '';
  document.getElementById('range-section').style.display = 'none';
  document.getElementById('hours-num').textContent = '0';
}

async function loadSchedules(start, end) {
  document.getElementById('sched-preview').innerHTML =
    '<div class="sched-loading">載入班表中…</div>';
  try {
    const data = await apiFetch(`/api/schedules?start=${start}&end=${end}&employee_id=${currentUser.id}`);
    // legacy GET 回 array of {work_date, start_time, end_time, shift_types:{name, is_off}}
    cachedSchedules = Array.isArray(data) ? data : [];
  } catch(err) {
    cachedSchedules = [];
    console.error('[loadSchedules]', err);
  }
}

function renderSchedPreview() {
  const el = document.getElementById('sched-preview');
  const s = document.getElementById('f-start').value;
  const e = document.getElementById('f-end').value;
  if (!s || !e) { el.innerHTML = ''; return; }

  // 列出每一天的班表
  const dates = [];
  const cur = new Date(s);
  const endD = new Date(e);
  while (cur <= endD) {
    dates.push(cur.toISOString().substring(0,10));
    cur.setDate(cur.getDate() + 1);
  }
  if (dates.length === 0) { el.innerHTML = ''; return; }

  // 先檢查是不是「整段都沒排班」
  const workDays = dates.filter(d => {
    const sched = cachedSchedules.find(s => s.work_date === d);
    return sched && !sched.shift_types?.is_off && sched.start_time;
  });

  if (workDays.length === 0) {
    el.innerHTML = `<div class="sched-warn">⚠️ 您所選區間內 ${dates.length} 天都沒有排班(休息日 / 例假日 / 國定假日 / 未排班),無法請假。請洽主管確認班表。</div>`;
    return;
  }

  // 顯示班表摘要
  const lines = dates.map(d => {
    const sched = cachedSchedules.find(s => s.work_date === d);
    const dow = ['日','一','二','三','四','五','六'][new Date(d).getDay()];
    if (!sched) return `${d.substring(5)} (${dow}):未排班`;
    const st = sched.shift_types;
    if (!st) return `${d.substring(5)} (${dow}):—`;
    if (st.is_off) return `${d.substring(5)} (${dow}):${st.name}(無工時)`;
    if (sched.start_time) return `${d.substring(5)} (${dow}):${st.name} ${fmtTime(sched.start_time)}-${fmtTime(sched.end_time)}`;
    return `${d.substring(5)} (${dow}):${st.name}`;
  });
  el.innerHTML = `
    <div class="sched-info">
      <div class="sched-info-label">當期班表(自動帶入)</div>
      ${lines.join('<br>')}
    </div>`;
}

function renderRangeChips() {
  const s = document.getElementById('f-start').value;
  const e = document.getElementById('f-end').value;
  const sec = document.getElementById('range-section');
  const chipsEl = document.getElementById('range-chips');
  if (!s || !e) { sec.style.display = 'none'; return; }

  const isSingleDay = s === e;
  const sched = cachedSchedules.find(c => c.work_date === s);
  const hasShift = sched && !sched.shift_types?.is_off && sched.start_time;

  // 多天 / 沒排班 → 只顯示「整天」、不給選項
  if (!isSingleDay || !hasShift) {
    sec.style.display = isSingleDay && !hasShift ? 'none' : 'block';
    chipsEl.innerHTML = `<button class="range-chip selected" onclick="selectRange('full')">整天<span class="range-chip-sub">依當日班表</span></button>`;
    selectedRange = 'full';
    document.getElementById('custom-time').style.display = 'none';
    return;
  }

  // 單天且有排班 → 顯示 4 種選項
  sec.style.display = 'block';
  const startStr = fmtTime(sched.start_time);
  const endStr   = fmtTime(sched.end_time);
  // 上下半段切點:fixed break shift 用 break_start/break_end、其他用中點
  const halfBounds = calculateHalfDayBoundaries(sched);
  const morningEnd   = halfBounds?.morning.end   ?? startStr;
  const afternoonStart = halfBounds?.afternoon.start ?? endStr;

  chipsEl.innerHTML = `
    <button class="range-chip ${selectedRange==='full'?'selected':''}" onclick="selectRange('full')">
      整天<span class="range-chip-sub">${startStr}-${endStr}</span>
    </button>
    <button class="range-chip ${selectedRange==='morning'?'selected':''}" onclick="selectRange('morning')">
      上半段<span class="range-chip-sub">${startStr}-${morningEnd}</span>
    </button>
    <button class="range-chip ${selectedRange==='afternoon'?'selected':''}" onclick="selectRange('afternoon')">
      下半段<span class="range-chip-sub">${afternoonStart}-${endStr}</span>
    </button>
    <button class="range-chip ${selectedRange==='custom'?'selected':''}" onclick="selectRange('custom')">
      自訂時段<span class="range-chip-sub">幾點到幾點</span>
    </button>
  `;
  document.getElementById('custom-time').style.display = selectedRange === 'custom' ? 'grid' : 'none';
}

function selectRange(r) {
  selectedRange = r;
  renderRangeChips();
  // 切到自訂時,預填當天班表時段
  if (r === 'custom') {
    const sched = cachedSchedules.find(c => c.work_date === document.getElementById('f-start').value);
    if (sched && sched.start_time) {
      document.getElementById('f-time-start').value = fmtTime(sched.start_time);
      document.getElementById('f-time-end').value   = fmtTime(sched.end_time);
    }
  }
  recalcHours();
}

// 取得當前選擇的 [start_at, end_at, hoursPreview]
// 注意:hoursPreview 只是前端粗估,真實時數由後端 calculateLeaveHours 用 overlap 算
function getSelectedRange() {
  const s = document.getElementById('f-start').value;
  const e = document.getElementById('f-end').value;
  if (!s || !e) return null;

  const isSingleDay = s === e;

  // 多天:固定整天區間,後端依各天班表 overlap 計算
  if (!isSingleDay) {
    return {
      start_at: `${s}T00:00:00+08:00`,
      end_at:   `${e}T23:59:59+08:00`,
      hours: estimateMultiDayHours(s, e),
    };
  }

  const sched = cachedSchedules.find(c => c.work_date === s);
  // 沒班 / 全休 → 不該到這裡(submitLeave 會擋),但保險起見回 0
  if (!sched || sched.shift_types?.is_off || !sched.start_time) {
    return { start_at: `${s}T00:00:00+08:00`, end_at: `${s}T23:59:59+08:00`, hours: 0 };
  }

  const startStr = fmtTime(sched.start_time);
  const endStr   = fmtTime(sched.end_time);
  // 上下半段切點:用同一個 SOT
  const halfBounds = calculateHalfDayBoundaries(sched);

  let stTime = startStr, edTime = endStr;
  if (selectedRange === 'morning' && halfBounds)   { edTime = halfBounds.morning.end; }
  if (selectedRange === 'afternoon' && halfBounds) { stTime = halfBounds.afternoon.start; }
  if (selectedRange === 'custom') {
    stTime = document.getElementById('f-time-start').value || startStr;
    edTime = document.getElementById('f-time-end').value   || endStr;
  }

  // 預估時數:用三類分流 SOT(跟後端 calculateLeaveHours 一致)
  const reqStartMs = timeStringToMs(stTime, s);
  const reqEndMs   = timeStringToMs(edTime, s) + (edTime <= stTime ? 86400000 : 0);
  const segStartMs = timeStringToMs(startStr, s);
  const segEndMs   = timeStringToMs(endStr,   s) + (sched.crosses_midnight ? 86400000 : 0);
  const minutes = calculateSegmentLeaveMinutes({
    reqStartMs, reqEndMs, segStartMs, segEndMs,
    shift: sched, baseDateStr: s,
  });
  const hours = Math.round(minutes / 60 * 2) / 2;

  return {
    start_at: `${s}T${stTime}:00+08:00`,
    end_at:   `${s}T${edTime}:00+08:00`,
    hours,
  };
}

function parseTime(t) {
  const [h, m] = t.split(':').map(Number);
  return h*60 + m;
}

function estimateMultiDayHours(s, e) {
  let total = 0;
  const cur = new Date(s);
  const endD = new Date(e);
  while (cur <= endD) {
    const d = cur.toISOString().substring(0,10);
    const sched = cachedSchedules.find(c => c.work_date === d);
    if (sched && !sched.shift_types?.is_off && sched.scheduled_work_minutes) {
      total += Number(sched.scheduled_work_minutes) / 60;
    }
    cur.setDate(cur.getDate() + 1);
  }
  return Math.round(total * 2) / 2;
}

function recalcHours() {
  const r = getSelectedRange();
  document.getElementById('hours-num').textContent = r ? r.hours : 0;
  // Phase 1.4: 日期 / 時段 / 班表變動時、同步重算 advance 檢查
  recheckAdvance();
}

async function submitLeave() {
  if (!currentUser) return;
  const type   = document.getElementById('f-type').value;
  const start  = document.getElementById('f-start').value;
  const end    = document.getElementById('f-end').value;
  const reason = document.getElementById('f-reason').value.trim();
  if (!start || !end) { toast('請選擇請假日期', 'warn'); return; }
  if (new Date(end) < new Date(start)) { toast('結束日期須不早於開始日期', 'warn'); return; }
  if (type === 'sick' && !selectedFile) { toast('病假須上傳病假證明', 'warn'); return; }

  const range = getSelectedRange();
  if (!range || range.hours <= 0) {
    toast('您所選的區間沒有可請假的工時(可能全是休息日 / 例假 / 國假),無法送出', 'warn');
    return;
  }

  // soft late 時 late_reason 必填(client-side 先 prompt)
  const lateRow = document.getElementById('late-reason-row');
  const lateReasonEl = document.getElementById('f-late-reason');
  let late_reason = null;
  if (lateRow.style.display !== 'none') {
    late_reason = lateReasonEl.value.trim();
    if (!late_reason) { toast('請填遲報原因', 'warn'); lateReasonEl.focus(); return; }
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '送出中…';
  try {
    let attachment_url = null, attachment_name = null;
    if (selectedFile) {
      const ext  = selectedFile.name.split('.').pop();
      const path = `${currentUser.id}/${Date.now()}.${ext}`;
      const { error: upErr } = await _sb.storage.from('leave-attachments').upload(path, selectedFile, { upsert: true });
      if (upErr) { toast('附件上傳失敗:' + upErr.message, 'error'); btn.disabled=false; btn.textContent='送出申請'; return; }
      attachment_url  = path;
      attachment_name = selectedFile.name;
    }
    // start_at/end_at 由 getSelectedRange() 組好(已含 +08:00 時區),
    // 後端 calculateLeaveHours 會用 schedule overlap 計算實際時數。
    // apiFetch throw on !res.ok、所以改用 fetch 直接拿 body 來判斷 reason
    const session = await _sb.auth.getSession();
    const token = session?.data?.session?.access_token;
    const res = await fetch(API + '/api/leaves', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) },
      body: JSON.stringify({
        employee_id: currentUser.id, leave_type: type,
        start_at: range.start_at, end_at: range.end_at, reason,
        late_reason,
        attachment_url, attachment_name,
      }),
    });
    const result = await res.json().catch(() => ({}));
    if (!res.ok || result.ok === false) {
      const msg = result.reason === 'ADVANCE_TIME_NOT_MET'
        ? `未達前置時間(需 ${result.advance_hours} 小時、距假期僅 ${Math.floor(result.gap_hours)} 小時)`
        : result.reason === 'LATE_REASON_REQUIRED'
        ? '請填遲報原因'
        : (result.reason || result.error || `${res.status}`);
      toast('送出失敗:' + msg, 'error');
      if (result.reason === 'LATE_REASON_REQUIRED' && lateReasonEl) lateReasonEl.focus();
      btn.disabled = false; btn.textContent = '送出申請';
      return;
    }
    toast('✅ 假單已送出', 'success');
    document.getElementById('f-start').value = '';
    document.getElementById('f-end').value   = '';
    document.getElementById('f-reason').value = '';
    if (lateReasonEl) lateReasonEl.value = '';
    selectedRange = 'full';
    resetSched();
    const sel = document.getElementById('f-type');
    if (sel.options.length) sel.selectedIndex = 0;
    document.getElementById('upload-section').style.display = 'none';
    document.getElementById('lt-hint').style.display = 'none';
    document.getElementById('late-reason-row').style.display = 'none';
    document.getElementById('late-warn').style.display = 'none';
    document.getElementById('hard-warn').style.display = 'none';
    clearFile();
    // 重新 fetch 自己的假單列表
    await loadLeaves();
  } catch(e) { toast('送出失敗:' + e.message, 'error'); }
  btn.disabled = false; btn.textContent = '送出申請';
}

function filterList(status, el) {
  currentFilter = status;
  document.querySelectorAll('#tab-list .m-tabs .m-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

function getFlowHtml(status) {
  // 多階審核 4 個 step:員工 → 主管 → 執行長 → 人資
  // legacy 'pending' 視為 'pending_mgr' 處理
  const s = status === 'pending' ? 'pending_mgr' : status;
  const steps = [
    { label:'員工',  done: true },
    { label:'主管',  done: ['pending_ceo','approved','archived'].includes(s),
                     current: s === 'pending_mgr',
                     reject: s === 'rejected' },
    { label:'執行長', done: ['approved','archived'].includes(s),
                     current: s === 'pending_ceo' },
    { label:'人資',   done: s === 'archived' },
  ];
  return steps.map((s2, i) => {
    let dotCls = 'flow-dot-wait';
    let symbol = String(i+1);
    if (s2.reject)   { dotCls = 'flow-dot-reject'; symbol = '✗'; }
    else if (s2.done){ dotCls = 'flow-dot-done';   symbol = '✓'; }
    else if (s2.current){ dotCls = 'flow-dot-current'; symbol = '…'; }
    const arrow = i < steps.length-1 ? '<span class="flow-arrow">›</span>' : '';
    return `<div class="flow-step"><div class="flow-dot ${dotCls}">${symbol}</div><div class="flow-name">${s2.label}</div></div>${arrow}`;
  }).join('');
}

async function uploadProofMobile(id) {

      method: 'PUT',
      headers: await authHeaders(),
      body: JSON.stringify({ action: 'submit_proof', proof_url: url.trim() }),
    });
    const result = await res.json().catch(() => ({}));
    if (!res.ok || result.ok === false) {
      toast('提交失敗:' + (result.error || result.reason || `${res.status}`), 'error');

    }
    toast('已提交證明', 'success');
    await loadLeaves();
  } catch(e) { toast('提交失敗:' + e.message, 'error'); }
}

async function cancelLeave(id) {
  if (!confirm('確定撤回此假單?')) return;
  try {
    const res = await fetch(API + `/api/leaves/${encodeURIComponent(id)}`, {
      method: 'DELETE',
      headers: await authHeaders(),
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      toast('撤回失敗:' + (e.error || e.reason || `${res.status}`), 'error');
      return;
    }
    toast('已撤回', 'success');
    await loadLeaves();
  } catch(e) { toast('撤回失敗:' + e.message, 'error'); }
}

async function authHeaders() {
  const session = await _sb.auth.getSession();
  const token = session?.data?.session?.access_token;
  return { 'Content-Type':'application/json', ...(token ? { 'Authorization':`Bearer ${token}` } : {}) };
}

function renderLeaves() {
  const SU = window.HR_Utils;
  // filter 'pending' tab 涵蓋所有 pending* 狀態
  const filtered = currentFilter
    ? allLeaves.filter(l => currentFilter === 'pending'
        ? ['pending', 'pending_mgr', 'pending_ceo'].includes(l.status)
        : l.status === currentFilter)
    : allLeaves;
  const wrap = document.getElementById('leave-list');
  if (!filtered.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div>沒有假單紀錄</div></div>`;
    return;
  }
  wrap.innerHTML = filtered.map(l => {
    const stageText = SU.stageLabel(l.status);
    const stageCls  = SU.stageBadgeClass(l.status);
    const statusBadge = `<span class="status-badge ${stageCls}">${stageText}</span>`;
    const lateTag  = l.late_application ? `<span class="mini-tag mini-tag-late">⚠ 補申請</span>` : '';
    // Phase 1.5 升級:expired 顯示灰底紅字、與 required 黃 ⏳ tag 區分
    const proofTag = l.proof_status === 'required'
      ? `<span class="mini-tag mini-tag-proof">⏳ 待補證明</span>`
      : l.proof_status === 'expired'
      ? `<span class="mini-tag mini-tag-expired">證明已過期、HR 處理中</span>` : '';
    const proofBtn = (l.proof_status === 'required' && l.employee_id === currentUser.id)
      ? `<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="uploadProofMobile('${l.id}')">📎 提交證明</button>` : '';
    const cancelBtn = (['pending','pending_mgr','pending_ceo'].includes(l.status) && l.employee_id === currentUser.id)
      ? `<button class="btn btn-ghost btn-sm" style="margin-top:8px;margin-left:6px" onclick="cancelLeave('${l.id}')">撤回</button>` : '';
    return `<div class="leave-card">
      <div class="leave-card-top">
        <span class="leave-type-chip ${CHIP_CLS[l.leave_type]||'chip-personal'}">${LEAVE_LABELS[l.leave_type]||l.leave_type}${lateTag}${proofTag}</span>
        ${statusBadge}
      </div>
      <div class="leave-dates">${l.start_date} ～ ${l.end_date}</div>
      <div class="leave-days-badge">共 ${l.days} 天${l.attachment_name ? ` <span title="${l.attachment_name}">📎</span>` : ''}</div>
      <div class="flow-row">${getFlowHtml(l.status)}</div>
      ${proofBtn || cancelBtn ? `<div>${proofBtn}${cancelBtn}</div>` : ''}
    </div>`;
  }).join('');
}

async function loadLeaves() {
  if (!currentUser) return;
  try {
    const all = await apiFetch(`/api/leaves`);
    // Filter to current employee only
    allLeaves = all.filter(l => l.employee_id === currentUser.id);
    renderLeaves();
  } catch(e) { allLeaves = []; }
}

(async () => {
  API = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? 'http://localhost:3000' : '';
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) { window.location.href = '/login.html'; return; }
  try { currentUser = await apiFetch('/api/employees/me'); }
  catch(e) { window.location.href = '/login.html'; return; }

  // Set default dates
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('f-start').value = today;
  document.getElementById('f-end').value   = today;
  // calcDays() 已被 onDateChange() 取代,不在 init 階段觸發(只有員工選日期才載入)

  // 並行：假別下拉 + 假單列表
  await Promise.all([loadLeaveTypes(), loadLeaves()]);
})();
</script>
