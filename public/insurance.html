<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勞健保管理 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.ins-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.ins-block-title{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ins-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;background:var(--surface2);border-radius:8px;padding:10px 14px;border:1px solid var(--border)}
.ins-sum-item .is-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.ins-sum-item .is-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace}
.is-val.pos{color:var(--green)}.is-val.acc{color:var(--accent2)}
.emp-modal-header{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px}
.emp-modal-salary{margin-left:auto;text-align:right}
.emp-modal-salary .sal-label{font-size:10px;color:var(--text-dim)}
.emp-modal-salary .sal-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent2)}
.no-ins-box{padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:14px}
.badge-ins{background:rgba(74,222,128,.12);color:#4ADE80;border:1px solid rgba(74,222,128,.2)}
.badge-no{background:rgba(122,133,160,.1);color:#7A85A0;border:1px solid rgba(122,133,160,.2)}
.badge-unset{background:rgba(251,146,60,.1);color:#FB923C;border:1px solid rgba(251,146,60,.2)}
.badge-pt{background:rgba(255,160,80,.1);color:#FFA050;border:1px solid rgba(255,160,80,.2)}
.stat-card.purple{background:rgba(192,132,252,.06);border:1px solid rgba(192,132,252,.2)}
.stat-card.purple .stat-value{color:#C084FC}
/* ── Batch toolbar ── */
.batch-toolbar{display:flex;align-items:center;justify-content:space-between;background:rgba(91,141,239,.08);border:1px solid rgba(91,141,239,.2);border-radius:8px;padding:10px 14px;margin-bottom:10px}
.batch-toolbar-count{font-size:13px;color:var(--accent2);font-weight:500}
/* ── Batch modal mode rows ── */
.batch-mode-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.batch-mode-row:last-of-type{border-bottom:none}
.batch-mode-row input[type=radio]{margin-top:3px;flex-shrink:0;cursor:pointer}
.batch-mode-label{font-weight:500;font-size:13px;cursor:pointer}
.batch-mode-hint{font-size:11px;color:var(--text-dim);margin-top:2px}
</style>
</head>
<body data-page="insurance">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">勞健保管理</div>
        <div class="page-sub">員工勞保、健保及勞退提撥管理 <span class="db-badge" id="db-status">● 連線中…</span></div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" onclick="batchApply()">⚡ 全員建議級距</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card green"><div class="stat-label">投保人數</div><div class="stat-value" id="st-insured">—</div><div class="stat-hint">位員工</div></div>
      <div class="stat-card blue"><div class="stat-label">公司勞保</div><div class="stat-value" id="st-labor" style="font-size:18px">—</div><div class="stat-hint">本月負擔</div></div>
      <div class="stat-card purple"><div class="stat-label">公司健保</div><div class="stat-value" id="st-health" style="font-size:18px">—</div><div class="stat-hint">本月負擔</div></div>
      <div class="stat-card orange"><div class="stat-label">勞退提撥</div><div class="stat-value" id="st-pension" style="font-size:18px">—</div><div class="stat-hint">本月合計</div></div>
    </div>

    <!-- 未設定提示 -->
    <div id="unset-notice" style="display:none;align-items:center;justify-content:space-between;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:12px 16px;margin-bottom:14px">
      <div style="font-size:13px">⚠️ 有 <span id="unset-count" style="font-weight:600">0</span> 位員工尚未設定勞健保</div>
      <button class="btn btn-ghost btn-sm" onclick="autoSetAll()">一鍵套用建議級距</button>
    </div>

    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="搜尋員工姓名…" oninput="renderTable()">
      <select id="dept-filter" onchange="renderTable()"><option value="">全部部門</option></select>
      <select id="ins-filter" onchange="renderTable()">
        <option value="">全部狀態</option>
        <option value="insured">已投保</option>
        <option value="none">無投保</option>
        <option value="unset">未設定</option>
      </select>
    </div>

    <!-- 批次操作工具列 -->
    <div class="batch-toolbar" id="batch-toolbar" style="display:none">
      <span class="batch-toolbar-count" id="batch-count">已選 0 人</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="batchSetInsurance(true)">✅ 設為投保</button>
        <button class="btn btn-ghost btn-sm" onclick="batchSetInsurance(false)">❌ 設為無投保</button>
        <button class="btn btn-primary btn-sm" onclick="openBatchModal()">⚙️ 批次設定級距</button>
        <button class="btn btn-ghost btn-sm" onclick="clearSelection()">取消選取</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:40px;text-align:center">
            <input type="checkbox" id="select-all" onchange="toggleSelectAll(this.checked)">
          </th>
          <th>員工</th><th>月薪</th><th>投保狀態</th>
          <th>勞保投保薪資</th><th>員工勞保費</th>
          <th>健保投保金額</th><th>員工健保費</th>
          <th>眷屬數</th><th>勞退提撥</th><th>操作</th>
        </tr></thead>
        <tbody id="ins-tbody"><tr class="loading-row"><td colspan="11">載入中…</td></tr></tbody>
      </table>
      <div id="ins-empty" class="empty-state" style="display:none">
        <div class="icon">🏥</div><div>找不到符合條件的員工</div>
      </div>
    </div>
  </main>
</div>

<!-- 單筆設定 Modal -->
<div class="modal-bg" id="ins-modal">
  <div class="modal">
    <div class="modal-title">🏥 勞健保設定</div>

    <div class="emp-modal-header">
      <div class="avatar" id="m-avatar">?</div>
      <div>
        <div style="font-weight:600;font-size:15px" id="m-emp-name">—</div>
        <div style="font-size:12px;color:var(--text-dim)" id="m-emp-info">—</div>
      </div>
      <div class="emp-modal-salary">
        <div class="sal-label">月薪合計</div>
        <div class="sal-val" id="m-salary">—</div>
      </div>
    </div>

    <div class="no-ins-box">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px">
        <input type="checkbox" id="m-no-insurance" onchange="onNoInsChange()">
        <span>此員工無勞健保投保（執行長 / 專案合作 / 特殊情況）</span>
      </label>
    </div>

    <div id="m-ins-form">
      <div class="ins-block">
        <div class="ins-block-title">勞保設定</div>
        <div class="form-row" style="margin-bottom:8px">
          <label class="form-label">投保薪資級距</label>
          <select class="form-select" id="m-labor-select" onchange="onLaborSelect()">
            <option value="">— 選擇級距 —</option>
          </select>
        </div>
        <div class="ins-summary">
          <div class="ins-sum-item"><div class="is-label">員工自付</div><div class="is-val" style="color:var(--red)" id="m-labor-emp">—</div></div>
          <div class="ins-sum-item"><div class="is-label">公司負擔</div><div class="is-val acc" id="m-labor-co">—</div></div>
        </div>
      </div>

      <div class="ins-block">
        <div class="ins-block-title">健保設定</div>
        <div class="form-grid" style="margin-bottom:8px">
          <div class="form-row">
            <label class="form-label">投保金額</label>
            <select class="form-select" id="m-health-select" onchange="onHealthChange()">
              <option value="">— 選擇級距 —</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label">眷屬人數</label>
            <select class="form-select" id="m-health-deps" onchange="onHealthChange()">
              <option value="0">0 人</option><option value="1">1 人</option>
              <option value="2">2 人</option><option value="3">3 人</option>
              <option value="4">4 人</option><option value="5">5 人</option>
              <option value="6">6 人</option>
            </select>
          </div>
        </div>
        <div class="ins-summary">
          <div class="ins-sum-item"><div class="is-label">員工自付（含眷屬）</div><div class="is-val" style="color:var(--red)" id="m-health-emp">—</div></div>
          <div class="ins-sum-item"><div class="is-label">公司負擔</div><div class="is-val acc" id="m-health-co">—</div></div>
        </div>
      </div>

      <div class="ins-block">
        <div class="ins-block-title">勞退設定（公司提撥）</div>
        <div class="form-grid">
          <div class="form-row">
            <label class="form-label">提撥率 (%)</label>
            <input type="number" class="form-input" id="m-pension-rate" min="0" max="20" step="0.5" value="6" oninput="onPensionChange()">
          </div>
          <div class="form-row">
            <label class="form-label">每月提撥金額</label>
            <div style="height:40px;display:flex;align-items:center;padding:0 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-weight:600;color:var(--accent2)" id="m-pension-amount">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('ins-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveInsurance()">儲存</button>
    </div>
  </div>
</div>

<!-- 批次設定 Modal -->
<div class="modal-bg" id="batch-modal">
  <div class="modal">
    <div class="modal-title">⚙️ 批次設定勞健保級距</div>

    <div style="background:var(--surface2);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--text-dim)">
      將套用到 <span id="batch-modal-count" style="color:var(--text);font-weight:500">0</span> 位已選取員工
    </div>

    <div class="batch-mode-row">
      <input type="radio" name="batch-mode" id="bmode-auto" value="auto" checked onchange="setBatchMode('auto')">
      <label for="bmode-auto">
        <div class="batch-mode-label">依月薪自動套用建議級距</div>
        <div class="batch-mode-hint">根據每位員工的月薪合計自動計算對應級距</div>
      </label>
    </div>
    <div class="batch-mode-row">
      <input type="radio" name="batch-mode" id="bmode-manual" value="manual" onchange="setBatchMode('manual')">
      <label for="bmode-manual">
        <div class="batch-mode-label">手動指定相同級距</div>
        <div class="batch-mode-hint">所有選取員工套用同一個級距</div>
      </label>
    </div>

    <div id="batch-manual-settings" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
      <div class="form-row">
        <label class="form-label">勞保級距</label>
        <select class="form-select" id="batch-labor-select" onchange="onBatchLaborChange()">
          <option value="">不變更</option>
        </select>
        <div id="batch-labor-preview" style="font-size:11px;color:var(--text-dim);margin-top:4px"></div>
      </div>
      <div class="form-row">
        <label class="form-label">健保級距</label>
        <select class="form-select" id="batch-health-select" onchange="onBatchHealthChange()">
          <option value="">不變更</option>
        </select>
        <div id="batch-health-preview" style="font-size:11px;color:var(--text-dim);margin-top:4px"></div>
      </div>
      <div class="form-row">
        <label class="form-label">眷屬人數（統一設定）</label>
        <select class="form-select" id="batch-dependents">
          <option value="-1">不變更</option>
          <option value="0">0 人</option><option value="1">1 人</option>
          <option value="2">2 人</option><option value="3">3 人</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('batch-modal')">取消</button>
      <button class="btn btn-primary" onclick="applyBatchSettings()">套用設定</button>
    </div>
  </div>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap=document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el=document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}

const fmt  = n => '$' + Number(n||0).toLocaleString();
const fmtN = n => Number(n||0).toLocaleString();

let allEmployees   = [];
let allInsuranceData = [];          // flat array from /api/insurance
let insMap         = {};            // employee_id → record
let laborBrackets  = [];
let healthBrackets = [];
let currentEmpId   = null;

/* ── Salary helpers ─────────────────────────────────────────────────────── */
function calcSalary(emp) {
  if (emp.employment_type === 'part_time') return null;
  return (emp.base_salary||30000)+(emp.attendance_bonus||0)+
         (emp.grade_allowance||0)+(emp.manager_allowance||0)+(emp.extra_allowance||0);
}

function recommendBracket(salary, brackets) {
  if (!salary || !brackets.length) return null;
  return brackets.find(b => salary >= b.monthly_wage_min && salary <= b.monthly_wage_max)
    || brackets[brackets.length-1];
}

/* ── Load ───────────────────────────────────────────────────────────────── */
window.onload = async () => {
  await new Promise(r => setTimeout(r, 600));
  const badge = document.getElementById('db-status');
  try {
    await Promise.all([loadEmployees(), loadInsuranceData(), loadBrackets()]);
    checkUnsetNotice();
    badge.textContent='● Supabase 已連線';
    badge.style.cssText='background:rgba(74,222,128,.1);color:#4ADE80;border-color:rgba(74,222,128,.2)';
  } catch(e) {
    badge.textContent='● 連線失敗';
    badge.style.cssText='background:rgba(248,113,113,.1);color:#F87171;border-color:rgba(248,113,113,.2)';
    toast('載入失敗：'+e.message,'error');
  }
};

async function loadEmployees() {
  const data = await api('/api/employees');
  allEmployees = data.filter(e => e.status === 'active');
  const depts = [...new Set(allEmployees.map(e=>e.dept).filter(Boolean))].sort();
  document.getElementById('dept-filter').innerHTML =
    '<option value="">全部部門</option>' + depts.map(d=>`<option value="${d}">${d}</option>`).join('');
}

async function loadInsuranceData() {
  const data = await api('/api/insurance');
  allInsuranceData = data || [];
  insMap = {};
  allInsuranceData.forEach(s => { insMap[s.employee_id] = s; });
  renderTable();
  updateStats();
}

async function loadBrackets() {
  const [lb, hb] = await Promise.all([
    api('/api/insurance?brackets=labor'),
    api('/api/insurance?brackets=health'),
  ]);
  laborBrackets  = lb || [];
  healthBrackets = hb || [];

  // Single-edit modal selects
  document.getElementById('m-labor-select').innerHTML =
    '<option value="">— 選擇級距 —</option>' +
    laborBrackets.map(b=>`<option value="${b.bracket_level}">${fmtN(b.insured_salary)}（員工${fmt(b.employee_premium)}/公司${fmt(b.company_premium)}）</option>`).join('');
  document.getElementById('m-health-select').innerHTML =
    '<option value="">— 選擇級距 —</option>' +
    healthBrackets.map(b=>`<option value="${b.bracket_level}">${fmtN(b.insured_salary)}（員工${fmt(b.employee_premium)}起/公司${fmt(b.company_premium)}）</option>`).join('');

  // Batch modal selects
  const bLaborOpts = '<option value="">不變更</option>' +
    laborBrackets.map(b=>`<option value="${b.bracket_level}">第${b.bracket_level}級 ${fmtN(b.insured_salary)}（員工${fmt(b.employee_premium)}/公司${fmt(b.company_premium)}）</option>`).join('');
  const bHealthOpts = '<option value="">不變更</option>' +
    healthBrackets.map(b=>`<option value="${b.bracket_level}">第${b.bracket_level}級 ${fmtN(b.insured_salary)}（員工${fmt(b.employee_premium)}起/公司${fmt(b.company_premium)}）</option>`).join('');
  document.getElementById('batch-labor-select').innerHTML  = bLaborOpts;
  document.getElementById('batch-health-select').innerHTML = bHealthOpts;
}

/* ── Status helpers ─────────────────────────────────────────────────────── */
function insStatus(emp) {
  if (emp.employment_type === 'part_time') return 'part_time';
  const ins = insMap[emp.id];
  if (!ins) return 'unset';
  if (ins.has_insurance === false || emp.has_insurance === false) return 'none';
  return 'insured';
}

function statusBadge(status) {
  const m = { insured:'已投保', none:'無投保', unset:'未設定', part_time:'時薪制' };
  const c = { insured:'badge-ins', none:'badge-no', unset:'badge-unset', part_time:'badge-pt' };
  return `<span class="badge ${c[status]||'badge-no'}" style="font-size:11px">${m[status]||status}</span>`;
}

/* ── Filter & Render ────────────────────────────────────────────────────── */
function getFiltered() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const dept   = document.getElementById('dept-filter').value;
  const isFil  = document.getElementById('ins-filter').value;
  return allEmployees.filter(e => {
    if (dept && e.dept !== dept) return false;
    if (search && !(e.name||'').toLowerCase().includes(search)) return false;
    if (isFil) {
      const s = insStatus(e);
      if (isFil === 'insured' && s !== 'insured') return false;
      if (isFil === 'none'    && s !== 'none')    return false;
      if (isFil === 'unset'   && s !== 'unset')   return false;
    }
    return true;
  });
}

function renderTable() {
  const rows  = getFiltered();
  const tbody = document.getElementById('ins-tbody');
  const empty = document.getElementById('ins-empty');
  if (!rows.length) { tbody.innerHTML=''; empty.style.display='block'; updateSelection(); return; }
  empty.style.display = 'none';
  const dim = 'color:var(--text-dim);font-size:12px';
  tbody.innerHTML = rows.map(emp => {
    const ins    = insMap[emp.id];
    const salary = calcSalary(emp);
    const status = insStatus(emp);
    const isPt   = emp.employment_type === 'part_time';
    const canSel = !isPt;  // only selectable for non part-time
    return `<tr>
      <td style="text-align:center">
        <input type="checkbox" class="emp-checkbox" data-id="${emp.id}"
          ${canSel?'':'disabled style="opacity:.3"'} onchange="updateSelection()">
      </td>
      <td><div class="emp-cell"><div class="avatar">${emp.avatar||emp.name?.[0]||'?'}</div>
        <div><div class="emp-name">${emp.name}</div><div class="emp-dept">${emp.dept||''}</div></div></div></td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${isPt?`<span style="${dim}">時薪制</span>`:salary?fmt(salary):'—'}</td>
      <td>${statusBadge(status)}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${ins?.labor_ins_bracket?fmtN(ins.labor_ins_bracket):'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--red)">${ins?.labor_ins_employee?fmt(ins.labor_ins_employee):'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${ins?.health_ins_bracket?fmtN(ins.health_ins_bracket):'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--red)">${ins?.health_ins_employee?fmt(ins.health_ins_employee):'—'}</td>
      <td style="font-size:12px;text-align:center">${ins?.health_ins_dependents??'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--accent2)">${ins?.pension_company?fmt(ins.pension_company):'—'}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="openModal('${emp.id}')">設定</button></td>
    </tr>`;
  }).join('');
  updateSelection();
}

function updateStats() {
  const active  = allEmployees.filter(e => e.employment_type !== 'part_time');
  const insured = active.filter(e => insStatus(e) === 'insured');
  document.getElementById('st-insured').textContent = insured.length;
  document.getElementById('st-labor').textContent   = fmt(insured.reduce((s,e)=>s+(insMap[e.id]?.labor_ins_company||0),0));
  document.getElementById('st-health').textContent  = fmt(insured.reduce((s,e)=>s+(insMap[e.id]?.health_ins_company||0),0));
  document.getElementById('st-pension').textContent = fmt(insured.reduce((s,e)=>s+(insMap[e.id]?.pension_company||0),0));
}

function checkUnsetNotice() {
  const unset = allEmployees.filter(e =>
    e.has_insurance !== false &&
    e.employment_type !== 'part_time' &&
    !insMap[e.id]
  );
  const notice = document.getElementById('unset-notice');
  if (unset.length > 0) {
    document.getElementById('unset-count').textContent = unset.length;
    notice.style.display = 'flex';
  } else {
    notice.style.display = 'none';
  }
}

/* ── Selection ──────────────────────────────────────────────────────────── */
function toggleSelectAll(checked) {
  document.querySelectorAll('.emp-checkbox:not(:disabled)').forEach(cb => {
    cb.checked = checked;
  });
  updateSelection();
}

function updateSelection() {
  const all      = document.querySelectorAll('.emp-checkbox:not(:disabled)');
  const selected = document.querySelectorAll('.emp-checkbox:not(:disabled):checked');
  const toolbar  = document.getElementById('batch-toolbar');
  const allCb    = document.getElementById('select-all');
  const total    = all.length;
  const selCount = selected.length;

  document.getElementById('batch-count').textContent = `已選 ${selCount} 人`;
  toolbar.style.display = selCount > 0 ? '' : 'none';
  if (allCb) {
    allCb.indeterminate = selCount > 0 && selCount < total;
    allCb.checked = total > 0 && selCount === total;
  }
}

function clearSelection() {
  document.querySelectorAll('.emp-checkbox').forEach(cb => { cb.checked = false; });
  const allCb = document.getElementById('select-all');
  if (allCb) { allCb.checked = false; allCb.indeterminate = false; }
  updateSelection();
}

function getSelectedIds() {
  return [...document.querySelectorAll('.emp-checkbox:checked')].map(cb => cb.dataset.id);
}

/* ── Batch set insurance status ─────────────────────────────────────────── */
async function batchSetInsurance(hasInsurance) {
  const ids = getSelectedIds();
  if (!ids.length) return;
  const label = hasInsurance ? '投保' : '無投保';
  if (!confirm(`確定要將選取的 ${ids.length} 位員工設為「${label}」嗎？`)) return;

  let ok = 0;
  for (const empId of ids) {
    try {
      const existing = insMap[empId] || {};
      const payload = {
        employee_id:  empId,
        has_insurance: hasInsurance,
        ...(hasInsurance ? {} : {
          labor_ins_bracket: 0, labor_ins_employee: 0, labor_ins_company: 0,
          health_ins_bracket: 0, health_ins_employee: 0, health_ins_company: 0,
          pension_company: 0,
        }),
      };
      await api('/api/insurance', { method:'POST', body: JSON.stringify(payload) });
      insMap[empId] = { ...existing, ...payload };
      ok++;
    } catch(e) {}
  }
  clearSelection();
  await loadInsuranceData();
  checkUnsetNotice();
  toast(`✅ 已更新 ${ok} 位員工的投保狀態`, 'success');
}

/* ── Batch modal ────────────────────────────────────────────────────────── */
function openBatchModal() {
  const ids = getSelectedIds();
  document.getElementById('batch-modal-count').textContent = ids.length;
  // Reset to auto mode
  document.getElementById('bmode-auto').checked = true;
  setBatchMode('auto');
  document.getElementById('batch-labor-select').value  = '';
  document.getElementById('batch-health-select').value = '';
  document.getElementById('batch-dependents').value    = '-1';
  document.getElementById('batch-labor-preview').textContent  = '';
  document.getElementById('batch-health-preview').textContent = '';
  document.getElementById('batch-modal').classList.add('open');
}

function setBatchMode(mode) {
  document.getElementById('batch-manual-settings').style.display = mode === 'manual' ? '' : 'none';
}

function onBatchLaborChange() {
  const lvl = document.getElementById('batch-labor-select').value;
  const b   = laborBrackets.find(x => x.bracket_level == lvl);
  document.getElementById('batch-labor-preview').textContent = b
    ? `員工自付 ${fmt(b.employee_premium)} / 公司負擔 ${fmt(b.company_premium)}` : '';
}

function onBatchHealthChange() {
  const lvl = document.getElementById('batch-health-select').value;
  const b   = healthBrackets.find(x => x.bracket_level == lvl);
  document.getElementById('batch-health-preview').textContent = b
    ? `員工自付 ${fmt(b.employee_premium)} / 公司負擔 ${fmt(b.company_premium)}` : '';
}

async function applyBatchSettings() {
  const ids  = getSelectedIds();
  if (!ids.length) { closeModal('batch-modal'); return; }
  const mode = document.querySelector('input[name="batch-mode"]:checked').value;
  const deps = parseInt(document.getElementById('batch-dependents').value);  // -1 = don't change

  let ok = 0;
  for (const empId of ids) {
    const emp = allEmployees.find(e => e.id === empId);
    if (!emp) continue;

    try {
      const salary     = calcSalary(emp) || 30000;
      const existing   = insMap[empId] || {};
      let lb, hb;

      if (mode === 'auto') {
        lb = recommendBracket(salary, laborBrackets);
        hb = recommendBracket(salary, healthBrackets);
      } else {
        const ll = document.getElementById('batch-labor-select').value;
        const hl = document.getElementById('batch-health-select').value;
        lb = ll ? laborBrackets.find(b => b.bracket_level == ll) : null;
        hb = hl ? healthBrackets.find(b => b.bracket_level == hl) : null;
      }

      const finalDeps = deps >= 0 ? deps : (existing.health_ins_dependents || 0);
      const payload = {
        employee_id:       empId,
        has_insurance:     true,
        labor_ins_bracket: lb?.insured_salary   || existing.labor_ins_bracket  || 0,
        labor_ins_employee:lb?.employee_premium  || existing.labor_ins_employee || 0,
        labor_ins_company: lb?.company_premium   || existing.labor_ins_company  || 0,
        health_ins_bracket:hb?.insured_salary    || existing.health_ins_bracket || 0,
        health_ins_dependents: finalDeps,
        health_ins_employee: hb
          ? (hb.employee_premium||0) + finalDeps*(hb.per_dependent||0)
          : (existing.health_ins_employee || 0),
        health_ins_company: hb?.company_premium  || existing.health_ins_company || 0,
        pension_rate:      existing.pension_rate || 6,
        pension_company:   Math.round(salary * (existing.pension_rate || 6) / 100),
      };

      await api('/api/insurance', { method:'POST', body: JSON.stringify(payload) });
      insMap[empId] = payload;
      ok++;
    } catch(e) {}
  }

  closeModal('batch-modal');
  clearSelection();
  await loadInsuranceData();
  checkUnsetNotice();
  toast(`✅ 已完成 ${ok} 位員工的勞健保設定`, 'success');
}

/* ── 未設定員工一鍵套用 ─────────────────────────────────────────────────── */
async function autoSetAll() {
  if (!laborBrackets.length) { toast('級距表尚未載入', 'warn'); return; }
  if (!confirm('確定要根據月薪自動套用建議勞健保級距給所有未設定員工嗎？')) return;

  // Select unset employees
  document.querySelectorAll('.emp-checkbox:not(:disabled)').forEach(cb => {
    const empId = cb.dataset.id;
    if (!insMap[empId]) cb.checked = true;
  });
  updateSelection();

  // Set mode radio to auto programmatically
  document.getElementById('bmode-auto').checked = true;

  await applyBatchSettings();
}

/* ── Old header button (all employees) ─────────────────────────────────── */
async function batchApply() {
  if (!laborBrackets.length) { toast('級距表尚未載入，請稍候再試', 'warn'); return; }
  const targets = allEmployees.filter(e =>
    e.employment_type !== 'part_time' && e.has_insurance !== false
  );
  if (!targets.length) { toast('沒有可套用的員工', 'warn'); return; }
  if (!confirm(`確定要依月薪批次套用建議級距給全部 ${targets.length} 位員工嗎？`)) return;

  let ok = 0, fail = 0;
  for (const emp of targets) {
    const salary = calcSalary(emp) || 30000;
    const lb  = recommendBracket(salary, laborBrackets);
    const hb  = recommendBracket(salary, healthBrackets);
    const deps= insMap[emp.id]?.health_ins_dependents || 0;
    const payload = {
      employee_id: emp.id, has_insurance: true,
      labor_ins_bracket: lb?.insured_salary||0, labor_ins_employee: lb?.employee_premium||0, labor_ins_company: lb?.company_premium||0,
      health_ins_bracket: hb?.insured_salary||0,
      health_ins_employee: hb?(hb.employee_premium||0)+deps*(hb.per_dependent||0):0,
      health_ins_company: hb?.company_premium||0,
      health_ins_dependents: deps, pension_rate: 6, pension_company: Math.round(salary*0.06),
    };
    try {
      await api('/api/insurance', { method:'POST', body: JSON.stringify(payload) });
      insMap[emp.id] = payload; ok++;
    } catch(e) { fail++; }
  }
  await loadInsuranceData();
  checkUnsetNotice();
  toast(`✅ 已套用 ${ok} 位員工建議級距${fail?`，失敗 ${fail} 筆`:''}`, fail?'warn':'success');
}

/* ── Single-edit modal ──────────────────────────────────────────────────── */
function openModal(empId) {
  const emp = allEmployees.find(e => e.id === empId);
  if (!emp) return;
  currentEmpId = empId;
  const ins    = insMap[empId];
  const salary = calcSalary(emp);

  document.getElementById('m-avatar').textContent   = emp.avatar || emp.name?.[0] || '?';
  document.getElementById('m-emp-name').textContent = emp.name;
  document.getElementById('m-emp-info').textContent = `${emp.dept} · ${emp.position}`;
  document.getElementById('m-salary').textContent   = salary ? fmt(salary) : '時薪制';

  const isPt  = emp.employment_type === 'part_time';
  const noIns = isPt || ins?.has_insurance === false || emp.has_insurance === false;
  document.getElementById('m-no-insurance').checked = noIns;
  document.getElementById('m-ins-form').style.opacity       = noIns ? '0.4' : '1';
  document.getElementById('m-ins-form').style.pointerEvents = noIns ? 'none' : '';

  // Labor
  const recLabor = salary ? recommendBracket(salary, laborBrackets) : null;
  const lSel = document.getElementById('m-labor-select');
  Array.from(lSel.options).forEach(o => {
    const b = laborBrackets.find(x => x.bracket_level == o.value);
    if (b) o.textContent = `${fmtN(b.insured_salary)}（員工${fmt(b.employee_premium)}/公司${fmt(b.company_premium)}）${b.bracket_level===recLabor?.bracket_level?' ★ 建議':''}`;
  });
  lSel.value = ins?.labor_ins_bracket
    ? (laborBrackets.find(b=>b.insured_salary===ins.labor_ins_bracket)?.bracket_level || '')
    : (recLabor?.bracket_level || '');
  onLaborSelect();

  // Health
  const recHealth = salary ? recommendBracket(salary, healthBrackets) : null;
  const hSel = document.getElementById('m-health-select');
  Array.from(hSel.options).forEach(o => {
    const b = healthBrackets.find(x => x.bracket_level == o.value);
    if (b) o.textContent = `${fmtN(b.insured_salary)}（員工${fmt(b.employee_premium)}起/公司${fmt(b.company_premium)}）${b.bracket_level===recHealth?.bracket_level?' ★ 建議':''}`;
  });
  hSel.value = ins?.health_ins_bracket
    ? (healthBrackets.find(b=>b.insured_salary===ins.health_ins_bracket)?.bracket_level || '')
    : (recHealth?.bracket_level || '');
  document.getElementById('m-health-deps').value = ins?.health_ins_dependents ?? 0;
  onHealthChange();

  // Pension
  document.getElementById('m-pension-rate').value = ins?.pension_rate ?? 6;
  onPensionChange();

  document.getElementById('ins-modal').classList.add('open');
}

function onNoInsChange() {
  const noIns = document.getElementById('m-no-insurance').checked;
  document.getElementById('m-ins-form').style.opacity       = noIns ? '0.4' : '1';
  document.getElementById('m-ins-form').style.pointerEvents = noIns ? 'none' : '';
}

function onLaborSelect() {
  const lvl = parseInt(document.getElementById('m-labor-select').value);
  const b   = laborBrackets.find(x => x.bracket_level === lvl);
  document.getElementById('m-labor-emp').textContent = b ? fmt(b.employee_premium) : '—';
  document.getElementById('m-labor-co').textContent  = b ? fmt(b.company_premium)  : '—';
}

function onHealthChange() {
  const lvl  = parseInt(document.getElementById('m-health-select').value);
  const deps = parseInt(document.getElementById('m-health-deps').value) || 0;
  const b    = healthBrackets.find(x => x.bracket_level === lvl);
  if (b) {
    document.getElementById('m-health-emp').textContent = fmt((b.employee_premium||0) + deps*(b.per_dependent||0));
    document.getElementById('m-health-co').textContent  = fmt(b.company_premium);
  } else {
    document.getElementById('m-health-emp').textContent = '—';
    document.getElementById('m-health-co').textContent  = '—';
  }
}

function onPensionChange() {
  const emp    = allEmployees.find(e => e.id === currentEmpId);
  const salary = emp ? calcSalary(emp) : 0;
  const rate   = parseFloat(document.getElementById('m-pension-rate').value) || 0;
  const amount = salary ? Math.round(salary * rate / 100) : 0;
  document.getElementById('m-pension-amount').textContent = amount ? fmt(amount) : '—';
}

async function saveInsurance() {
  const emp = allEmployees.find(e => e.id === currentEmpId);
  if (!emp) return;
  const noIns     = document.getElementById('m-no-insurance').checked;
  const laborLvl  = parseInt(document.getElementById('m-labor-select').value);
  const healthLvl = parseInt(document.getElementById('m-health-select').value);
  const deps      = parseInt(document.getElementById('m-health-deps').value) || 0;
  const pRate     = parseFloat(document.getElementById('m-pension-rate').value) || 6;
  const salary    = calcSalary(emp) || 0;
  const lb = laborBrackets.find(b => b.bracket_level === laborLvl);
  const hb = healthBrackets.find(b => b.bracket_level === healthLvl);
  const payload = {
    employee_id: currentEmpId, has_insurance: !noIns,
    labor_ins_bracket:  lb?.insured_salary   || 0,
    labor_ins_employee: lb?.employee_premium || 0,
    labor_ins_company:  lb?.company_premium  || 0,
    health_ins_bracket: hb?.insured_salary   || 0,
    health_ins_employee: hb ? (hb.employee_premium||0)+deps*(hb.per_dependent||0) : 0,
    health_ins_company:  hb?.company_premium || 0,
    health_ins_dependents: deps,
    pension_rate: pRate,
    pension_company: Math.round(salary * pRate / 100),
  };
  try {
    await api('/api/insurance', { method:'POST', body: JSON.stringify(payload) });
    insMap[currentEmpId] = payload;
    closeModal('ins-modal');
    renderTable();
    updateStats();
    checkUnsetNotice();
    toast('✅ 勞健保設定已儲存', 'success');
  } catch(e) { toast('儲存失敗：'+e.message, 'error'); }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
</script>
