<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>組織圖 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Org scroll shell ── */
.org-scroll {
  overflow-x: auto;
  overflow-y: visible;
  padding: 40px 48px 56px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 220px;
  text-align: center;   /* fallback centering */
}

/* ── Root: vertical column, centred ── */
.org-root {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  min-width: max-content;
}

/* ── One horizontal level (row of nodes or branches) ── */
.org-level {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: flex-start;
  gap: 24px;
}

/* ── Simple vertical connector (between two levels) ── */
.org-connector-v {
  width: 1px;
  height: 28px;
  background: var(--border);
  flex-shrink: 0;
}

/* ── Row of branches (managers + their reports) ──
   Each .org-branch gets a T-connector to the parent
── */
.org-branches {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
}

/* Each branch: vertical stack of manager card + its employees */
.org-branch {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 16px 0;
  position: relative;
}

/* Horizontal bar connecting sibling branches */
.org-branch::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: var(--border);
}
.org-branch:first-child::before { left:  50%; }
.org-branch:last-child::before  { right: 50%; }
.org-branch:only-child::before  { display: none; }

/* Vertical drop from horizontal bar to branch card */
.org-branch::after {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-0.5px);
  width: 1px; height: 28px;
  background: var(--border);
}

/* Row of employee cards under a manager */
.org-emp-row {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
}

/* Per-employee wrapper inside .org-emp-row — same T-connector logic */
.org-emp-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 10px 0;
  position: relative;
}
.org-emp-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: var(--border);
}
.org-emp-wrap:first-child::before { left:  50%; }
.org-emp-wrap:last-child::before  { right: 50%; }
.org-emp-wrap:only-child::before  { display: none; }
.org-emp-wrap::after {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-0.5px);
  width: 1px; height: 28px;
  background: var(--border);
}

/* ── Node card ── */
.node-card {
  width: 140px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 10px 10px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s, transform .15s;
  box-sizing: border-box;
  flex-shrink: 0;
  position: relative;
  text-align: left;
}
.node-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,.35);
}
.node-card.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(91,141,239,.3);
}
/* Chairman / CEO get a wider card */
.node-card.tier-top {
  width: 160px;
  border-width: 2px;
}

.node-avatar {
  width: 30px; height: 30px;
  border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.tier-top .node-avatar { width: 36px; height: 36px; font-size: 15px; }

.node-info { flex: 1; min-width: 0; }
.node-name {
  font-size: 12px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tier-top .node-name { font-size: 13px; }
.node-pos {
  font-size: 10px; color: var(--text-dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}
.node-badge {
  display: inline-block; font-size: 9px; padding: 1px 5px;
  border-radius: 4px; margin-top: 3px; font-weight: 500;
}

/* Collapse/expand toggle inside branch header */
.node-toggle {
  position: absolute; bottom: 4px; right: 5px;
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 10px; padding: 1px 4px;
  line-height: 1; border-radius: 3px; transition: all .15s;
}
.node-toggle:hover { color: var(--text); background: rgba(255,255,255,.07); }

/* ── View toolbar ── */
.view-toolbar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.view-seg {
  display: flex; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
.view-seg button {
  background: none; border: none; color: var(--text-dim);
  padding: 7px 16px; font-size: 13px; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif; transition: all .2s;
}
.view-seg button.active { background: var(--accent); color: #fff; }
.toolbar-sep { flex: 1; }

/* ── Department card view ── */
.dept-oc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.dept-oc-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.dept-oc-header {
  padding: 14px 18px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.dept-oc-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dept-oc-name { font-size: 15px; font-weight: 600; }
.dept-oc-count {
  margin-left: auto; font-size: 11px; color: var(--text-dim);
  font-family: 'DM Mono', monospace;
}
.dept-oc-members { padding: 6px 10px 10px; }
.dept-member-row {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 8px; border-radius: 7px; cursor: pointer; transition: background .15s;
}
.dept-member-row:hover { background: var(--surface2); }
.dept-member-av {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
}
.dept-member-name { font-size: 13px; font-weight: 500; }
.dept-member-pos  { font-size: 11px; color: var(--text-dim); }
.dept-mgr-badge {
  margin-left: auto; font-size: 9px; padding: 1px 6px; border-radius: 4px;
  background: rgba(91,141,239,.15); color: var(--accent2);
  border: 1px solid rgba(91,141,239,.25); white-space: nowrap;
}

/* ── Right detail panel ── */
.detail-panel {
  position: fixed; top: 0; right: 0; height: 100vh; width: 300px;
  background: var(--surface); border-left: 1px solid var(--border);
  z-index: 300; transform: translateX(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
.detail-panel.open { transform: translateX(0); }
.detail-overlay {
  position: fixed; inset: 0; z-index: 299;
  background: rgba(0,0,0,.25); display: none;
}
.detail-overlay.open { display: block; }
.detail-hd {
  padding: 18px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.detail-hd-label {
  font-size: 11px; font-family: 'DM Mono', monospace;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
}
.detail-close {
  background: none; border: none; color: var(--text-dim);
  font-size: 17px; cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: all .2s;
}
.detail-close:hover { background: var(--surface2); color: var(--text); }
.detail-body { padding: 24px 20px; overflow-y: auto; flex: 1; }
.detail-avatar-wrap { text-align: center; margin-bottom: 18px; }
.detail-av-lg {
  width: 64px; height: 64px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700;
}
.detail-dname { font-size: 18px; font-weight: 700; text-align: center; margin-top: 12px; }
.detail-dpos  { font-size: 13px; color: var(--text-dim); text-align: center; margin-top: 3px; }
.detail-dept-chip {
  display: inline-block; margin-top: 8px; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 500;
}
hr.dp { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
.detail-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-start; }
.detail-row-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; padding-top: 1px; }
.detail-row-label {
  font-size: 10px; color: var(--text-dim); margin-bottom: 2px;
  text-transform: uppercase; letter-spacing: .5px;
}
.detail-row-val { font-size: 13px; }

.org-loading { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 13px; }
</style>
</head>
<body data-page="orgchart">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">

    <div class="page-header">
      <div>
        <div class="page-title">組織圖</div>
        <div class="page-sub">公司人員架構與部門組織總覽</div>
      </div>
    </div>

    <!-- 工具列 -->
    <div class="view-toolbar">
      <div class="view-seg">
        <button class="active" id="vb-tree" onclick="setView('tree',this)">🌲 樹狀圖</button>
        <button id="vb-dept"               onclick="setView('dept',this)">🏢 部門卡片</button>
      </div>
      <div class="toolbar-sep"></div>
      <div id="tree-btns" style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="expandAll()">全部展開</button>
        <button class="btn btn-ghost btn-sm" onclick="collapseAll()">全部收合</button>
      </div>
    </div>

    <!-- 樹狀圖 -->
    <div id="tree-view">
      <div class="org-scroll">
        <div id="org-tree" class="org-root">
          <div class="org-loading">載入中…</div>
        </div>
      </div>
    </div>

    <!-- 部門卡片 -->
    <div id="dept-view" style="display:none">
      <div class="dept-oc-grid" id="dept-cards">
        <div class="org-loading">載入中…</div>
      </div>
    </div>

  </main>
</div>

<!-- 右側詳細面板 -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-hd">
    <span class="detail-hd-label">員工資料</span>
    <button class="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}
</script>
<script src="/js/layout.js"></script>
<script>
/* ── State ── */
let allEmployees = [];
let allDepts     = [];
let deptColorMap = {};

const ROLE_PRIORITY = { chairman:0, ceo:1, admin:2, hr:2, manager:3, employee:4 };
const ROLE_LABEL    = { chairman:'董事長', ceo:'執行長', manager:'主管', hr:'人資', admin:'管理員' };

/* ── Init ── */
window.onload = async () => {
  await new Promise(r => setTimeout(r, 650));
  try {
    [allEmployees, allDepts] = await Promise.all([
      api('/api/employees?status=active'),
      api('/api/departments'),
    ]);
    deptColorMap = {};
    allDepts.forEach(d => { deptColorMap[d.name] = d.color || '#5B8DEF'; });
    renderTree();
    renderDeptCards();
  } catch(e) {
    document.getElementById('org-tree').innerHTML =
      `<div class="org-loading">載入失敗：${esc(e.message)}</div>`;
    toast('載入失敗：' + e.message, 'error');
  }
};

/* ════════════════════════════════════════════
   CARD HTML — renders a single employee card
   (no children, no connectors)
════════════════════════════════════════════ */
function cardHTML(emp) {
  const color  = deptColorMap[emp.dept] || '#5B8DEF';
  const isTop  = emp.role === 'chairman' || emp.role === 'ceo';
  const badge  = ROLE_LABEL[emp.role];
  return `
    <div class="node-card ${isTop ? 'tier-top' : ''}"
         style="border-top: 3px solid ${color}${isTop ? '; border-color:' + color : ''}"
         data-id="${emp.id}"
         onclick="openDetail('${emp.id}')">
      <div class="node-avatar" style="background:${color}22;color:${color}">
        ${esc(emp.avatar || emp.name[0])}
      </div>
      <div class="node-info">
        <div class="node-name">${esc(emp.name)}</div>
        <div class="node-pos">${esc(emp.position || emp.dept || '')}</div>
        ${badge ? `<span class="node-badge" style="background:${color}22;color:${color}">${badge}</span>` : ''}
      </div>
    </div>`;
}

/* ════════════════════════════════════════════
   RENDER TREE
   Fixed 4-level hierarchy:
     L1  chairman
     L2  ceo
     L3  manager / hr / admin  (one .org-branch per person)
     L4  employee               (inside their manager's branch)
════════════════════════════════════════════ */
function renderTree() {
  const el = document.getElementById('org-tree');

  /* ── Split by role ── */
  const chairmen  = allEmployees.filter(e => e.role === 'chairman');
  const ceos      = allEmployees.filter(e => e.role === 'ceo');
  const managers  = allEmployees.filter(e => ['manager','hr','admin'].includes(e.role))
                                .sort((a,b) => (ROLE_PRIORITY[a.role]||5)-(ROLE_PRIORITY[b.role]||5));
  const employees = allEmployees.filter(e =>
    !['chairman','ceo','manager','hr','admin'].includes(e.role));

  if (!allEmployees.length) {
    el.innerHTML = '<div class="org-loading">暫無員工資料</div>';
    return;
  }

  /* ── Assign employees to managers ──
     Priority: manager_id match → same dept → first manager
  ── */
  const empsByMgr = {};
  managers.forEach(m => { empsByMgr[m.id] = []; });
  const unassigned = [];

  employees.forEach(emp => {
    // 1. real manager_id
    if (emp.manager_id && empsByMgr[emp.manager_id] !== undefined) {
      empsByMgr[emp.manager_id].push(emp);
      return;
    }
    // 2. same dept
    const deptMgr = managers.find(m => m.dept === emp.dept);
    if (deptMgr) { empsByMgr[deptMgr.id].push(emp); return; }
    // 3. first manager
    if (managers.length > 0) { empsByMgr[managers[0].id].push(emp); return; }
    // 4. no manager at all
    unassigned.push(emp);
  });

  let html = '';

  /* ── Level 1: Chairman ── */
  if (chairmen.length > 0) {
    html += `<div class="org-level">${chairmen.map(cardHTML).join('')}</div>`;
    html += `<div class="org-connector-v"></div>`;
  }

  /* ── Level 2: CEO ── */
  if (ceos.length > 0) {
    html += `<div class="org-level">${ceos.map(cardHTML).join('')}</div>`;
    if (managers.length > 0 || unassigned.length > 0) {
      html += `<div class="org-connector-v"></div>`;
    }
  }

  /* ── Level 3+4: Managers + their employees as branches ── */
  if (managers.length > 0) {
    const branchesHTML = managers.map(mgr => {
      const emps = empsByMgr[mgr.id] || [];
      const hasEmps = emps.length > 0;
      return `
        <div class="org-branch" id="branch-${mgr.id}">
          ${cardHTML(mgr)}
          ${hasEmps ? `
            <div class="org-connector-v" id="bcv-${mgr.id}"></div>
            <div class="org-emp-row" id="bemps-${mgr.id}">
              ${emps.map(emp => `<div class="org-emp-wrap">${cardHTML(emp)}</div>`).join('')}
            </div>` : ''}
          <button class="node-toggle" id="btoggle-${mgr.id}"
                  onclick="toggleBranch('${mgr.id}')"
                  style="position:static;margin-top:4px;${!hasEmps?'display:none':''}">▾</button>
        </div>`;
    }).join('');

    html += `<div class="org-branches">${branchesHTML}</div>`;
  }

  /* ── Unassigned employees (no manager exists) ── */
  if (unassigned.length > 0 && managers.length === 0) {
    if (ceos.length > 0 || chairmen.length > 0) {
      html += `<div class="org-connector-v"></div>`;
    }
    html += `<div class="org-level">${unassigned.map(cardHTML).join('')}</div>`;
  }

  el.innerHTML = html || '<div class="org-loading">暫無員工資料</div>';
}

/* ── Toggle a manager branch ── */
function toggleBranch(mgrId) {
  const row = document.getElementById('bemps-' + mgrId);
  const cvl = document.getElementById('bcv-'   + mgrId);
  const btn = document.getElementById('btoggle-' + mgrId);
  if (!row) return;
  const hidden = row.style.display === 'none';
  row.style.display = hidden ? '' : 'none';
  if (cvl) cvl.style.display = hidden ? '' : 'none';
  btn.textContent = hidden ? '▾' : '▸';
}

function expandAll() {
  document.querySelectorAll('.org-emp-row').forEach(el => { el.style.display = ''; });
  document.querySelectorAll('[id^="bcv-"]').forEach(el  => { el.style.display = ''; });
  document.querySelectorAll('[id^="btoggle-"]').forEach(b => { b.textContent = '▾'; });
}
function collapseAll() {
  document.querySelectorAll('.org-emp-row').forEach(el => { el.style.display = 'none'; });
  document.querySelectorAll('[id^="bcv-"]').forEach(el  => { el.style.display = 'none'; });
  document.querySelectorAll('[id^="btoggle-"]').forEach(b => { b.textContent = '▸'; });
}

/* ── Department card view ── */
function renderDeptCards() {
  const container = document.getElementById('dept-cards');
  if (!allDepts.length) {
    container.innerHTML = '<div class="org-loading">暫無部門資料</div>';
    return;
  }
  container.innerHTML = allDepts.map(dept => {
    const color   = dept.color || '#5B8DEF';
    const members = allEmployees.filter(e => e.dept === dept.name)
      .sort((a,b) => (ROLE_PRIORITY[a.role]||5)-(ROLE_PRIORITY[b.role]||5));
    return `
      <div class="dept-oc-card">
        <div class="dept-oc-header">
          <div class="dept-oc-dot" style="background:${color}"></div>
          <div class="dept-oc-name">${esc(dept.name)}</div>
          <div class="dept-oc-count">${members.length} 人</div>
        </div>
        <div class="dept-oc-members">
          ${members.length ? members.map(m => `
            <div class="dept-member-row" onclick="openDetail('${m.id}')">
              <div class="dept-member-av" style="background:${color}22;color:${color}">
                ${esc(m.avatar || m.name[0])}
              </div>
              <div>
                <div class="dept-member-name">${esc(m.name)}</div>
                <div class="dept-member-pos">${esc(m.position)}</div>
              </div>
              ${ROLE_LABEL[m.role] ? `<span class="dept-mgr-badge">${ROLE_LABEL[m.role]}</span>` : ''}
            </div>`).join('')
          : '<div style="padding:10px 8px;color:var(--text-dim);font-size:12px">暫無成員</div>'}
        </div>
      </div>`;
  }).join('');
}

/* ── View toggle ── */
function setView(v, btn) {
  document.querySelectorAll('.view-seg button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tree-view').style.display = v === 'tree' ? '' : 'none';
  document.getElementById('dept-view').style.display = v === 'dept' ? '' : 'none';
  document.getElementById('tree-btns').style.display = v === 'tree' ? 'flex' : 'none';
}

/* ── Detail panel ── */
const ROLE_FULL = {
  chairman:'董事長', ceo:'執行長', manager:'部門主管',
  hr:'人資專員', admin:'管理員', employee:'員工',
};

function openDetail(empId) {
  const emp = allEmployees.find(e => e.id === empId);
  if (!emp) return;
  const color = deptColorMap[emp.dept] || '#5B8DEF';

  document.querySelectorAll('.node-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`.node-card[data-id="${empId}"]`);
  if (card) card.classList.add('selected');

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-avatar-wrap">
      <div class="detail-av-lg" style="background:${color}22;color:${color}">
        ${esc(emp.avatar || emp.name[0])}
      </div>
      <div class="detail-dname">${esc(emp.name)}</div>
      <div class="detail-dpos">${esc(emp.position)}</div>
      <span class="detail-dept-chip" style="background:${color}22;color:${color}">
        ${esc(emp.dept || '—')}
      </span>
    </div>
    <hr class="dp">
    ${dRow('👤','角色',    ROLE_FULL[emp.role] || emp.role || '—')}
    ${dRow('📧','電子郵件', emp.email || '—')}
    ${dRow('📱','電話',    emp.phone || '—')}
    ${dRow('📅','到職日',  emp.hire_date || '—')}
    ${emp.base_salary ? dRow('💰','底薪','$'+Number(emp.base_salary).toLocaleString()) : ''}
  `;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-overlay').classList.add('open');
}

function dRow(icon, label, value) {
  return `<div class="detail-row">
    <div class="detail-row-icon">${icon}</div>
    <div><div class="detail-row-label">${label}</div>
         <div class="detail-row-val">${esc(String(value))}</div></div>
  </div>`;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-overlay').classList.remove('open');
  document.querySelectorAll('.node-card').forEach(c => c.classList.remove('selected'));
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
