<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>排班管理 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .status-pill{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace}
  .st-draft    {background:rgba(107,114,128,.15);color:#9CA3AF}
  .st-submitted{background:rgba(251,191,36,.15);color:#FBBF24}
  .st-approved {background:rgba(74,222,128,.15);color:#4ADE80}
  .st-locked   {background:rgba(91,141,239,.15);color:#7FBBFF}
  .st-none     {background:rgba(107,114,128,.08);color:#6B7280}

  .emp-row{display:grid;grid-template-columns:1fr 110px 100px 80px;gap:10px;align-items:center;padding:10px 14px;border-bottom:0.5px solid rgba(255,255,255,.06);cursor:pointer;transition:background .12s}
  .emp-row:hover{background:rgba(91,141,239,.06)}
  .emp-row.active{background:rgba(91,141,239,.1)}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}
  .cal-h{text-align:center;font-size:11px;color:var(--text-dim);padding:6px 0;font-family:'DM Mono',monospace}
  .cal-cell{min-height:80px;background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:8px;padding:6px;cursor:pointer;display:flex;flex-direction:column;gap:4px}
  .cal-cell:hover{background:rgba(91,141,239,.08)}
  .cal-cell.other-month{opacity:.25;cursor:default}
  .cal-cell.has-shift{border-color:rgba(91,141,239,.4)}
  .cal-cell.day-off{border-color:rgba(107,114,128,.5);background:rgba(107,114,128,.06)}
  .cal-day-num{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
  .cal-shift-line{font-size:11px;color:#7FBBFF;font-family:'DM Mono',monospace;line-height:1.3}
  .cal-off-tag{font-size:11px;color:#9CA3AF}

  .seg-row{display:grid;grid-template-columns:1fr 1fr 80px;gap:8px;align-items:end;margin-bottom:8px}
  .seg-rm{background:transparent;border:1px solid rgba(248,113,113,.4);color:#F87171;border-radius:5px;padding:6px;cursor:pointer;font-size:12px}

  .late-warn{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.4);color:#F87171;padding:10px 12px;border-radius:8px;font-size:13px;margin:10px 0}
</style>
</head>
<body data-page="schedule">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">排班管理</div>
        <div class="page-sub">確認部門員工排班 / 主管定案 / 當日調整</div>
      </div>
      <div class="header-actions" style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-ghost" onclick="changeMonth(-1)">←</button>
        <div id="month-label" style="font-family:'DM Mono',monospace;font-size:16px;min-width:90px;text-align:center"></div>
        <button class="btn btn-ghost" onclick="changeMonth(1)">→</button>
      </div>
    </div>

    <div id="gate-blocked" class="empty-state" style="display:none">
      <div class="icon">🔒</div><div>無權限存取此頁面(限主管 / HR / admin)</div>
    </div>

    <div id="main-content" style="display:grid;grid-template-columns:380px 1fr;gap:18px">
      <div class="table-wrap" style="overflow-y:auto;max-height:calc(100vh - 180px)">
        <div class="emp-row" style="background:rgba(0,0,0,.15);font-weight:600;color:var(--text-dim);font-size:11px;cursor:default;font-family:'DM Mono',monospace">
          <div>員工</div><div>狀態</div><div>送出</div><div></div>
        </div>
        <div id="emp-list"></div>
      </div>

      <div id="detail-panel">
        <div id="detail-empty" class="empty-state"><div class="icon">👈</div><div>左側選一位員工檢視排班</div></div>
        <div id="detail-content" style="display:none">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div>
              <div id="detail-name" style="font-size:18px;font-weight:600"></div>
              <div id="detail-status" style="margin-top:6px"></div>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-primary" id="btn-approve" onclick="approvePeriod()" style="display:none">定案</button>
            </div>
          </div>

          <div class="cal-grid" id="cal-head">
            <div class="cal-h">一</div><div class="cal-h">二</div><div class="cal-h">三</div>
            <div class="cal-h">四</div><div class="cal-h">五</div><div class="cal-h">六</div><div class="cal-h">日</div>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 編輯一天 Modal(主管視角:全可編輯) -->
<div class="modal-bg" id="day-modal">
  <div class="modal" style="max-width:560px;width:95vw">
    <div class="modal-title" id="modal-title">編輯排班</div>
    <input type="hidden" id="f-date">

    <div id="late-warn-box" class="late-warn" style="display:none">
      ⚠️ 此排班月份已鎖定且今天是工作日。儲存後將通知 HR + CEO。
    </div>

    <div class="form-row" style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
      <label style="display:flex;gap:6px;align-items:center">
        <input type="checkbox" id="f-day-off" onchange="onDayOffToggle()">
        <span>整天不排</span>
      </label>
    </div>

    <div id="seg-list"></div>

    <div style="margin-bottom:12px">
      <button class="btn btn-ghost btn-sm" id="btn-add-seg" onclick="addSegment()">＋ 加一段</button>
    </div>

    <div class="form-row" id="reason-row" style="display:none">
      <label class="form-label">調整原因(late_change 時必填)</label>
      <input type="text" class="form-input" id="f-reason" placeholder="例:員工臨時請假,改派 A 員工">
    </div>

    <div class="modal-actions" style="justify-content:space-between">
      <button class="btn btn-danger btn-sm" id="btn-delete-day" onclick="deleteDay()" style="display:none">清除這天</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="closeDayModal()">取消</button>
        <button class="btn btn-primary" id="btn-save-day" onclick="saveDay()">儲存</button>
      </div>
    </div>
  </div>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtTime(t) {
  if (!t) return '';
  const m = String(t).match(/^(\d{1,2}):(\d{2})/);
  return m ? `${m[1].padStart(2,'0')}:${m[2]}` : t;
}
function todayStr(){ return new Date().toISOString().slice(0,10); }

// ── State ──
let currentYear, currentMonth;
let allEmps = [];           // 主管/HR 可看到的員工
let allPeriods = [];        // 該年月所有 periods
let currentEmp = null;      // 選中的員工
let currentPeriod = null;
let currentSchedules = [];
let editing = { date: null, segs: [], off: false };

// Default: 本月
{ const d = new Date(); currentYear = d.getFullYear(); currentMonth = d.getMonth()+1; }

function changeMonth(d) {
  let m = currentMonth + d, y = currentYear;
  if (m > 12) { m -= 12; y += 1; } if (m < 1) { m += 12; y -= 1; }
  currentYear = y; currentMonth = m;
  load();
}

async function load(retries = 0) {
  if (!window.api || !window.currentUser) {
    if (retries < 25) return setTimeout(()=>load(retries+1), 200);
    return;
  }
  document.getElementById('month-label').textContent = `${currentYear}/${String(currentMonth).padStart(2,'0')}`;

  // Page-level gate
  const u = window.currentUser;
  const allowed = u && (u.is_manager === true || ['hr','admin'].includes(u.role));
  if (u && !allowed) {
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('gate-blocked').style.display = '';
    return;
  }

  try {
    // 取所有員工(主管:下屬 / HR:全部)
    const emps = await api(`/api/employees`);
    allEmps = filterVisibleEmps(emps || [], u);
    // 取該月所有 periods
    const r = await api(`/api/schedule-periods?year=${currentYear}&month=${currentMonth}`);
    allPeriods = r.periods || [];
    renderEmpList();
    if (currentEmp) selectEmp(currentEmp.id);
  } catch(e) { toast('載入失敗:'+e.message, 'error'); }
}

function filterVisibleEmps(emps, user) {
  if (['hr','admin'].includes(user.role)) return emps;
  if (user.is_manager) return emps.filter(e => e.manager_id === user.id);
  return [];
}

function periodFor(empId){ return allPeriods.find(p => p.employee_id === empId); }

function renderEmpList() {
  const wrap = document.getElementById('emp-list');
  wrap.innerHTML = allEmps.map(e => {
    const p = periodFor(e.id);
    const status = p ? p.status : 'none';
    const submitted = p?.submitted_at ? p.submitted_at.slice(5,10) : '—';
    return `
      <div class="emp-row ${currentEmp?.id===e.id?'active':''}" onclick="selectEmp('${escHtml(e.id)}')">
        <div>
          <div style="font-size:14px;font-weight:500">${escHtml(e.name||e.id)}</div>
          <div style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace">${escHtml(e.dept||'')}</div>
        </div>
        <div><span class="status-pill st-${status}">${status.toUpperCase()}</span></div>
        <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text-dim)">${escHtml(submitted)}</div>
        <div></div>
      </div>`;
  }).join('') || '<div style="padding:30px;text-align:center;color:var(--text-dim)">沒有可看的員工</div>';
}

async function selectEmp(empId) {
  currentEmp = allEmps.find(e => e.id === empId);
  if (!currentEmp) return;
  renderEmpList();
  try {
    const r = await api(`/api/schedule-periods?year=${currentYear}&month=${currentMonth}&employee_id=${currentEmp.id}`);
    currentPeriod = (r.periods || [])[0] || null;
    currentSchedules = r.schedules || [];
    renderDetail();
  } catch(e) { toast('載入員工排班失敗:'+e.message,'error'); }
}

function renderDetail() {
  document.getElementById('detail-empty').style.display = 'none';
  const dc = document.getElementById('detail-content');
  dc.style.display = '';
  document.getElementById('detail-name').textContent = currentEmp.name || currentEmp.id;
  const s = currentPeriod ? currentPeriod.status : 'none';
  document.getElementById('detail-status').innerHTML =
    currentPeriod ? `<span class="status-pill st-${s}">${s.toUpperCase()}</span>` : '<span style="color:var(--text-dim);font-size:13px">該員工此月尚未建立排班</span>';

  document.getElementById('btn-approve').style.display = (s === 'submitted') ? '' : 'none';

  renderCal();
}

function renderCal() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const first = new Date(currentYear, currentMonth - 1, 1);
  const last  = new Date(currentYear, currentMonth, 0);
  const startWd = (first.getDay() + 6) % 7;
  const cells = Math.ceil((startWd + last.getDate()) / 7) * 7;

  const segByDate = {};
  for (const s of currentSchedules) (segByDate[s.work_date] = segByDate[s.work_date] || []).push(s);

  for (let i = 0; i < cells; i++) {
    const day = i - startWd + 1;
    const inMonth = day >= 1 && day <= last.getDate();
    const date = inMonth
      ? `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`
      : null;

    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (inMonth ? '' : ' other-month');
    if (inMonth) {
      const segs = segByDate[date] || [];
      const isOff = segs.length === 1 && segs[0].note === '__OFF__';
      let inner = `<div class="cal-day-num">${day}</div>`;
      if (isOff) { inner += `<div class="cal-off-tag">休</div>`; cell.classList.add('day-off'); }
      else if (segs.length) {
        cell.classList.add('has-shift');
        for (const s of segs.slice(0,2)) {
          inner += `<div class="cal-shift-line">${escHtml(fmtTime(s.start_time))}–${escHtml(fmtTime(s.end_time))}</div>`;
        }
        if (segs.length > 2) inner += `<div class="cal-shift-line">+${segs.length-2} 段…</div>`;
      }
      cell.innerHTML = inner;
      if (currentPeriod) cell.onclick = () => openDayModal(date);
    } else {
      cell.innerHTML = `<div class="cal-day-num">${day < 1 ? new Date(currentYear, currentMonth-1, day).getDate() : day - last.getDate()}</div>`;
    }
    grid.appendChild(cell);
  }
}

function isLateChangeFor(date) {
  if (!currentPeriod) return false;
  if (currentPeriod.status !== 'locked') return false;
  return date === todayStr();
}

function openDayModal(date) {
  if (!currentPeriod) { toast('員工尚未建立此月排班','error'); return; }
  const segs = (currentSchedules.filter(s => s.work_date === date) || []).slice();
  const isOff = segs.length === 1 && segs[0].note === '__OFF__';
  editing = {
    date, off: isOff,
    segs: isOff ? [] : segs.map(s => ({
      id: s.id,
      shift_type_id: s.shift_type_id || '',
      start_time:    fmtTime(s.start_time),
      end_time:      fmtTime(s.end_time),
      crosses_midnight: !!s.crosses_midnight,
      break_minutes: 60,
    })),
  };
  if (editing.segs.length === 0 && !isOff) {
    editing.segs.push({ shift_type_id:'', start_time:'09:00', end_time:'18:00', crosses_midnight:false, break_minutes:60 });
  }
  document.getElementById('modal-title').textContent = `${currentEmp.name || currentEmp.id} — ${date}`;
  document.getElementById('f-date').value = date;
  document.getElementById('f-day-off').checked = isOff;
  document.getElementById('btn-delete-day').style.display = (segs.length > 0) ? '' : 'none';

  // late_change 警示
  const isLate = isLateChangeFor(date);
  document.getElementById('late-warn-box').style.display = isLate ? '' : 'none';
  document.getElementById('reason-row').style.display = isLate ? '' : 'none';

  renderSegList();
  document.getElementById('day-modal').classList.add('open');
}
function closeDayModal(){ document.getElementById('day-modal').classList.remove('open'); }

function onDayOffToggle() { editing.off = document.getElementById('f-day-off').checked; renderSegList(); }

function renderSegList() {
  const wrap = document.getElementById('seg-list');
  const btnAdd = document.getElementById('btn-add-seg');
  if (editing.off) {
    wrap.innerHTML = `<div style="color:var(--text-dim);font-size:13px;padding:8px 0">已勾選整天不排</div>`;
    btnAdd.style.display = 'none';
    return;
  }
  btnAdd.style.display = '';
  wrap.innerHTML = editing.segs.map((s, i) => `
    <div class="seg-row">
      <div><label class="form-label">開始</label><input type="time" class="form-input" value="${escHtml(s.start_time)}" oninput="updateSeg(${i},'start_time',this.value)"></div>
      <div><label class="form-label">結束</label><input type="time" class="form-input" value="${escHtml(s.end_time)}" oninput="updateSeg(${i},'end_time',this.value)"></div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <label style="font-size:11px;display:flex;gap:4px;align-items:center"><input type="checkbox" ${s.crosses_midnight?'checked':''} onchange="updateSeg(${i},'crosses_midnight',this.checked)">跨日</label>
        ${editing.segs.length > 1 ? `<button class="seg-rm" onclick="removeSeg(${i})">移除</button>` : ''}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div><label class="form-label">休息(分)</label><input type="number" class="form-input" value="${s.break_minutes ?? 0}" min="0" oninput="updateSeg(${i},'break_minutes',this.value)"></div>
      <div><label class="form-label">班別 (選填)</label><input type="text" class="form-input" value="${escHtml(s.shift_type_id||'')}" oninput="updateSeg(${i},'shift_type_id',this.value)"></div>
    </div>
  `).join('');
}

function updateSeg(i,k,v){ editing.segs[i][k]=v; }
function addSegment(){ editing.segs.push({shift_type_id:'',start_time:'19:00',end_time:'22:00',crosses_midnight:false,break_minutes:0}); renderSegList(); }
function removeSeg(i){ editing.segs.splice(i,1); renderSegList(); }

async function saveDay() {
  const isLate = isLateChangeFor(editing.date);
  if (isLate) {
    const ok = confirm('此調整為「鎖定後當日異動」,儲存後將通知 HR + CEO。確定送出?');
    if (!ok) return;
  }
  const reason = document.getElementById('f-reason').value || null;
  const date = editing.date;

  const existing = currentSchedules.filter(s => s.work_date === date);
  for (const s of existing) {
    try { await api(`/api/schedules/${encodeURIComponent(s.id)}`, { method:'DELETE', body: JSON.stringify({ reason }) }); } catch(_) {}
  }
  if (editing.off) {
    try {
      await api('/api/schedules', { method:'POST', body: JSON.stringify({
        period_id: currentPeriod.id, employee_id: currentEmp.id, work_date: date,
        segment_no: 1, note: '__OFF__', reason,
      })});
    } catch(e) { toast('儲存失敗:'+e.message,'error'); return; }
  } else {
    let i = 1;
    for (const s of editing.segs) {
      try {
        await api('/api/schedules', { method:'POST', body: JSON.stringify({
          period_id: currentPeriod.id, employee_id: currentEmp.id, work_date: date,
          segment_no: i++,
          shift_type_id: s.shift_type_id || null,
          start_time: s.start_time, end_time: s.end_time,
          crosses_midnight: !!s.crosses_midnight,
          break_minutes: parseInt(s.break_minutes) || 0,
          reason,
        })});
      } catch(e) { toast('段次 '+i+' 儲存失敗:'+e.message,'error'); return; }
    }
  }
  toast(isLate ? '已儲存並通知 HR + CEO' : '已儲存');
  closeDayModal();
  await selectEmp(currentEmp.id);
  await load(); // 同步左側清單
}

async function deleteDay() {
  const isLate = isLateChangeFor(editing.date);
  if (isLate && !confirm('此清除為「鎖定後當日異動」,儲存後將通知 HR + CEO。確定?')) return;
  const reason = document.getElementById('f-reason').value || null;
  const existing = currentSchedules.filter(s => s.work_date === editing.date);
  for (const s of existing) {
    try { await api(`/api/schedules/${encodeURIComponent(s.id)}`, { method:'DELETE', body: JSON.stringify({ reason }) }); } catch(_){}
  }
  toast(isLate ? '已清除並通知 HR + CEO' : '已清除');
  closeDayModal();
  await selectEmp(currentEmp.id);
}

async function approvePeriod() {
  if (!currentPeriod) return;
  if (!confirm(`定案 ${currentEmp.name||currentEmp.id} 的 ${currentYear}/${String(currentMonth).padStart(2,'0')} 排班?`)) return;
  try {
    await api(`/api/schedule-periods/${encodeURIComponent(currentPeriod.id)}/approve`, { method:'POST' });
    toast('已定案');
    await load();
    await selectEmp(currentEmp.id);
  } catch(e) { toast('定案失敗:'+e.message,'error'); }
}

// Init
load();
</script>

<script src="/js/roles.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/pwa.js"></script>
<script>PWA.init();</script>
</body>
</html>
