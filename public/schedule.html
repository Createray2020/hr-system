<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>排班管理 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
  // 把 lib pure functions 暴露給內聯 script 用（schedule.html 是 non-module、需要 window.X）
  import { buildScheduleAOA, daysInMonth } from '/js/schedule/excel-builder.js';
  import { parseScheduleAOA } from '/js/schedule/import-parser.js';
  import { forceFinalizeAuth, computeForceWindows } from '/js/schedule/finalize-auth.js';
  window.__excelBuilder = { buildScheduleAOA, daysInMonth };
  window.__excelParser  = { parseScheduleAOA };
  window.ScheduleFinalizeAuth = { forceFinalizeAuth, computeForceWindows };
</script>
<style>
  /* C11 week grid styles */
  .week-cell { padding:10px 6px; text-align:center; cursor:pointer; border-bottom:1px solid var(--border); position:relative; font-size:12px; transition:filter .12s; }
  .week-cell:hover { filter:brightness(1.15); }
  .week-cell-shift1 { background:rgba(91,141,239,.18); color:#7FBBFF; }
  .week-cell-shift2 { background:rgba(250,167,39,.18); color:#FFB97B; }
  .week-cell-off { background:rgba(120,120,120,.10); color:var(--text-dim); }
  .week-cell-wish { font-style:italic; opacity:0.85; }
  .week-cell-empty { color:var(--text-dim); }
  .week-emp-name { padding:10px 12px; border-bottom:1px solid var(--border); font-weight:500; }
  .week-emp-name .role-hint { font-size:11px; color:var(--text-dim); font-weight:400; margin-top:2px; }
  .late-dot { position:absolute; top:4px; right:4px; width:6px; height:6px; background:#E24B4A; border-radius:50%; }

  /* day modal styles (保留) */
  .seg-row{display:grid;grid-template-columns:1fr 1fr 80px;gap:8px;align-items:end;margin-bottom:8px}
  .seg-rm{background:transparent;border:1px solid rgba(248,113,113,.4);color:#F87171;border-radius:5px;padding:6px;cursor:pointer;font-size:12px}
  .late-warn{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.4);color:#F87171;padding:10px 12px;border-radius:8px;font-size:13px;margin:10px 0}

  /* pill bar (3-A 班別選擇器) */
  .pill-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:8px 4px;margin-bottom:12px}
  .shift-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--border);cursor:pointer;font-size:13px;transition:all .15s;user-select:none}
  .shift-pill:hover{background:rgba(255,255,255,.08)}
  .shift-pill.active{border-color:#5B8DEF;background:rgba(91,141,239,.18);box-shadow:0 0 0 2px rgba(91,141,239,.3)}
  .shift-pill .color-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
  .shift-pill-add{border-style:dashed;color:var(--text-dim)}
  .pill-divider{width:1px;height:20px;background:var(--border);margin:0 4px}
  .pill-hint{font-size:12px;color:var(--text-dim);margin-left:auto}
</style>
</head>
<body data-page="schedule">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">排班管理</div>
        <div id="dept-info" class="page-sub">載入中…</div>
      </div>
      <div class="header-actions" style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-ghost" onclick="changeWeek(-1)">←</button>
        <span id="week-range" style="font-family:'DM Mono',monospace;font-size:14px;min-width:200px;text-align:center">--</span>
        <button class="btn btn-ghost" onclick="changeWeek(1)">→</button>
        <button class="btn btn-ghost" onclick="goThisWeek()">本週</button>
        <input type="date" id="jump-date" class="form-input" style="width:auto" onchange="jumpToWeek(this.value)" title="跳到指定日期所在的那一週">
        <select id="dept-filter" class="form-select" style="width:auto;display:none" onchange="onDeptFilterChange()" title="部門過濾"></select>
        <button class="btn btn-ghost" onclick="openExportModal()" title="匯出排班（選範圍）">📤 匯出</button>
        <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()" title="從 Excel 匯入排班">📥 匯入</button>
        <input type="file" id="import-file" accept=".xlsx,.xls" style="display:none" onchange="handleImportFile(event)">
        <button class="btn btn-ghost" id="btn-batch-tpl" onclick="openBatchTemplatePicker()" title="整批套範本到可管轄員工" style="display:none">📋 整批套範本</button>
        <button class="btn btn-ghost" id="btn-batch-period" onclick="openBatchCreatePeriod()" title="批次建立尚未開立的本月排班期間" style="display:none">📅 建立本月排班</button>
        <button class="btn btn-ghost" id="btn-batch-force" onclick="openBatchForceDialog()" title="把時間閘門已到的 draft/submitted/approved 一次全部公告" style="display:none">⏰ 一鍵強制公告</button>
      </div>
    </div>

    <div id="gate-blocked" class="empty-state" style="display:none">
      <div class="icon">🔒</div><div>無權限存取此頁面（限主管 / HR / admin）</div>
    </div>

    <div id="main-content">
      <div id="pill-bar" class="pill-bar"></div>
      <div class="table-wrap" style="overflow:auto;background:var(--card);border-radius:12px;border:1px solid var(--border)">
        <table id="week-grid" style="width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed">
          <thead id="week-grid-head"></thead>
          <tbody id="week-grid-body"></tbody>
        </table>
      </div>
      <div style="display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--text-dim);flex-wrap:wrap;padding:0 4px">
        <span><span style="display:inline-block;width:12px;height:12px;background:rgba(91,141,239,.18);border-radius:2px;vertical-align:middle;margin-right:4px"></span>早班</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:rgba(250,167,39,.18);border-radius:2px;vertical-align:middle;margin-right:4px"></span>晚班</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:rgba(120,120,120,.10);border-radius:2px;vertical-align:middle;margin-right:4px"></span>休</span>
        <span><span style="display:inline-block;width:6px;height:6px;background:#E24B4A;border-radius:50%;vertical-align:middle;margin-right:4px"></span>當日異動</span>
        <span><em style="font-style:italic">斜體</em>＝員工 wish 未排</span>
      </div>
    </div>
  </main>
</div>

<!-- 匯出範圍 Modal -->
<div class="modal-bg" id="export-modal">
  <div class="modal" style="max-width:600px;width:95vw;max-height:88vh;overflow:auto">
    <div class="modal-title">匯出排班</div>

    <!-- 時間範圍 -->
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:.5px;margin-bottom:8px">時間範圍</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex-wrap:wrap">
          <input type="radio" name="ex-range-mode" value="month" checked onchange="renderExportModal()">
          <span>單月</span>
          <select id="ex-year" class="form-select" style="width:100px" onchange="updateExportPreview()"></select>
          <span>年</span>
          <select id="ex-month" class="form-select" style="width:80px" onchange="updateExportPreview()"></select>
          <span>月</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="ex-range-mode" value="custom" onchange="renderExportModal()">
          <span>自訂區間</span>
        </label>
        <div id="ex-custom-row" style="display:none;margin-left:24px;gap:10px;align-items:center">
          <span style="font-size:13px;color:var(--text-dim)">起</span>
          <input type="date" id="ex-start" class="form-input" style="width:auto" onchange="updateExportPreview()">
          <span style="font-size:13px;color:var(--text-dim);margin-left:8px">迄</span>
          <input type="date" id="ex-end" class="form-input" style="width:auto" onchange="updateExportPreview()">
        </div>
      </div>
    </div>

    <!-- 人員範圍 -->
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:.5px;margin-bottom:8px">人員範圍</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="ex-people-mode" value="all" checked onchange="renderExportModal()">
          <span>全部員工 (<span id="ex-all-count">0</span> 人)</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="ex-people-mode" value="single-dept" onchange="renderExportModal()">
          <span>單一部門</span>
        </label>
        <div id="ex-single-dept-row" style="display:none;margin-left:24px">
          <select id="ex-single-dept" class="form-select" onchange="updateExportPreview()"></select>
        </div>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="ex-people-mode" value="multi-dept" onchange="renderExportModal()">
          <span>多部門勾選</span>
        </label>
        <div id="ex-multi-dept-row" style="display:none;margin-left:24px;max-height:140px;overflow:auto;border:1px solid var(--border);border-radius:6px;padding:8px"></div>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="radio" name="ex-people-mode" value="custom-emp" onchange="renderExportModal()">
          <span>自訂員工勾選</span>
        </label>
        <div id="ex-custom-emp-row" style="display:none;margin-left:24px;max-height:240px;overflow:auto;border:1px solid var(--border);border-radius:6px;padding:8px;font-size:13px"></div>
      </div>
    </div>

    <div style="padding:10px 12px;background:rgba(91,141,239,.08);border:1px solid rgba(91,141,239,.2);border-radius:6px;font-size:13px;margin-bottom:14px">
      預估匯出：<b id="ex-emp-count">0</b> 員工、<b id="ex-month-count">0</b> 個月
      <span id="ex-warn" style="color:#F87171;margin-left:8px;display:none">（區間無效）</span>
    </div>

    <div class="modal-actions" style="justify-content:flex-end;gap:8px">
      <button class="btn btn-ghost" onclick="closeExportModal()">取消</button>
      <button class="btn btn-primary" id="ex-confirm-btn" onclick="runExportConfirm()">匯出</button>
    </div>
  </div>
</div>

<!-- 匯入預覽 Modal -->
<div class="modal-bg" id="import-modal">
  <div class="modal" style="max-width:720px;width:95vw;max-height:88vh;overflow:auto">
    <div class="modal-title">匯入排班預覽</div>
    <div id="import-month-label" style="font-size:12px;color:var(--text-dim);margin-bottom:14px"></div>

    <div style="display:flex;gap:12px;margin-bottom:16px">
      <div style="flex:1;background:rgba(91,141,239,.08);border:1px solid rgba(91,141,239,.3);border-radius:8px;padding:12px;text-align:center">
        <div id="im-total" style="font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:#7FBBFF">0</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">讀取 row</div>
      </div>
      <div style="flex:1;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.3);border-radius:8px;padding:12px;text-align:center">
        <div id="im-write" style="font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:#4ADE80">0</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">可寫入</div>
      </div>
      <div style="flex:1;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:12px;text-align:center">
        <div id="im-error" style="font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:#F87171">0</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">錯誤</div>
      </div>
    </div>

    <div id="im-error-block" style="display:none;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 12px;margin-bottom:14px;max-height:160px;overflow:auto">
      <div style="font-size:11px;color:#F87171;font-family:'DM Mono',monospace;letter-spacing:.5px;margin-bottom:6px">錯誤明細</div>
      <div id="im-error-list" style="font-size:12px;line-height:1.6"></div>
    </div>

    <div id="im-preview-block" style="display:none;margin-bottom:14px">
      <div style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:.5px;margin-bottom:6px">寫入預覽（前 8 筆）</div>
      <div style="overflow:auto;max-height:240px;border:1px solid var(--border);border-radius:8px">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead>
            <tr style="background:rgba(255,255,255,.04)">
              <th style="padding:7px 10px;text-align:left;font-size:10px;color:var(--text-dim);white-space:nowrap;border-bottom:1px solid var(--border)">員工編號</th>
              <th style="padding:7px 10px;text-align:left;font-size:10px;color:var(--text-dim);white-space:nowrap;border-bottom:1px solid var(--border)">姓名</th>
              <th style="padding:7px 10px;text-align:left;font-size:10px;color:var(--text-dim);white-space:nowrap;border-bottom:1px solid var(--border)">日期</th>
              <th style="padding:7px 10px;text-align:left;font-size:10px;color:var(--text-dim);white-space:nowrap;border-bottom:1px solid var(--border)">班別</th>
              <th style="padding:7px 10px;text-align:left;font-size:10px;color:var(--text-dim);white-space:nowrap;border-bottom:1px solid var(--border)">寫入 status</th>
            </tr>
          </thead>
          <tbody id="im-preview-body"></tbody>
        </table>
      </div>
      <div id="im-more-hint" style="font-size:11px;color:var(--text-dim);margin-top:6px;text-align:right"></div>
    </div>

    <div id="im-empty-hint" style="display:none;text-align:center;padding:24px;color:var(--text-dim)">沒有可匯入的有效資料</div>

    <div class="modal-actions" style="justify-content:flex-end;gap:8px">
      <button class="btn btn-ghost" onclick="closeImportModal()">取消</button>
      <button class="btn btn-primary" id="im-confirm-btn" onclick="runImportConfirm()">確認匯入</button>
    </div>
  </div>
</div>

<!-- 快速新增班別 Modal（3-A） -->
<div class="modal-bg" id="quick-add-modal">
  <div class="modal" style="max-width:420px;width:95vw">
    <div class="modal-title">新增班別</div>
    <div class="form-row" style="margin-bottom:10px">
      <label class="form-label">名稱 *</label>
      <input class="form-input" id="qa-name" placeholder="例：中班">
    </div>
    <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div><label class="form-label">開始</label><input type="time" class="form-input" id="qa-start"></div>
      <div><label class="form-label">結束</label><input type="time" class="form-input" id="qa-end"></div>
    </div>
    <div class="form-row" style="display:flex;gap:14px;align-items:center;margin-bottom:14px">
      <label style="display:flex;gap:6px;align-items:center;cursor:pointer">
        <input type="checkbox" id="qa-cm">
        <span>跨日</span>
      </label>
      <label style="display:flex;gap:6px;align-items:center;cursor:pointer">
        <span>顏色</span>
        <input type="color" id="qa-color" value="#5B8DEF" style="width:40px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent">
      </label>
    </div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:14px">
      休息分鐘預設 60 min、is_off 預設否、sort_order 自動。完整設定請至「班別管理」。
    </div>
    <div class="modal-actions" style="justify-content:flex-end;gap:8px">
      <button class="btn btn-ghost" onclick="closeQuickAddModal()">取消</button>
      <button class="btn btn-primary" onclick="saveQuickAddShift()">儲存</button>
    </div>
  </div>
</div>

<!-- 編輯一天 Modal（主管視角:全可編輯）-->
<div class="modal-bg" id="day-modal">
  <div class="modal" style="max-width:560px;width:95vw">
    <div class="modal-title" id="modal-title">編輯排班</div>
    <input type="hidden" id="f-date">

    <div id="gcal-banner-box" style="display:none;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.4);color:#93c5fd;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:12px"></div>

    <div id="late-warn-box" class="late-warn" style="display:none">
      ⚠️ 此排班月份已鎖定且今天是工作日。儲存後將通知 HR + CEO。
    </div>

    <div class="form-row" style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
      <label style="display:flex;gap:6px;align-items:center">
        <input type="checkbox" id="f-day-off" onchange="onDayOffToggle()">
        <span>整天不排</span>
      </label>
    </div>

    <div id="seg-list"></div>

    <div style="margin-bottom:12px">
      <button class="btn btn-ghost btn-sm" id="btn-add-seg" onclick="addSegment()">＋ 加一段</button>
    </div>

    <div class="form-row" id="reason-row" style="display:none">
      <label class="form-label">調整原因（late_change 時必填）</label>
      <input type="text" class="form-input" id="f-reason" placeholder="例：員工臨時請假，改派 A 員工">
    </div>

    <div class="modal-actions" style="justify-content:space-between">
      <button class="btn btn-danger btn-sm" id="btn-delete-day" onclick="deleteDay()" style="display:none">清除這天</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="closeDayModal()">取消</button>
        <button class="btn btn-primary" id="btn-save-day" onclick="saveDay()">儲存</button>
      </div>
    </div>
  </div>
</div>

<!-- C8-3：套範本選擇 Modal（單人 / 整批共用） -->
<div class="modal-bg" id="tpl-modal">
  <div class="modal" style="max-width:480px;width:95vw;max-height:80vh;overflow:auto">
    <div class="modal-title" id="tpl-modal-title">選擇範本</div>
    <div id="tpl-modal-sub" style="font-size:12px;color:var(--text-dim);margin-bottom:12px"></div>
    <div id="tpl-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px"></div>
    <div class="modal-actions" style="justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeTemplatePicker()">取消</button>
    </div>
  </div>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtTime(t) {
  if (!t) return '';
  const m = String(t).match(/^(\d{1,2}):(\d{2})/);
  return m ? `${m[1].padStart(2,'0')}:${m[2]}` : t;
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── State ──
let currentWeekStart = null;     // ISO date string, 週日為起始
let allEmps = [];                // 役色過濾後的完整 active 員工（HR=全公司、主管=同部門）
let visibleEmps = [];            // allEmps 再套部門過濾後、實際渲染的員工
let selectedDeptId = '';         // dept filter（'' = 全部、HR 專屬）
let allSchedules = {};           // { emp_id: [schedules] }
let allPeriods = {};             // F1:{ `${empId}_${yyyy-mm}`: period } 複合 key、防跨月 race
let holidayDates = new Set();    // C12-3:該年 holidays（不含 makeup_workday）
let gcalEvents = [];             // C13:該週 GCal 公司活動
let editing = { date: null, empId: null, segs: [], off: false };
let currentEmp = null;
let currentPeriod = null;
let currentSchedules = [];
let shiftTypes = [];             // 3-A:班別清單（fetch /api/shift-types）
let selectedShiftTypeId = null;  // 3-A:目前選中的班別 pill

// C13：判斷 GCal event 是否落在某日（處理全天 end exclusive）
function isInDay(ev, dateStr) {
  if (ev.allDay && ev.end && ev.end > ev.start) {
    const inclEnd = fmtDate(new Date(new Date(ev.end).getTime() - 86400000));
    return dateStr >= ev.start && dateStr <= inclEnd;
  }
  return dateStr >= ev.start && dateStr <= (ev.end || ev.start);
}

// C12-3：算該月標準工時（工作日 × 8、扣週末 + holidays）
function calcMonthMax(year, month, holidayDateSet) {
  let workDays = 0;
  const last = new Date(year, month, 0).getDate();
  for (let d = 1; d <= last; d++) {
    const date = new Date(year, month - 1, d);
    const dow = date.getDay();
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isWeekend = dow === 0 || dow === 6;
    const isHoliday = holidayDateSet.has(dateStr);
    if (!isWeekend && !isHoliday) workDays++;
  }
  return workDays * 8;
}

// 計算當週日起始（週日=0、JS getDay）
function getWeekStart(date) {
  const d = new Date(date);
  d.setDate(d.getDate() - d.getDay());
  d.setHours(0,0,0,0);
  return d;
}
function getWeekDates(start) {
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function changeWeek(delta) {
  const d = new Date(currentWeekStart);
  d.setDate(d.getDate() + delta * 7);
  currentWeekStart = fmtDate(d);
  load();
}
function goThisWeek() {
  currentWeekStart = fmtDate(getWeekStart(new Date()));
  load();
}
function jumpToWeek(dateStr) {
  if (!dateStr) return;
  // dateStr 是 <input type="date"> 的 'YYYY-MM-DD';用 T00:00:00 強制 local time、避免被當 UTC 解析位移
  const d = new Date(`${dateStr}T00:00:00`);
  currentWeekStart = fmtDate(getWeekStart(d));
  load();
}

async function load(retries = 0) {
  if (!window.api || !window.currentUser) {
    if (retries < 25) return setTimeout(()=>load(retries+1), 200);
    return;
  }
  if (!currentWeekStart) currentWeekStart = fmtDate(getWeekStart(new Date()));

  // Page-level gate
  const u = window.currentUser;
  const allowed = u && (u.is_manager === true || ['hr','admin','ceo','chairman'].includes(u.role));
  if (u && !allowed) {
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('gate-blocked').style.display = '';
    return;
  }

  // 員工列表 + 班別清單（pill bar）
  try {
    const emps = await api('/api/employees');
    allEmps = filterVisibleEmps(emps || [], u);
    applyDeptFilter();
  } catch(e) { toast('員工列表載入失敗：' + e.message, 'error'); return; }

  try {
    shiftTypes = await api('/api/shift-types') || [];
  } catch(_) { shiftTypes = []; }
  renderPillBar();

  // 部門 filter select（只 HR 看得到）+ 部門資訊
  const isHR = ['hr','admin','ceo','chairman'].includes(u.role);
  renderDeptFilter(isHR);
  updateDeptInfo(isHR);

  // 撈該週可能跨月的 periods + schedules
  allPeriods = {};
  allSchedules = {};
  const weekStart = currentWeekStart;
  const weekEnd = fmtDate(new Date(new Date(currentWeekStart).getTime() + 6*86400000));
  const months = new Set([weekStart.substring(0,7), weekEnd.substring(0,7)]);

  await Promise.all([...months].map(async ym => {
    const [year, mm] = ym.split('-');
    try {
      const r = await api(`/api/schedule-periods?year=${year}&month=${parseInt(mm)}`);
      // F1:用 (empId, yyyy-mm) composite key 儲存、跨月週 5 月 / 6 月 row 都保留,
      // 避免原本 first-wins(`if (!allPeriods[empId]) ...`)受 Promise.all resolve 順序影響、
      // 同員工標籤在「已公告 / 無排班」之間隨機跳動。下游 5 處 caller 用 getPeriodFor() 查。
      (r.periods || []).forEach(p => {
        const ym = `${p.period_year}-${String(p.period_month).padStart(2, '0')}`;
        allPeriods[`${p.employee_id}_${ym}`] = p;
      });
      (r.schedules || []).forEach(s => {
        if (!allSchedules[s.employee_id]) allSchedules[s.employee_id] = [];
        allSchedules[s.employee_id].push(s);
      });
    } catch(_) {}
  }));

  // C12-3：撈該週所跨年份的 holidays（按 year 撈、cache 整年）
  holidayDates = new Set();
  const years = new Set([weekStart.substring(0,4), weekEnd.substring(0,4)]);
  await Promise.all([...years].map(async year => {
    try {
      const hs = await api(`/api/holidays?year=${year}`);
      (hs || []).forEach(h => {
        // 補行上班日不算 off、其他類型 (national/company/flexible) 都當 off
        if (h.holiday_type !== 'makeup_workday') holidayDates.add(h.date);
      });
    } catch(_) {}
  }));

  // C13：撈該週 GCal events（silent fail、沒 env 不顯示 events row）
  try {
    gcalEvents = await api(`/api/calendar?_resource=events&start=${weekStart}T00:00:00Z&end=${weekEnd}T23:59:59Z`) || [];
  } catch(e) {
    gcalEvents = [];
    console.warn('[schedule] GCal events 載入失敗：', e.message);
  }

  render();
}

function filterVisibleEmps(emps, user) {
  const active = (emps || []).filter(e => e.status === 'active');
  if (['hr','admin','ceo','chairman'].includes(user.role)) return active;
  if (user.is_manager && user.dept_id) {
    return active.filter(e => e.dept_id === user.dept_id);
  }
  return [];
}

function applyDeptFilter() {
  if (!selectedDeptId) {
    visibleEmps = allEmps.slice();
  } else {
    visibleEmps = allEmps.filter(e => (e.dept_id || '') === selectedDeptId);
  }
}

function renderDeptFilter(isHR) {
  const sel = document.getElementById('dept-filter');
  if (!isHR) { sel.style.display = 'none'; return; }
  sel.style.display = '';
  // 部門列表 + 人數（從 allEmps 推導、含未指派 dept 為空字串的人）
  const deptCounts = {};
  for (const emp of allEmps) {
    const id = emp.dept_id || '';
    if (!id) continue; // 未指派不列為過濾選項（仍在「全部」中顯示）
    if (!deptCounts[id]) deptCounts[id] = { name: emp.dept_name || id, count: 0 };
    deptCounts[id].count++;
  }
  const ids = Object.keys(deptCounts).sort((a, b) => deptCounts[a].name.localeCompare(deptCounts[b].name));
  sel.innerHTML = `<option value="">全部（${allEmps.length} 人）</option>` +
    ids.map(id => `<option value="${escHtml(id)}"${id === selectedDeptId ? ' selected' : ''}>${escHtml(deptCounts[id].name)}（${deptCounts[id].count} 人）</option>`).join('');
}

function updateDeptInfo(isHR) {
  const el = document.getElementById('dept-info');
  if (!isHR) {
    const deptName = visibleEmps[0]?.dept_name || visibleEmps[0]?.dept || '';
    el.textContent = `${deptName} · ${visibleEmps.length} 人`;
    return;
  }
  if (!selectedDeptId) {
    el.textContent = `全公司 · ${visibleEmps.length} 人`;
  } else {
    const name = visibleEmps[0]?.dept_name || selectedDeptId;
    el.textContent = `${name} · ${visibleEmps.length} 人`;
  }
}

function onDeptFilterChange() {
  selectedDeptId = document.getElementById('dept-filter').value;
  applyDeptFilter();
  const u = window.currentUser;
  const isHR = u && ['hr','admin','ceo','chairman'].includes(u.role);
  updateDeptInfo(isHR);
  render();
}

function isLateChangeFor(date, periodStatus) {
  if (periodStatus !== 'locked' && periodStatus !== 'approved') return false;
  return date === todayStr();
}

// F1:allPeriods 用 composite key (empId_yyyy-mm),helper 寬鬆接受 'yyyy-mm' 或 'yyyy-mm-dd'。
function getPeriodFor(empId, dateOrYM) {
  if (!empId || !dateOrYM) return null;
  const ym = String(dateOrYM).substring(0, 7);
  return allPeriods[`${empId}_${ym}`] || null;
}
// 該週「中間日」(weekStart + 3 天) 所屬月份 = 該週多數天月份(7 天必 ≥4 天落同月、deterministic)。
function primaryMonthOf(weekStartStr) {
  const start = new Date(weekStartStr);
  const mid = new Date(start.getTime() + 3 * 86400000);
  return `${mid.getFullYear()}-${String(mid.getMonth() + 1).padStart(2, '0')}`;
}

function render() {
  const weekStart = new Date(currentWeekStart);
  const dates = getWeekDates(weekStart);
  const weekEnd = dates[6];

  // 週範圍顯示
  const yearStr = weekStart.getFullYear();
  document.getElementById('week-range').textContent =
    `${yearStr}/${weekStart.getMonth()+1}/${weekStart.getDate()} ~ ${weekEnd.getMonth()+1}/${weekEnd.getDate()}`;

  // Header
  const dayLabels = ['日','一','二','三','四','五','六'];
  const head = document.getElementById('week-grid-head');
  head.innerHTML = `
    <tr style="background:rgba(255,255,255,0.04)">
      <th style="text-align:left;padding:10px 12px;width:140px;border-bottom:1px solid var(--border);font-weight:500;font-size:12px">員工</th>
      ${dates.map((d,i) => `<th style="padding:10px 4px;border-bottom:1px solid var(--border);font-weight:500;font-size:12px;color:${i===0||i===6?'var(--text-dim)':''}">${dayLabels[i]}<div style="font-family:'DM Mono',monospace;font-size:11px;font-weight:400;margin-top:2px;opacity:.7">${d.getMonth()+1}/${d.getDate()}</div></th>`).join('')}
      <th style="padding:10px 8px;width:90px;border-bottom:1px solid var(--border);font-weight:500;text-align:center;font-size:12px">工時<div style="font-size:10px;color:var(--text-dim);font-weight:400;margin-top:2px">本週 / 月</div></th>
      <th style="padding:10px 8px;width:110px;border-bottom:1px solid var(--border);font-weight:500;text-align:center;font-size:12px">操作</th>
    </tr>
    ${gcalEvents.length ? `
    <tr style="background:rgba(59,130,246,.04)">
      <th style="text-align:right;padding:8px 12px;border-bottom:1px solid var(--border);font-weight:400;font-size:11px;color:var(--text-dim)">公司活動</th>
      ${dates.map(d => {
        const events = gcalEvents.filter(ev => isInDay(ev, fmtDate(d)));
        const html = events.slice(0, 2).map(ev => {
          const timeLabel = ev.allDay ? '' : (ev.startTime ? fmtTime(ev.startTime) + ' ' : '');
          const full = timeLabel + ev.title;
          return `<div style="font-size:10px;color:#93c5fd;padding:2px 4px;background:rgba(59,130,246,.12);border-radius:4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(full)}">${escHtml(full)}</div>`;
        }).join('');
        const more = events.length > 2 ? `<div style="font-size:10px;color:var(--text-dim)">+${events.length-2}</div>` : '';
        return `<td style="padding:6px 4px;border-bottom:1px solid var(--border);vertical-align:top">${html}${more}</td>`;
      }).join('')}
      <td style="border-bottom:1px solid var(--border)"></td>
      <td style="border-bottom:1px solid var(--border)"></td>
    </tr>` : ''}`;

  // Body
  const body = document.getElementById('week-grid-body');
  if (!visibleEmps.length) {
    body.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text-dim)">此部門無員工</td></tr>`;
    return;
  }

  const weekStartStr = fmtDate(weekStart);
  const weekEndStr = fmtDate(weekEnd);
  // F1:跨月週 row 標籤改取「該週多數天月份」對應的 period、避免 race
  const weekPrimaryMonth = primaryMonthOf(weekStartStr);

  const empRows = visibleEmps.map(emp => {
    const schs = allSchedules[emp.id] || [];
    const period = getPeriodFor(emp.id, weekPrimaryMonth);
    const periodStatus = period?.status;
    const isManagerPhase = !!periodStatus && periodStatus !== 'draft';

    const cells = dates.map(d => {
      const dateStr = fmtDate(d);
      const segs = schs.filter(s => s.work_date === dateStr);
      const seg1 = segs.find(s => s.segment_no === 1) || segs[0];

      if (!seg1) {
        return `<td class="week-cell week-cell-empty" onclick="onCellClick('${escHtml(emp.id)}','${dateStr}')">-</td>`;
      }

      const stid = seg1.shift_type_id;
      const isOff = seg1.shift_types?.is_off === true || seg1.note === '__OFF__';
      // 階段 B1 + Phase 1.3:approved leave 覆蓋、半日斜紋 / 全日純色
      const overlay = seg1.leave_overlay;
      const overlayClass = overlay
        ? (overlay.is_full_day ? 'schedule-leave-overlay' : 'schedule-leave-overlay-half')
        : null;
      const cellClass = overlayClass
        ? `week-cell ${overlayClass}`
        : (isOff
            ? 'week-cell week-cell-off'
            : `week-cell ${stid === 'ST002' ? 'week-cell-shift2' : 'week-cell-shift1'}`);
      const wishClass = !isManagerPhase && !overlay ? ' week-cell-wish' : '';

      let labelHtml, tooltip = '';
      if (overlay) {
        const origName = seg1.shift_types?.name || stid || '';
        const shortLabel = overlay.is_full_day ? '假' : `假 (${overlay.hours}h)`;
        // Task 3:post-hoc leave (員工已打卡 + 補請假) 加 ⚠️ icon、tooltip 提醒 HR 處理
        const postHocIcon = seg1.post_hoc_leave ? '⚠️' : '';
        labelHtml = `${postHocIcon}${escHtml(shortLabel)}<span class="leave-orig">原:${escHtml(origName)}</span>`;
        tooltip = seg1.post_hoc_leave
          ? `⚠ 員工已打卡 + 補請假、請 HR 處理 conflict:${overlay.leave_name||''} ${overlay.hours||0}h`
          : `${overlay.leave_name || ''} (${overlay.leave_type}) — ${overlay.overlay_label_short || ''}`;
      } else if (isOff) {
        labelHtml = escHtml(isManagerPhase ? '休' : '想休');
      } else if (isManagerPhase && seg1.start_time && seg1.end_time) {
        labelHtml = escHtml(`${fmtTime(seg1.start_time)}-${fmtTime(seg1.end_time)}`);
      } else {
        labelHtml = escHtml((isManagerPhase ? '' : '想') + (seg1.shift_types?.name || stid || ''));
      }

      const isLate = isLateChangeFor(dateStr, periodStatus);
      const lateDot = isLate ? '<span class="late-dot"></span>' : '';
      const titleAttr = tooltip ? ` title="${escHtml(tooltip)}"` : '';
      return `<td class="${cellClass}${wishClass}"${titleAttr} onclick="onCellClick('${escHtml(emp.id)}','${dateStr}')">${labelHtml}${lateDot}</td>`;
    }).join('');

    // 工時統計（本週）
    const weekMinutes = schs.reduce((sum, s) => {
      const inWeek = s.work_date >= weekStartStr && s.work_date <= weekEndStr;
      return inWeek ? sum + (s.scheduled_work_minutes || 0) : sum;
    }, 0);
    const weekHours = (weekMinutes / 60).toFixed(1);
    const weekColor = weekMinutes > 48*60 ? '#E24B4A' : weekMinutes > 40*60 ? '#FFB97B' : '#5BA68F';

    // C12-3：本月工時 + 動態月上限（扣 weekend + holidays）
    const weekMonth = weekStartStr.substring(0, 7); // 'YYYY-MM'
    const monthMinutes = schs.reduce((sum, s) =>
      s.work_date.substring(0, 7) === weekMonth ? sum + (s.scheduled_work_minutes || 0) : sum, 0);
    const monthHours = (monthMinutes / 60).toFixed(0);
    const [yr, mo] = weekMonth.split('-').map(Number);
    const monthMax = calcMonthMax(yr, mo, holidayDates);
    const monthColor = (monthMinutes/60) > monthMax * 1.1 ? '#E24B4A'
                     : (monthMinutes/60) > monthMax       ? '#FFB97B'
                     : '#5BA68F';

    // 操作欄
    // Phase 2.x.3 frontend gate(對齊 backend 嚴格 spec):
    //   approve / publish 都需要 同部門 + is_manager + 非自己
    //   不合法 → 隱藏按鈕、顯示「待主管」hint
    const u = window.currentUser || {};
    const canManagePeriod = u.is_manager === true
                            && !!u.dept_id
                            && u.dept_id === emp.dept_id
                            && u.id !== emp.id;
    // F3:撤回公告權限(對齊後端 unpublish.js):admin / chairman / 同部門主管 三選一、
    // 且非自己 period(對齊 self-approval guard);HR / CEO 不在 allowlist、後端也擋
    const canUnpublish = u.id !== emp.id
      && (
        ['admin', 'chairman'].includes(u.role)
        || (u.is_manager === true && !!u.dept_id && u.dept_id === emp.dept_id)
      );
    // F4:時間閘門「強制公告」視覺判定(真授權在後端 force-finalize.js)。
    // client 時間僅視覺;前端拿台北今日字串比 period_start 推的 mgr/ceo 窗。
    // 注意:force 路徑允許主管定案自己 period(後端 forceFinalizeAuth 無 self 擋),
    // 否則部門主管自己的 draft 永無解。前端不該再多擋 u.id !== emp.id。
    const taipeiNow = new Date(Date.now() + 8 * 3600 * 1000).toISOString().slice(0, 10);
    const fw = (window.ScheduleFinalizeAuth && period)
      ? window.ScheduleFinalizeAuth.forceFinalizeAuth({
          caller: u, period, employeeDeptId: emp.dept_id, now: taipeiNow,
        })
      : { ok: false };
    const forceBtn = (fw.ok && period)
      ? `<button class="btn btn-ghost btn-sm" style="font-size:11px;padding:4px 10px;border:1px solid rgba(248,113,113,.4);color:#F87171" onclick="forceFinalizePeriod('${escHtml(period.id)}')" title="時間閘門已到、強制定案+公告">⏰ 強制定案公告</button>`
      : '';
    let opHtml = '';
    if (periodStatus === 'submitted') {
      opHtml = canManagePeriod
        ? `<button class="btn btn-primary" style="font-size:11px;padding:4px 10px" onclick="approvePeriod('${escHtml(period.id)}')">定案</button>${forceBtn}`
        : `<span style="font-size:11px;padding:2px 8px;background:rgba(122,133,160,.12);color:var(--text-dim);border-radius:6px" title="只有同部門主管可定案">待主管定案</span>${forceBtn}`;
    } else if (periodStatus === 'approved') {
      opHtml = canManagePeriod
        ? `<button class="btn btn-primary" style="font-size:11px;padding:4px 10px" onclick="publishPeriod('${escHtml(period.id)}')">公告</button>${forceBtn}`
        : `<span style="font-size:11px;padding:2px 8px;background:rgba(122,133,160,.12);color:var(--text-dim);border-radius:6px" title="只有同部門主管可公告">待主管公告</span>${forceBtn}`;
    } else if (periodStatus === 'published') {
      // F3:有撤回權限 → 顯示「↩ 撤回公告」紅 ghost 按鈕;無權限 → 維持綠「已公告」span
      opHtml = canUnpublish
        ? `<button class="btn btn-ghost btn-sm" style="font-size:11px;padding:4px 10px;border:1px solid rgba(248,113,113,.4);color:#F87171" onclick="unpublishPeriod('${escHtml(period.id)}')">↩ 撤回公告</button>`
        : `<span style="font-size:11px;padding:2px 8px;background:rgba(74,222,128,.15);color:#4ADE80;border-radius:6px">已公告</span>`;
    } else if (periodStatus === 'locked') {
      // 鎖月後不可撤回(後端 RULES 也擋),維持綠 span 不分權限
      opHtml = `<span style="font-size:11px;padding:2px 8px;background:rgba(74,222,128,.15);color:#4ADE80;border-radius:6px">已公告</span>`;
    } else if (periodStatus === 'draft') {
      opHtml = `<span style="font-size:11px;padding:2px 8px;background:rgba(91,141,239,.15);color:#7FBBFF;border-radius:6px">員工標中</span>${forceBtn}`;
    } else {
      opHtml = `<span style="font-size:11px;color:var(--text-dim)">無排班</span>`;
    }

    // C8-3:逐人套範本按鈕(canManagePeriod=true 且 status ∈ draft/submitted/approved 顯示;
    //       published/locked 已過階段不顯示;period=null 仍顯示、點了 toast 提示)
    const tplApplicableStatus =
      !periodStatus || periodStatus === 'draft' ||
      periodStatus === 'submitted' || periodStatus === 'approved';
    const tplHtml = (canManagePeriod && tplApplicableStatus)
      ? `<button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick="applyTplToOne('${escHtml(emp.id)}', ${period ? `'${escHtml(period.id)}'` : 'null'}, '${escHtml(emp.name || emp.id)}')">📋 套範本</button>`
      : '';

    return `
      <tr>
        <td class="week-emp-name">${escHtml(emp.name || emp.id)}${emp.is_manager?'<div class="role-hint">主管</div>':''}</td>
        ${cells}
        <td style="padding:10px 8px;border-bottom:1px solid var(--border);text-align:center;font-size:12px;font-family:'DM Mono',monospace">
          <div style="color:${weekColor};font-weight:600">${weekHours}h</div>
          <div style="color:${monthColor};font-size:11px;margin-top:2px;opacity:.85">月 ${monthHours}/${monthMax}h</div>
        </td>
        <td style="padding:10px 8px;border-bottom:1px solid var(--border);text-align:center">
          <div style="display:flex;flex-direction:column;gap:4px;align-items:center">
            ${opHtml}
            ${tplHtml}
          </div>
        </td>
      </tr>`;
  }).join('');

  // 每日上班 / 休假人數（visibleEmps + allSchedules reduce per date）
  // 階段 B1:approved leave 覆蓋的也算「休」(扣掉上班人數)
  const dailyCounts = dates.map(d => {
    const dateStr = fmtDate(d);
    let on = 0, off = 0;
    visibleEmps.forEach(emp => {
      const segs = (allSchedules[emp.id] || []).filter(s => s.work_date === dateStr);
      const seg1 = segs.find(s => s.segment_no === 1) || segs[0];
      if (!seg1) return;
      const isOff = seg1.shift_types?.is_off === true || seg1.note === '__OFF__' || !!seg1.leave_overlay;
      if (isOff) off++; else on++;
    });
    return { on, off };
  });

  updateBatchForceButton();

  const totalOn = dailyCounts.reduce((s, c) => s + c.on, 0);
  const totalOff = dailyCounts.reduce((s, c) => s + c.off, 0);
  const sumRowBg = 'background:rgba(255,255,255,0.03)';
  const sumLabelStyle = `padding:10px 12px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-weight:600;font-size:12px`;
  const sumCellStyle = `padding:10px 6px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;font-size:14px;font-weight:600;font-family:'DM Mono',monospace`;
  const sumOpStyle = `padding:10px 8px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;font-size:11px;color:var(--text-dim)`;

function renderPillBar() {
  const bar = document.getElementById('pill-bar');
  if (!bar) return;
  const visible = (shiftTypes || [])
    .filter(t => t.id !== 'ST002')                                // 過濾晚班（員工 wish 用）
    .sort((a, b) => (a.sort_order ?? 999) - (b.sort_order ?? 999));

  const html = [];
  let lastWasSystem = null;
  for (const t of visible) {
    if (lastWasSystem === true && !t.is_system) html.push('<div class="pill-divider"></div>');
    const active = selectedShiftTypeId === t.id ? ' active' : '';
    const dot = `<span class="color-dot" style="background:${escHtml(t.color || '#5B8DEF')}"></span>`;
    const offIcon = t.is_off ? ' <span style="opacity:.6;font-size:11px">休</span>' : '';
    const range = (t.start_time && t.end_time)
      ? `<span style="opacity:.55;font-size:11px;margin-left:4px">${escHtml(fmtTime(t.start_time))}-${escHtml(fmtTime(t.end_time))}</span>` : '';
    html.push(`<div class="shift-pill${active}" onclick="selectPill('${escHtml(t.id)}')">${dot}<span>${escHtml(t.name)}</span>${offIcon}${range}</div>`);
    lastWasSystem = t.is_system;
  }
  html.push(`<div class="shift-pill shift-pill-add" onclick="openQuickAddModal()">＋ 新增</div>`);
  html.push(`<span class="pill-hint">${selectedShiftTypeId ? '點 cell 直接套用、再點同一 pill 取消選擇' : '選一個班別、點 cell 即可快速套用'}</span>`);
  bar.innerHTML = html.join('');
}

function selectPill(id) {
  selectedShiftTypeId = (selectedShiftTypeId === id) ? null : id;
  renderPillBar();
}

function onCellClick(empId, dateStr) {
  if (selectedShiftTypeId) return applyPillToCell(empId, dateStr);
  return openDayModal(empId, dateStr);
}

async function applyPillToCell(empId, dateStr) {
  const emp = visibleEmps.find(e => e.id === empId);
  if (!emp) return;
  // F1:該 cell 操作對齊該日期月份的 period(跨月週時不會誤判另一個月的狀態)
  const period = getPeriodFor(empId, dateStr);
  if (!period) {
    toast('該員工此月尚未建立排班 period、請員工先建立或 HR 代建', 'error');
    return;
  }
  const type = shiftTypes.find(t => t.id === selectedShiftTypeId);
  if (!type) return;

  const segs = (allSchedules[empId] || []).filter(s => s.work_date === dateStr);

  if (segs.length > 1) {
    if (!confirm(`此天有 ${segs.length} 段排班、套用「${type.name}」會清掉現有並改為單段。確定？`)) return;
  }

  const isLate = isLateChangeFor(dateStr, period.status);
  let reason = null;
  if (isLate) {
    if (!confirm('此調整為「鎖定後當日異動」、儲存後將通知 HR + CEO。確定送出？')) return;
    reason = prompt('調整原因（必填）：');
    if (!reason) { toast('已取消（未填原因）', 'error'); return; }
  }

  // 1. DELETE 舊段
  for (const s of segs) {
    try {
      await api(`/api/schedules/${encodeURIComponent(s.id)}`, {
        method: 'DELETE', body: JSON.stringify({ reason }),
      });
    } catch(_) {}
  }

  // 2. POST 新段
  const body = {
    period_id: period.id, employee_id: empId, work_date: dateStr,
    segment_no: 1, shift_type_id: type.id, reason,
  };
  if (type.is_off) {
    body.note = '__OFF__';
  } else {
    body.start_time = type.start_time || null;
    body.end_time   = type.end_time   || null;
    body.crosses_midnight = !!type.crosses_midnight;
    body.break_minutes = type.break_minutes ?? 60;
  }
  try {
    await api('/api/schedules', { method: 'POST', body: JSON.stringify(body) });
  } catch(e) {
    toast('套用失敗：' + e.message, 'error');
    return;
  }
  toast(`${emp.name || emp.id} ${dateStr} → ${type.name}`);
  await load();
}

let _pendingImportRows = [];

function _currentMonthKey() {
  // 用 currentWeekStart 的月份做匯出/匯入的 target month
  const ws = currentWeekStart || fmtDate(getWeekStart(new Date()));
  const [y, m] = ws.split('-').map(Number);
  return { year: y, month: m };
}

function renderExportModal() {
  const rangeMode = document.querySelector('[name=ex-range-mode]:checked').value;

  document.getElementById('ex-custom-emp-row').style.display  = (peopleMode === 'custom-emp')  ? '' : 'none';

  updateExportPreview();

function _getSelectedRange() {
  const mode = document.querySelector('[name=ex-range-mode]:checked')?.value;
  if (mode === 'month') {
    const y = parseInt(document.getElementById('ex-year').value);
    const m = parseInt(document.getElementById('ex-month').value);
    if (!y || !m) return [];
    return [{ year: y, month: m }];
  }
  // custom：用 start/end 取出涵蓋的所有月份
  const start = document.getElementById('ex-start').value;
  const end   = document.getElementById('ex-end').value;
  if (!start || !end) return [];
  if (start > end) return [];
  const months = [];
  let cur = new Date(start + 'T00:00:00Z');
  const last = new Date(end + 'T00:00:00Z');
  while (cur <= last) {
    months.push({ year: cur.getUTCFullYear(), month: cur.getUTCMonth() + 1 });
    cur.setUTCMonth(cur.getUTCMonth() + 1);
    cur.setUTCDate(1);
  }
  return months;
}

function _getSelectedEmps() {
  const mode = document.querySelector('[name=ex-people-mode]:checked')?.value;
  if (mode === 'all') return visibleEmps.slice();
  if (mode === 'single-dept') {
    const deptId = document.getElementById('ex-single-dept').value;
    return visibleEmps.filter(e => (e.dept_id || '') === deptId);
  }
  if (mode === 'multi-dept') {
    const checked = [...document.querySelectorAll('[name=ex-multi-dept]:checked')].map(c => c.value);
    return visibleEmps.filter(e => checked.includes(e.dept_id || ''));
  }
  if (mode === 'custom-emp') {
    const checked = [...document.querySelectorAll('[name=ex-custom-emp]:checked')].map(c => c.value);
    return visibleEmps.filter(e => checked.includes(e.id));
  }
  return [];
}

function updateExportPreview() {
  const months = _getSelectedRange();
  const emps   = _getSelectedEmps();
  document.getElementById('ex-emp-count').textContent = emps.length;
  document.getElementById('ex-month-count').textContent = months.length;

  const rangeMode = document.querySelector('[name=ex-range-mode]:checked')?.value;
  const warn = document.getElementById('ex-warn');
  if (rangeMode === 'custom' && months.length === 0) {
    warn.style.display = '';
  } else {
    warn.style.display = 'none';
  }

  const btn = document.getElementById('ex-confirm-btn');
  btn.disabled = emps.length === 0 || months.length === 0;
}

async function runExportConfirm() {
  const months = _getSelectedRange();
  const emps   = _getSelectedEmps();
  if (!months.length || !emps.length) return;

  const btn = document.getElementById('ex-confirm-btn');
  btn.disabled = true;
  btn.textContent = `匯出中… 0 / ${months.length}`;

  const wb = window.XLSX.utils.book_new();
  let i = 0;
  for (const { year, month } of months) {
    let schedules = [];
    let monthEvents = [];
    try {
      const r = await api(`/api/schedule-periods?year=${year}&month=${month}`);
      schedules = r?.schedules || [];
    } catch(e) {
      toast(`${year}/${month} 匯出失敗：${e.message}`, 'error');
      btn.disabled = false; btn.textContent = '匯出';
      return;
    }
    try {
      const start = `${year}-${String(month).padStart(2,'0')}-01`;
      const lastDay = window.__excelBuilder.daysInMonth(year, month);
      const end = `${year}-${String(month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
      monthEvents = await api(`/api/calendar?_resource=events&start=${start}T00:00:00Z&end=${end}T23:59:59Z`) || [];
    } catch(_) { /* GCal silent fail */ }

    const { sheetName, aoa, columnWidths } = window.__excelBuilder.buildScheduleAOA({
      year, month, employees: emps, schedules, shiftTypes, gcalEvents: monthEvents,
    });
    const ws = window.XLSX.utils.aoa_to_sheet(aoa);
    if (columnWidths?.length) ws['!cols'] = columnWidths.map(w => ({ wch: w }));
    ws['!freeze'] = { xSplit: 3, ySplit: 5 };
    window.XLSX.utils.book_append_sheet(wb, ws, sheetName);

    i++;
    btn.textContent = `匯出中… ${i} / ${months.length}`;
  }

  const wbout = window.XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const first = months[0], last = months[months.length - 1];
  const fname = months.length === 1
    ? `${first.year}-${String(first.month).padStart(2,'0')}-排班.xlsx`
    : `${first.year}${String(first.month).padStart(2,'0')}-${last.year}${String(last.month).padStart(2,'0')}-排班.xlsx`;
  a.download = fname;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);

  closeExportModal();
  toast(`已匯出 ${months.length} 個月、${emps.length} 員工`);
}

async function handleImportFile(evt) {
  const input = evt.target;
  const file = input.files?.[0];
  input.value = ''; // 清掉、避免下次選同檔不觸發
  if (!file) return;
  if (!window.__excelParser || !window.XLSX) {
    toast('Excel 模組尚未載入、請稍候再試', 'error'); return;
  }

  const { year, month } = _currentMonthKey();
  let aoa;
  try {
    const buf = await file.arrayBuffer();
    const wb = window.XLSX.read(buf, { type: 'array' });
    const firstSheetName = wb.SheetNames[0];
    if (!firstSheetName) { toast('Excel 沒 sheet', 'error'); return; }
    aoa = window.XLSX.utils.sheet_to_json(wb.Sheets[firstSheetName], { header: 1, defval: '' });
  } catch(e) {
    toast('Excel 解析失敗：' + e.message, 'error'); return;
  }

  const result = window.__excelParser.parseScheduleAOA({
    aoa, year, month,
    employees: visibleEmps,
    shiftTypes,
  });

  // 補檢查 period 存在（parser 不知道 period）
  const validRows = [];
  const periodErrors = [];
  for (const r of result.rows) {
    // F1:用該筆 work_date 對應月份查 period(跨月貼上時不會找錯月)
    const period = getPeriodFor(r.employee_id, r.work_date);
    if (!period) {
      periodErrors.push({
        row: 0, col: 0,
        message: `${r.employee_id} ${r.work_date}:該員工 ${year}/${month} 尚未建立 period、請先建`,
      });
      continue;
    }
    r.period_id = period.id;
    validRows.push(r);
  }

  showImportPreviewModal({
    year, month,
    rows: validRows,
    errors: [...result.errors, ...periodErrors],
    total: result.total,
  });
}

  } else {

function closeImportModal() {

async function runImportConfirm() {
  const rows = _pendingImportRows.slice();
  if (!rows.length) return;

  const btn = document.getElementById('im-confirm-btn');
  btn.disabled = true;
  btn.textContent = `寫入中… 0 / ${rows.length}`;

  const stMap = Object.fromEntries(shiftTypes.map(t => [t.id, t]));
  let written = 0;
  const writeErrors = [];

  for (const r of rows) {
    const type = stMap[r.shift_type_id];
    // 1. 刪該員工那天現有的所有 segments（避免殘留多段）
    const existing = (allSchedules[r.employee_id] || []).filter(s => s.work_date === r.work_date);
    for (const s of existing) {
      try { await api(`/api/schedules/${encodeURIComponent(s.id)}`, { method: 'DELETE' }); } catch(_) {}
    }
    // 2. POST 新段
    const body = {
      period_id: r.period_id,
      employee_id: r.employee_id,
      work_date: r.work_date,
      segment_no: 1,
      shift_type_id: r.shift_type_id,
      status: 'confirmed',
    };
    if (r.is_off || type?.is_off) {
      body.note = '__OFF__';
    } else if (type) {
      body.start_time = type.start_time || null;
      body.end_time   = type.end_time   || null;
      body.crosses_midnight = !!type.crosses_midnight;
      body.break_minutes = type.break_minutes ?? 60;
    }
    try {
      await api('/api/schedules', { method: 'POST', body: JSON.stringify(body) });
      written++;
    } catch(e) {
      writeErrors.push(`${r.employee_id} ${r.work_date}：${e.message}`);
      console.error('[schedule:import] write failed', r, e);
    }
    btn.textContent = `寫入中… ${written} / ${rows.length}`;
  }

  closeImportModal();

  if (writeErrors.length) {
    toast(`匯入完成、${written} 筆成功、${writeErrors.length} 筆失敗（看 console）`, 'error');
  } else {
    toast(`匯入完成、${written} 筆已寫入`);
  }
  await load();
}

  if (isLate) {
    const ok = confirm('此調整為「鎖定後當日異動」，儲存後將通知 HR + CEO。確定送出？');
    if (!ok) return;
  }
  const reason = document.getElementById('f-reason').value || null;

  const existing = currentSchedules.filter(s => s.work_date === date);
  for (const s of existing) {
    try { await api(`/api/schedules/${encodeURIComponent(s.id)}`, { method:'DELETE', body: JSON.stringify({ reason }) }); } catch(_) {}
  }
  if (editing.off) {

// F4 批次:遍歷 visibleEmps(已套角色 + dept-filter)、依該週 primaryMonth 抓 period、
// 分類成 eligible / skipDone / skipNoPeriod / skipTimeWindow。
// 範圍跟著現有 selectedDeptId 走、不另加 scope 選擇。
// 不排除自己(後端 forceFinalizeAuth 無 self 擋、主管自審用)。
function taipeiNow() {
  return new Date(Date.now() + 8 * 3600 * 1000).toISOString().slice(0, 10);
}
function computeBatchForceTargets() {
  const u = window.currentUser;
  const now = taipeiNow();
  const ym = primaryMonthOf(currentWeekStart);
  const eligible = [], skipDone = [], skipNoPeriod = [], skipTimeWindow = [];
  if (!u || !window.ScheduleFinalizeAuth) {
    return { eligible, skipDone, skipNoPeriod, skipTimeWindow };
  }
  for (const emp of (visibleEmps || [])) {
    const period = getPeriodFor(emp.id, ym);
    if (!period) { skipNoPeriod.push({ emp }); continue; }
    if (period.status === 'published' || period.status === 'locked') {
      skipDone.push({ emp, period }); continue;
    }
    if (period.status !== 'draft' && period.status !== 'submitted' && period.status !== 'approved') {
      // 防衛:未知 status 一律視為跳過(不在批次內動)
      skipDone.push({ emp, period }); continue;
    }
    const fw = window.ScheduleFinalizeAuth.forceFinalizeAuth({
      caller: u, period, employeeDeptId: emp.dept_id, now,
    });
    if (fw.ok) eligible.push({ emp, period });
    else skipTimeWindow.push({ emp, period, reason: fw.reason });
  }
  return { eligible, skipDone, skipNoPeriod, skipTimeWindow };
}

function updateBatchForceButton() {
  const btn = document.getElementById('btn-batch-force');
  if (!btn) return;
  const t = computeBatchForceTargets();
  btn.style.display = t.eligible.length > 0 ? '' : 'none';
}

async function openBatchForceDialog() {
  const t = computeBatchForceTargets();
  if (!t.eligible.length) {
    alert('沒有可強制公告的對象(可能都已公告 / 無 period / 時間閘門未到)');
    return;
  }
  // 範圍標籤:eligible 的 distinct dept 數量決定
  const distinctDepts = [...new Set(t.eligible.map(x => x.emp.dept_id || ''))];
  let scopeLabel;
  if (distinctDepts.length === 1) {
    const deptName = t.eligible[0].emp.dept_name || distinctDepts[0] || '(未指派)';
    scopeLabel = `本部門:${deptName}`;
  } else {
    scopeLabel = `全部門(${distinctDepts.length} 個部門)`;
  }
  const SHOW_MAX = 8;
  const namesOf = arr => {
    const head = arr.slice(0, SHOW_MAX).map(x => `  • ${x.emp?.name || x.emp?.id}`).join('\n');
    const more = arr.length > SHOW_MAX ? `\n  …等 ${arr.length} 位` : '';
    return head + more;
  };
  let msg = `將強制定案並公告【${scopeLabel}】的 ${t.eligible.length} 位:\n`;
  msg += namesOf(t.eligible);
  if (t.skipDone.length) {
    msg += `\n\n⚠ 另 ${t.skipDone.length} 位已公告 / 鎖月將被跳過:\n` + namesOf(t.skipDone);
  }
  if (t.skipNoPeriod.length) {
    msg += `\n\n⚠ 另 ${t.skipNoPeriod.length} 位尚未建立 period 將被跳過:\n` + namesOf(t.skipNoPeriod);
  }
  if (t.skipTimeWindow.length) {
    msg += `\n\n⚠ 另 ${t.skipTimeWindow.length} 位時間閘門未到 / 角色不符將被跳過:\n` + namesOf(t.skipTimeWindow);
  }
  msg += '\n\n會通知員工、寫稽核紀錄;不可撤回到 draft。\n確定執行?';
  if (!confirm(msg)) return;
  await applyForceFinalizeBatch(t.eligible);
}

async function applyForceFinalizeBatch(targets) {
  toast(`強制公告中…(${targets.length} 位)`);
  const settled = await Promise.allSettled(targets.map(async ({ emp, period }) => {
    const r = await window.apiRaw(
      `/api/schedule-periods/${encodeURIComponent(period.id)}/force-finalize`,
      { method: 'POST' },
    );
    if (!r.ok) throw { emp, body: r.body };
    return { emp };
  }));
  const ok = [];
  const fail = [];
  for (const s of settled) {
    if (s.status === 'fulfilled') ok.push(s.value);
    else {
      const r = s.reason;
      if (r && r.emp) fail.push({ emp: r.emp, body: r.body || {} });
      else fail.push({ emp: { name: '?' }, body: { error: String(r?.message || r || 'UNKNOWN') } });
    }
  }
  if (!fail.length) {
    toast(`已強制公告 ${ok.length} 位`);
  } else {
    const lines = fail.map(f => `  • ${f.emp.name || f.emp.id}:${formatForceError(f.body)}`).join('\n');
    alert(`部分失敗:\n成功 ${ok.length} 位、失敗 ${fail.length} 位\n\n明細:\n${lines}`);
  }
  await load();
}

function computeBatchTargets(emps, u) {
  if (!u) return [];
  if (['hr', 'admin', 'ceo', 'chairman'].includes(u.role)) {

  if (u.is_manager === true && u.dept_id) {
    return (emps || []).filter(e => e.dept_id === u.dept_id && e.id !== u.id);

  return [];
}

// 後端 error code → 中文人話 (raw code console.log 給 debug)
const TPL_ERR_MAP = {
  NO_PERIOD_ID: '未指定排班期間',
  NO_TEMPLATE_ID: '未指定範本',
  TEMPLATE_NOT_FOUND: '找不到範本',
  PATTERN_INVALID: '範本格式無效',
  NOT_OWNER: '非範本所有者',
  PERIOD_NOT_FOUND: '找不到排班期間',
  PERIOD_RANGE_INVALID: '排班期間日期無效',
  NO_PERIOD: '找不到排班期間',
  NOT_OWN_PERIOD: '非本人排班',
  NOT_DRAFT: '已送出/已公告、無法套用',
  WISH_DEADLINE_PASSED: '員工心願截止已過',
  PERIOD_STARTED: '排班月已開始、無法套用',
  NOT_MANAGER_OR_HR: '非你管轄範圍',
  MANAGER_LATE_DENIED: '過去日不可套',
};
function formatTplError(err) {
  const raw = (err && (err.error || err.message)) || '';
  console.warn('[tpl-apply] raw error:', raw, err);
  // err.message 可能是 "EMPLOYEE_PERIOD_NOT_FOUND" 或 "Internal Server Error";
  // 抓最後一段大寫底線片段比對 map
  const code = String(raw).match(/[A-Z_]+/g)?.find(s => TPL_ERR_MAP[s]);
  if (code) return TPL_ERR_MAP[code];
  return '套用失敗';
}

// F4 批次:force-finalize 後端 error code → 中文人話。
// 對齊 api/schedule-periods/[id]/force-finalize.js 實際回傳的 error 字串。
const FORCE_ERR_MAP = {
  BEFORE_WINDOW:       '時間閘門未到',
  NOT_AUTHORIZED:      '無強制權限',
  FORCE_EMPTY_PERIOD:  '尚有未排班的日期',
  PERIOD_NOT_FOUND:    '找不到排班期間',
  NO_PERIOD_ID:        '未指定排班期間',
  STATE_RACED:         '狀態已被更動、請重新整理',
  INVALID_TRANSITION:  '狀態無法轉移',
};
function formatForceError(body) {
  const code = body?.error || '';
  let msg = FORCE_ERR_MAP[code] || code || '未知錯誤';
  if (code === 'FORCE_EMPTY_PERIOD' && Array.isArray(body?.missingDates) && body.missingDates.length) {
    msg += `(缺 ${body.missingDates.join('、')})`;
  }
  return msg;
}

// ── 整批入口 ──────────────────────────────────────────
async function openBatchTemplatePicker() {
  const u = window.currentUser;
  const targets = computeBatchTargets(visibleEmps, u);
  if (!targets.length) return toast('無可套用對象', 'error');

  // 分三類:可套 / 沒 period / 已公告
  const ym = primaryMonthOf(currentWeekStart);
  const applicable = [];      // { emp, period }
  const skipNoPeriod = [];    // emp
  const skipPublished = [];   // { emp, status }
  targets.forEach(emp => {
    const p = getPeriodFor(emp.id, ym);
    if (!p) return skipNoPeriod.push(emp);
    const st = p.status;
    if (st === 'published' || st === 'locked') {
      skipPublished.push({ emp, status: st });
    } else {
      applicable.push({ emp, period: p });
    }
  });

  if (!applicable.length) {
    const noP = skipNoPeriod.length;
    const pub = skipPublished.length;
    return alert(
      `本月無可套用對象:\n` +
      (noP ? `  • ${noP} 位尚未建立 period\n` : '') +
      (pub ? `  • ${pub} 位已公告/鎖月\n` : '') +
      `\n請員工先建立 period、或主管「撤回公告」後再套。`,
    );
  }

  let tpls;
  try { tpls = await fetchTemplates(); }
  catch (e) { return toast('載入範本失敗：' + e.message, 'error'); }
  if (!tpls.length) return toast('尚無範本可套用', 'error');

  openTemplatePicker('batch', { applicable, skipNoPeriod, skipPublished, tpls, ym });
}

// ── 範本選擇 modal (single / batch 共用) ────────────
function openTemplatePicker(mode, ctx) {
  const modal = document.getElementById('tpl-modal');
  const titleEl = document.getElementById('tpl-modal-title');
  const subEl = document.getElementById('tpl-modal-sub');
  const listEl = document.getElementById('tpl-list');
  if (!modal) return;

  if (mode === 'single') {
    titleEl.textContent = `為「${ctx.empName}」選擇範本`;
    subEl.textContent = '選擇範本後、員工已標休假的日子會保留、其餘填入範本對應班別。';
  } else {
    const n = ctx.applicable.length;
    const noP = ctx.skipNoPeriod.length;
    const pub = ctx.skipPublished.length;
    titleEl.textContent = `整批套範本 (可套 ${n} 位)`;
    let sub = `可套 ${n} 位`;
    if (noP) sub += `、跳過 ${noP} 位 (沒 period)`;
    if (pub) sub += `、跳過 ${pub} 位 (已公告/鎖月)`;
    subEl.textContent = sub;
  }

  listEl.innerHTML = ctx.tpls.map((t, i) => `
    <button class="btn btn-ghost" style="justify-content:space-between;text-align:left;padding:10px 12px;font-size:13px;display:flex;align-items:center" data-idx="${i}">
      <span>${escHtml(t.name || t.id)}</span>
      <span style="font-size:11px;color:var(--text-dim)">套用 →</span>
    </button>
  `).join('');
  Array.from(listEl.querySelectorAll('button[data-idx]')).forEach(btn => {
    btn.onclick = () => {
      const tpl = ctx.tpls[Number(btn.dataset.idx)];
      if (!tpl) return;
      if (mode === 'single') confirmAndApplyTplSingle(tpl, ctx);
      else confirmAndApplyTplBatch(tpl, ctx);
    };
  });
  modal.classList.add('open');
}
function closeTemplatePicker() {
  document.getElementById('tpl-modal').classList.remove('open');
}

// 逐人 confirm + 執行
async function confirmAndApplyTplSingle(tpl, ctx) {
  const msg =
    `套用範本「${tpl.name}」會填入「${ctx.empName}」尚未標休假的日子` +
    `（已標休假的日子會保留），確定？`;
  if (!confirm(msg)) return;
  try {
    const r = await applyTemplateToPeriod(tpl.id, ctx.periodId);
    const applied = r.applied || 0;
    const skipOff = r.skipped_existing_off || 0;
    toast(`已套用「${tpl.name}」到 ${ctx.empName}：填入 ${applied} 天` +
          (skipOff ? `、保留 ${skipOff} 天休假` : ''));
    closeTemplatePicker();
    await load();
  } catch (e) {
    alert(`套用失敗(${ctx.empName})：${formatTplError(e)}`);
  }
}

// 整批 confirm + 並行執行
async function confirmAndApplyTplBatch(tpl, ctx) {
  const SHOW_MAX = 8;
  const namesOf = arr => {
    const head = arr.slice(0, SHOW_MAX).map(x => `  • ${x.emp?.name || x.name || x.emp?.id || x.id}`).join('\n');
    const more = arr.length > SHOW_MAX ? `\n  …等 ${arr.length} 位` : '';
    return head + more;
  };
  let msg = `將套用範本「${tpl.name}」到以下 ${ctx.applicable.length} 位員工：\n`;
  msg += namesOf(ctx.applicable) + '\n';
  if (ctx.skipPublished.length) {
    msg += `\n⚠ 另 ${ctx.skipPublished.length} 位已公告/鎖月將被跳過：\n` + namesOf(ctx.skipPublished) + '\n';
  }
  if (ctx.skipNoPeriod.length) {
    msg += `\n⚠ 另 ${ctx.skipNoPeriod.length} 位尚未建立 period 將被跳過：\n` + namesOf(ctx.skipNoPeriod) + '\n';
  }
  msg += `\n會填入每位員工尚未標休假的日子（已標休假的日子會保留）。\n確定執行？`;
  if (!confirm(msg)) return;
  closeTemplatePicker();
  toast(`套用中… (${ctx.applicable.length} 位)`);

  const tasks = ctx.applicable.map(async ({ emp, period }) => {
    try {
      const r = await applyTemplateToPeriod(tpl.id, period.id);
      return { ok: true, emp, applied: r.applied || 0, skipOff: r.skipped_existing_off || 0 };
    } catch (e) {
      return { ok: false, emp, err: e };
    }
  });
  const results = await Promise.all(tasks);
  const ok = results.filter(r => r.ok);
  const fail = results.filter(r => !r.ok);

  if (!fail.length) {
    let t = `已套用「${tpl.name}」到 ${ok.length} 位員工`;
    const extras = [];
    if (ctx.skipNoPeriod.length) extras.push(`跳過 ${ctx.skipNoPeriod.length} 位 (沒 period)`);
    if (ctx.skipPublished.length) extras.push(`跳過 ${ctx.skipPublished.length} 位 (已公告/鎖月)`);
    if (extras.length) t += `；${extras.join('、')}`;
    toast(t);
  } else {
    const lines = fail.map(r => `  • ${r.emp.name || r.emp.id}：${formatTplError(r.err)}`).join('\n');
    alert(
      `部分套用失敗:\n` +
      `成功 ${ok.length} 位、失敗 ${fail.length} 位\n\n` +
      `失敗明細:\n${lines}`,
    );
  }
  await load();
}

// Init
load();
</script>
