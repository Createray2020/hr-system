<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>離職員工檔案 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  .ra-table{width:100%;border-collapse:collapse;font-size:13px}
  .ra-table th,.ra-table td{padding:10px 12px;border-bottom:0.5px solid rgba(255,255,255,.06);text-align:left}
  .ra-table th{font-weight:600;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:11px;background:rgba(0,0,0,.15)}
  .ra-table tr.clickable{cursor:pointer;transition:background .12s}
  .ra-table tr.clickable:hover{background:rgba(91,141,239,.06)}
  .seniority-pill{display:inline-block;padding:2px 8px;border-radius:10px;background:rgba(91,141,239,.12);color:var(--accent2);font-family:'DM Mono',monospace;font-size:11px}
  .ra-modal-section{margin-bottom:18px}
  .ra-section-title{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.6px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .ra-section-title .ra-count{color:var(--accent2);font-size:10px}
  .ra-disclaimer{background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.25);color:#FB923C;padding:10px 14px;border-radius:6px;font-size:12px;line-height:1.5;margin-bottom:14px}
  .ra-emp-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13px;margin-bottom:14px}
  .ra-emp-summary div{padding:4px 0}
  .ra-emp-summary .label{color:var(--text-dim);font-size:11px}
  .ra-section-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
  .ra-section-table th,.ra-section-table td{padding:6px 10px;border-bottom:0.5px solid rgba(255,255,255,.06);text-align:left;white-space:nowrap}
  .ra-section-table th{color:var(--text-dim);font-family:'DM Mono',monospace;font-size:10px;background:rgba(0,0,0,.12)}
  .ra-empty{padding:14px;text-align:center;color:var(--text-dim);font-size:12px}
  /* 列印:隱藏 sidebar / 操作按鈕、白底黑字適合 PDF 另存 */
  @media print {
    .sidebar, .ra-print-hide, .modal-actions, .modal-bg:not(.open) { display:none !important; }
    body, .main, .modal { background:#fff !important; color:#000 !important; }
    .modal-bg { position:static; background:transparent; }
    .modal { box-shadow:none; max-width:none !important; width:100% !important; }
    .ra-section-title, .ra-section-title .ra-count { color:#444 !important; }
    .ra-table th, .ra-section-table th { background:#eee !important; color:#444 !important; }
  }
</style>
</head>
<body data-page="resigned-archive">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">離職員工檔案</div>
        <div class="page-sub">法律 / 稅務 / 勞檢留檔用</div>
      </div>
      <div class="page-actions ra-print-hide">
        <button class="btn btn-ghost" onclick="loadList()">↻ 重新載入</button>
      </div>
    </div>

    <div id="gate-blocked" class="empty-state" style="display:none">
      <div class="icon">🔒</div><div>無權限存取此頁面(限 HR / CEO / 董事長 / Admin)</div>
    </div>

    <div id="main-content">
      <div class="filter-bar ra-print-hide" style="margin-bottom:12px">
        <input type="text" class="form-input" id="f-search" placeholder="搜尋姓名 / 員工編號 / Email" oninput="renderList()" style="flex:1;max-width:280px">
        <select class="form-select" id="f-dept" onchange="renderList()" style="width:160px">
          <option value="">全部部門</option>
        </select>
        <span style="flex:1"></span>
        <span id="ra-count" style="color:var(--text-dim);font-size:12px"></span>
      </div>

      <div class="table-wrap">
        <table class="ra-table">
          <thead>
            <tr>
              <th>員工</th><th>員工編號</th><th>最後部門</th><th>職位</th>
              <th>到職日</th><th>離職日</th><th>在職年資</th><th>離職原因</th>
            </tr>
          </thead>
          <tbody id="ra-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="detail-modal">
  <div class="modal" style="max-width:880px;width:96vw;max-height:92vh;overflow-y:auto">
    <div class="modal-title" id="modal-title">離職員工檔案</div>
    <div id="modal-body"></div>
    <div class="modal-actions ra-print-hide" style="justify-content:space-between;margin-top:14px">
      <button class="btn btn-ghost" onclick="closeModal()">關閉</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="window.print()">🖨️ 列印 / 存 PDF</button>
        <button class="btn btn-primary" onclick="exportExcel()">📤 匯出 Excel</button>
      </div>
    </div>
  </div>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso); if(isNaN(d.getTime())) return String(iso).slice(0,10); const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())}`; }
function fmtMoney(n){ if(n===null||n===undefined||n==='') return '—'; const v=Number(n); if(!Number.isFinite(v)) return '—'; return '$' + v.toLocaleString(); }

let allResigned = [];
let currentDetail = null;

async function waitForCurrentUser(maxMs = 5000) {
  const step = 100;
  for (let i = 0; i < maxMs / step; i++) {
    if (window.currentUser) return window.currentUser;
    await new Promise(r => setTimeout(r, step));
  }
  return null;
}

function isHRish(u) { return u && ['hr','admin','ceo','chairman'].includes(u.role); }

async function loadList() {
  const u = await waitForCurrentUser();
  if (!u) return;
  if (!isHRish(u)) {
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('gate-blocked').style.display = '';
    return;
  }
  try {
    const rows = await window.api('/api/resigned-archive');
    allResigned = rows || [];
    populateDeptFilter();
    renderList();
  } catch(e) { toast('載入失敗:'+e.message, 'error'); }
}

function populateDeptFilter() {
  const sel = document.getElementById('f-dept');
  const seen = new Set();
  const opts = [];
  for (const r of allResigned) {
    if (!r.dept_id || seen.has(r.dept_id)) continue;
    seen.add(r.dept_id);
    opts.push(`<option value="${escHtml(r.dept_id)}">${escHtml(r.dept_name || r.dept_id)}</option>`);
  }
  sel.innerHTML = '<option value="">全部部門</option>' + opts.join('');
}

function calcSeniority(hireDate, anchorIso) {
  if (!hireDate) return '—';
  const start = new Date(hireDate);
  const end   = anchorIso ? new Date(anchorIso) : new Date();
  if (!Number.isFinite(start.getTime()) || !Number.isFinite(end.getTime())) return '—';
  const ms = end - start;
  if (ms < 0) return '—';
  const days = Math.floor(ms / (1000 * 60 * 60 * 24));
  const years = Math.floor(days / 365);
  const months = Math.floor((days - years * 365) / 30);
  if (years > 0) return `${years} 年 ${months} 個月`;
  return `${months} 個月`;
}

function renderList() {
  const q = document.getElementById('f-search').value.trim().toLowerCase();
  const dept = document.getElementById('f-dept').value;
  const rows = allResigned.filter(r => {
    if (dept && r.dept_id !== dept) return false;
    if (q) {
      const txt = `${r.name||''} ${r.emp_no||''} ${r.email||''}`.toLowerCase();
      if (!txt.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('ra-count').textContent = `共 ${rows.length} 名離職員工`;
  const tbody = document.getElementById('ra-tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="padding:30px;text-align:center;color:var(--text-dim)">無離職員工資料</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr class="clickable" onclick="openDetail('${escHtml(r.id)}')">
      <td>${escHtml(r.name || '—')}</td>
      <td style="font-family:'DM Mono',monospace">${escHtml(r.emp_no || '—')}</td>
      <td>${escHtml(r.dept_name || '—')}</td>
      <td>${escHtml(r.position || '—')}</td>
      <td style="font-family:'DM Mono',monospace">${fmtDate(r.hire_date)}</td>
      <td style="font-family:'DM Mono',monospace">${fmtDate(r.resigned_at || r.updated_at)}</td>
      <td><span class="seniority-pill">${calcSeniority(r.hire_date, r.resigned_at || r.updated_at)}</span></td>
      <td style="color:var(--text-dim);font-size:12px">${escHtml(r.resigned_reason || '—')}</td>
    </tr>
  `).join('');
}

async function openDetail(id) {
  try {
    const data = await window.api(`/api/resigned-archive?id=${encodeURIComponent(id)}`);
    currentDetail = data;
    renderDetail(data);
    document.getElementById('detail-modal').classList.add('open');
  } catch(e) { toast('載入詳情失敗:'+e.message, 'error'); }
}

function closeModal(){ document.getElementById('detail-modal').classList.remove('open'); }

function renderDetail(data) {
  const e = data.employee;
  const h = data.history;
  document.getElementById('modal-title').textContent = `離職員工檔案 — ${e.name || e.id}`;

  const empSummary = `
    <div class="ra-emp-summary">
      <div><div class="label">姓名</div>${escHtml(e.name || '—')}</div>
      <div><div class="label">員工編號</div><span style="font-family:'DM Mono',monospace">${escHtml(e.emp_no || '—')}</span></div>
      <div><div class="label">Email</div>${escHtml(e.email || '—')}</div>
      <div><div class="label">電話</div>${escHtml(e.phone || '—')}</div>
      <div><div class="label">最後部門</div>${escHtml(e.dept_name || '—')}</div>
      <div><div class="label">職位</div>${escHtml(e.position || '—')}</div>
      <div><div class="label">到職日</div><span style="font-family:'DM Mono',monospace">${fmtDate(e.hire_date)}</span></div>
      <div><div class="label">離職日</div><span style="font-family:'DM Mono',monospace">${fmtDate(e.resigned_at || e.updated_at)}</span></div>
      <div><div class="label">在職年資</div><span class="seniority-pill">${calcSeniority(e.hire_date, e.resigned_at || e.updated_at)}</span></div>
      <div><div class="label">離職原因</div>${escHtml(e.resigned_reason || '—')}</div>
    </div>
  `;

  const disclaimer = `
    <div class="ra-disclaimer">
      ⚠ 顯示的部門 = 員工當前 dept_id、可能與離職時不同(員工資料變更 audit log
      待 Phase 1.7.2 補)。歷史資料範圍:從離職日倒推 6 個月
      (${escHtml(h.window.start)} 至 ${escHtml(h.window.end)})。
    </div>
  `;

  const salaryHtml = h.salary.length ? `
    <table class="ra-section-table">
      <thead><tr><th>年月</th><th>底薪</th><th>加班費</th><th>獎金</th><th>津貼</th><th>勞健保扣</th><th>實領</th><th>狀態</th></tr></thead>
      <tbody>${h.salary.map(s => `
        <tr>
          <td style="font-family:'DM Mono',monospace">${s.year}/${String(s.month).padStart(2,'0')}</td>
          <td>${fmtMoney(s.base_salary)}</td>
          <td>${fmtMoney(s.overtime_pay)}</td>
          <td>${fmtMoney(s.bonus)}</td>
          <td>${fmtMoney(s.allowance)}</td>
          <td>${fmtMoney((Number(s.deduct_labor_ins)||0) + (Number(s.deduct_health_ins)||0))}</td>
          <td style="font-weight:600">${fmtMoney(s.net_salary)}</td>
          <td>${escHtml(s.status || '—')}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : `<div class="ra-empty">無薪資資料</div>`;

  // 出勤 group by month summary
  const attMonthMap = {};
  for (const a of h.attendance) {
    const ym = (a.work_date || '').slice(0, 7);
    if (!ym) continue;
    if (!attMonthMap[ym]) attMonthMap[ym] = {
      ym, days: 0, work_hours: 0, overtime_hours: 0,
      late_count: 0, early_arrival_total: 0, early_leave_count: 0, absent_count: 0,
    };
    const m = attMonthMap[ym];
    m.days++;
    m.work_hours += Number(a.work_hours) || 0;
    m.overtime_hours += Number(a.overtime_hours) || 0;
    if (a.status === 'late')        m.late_count++;
    if (a.status === 'early_leave') m.early_leave_count++;
    if (a.status === 'absent')      m.absent_count++;
    m.early_arrival_total += Number(a.early_arrival_minutes) || 0;
  }
  const attMonths = Object.values(attMonthMap).sort((x,y) => y.ym.localeCompare(x.ym));
  const attendanceHtml = attMonths.length ? `
    <table class="ra-section-table">
      <thead><tr><th>月份</th><th>出勤天</th><th>工時</th><th>加班</th><th>遲到</th><th>早退</th><th>缺勤</th><th>早到分</th></tr></thead>
      <tbody>${attMonths.map(m => `
        <tr>
          <td style="font-family:'DM Mono',monospace">${m.ym}</td>
          <td>${m.days}</td>
          <td>${m.work_hours.toFixed(1)}h</td>
          <td>${m.overtime_hours.toFixed(1)}h</td>
          <td>${m.late_count}</td>
          <td>${m.early_leave_count}</td>
          <td>${m.absent_count}</td>
          <td>${m.early_arrival_total}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : `<div class="ra-empty">無出勤資料</div>`;

  const leaveHtml = h.leave_requests.length ? `
    <table class="ra-section-table">
      <thead><tr><th>類型</th><th>起</th><th>迄</th><th>天/時</th><th>狀態</th><th>申請日</th></tr></thead>
      <tbody>${h.leave_requests.map(l => `
        <tr>
          <td>${escHtml(l.leave_type)}</td>
          <td style="font-family:'DM Mono',monospace">${fmtDate(l.start_date || l.start_at)}</td>
          <td style="font-family:'DM Mono',monospace">${fmtDate(l.end_date || l.end_at)}</td>
          <td>${l.finalized_hours ?? l.hours ?? l.days ?? '—'}</td>
          <td>${escHtml(l.status)}</td>
          <td style="font-family:'DM Mono',monospace">${fmtDate(l.applied_at)}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : `<div class="ra-empty">無假單資料</div>`;

  const overtimeHtml = h.overtime_requests.length ? `
    <table class="ra-section-table">
      <thead><tr><th>適用月</th><th>時數</th><th>補償類型</th><th>狀態</th><th>提交日</th></tr></thead>
      <tbody>${h.overtime_requests.map(o => `
        <tr>
          <td style="font-family:'DM Mono',monospace">${o.applies_to_year}/${String(o.applies_to_month).padStart(2,'0')}</td>
          <td>${o.hours ?? '—'}h</td>
          <td>${escHtml(o.compensation_type || '—')}</td>
          <td>${escHtml(o.status || '—')}</td>
          <td style="font-family:'DM Mono',monospace">${fmtDate(o.submitted_at)}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : `<div class="ra-empty">無加班資料</div>`;

  const compHtml = h.comp_time_balance.length ? `
    <table class="ra-section-table">
      <thead><tr><th>取得日</th><th>到期日</th><th>總時數</th><th>已用</th><th>剩餘</th><th>狀態</th></tr></thead>
      <tbody>${h.comp_time_balance.map(c => `
        <tr>
          <td style="font-family:'DM Mono',monospace">${fmtDate(c.earned_at)}</td>
          <td style="font-family:'DM Mono',monospace">${fmtDate(c.expires_at)}</td>
          <td>${c.hours_total ?? '—'}h</td>
          <td>${c.hours_used ?? '—'}h</td>
          <td style="font-weight:600">${c.hours_remaining ?? '—'}h</td>
          <td>${escHtml(c.status || '—')}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : `<div class="ra-empty">無補休資料</div>`;

  const errorBanner = (data.errors && data.errors.length) ? `
    <div class="ra-disclaimer" style="background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.3);color:#F87171">
      ⚠ 部分歷史資料載入失敗:${data.errors.map(e => e.source).join(', ')}
    </div>` : '';

  document.getElementById('modal-body').innerHTML = `
    ${disclaimer}
    ${errorBanner}
    ${empSummary}
    <div class="ra-modal-section">
      <div class="ra-section-title">薪資紀錄 <span class="ra-count">${h.salary.length} 筆</span></div>
      ${salaryHtml}
    </div>
    <div class="ra-modal-section">
      <div class="ra-section-title">出勤摘要(月匯總)<span class="ra-count">${attMonths.length} 個月 / ${h.attendance.length} 筆</span></div>
      ${attendanceHtml}
    </div>
    <div class="ra-modal-section">
      <div class="ra-section-title">假單紀錄 <span class="ra-count">${h.leave_requests.length} 筆</span></div>
      ${leaveHtml}
    </div>
    <div class="ra-modal-section">
      <div class="ra-section-title">加班紀錄 <span class="ra-count">${h.overtime_requests.length} 筆</span></div>
      ${overtimeHtml}
    </div>
    <div class="ra-modal-section">
      <div class="ra-section-title">補休餘額 <span class="ra-count">${h.comp_time_balance.length} 筆</span></div>
      ${compHtml}
    </div>
  `;
}

function exportExcel() {
  if (!currentDetail) { toast('沒資料可匯出', 'error'); return; }
  const e = currentDetail.employee;
  const h = currentDetail.history;
  const XLSX = window.XLSX;
  const wb = XLSX.utils.book_new();

  // Sheet 1:員工基本
  const empSheet = [
    ['欄位', '值'],
    ['姓名', e.name || ''],
    ['員工編號', e.emp_no || ''],
    ['Email', e.email || ''],
    ['電話', e.phone || ''],
    ['最後部門', e.dept_name || ''],
    ['職位', e.position || ''],
    ['到職日', e.hire_date || ''],
    ['離職日', e.resigned_at || e.updated_at || ''],
    ['離職原因', e.resigned_reason || ''],
    ['歷史範圍 起', h.window.start],
    ['歷史範圍 迄', h.window.end],
  ];
  const ws1 = XLSX.utils.aoa_to_sheet(empSheet);
  ws1['!cols'] = [{ wch: 16 }, { wch: 40 }];
  XLSX.utils.book_append_sheet(wb, ws1, '員工基本');

  // Sheet 2:薪資
  const salHead = ['年', '月', '底薪', '加班費', '獎金', '津貼', '應領', '勞保扣', '健保扣', '稅扣', '實領', '狀態', '發薪日'];
  const salRows = h.salary.map(s => [
    s.year, s.month, s.base_salary, s.overtime_pay, s.bonus, s.allowance,
    s.gross_salary, s.deduct_labor_ins, s.deduct_health_ins, s.deduct_tax,
    s.net_salary, s.status, s.pay_date,
  ]);
  const ws2 = XLSX.utils.aoa_to_sheet([salHead, ...salRows]);
  XLSX.utils.book_append_sheet(wb, ws2, '薪資');

  // Sheet 3:出勤
  const attHead = ['日期', '段次', 'clock_in', 'clock_out', '工時', '加班時數', '遲到分', '早到分', '早退分', '狀態', '異常'];
  const attRows = h.attendance.map(a => [
    a.work_date, a.segment_no, a.clock_in, a.clock_out, a.work_hours, a.overtime_hours,
    a.late_minutes, a.early_arrival_minutes, a.early_leave_minutes, a.status,
    a.is_anomaly ? 'Y' : '',
  ]);
  const ws3 = XLSX.utils.aoa_to_sheet([attHead, ...attRows]);
  XLSX.utils.book_append_sheet(wb, ws3, '出勤');

  // Sheet 4:假單
  const lvHead = ['假別', '起', '迄', '天/時', '狀態', '證明狀態', '申請日'];
  const lvRows = h.leave_requests.map(l => [
    l.leave_type, l.start_date || l.start_at, l.end_date || l.end_at,
    l.finalized_hours ?? l.hours ?? l.days, l.status, l.proof_status, l.applied_at,
  ]);
  const ws4 = XLSX.utils.aoa_to_sheet([lvHead, ...lvRows]);
  XLSX.utils.book_append_sheet(wb, ws4, '假單');

  // Sheet 5:加班
  const otHead = ['年', '月', '時數', '補償類型', '狀態', '提交日'];
  const otRows = h.overtime_requests.map(o => [
    o.applies_to_year, o.applies_to_month, o.hours, o.compensation_type, o.status, o.submitted_at,
  ]);
  const ws5 = XLSX.utils.aoa_to_sheet([otHead, ...otRows]);
  XLSX.utils.book_append_sheet(wb, ws5, '加班');

  // Sheet 6:補休
  const cpHead = ['取得日', '到期日', '總時數', '已用', '剩餘', '狀態'];
  const cpRows = h.comp_time_balance.map(c => [
    c.earned_at, c.expires_at, c.hours_total, c.hours_used, c.hours_remaining, c.status,
  ]);
  const ws6 = XLSX.utils.aoa_to_sheet([cpHead, ...cpRows]);
  XLSX.utils.book_append_sheet(wb, ws6, '補休');

  const fname = `離職員工檔案_${e.name || e.id}_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.xlsx`;
  XLSX.writeFile(wb, fname);
  toast('已匯出 Excel');
}

loadList();
</script>
