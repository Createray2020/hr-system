<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>總覽 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .welcome{margin-bottom:28px}
  .welcome-title{font-size:22px;font-weight:700;margin-bottom:4px}
  .welcome-sub{font-size:14px;color:var(--text-dim)}
  .quick-links{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
  .quick-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;cursor:pointer;transition:all .2s;text-decoration:none;display:block}
  .quick-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
  .quick-icon{font-size:28px;margin-bottom:10px}
  .quick-label{font-size:14px;font-weight:600;margin-bottom:2px}
  .quick-sub{font-size:12px;color:var(--text-dim)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
  .section-title{font-size:13px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px}
  .pending-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(42,48,72,.5)}
  .pending-item:last-child{border-bottom:none}
  .pending-name{font-weight:500;font-size:14px}
  .pending-meta{font-size:12px;color:var(--text-dim);margin-top:1px}
  .pending-action{display:flex;gap:6px}
  .today-list{list-style:none}
  .today-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(42,48,72,.4);font-size:13px}
  .today-item:last-child{border-bottom:none}
  .today-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .today-text{flex:1}
  .today-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim)}
  .birthday-item{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px;border-bottom:1px solid rgba(42,48,72,.4)}
  .birthday-item:last-child{border-bottom:none}
  /* Mini Calendar */
  .mini-cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .mini-cal-title{font-size:14px;font-weight:600}
  .mini-cal-link{font-size:12px;color:var(--accent);text-decoration:none}
  .mini-cal-link:hover{text-decoration:underline}
  .mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .mini-wday{text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--text-dim);padding:2px 0;margin-bottom:4px}
  .mini-wday.sun{color:#f87171}.mini-wday.sat{color:#60A5FA}
  .mini-day{text-align:center;font-size:11px;padding:3px 2px;border-radius:4px;cursor:pointer;position:relative;line-height:1.3}
  .mini-day:hover{background:rgba(255,255,255,.06)}
  .mini-day.today{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto}
  .mini-day.has-events::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--accent2);margin:1px auto 0}
  .mini-day.today::after{display:none}
  .mini-day.other-month{color:var(--text-dim);opacity:.35}
  .mini-day.holiday{color:#f87171}
</style>
</head>
<body data-page="dashboard">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">

    <div class="welcome">
      <div class="welcome-title" id="welcome-msg">早安 👋</div>
      <div class="welcome-sub" id="welcome-date">載入中…</div>
    </div>

    <!-- Quick links -->
    <div class="quick-links">
      <a class="quick-card" href="/leave.html">
        <div class="quick-icon">📋</div>
        <div class="quick-label">請假審批</div>
        <div class="quick-sub"><span id="ql-pending">—</span> 筆待審核</div>
      </a>
      <a class="quick-card" href="/attendance.html">
        <div class="quick-icon">⏱️</div>
        <div class="quick-label">出勤管理</div>
        <div class="quick-sub">打卡 & 出勤紀錄</div>
      </a>
      <a class="quick-card" href="/employees.html">
        <div class="quick-icon">👥</div>
        <div class="quick-label">員工資料</div>
        <div class="quick-sub"><span id="ql-emp">—</span> 位在職員工</div>
      </a>
      <a class="quick-card" href="/salary.html">
        <div class="quick-icon">💰</div>
        <div class="quick-label">薪資管理</div>
        <div class="quick-sub"><span id="ql-salary-draft">—</span> 份待確認</div>
      </a>
    </div>

    <!-- Stats -->
    <div class="stats-row" style="margin-bottom:24px">
      <div class="stat-card blue"><div class="stat-label">在職員工</div><div class="stat-value" id="st-emp">—</div><div class="stat-hint">人</div></div>
      <div class="stat-card orange"><div class="stat-label">待審假單</div><div class="stat-value" id="st-leave">—</div><div class="stat-hint">筆</div></div>
      <div class="stat-card red"><div class="stat-label">今日缺勤</div><div class="stat-value" id="st-absent">—</div><div class="stat-hint">人</div></div>
      <div class="stat-card purple"><div class="stat-label">本月薪資</div><div class="stat-value" id="st-salary" style="font-size:20px">—</div><div class="stat-hint">實發總額</div></div>
    </div>

    <div class="grid-2">
      <!-- 待審假單 -->
      <div class="card">
        <div class="section-title">待審假單</div>
        <div id="pending-leaves"><div style="color:var(--text-dim);font-size:13px">載入中…</div></div>
      </div>

      <!-- 今日出勤異常 -->
      <div class="card">
        <div class="section-title">今日出勤狀況</div>
        <ul class="today-list" id="today-attendance"><li style="color:var(--text-dim);font-size:13px">載入中…</li></ul>
      </div>
    </div>

    <div class="grid-2">
      <!-- 本月薪資概況 -->
      <div class="card">
        <div class="section-title">本月薪資概況</div>
        <div id="salary-overview"><div style="color:var(--text-dim);font-size:13px">載入中…</div></div>
      </div>

      <!-- 近期生日 -->
      <div class="card">
        <div class="section-title">近期壽星 🎂</div>
        <div id="birthdays"><div style="color:var(--text-dim);font-size:13px">載入中…</div></div>
      </div>
    </div>

    <!-- 最新公告 -->
    <div class="card" style="margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="section-title" style="margin-bottom:0">最新公告</div>
        <a href="/announcements.html" style="font-size:12px;color:var(--accent);text-decoration:none">查看全部 →</a>
      </div>
      <div id="latest-announcements"><div style="color:var(--text-dim);font-size:13px">載入中…</div></div>
    </div>

    <!-- 迷你行事曆 -->
    <div class="card" style="margin-bottom:20px">
      <div class="mini-cal-hdr">
        <div class="section-title" style="margin-bottom:0">本月行事曆</div>
        <a class="mini-cal-link" href="/calendar.html">查看完整行事曆 →</a>
      </div>
      <div id="mini-calendar"><div style="color:var(--text-dim);font-size:13px">載入中…</div></div>
    </div>

  </main>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}
const LEAVE_TYPES  = {annual:'特休假',sick:'病假',personal:'事假',maternity:'產假',funeral:'喪假',marriage:'婚假'};

window.onload = async () => {
  await new Promise(r => setTimeout(r, 650));
  setWelcome();
  try {
    await Promise.all([loadDashboard(), loadMiniCalendar(), loadLatestAnnouncements()]);
  } catch(e) { toast('載入失敗：'+e.message,'error'); }
};

function setWelcome() {
  const now  = new Date();
  const hour = now.getHours();
  const greet = hour < 12 ? '早安' : hour < 18 ? '午安' : '晚安';
  const name  = window.currentUser?.name || '您';
  document.getElementById('welcome-msg').textContent  = `${greet}，${name} 👋`;
  document.getElementById('welcome-date').textContent =
    now.toLocaleDateString('zh-TW',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

async function loadDashboard() {
  const now = new Date();
  const ym  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const today = now.toISOString().split('T')[0];

  const [leaveStats, employees, salaryData, todayAtt] = await Promise.all([
    api('/api/leaves?stats=true'),
    api('/api/employees?status=active'),
    api(`/api/salary?year=${now.getFullYear()}&month=${now.getMonth()+1}`).catch(()=>[]),
    api(`/api/attendance?month=${ym}`).catch(()=>[]),
  ]);

  // Stats bar
  document.getElementById('st-emp').textContent   = employees.length;
  document.getElementById('st-leave').textContent = leaveStats.pending;
  document.getElementById('ql-pending').textContent = leaveStats.pending;
  document.getElementById('ql-emp').textContent     = employees.length;

  const todayAbsent = todayAtt.filter(a => a.work_date === today && a.status === 'absent');
  document.getElementById('st-absent').textContent = todayAbsent.length;

  const netTotal = salaryData.reduce((s,r)=>s+(r.net_salary||0),0);
  const draftCount = salaryData.filter(r=>r.status==='draft').length;
  document.getElementById('st-salary').textContent = netTotal > 0 ? '$'+netTotal.toLocaleString() : '—';
  document.getElementById('ql-salary-draft').textContent = draftCount;

  // 待審假單
  const pendingLeaves = await api('/api/leaves?status=pending');
  const plEl = document.getElementById('pending-leaves');
  if (!pendingLeaves.length) {
    plEl.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:8px 0">目前沒有待審假單 ✓</div>';
  } else {
    plEl.innerHTML = pendingLeaves.slice(0,5).map(r=>`
      <div class="pending-item">
        <div>
          <div class="pending-name">${r.emp_name} <span style="font-size:12px;color:var(--text-dim)">— ${LEAVE_TYPES[r.leave_type]||r.leave_type} ${r.days}天</span></div>
          <div class="pending-meta">${r.start_date} ～ ${r.end_date}</div>
        </div>
        <div class="pending-action">
          <button class="btn btn-approve btn-sm" onclick="quickLeave('${r.id}','approved')">核准</button>
          <button class="btn btn-reject btn-sm"  onclick="quickLeave('${r.id}','rejected')">退回</button>
        </div>
      </div>`).join('');
  }

  // 今日出勤
  const attEl = document.getElementById('today-attendance');
  const todayRecs = todayAtt.filter(a => a.work_date === today);
  if (!todayRecs.length) {
    attEl.innerHTML = '<li style="color:var(--text-dim);font-size:13px">暫無今日出勤資料</li>';
  } else {
    attEl.innerHTML = todayRecs.slice(0,6).map(a => {
      const emp = employees.find(e=>e.id===a.employee_id);
      const color = a.status==='normal'?'var(--green)':a.status==='late'?'var(--orange)':'var(--red)';
      const label = {normal:'正常',late:'遲到',absent:'缺勤',leave:'請假'}[a.status]||a.status;
      return `<li class="today-item">
        <span class="today-dot" style="background:${color}"></span>
        <span class="today-text">${emp?.name||a.employee_id}</span>
        <span style="font-size:12px;color:${color}">${label}</span>
        <span class="today-time">${a.clock_in?a.clock_in.slice(11,16):'—'}</span>
      </li>`;
    }).join('');
  }

  // 薪資概況
  const salEl = document.getElementById('salary-overview');
  if (!salaryData.length) {
    salEl.innerHTML = `<div style="color:var(--text-dim);font-size:13px">本月尚無薪資資料<br><a href="/salary.html" style="color:var(--accent);font-size:13px">前往批次產生 →</a></div>`;
  } else {
    const gross = salaryData.reduce((s,r)=>s+(r.gross_salary||0),0);
    const net   = salaryData.reduce((s,r)=>s+(r.net_salary||0),0);
    const paid  = salaryData.filter(r=>r.status==='paid').length;
    const confirmed = salaryData.filter(r=>r.status==='confirmed').length;
    const draft = salaryData.filter(r=>r.status==='draft').length;
    salEl.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
        <div><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">應發總額</div><div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--text)">$${gross.toLocaleString()}</div></div>
        <div><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">實發總額</div><div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--accent2)">$${net.toLocaleString()}</div></div>
      </div>
      <div style="display:flex;gap:12px;font-size:13px">
        <span style="color:var(--text-dim)">草稿 <b style="color:var(--text)">${draft}</b></span>
        <span style="color:var(--text-dim)">已確認 <b style="color:var(--orange)">${confirmed}</b></span>
        <span style="color:var(--text-dim)">已發放 <b style="color:var(--green)">${paid}</b></span>
      </div>`;
  }

  // 近期生日（本月 & 下月）
  const bdEl = document.getElementById('birthdays');
  const nowMonth = now.getMonth() + 1;
  const upcoming = employees.filter(e => {
    if (!e.birth_date) return false;
    const bMonth = parseInt(e.birth_date.slice(5,7));
    return bMonth === nowMonth || bMonth === (nowMonth%12)+1;
  }).sort((a,b) => {
    const am = parseInt(a.birth_date.slice(5,7)), ad = parseInt(a.birth_date.slice(8,10));
    const bm = parseInt(b.birth_date.slice(5,7)), bd = parseInt(b.birth_date.slice(8,10));
    return am !== bm ? am - bm : ad - bd;
  });

  if (!upcoming.length) {
    bdEl.innerHTML = '<div style="color:var(--text-dim);font-size:13px">近期無壽星</div>';
  } else {
    bdEl.innerHTML = upcoming.slice(0,5).map(e => `
      <div class="birthday-item">
        <div class="avatar" style="width:28px;height:28px;font-size:11px">${e.avatar||e.name[0]}</div>
        <div style="flex:1">
          <div style="font-weight:500">${e.name}</div>
          <div style="font-size:11px;color:var(--text-dim)">${e.dept}</div>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--purple)">${e.birth_date?.slice(5)||'—'}</div>
      </div>`).join('');
  }
}

async function loadMiniCalendar() {
  const now   = new Date();
  const year  = now.getFullYear();
  const month = now.getMonth();
  const today = now.toISOString().slice(0, 10);

  // Fetch holidays for current year (light request, cached by browser)
  let holidays = new Set();
  try {
    const hols = await window.api(`/api/calendar?_resource=holidays&year=${year}`);
    (hols || []).forEach(h => holidays.add(h.date));
  } catch { /* optional */ }

  // Fetch approved leaves this month
  let leaveDates = new Set();
  try {
    const ym    = `${year}-${String(month+1).padStart(2,'0')}`;
    const leaves = await window.api(`/api/leaves?status=approved`).catch(()=>[]);
    const monthStart = `${ym}-01`;
    const monthEnd   = new Date(year, month+1, 0).toISOString().slice(0,10);
    (leaves || []).forEach(r => {
      if (r.end_date >= monthStart && r.start_date <= monthEnd) {
        let d = new Date(r.start_date + 'T00:00:00');
        const end = new Date(r.end_date + 'T00:00:00');
        while (d <= end) {
          leaveDates.add(d.toISOString().slice(0,10));
          d.setDate(d.getDate()+1);
        }
      }
    });
  } catch { /* optional */ }

  // Build grid
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month + 1, 0);
  const startWday = firstDay.getDay();

  const WDAYS = ['日','一','二','三','四','五','六'];
  let html = '<div class="mini-cal-grid">';
  html += WDAYS.map((w,i) => `<div class="mini-wday ${i===0?'sun':i===6?'sat':''}">${w}</div>`).join('');

  // Padding
  for (let i = 0; i < startWday; i++) {
    const d = new Date(year, month, -startWday + i + 1);
    html += `<div class="mini-day other-month">${d.getDate()}</div>`;
  }
  // Days
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dt    = new Date(year, month, d).toISOString().slice(0, 10);
    const isT   = dt === today;
    const isH   = holidays.has(dt);
    const hasEv = leaveDates.has(dt);
    const cls   = [isT?'today':'',isH?'holiday':'',hasEv?'has-events':''].filter(Boolean).join(' ');
    html += `<a class="mini-day ${cls}" href="/calendar.html" title="${dt}">${d}</a>`;
  }
  // Trailing padding
  const trail = (7 - ((startWday + lastDay.getDate()) % 7)) % 7;
  for (let i = 1; i <= trail; i++) html += `<div class="mini-day other-month">${i}</div>`;

  html += '</div>';
  document.getElementById('mini-calendar').innerHTML = html;
}

async function loadLatestAnnouncements() {
  const el = document.getElementById('latest-announcements');
  try {
    const role = window.currentUser?.role || '';
    const data = await api(`/api/announcements${role ? '?role='+role : ''}`);
    const latest = data.slice(0, 3);
    if (!latest.length) {
      el.innerHTML = '<div style="color:var(--text-dim);font-size:13px">目前沒有公告</div>';
      return;
    }
    const PRIO_COLOR = { urgent:'#F87171', high:'#FB923C', normal:'#5B8DEF', low:'#6B7280' };
    el.innerHTML = latest.map(a => `
      <a href="/announcements.html?id=${a.id}" style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid rgba(42,48,72,.5);text-decoration:none;color:inherit">
        <div style="width:3px;height:36px;border-radius:2px;background:${PRIO_COLOR[a.priority]||'#5B8DEF'};flex-shrink:0;margin-top:2px"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.is_pinned ? '📌 ' : ''}${a.title}</div>
          <div style="font-size:11px;color:var(--text-dim)">${a.author?.name || '系統'} · ${a.published_at ? new Date(a.published_at).toLocaleDateString('zh-TW') : ''}</div>
        </div>
      </a>`).join('');
  } catch(e) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:13px">無法載入公告</div>';
  }
}

async function quickLeave(id, status) {
  try {
    await api(`/api/leaves?id=${id}`, { method:'PUT', body: JSON.stringify({ status, handler_note:'' }) });
    toast(status==='approved'?'✅ 已核准':'❌ 已退回', status==='approved'?'success':'error');
    await loadDashboard();
  } catch(e) { toast('操作失敗','error'); }
}
</script>
