<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>請假審核 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .pill{padding:3px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace}
  /* Phase 1.4: 對齊 utils.js stageBadgeClass */
  .badge-pending{background:rgba(251,191,36,.15);color:#FBBF24}
  .badge-approved{background:rgba(74,222,128,.15);color:#4ADE80}
  .badge-archived{background:rgba(74,222,128,.10);color:#86efac}
  .badge-rejected{background:rgba(248,113,113,.12);color:#F87171}
  .badge-cancelled{background:rgba(107,114,128,.15);color:#9CA3AF}
  /* Phase 1.6:terminated(HR 終止 expired row)灰底紅邊、跟 rejected/archived 區分 */
  .badge-terminated{background:rgba(107,114,128,.18);color:#F87171;border:1px solid rgba(248,113,113,.35)}
  .l-row{display:grid;grid-template-columns:140px 80px 1fr 70px 110px 170px;gap:10px;padding:10px 12px;border-bottom:0.5px solid rgba(255,255,255,.06);align-items:center;font-size:13px}
  .l-row.head{font-weight:600;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:11px;background:rgba(0,0,0,.15)}
  .filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .approval-tabs{display:flex;gap:8px;margin-bottom:12px;border-bottom:1px solid var(--border)}
  .approval-tabs button{background:none;border:none;padding:10px 16px;cursor:pointer;font-size:14px;color:var(--text-dim);border-bottom:2px solid transparent}
  .approval-tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .live-recalc{background:rgba(91,141,239,.1);border:1px solid rgba(91,141,239,.4);color:#7FBBFF;padding:8px 12px;border-radius:6px;font-size:13px;margin:10px 0}
  .late-warn{background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.3);color:#FB923C;padding:8px 12px;border-radius:6px;font-size:13px;margin:8px 0}
  .proof-info{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#FBBF24;padding:8px 12px;border-radius:6px;font-size:13px;margin:8px 0}
  .audit-row{display:grid;grid-template-columns:90px 1fr;gap:6px 12px;font-size:12px;line-height:1.6;background:rgba(0,0,0,.15);padding:8px 12px;border-radius:6px;margin:8px 0}
  .audit-label{color:var(--text-dim);font-family:'DM Mono',monospace}
  .mini-tag{padding:2px 6px;border-radius:3px;font-size:10px;font-family:'DM Mono',monospace;margin-left:4px}
  .mini-tag-late{background:rgba(251,146,60,.15);color:#FB923C}
  .mini-tag-proof{background:rgba(251,191,36,.15);color:#FBBF24}
  /* Phase 1.5 升級:proof_status=expired(法定假未補、HR 待處理) */
  .mini-tag-expired{background:rgba(248,113,113,.12);color:#F87171}
  .override-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:#FB923C;cursor:pointer;margin:6px 0}
</style>
</head>
<body data-page="leave-admin">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">請假審核</div>
        <div class="page-sub">主管 / HR 審核員工假單</div>
      </div>
    </div>

    <div id="gate-blocked" class="empty-state" style="display:none">
      <div class="icon">🔒</div><div>無權限存取此頁面</div>
    </div>

    <div id="main-content">
      <div class="approval-tabs">
        <button type="button" data-tab="my_pending" class="active" onclick="onTabClick('my_pending')">待我處理</button>
        <button type="button" data-tab="done" onclick="onTabClick('done')">已完成</button>
        <button type="button" data-tab="all" onclick="onTabClick('all')">全部</button>
      </div>
      <div class="filter-bar">
        <select class="form-select" id="f-status" onchange="render()" style="width:170px">
          <option value="my_pending" selected>待我審</option>
          <option value="all_pending">全部 pending</option>
          <option value="approved">已核准待歸檔</option>
          <option value="archived">已歸檔</option>
          <option value="rejected">已退回</option>
          <option value="cancelled">已撤回</option>
          <option value="expired">證明過期(待 HR 處理)</option>
          <option value="terminated">已終結(HR 終止)</option>
          <option value="history">歷史(歸檔/退回/撤回/終結)</option>
          <option value="">全部</option>
        </select>
        <select class="form-select" id="f-type" onchange="render()" style="width:140px">
          <option value="">全部類型</option>
        </select>
        <input type="text" class="form-input" id="f-search" placeholder="搜尋員工姓名 / ID" oninput="render()" style="flex:1;max-width:240px">
        <button class="btn btn-ghost" onclick="load()">↻ 重新載入</button>
      </div>

      <div class="table-wrap">
        <div class="l-row head">
          <div>申請人</div><div>類型</div><div>時間</div><div>申請時數</div><div>狀態</div><div>操作</div>
        </div>
        <div id="list"></div>
      </div>
    </div>
  </main>
</div>

<!-- 詳細抽屜 -->
<div class="modal-bg" id="detail-modal">
  <div class="modal" style="max-width:560px;width:95vw">
    <div class="modal-title" id="modal-title">假單詳情</div>
    <div id="modal-body" style="font-size:13px"></div>

    <div class="form-row" id="reject-row" style="display:none;margin-top:10px">
      <label class="form-label">退回原因 (必填)</label>
      <input type="text" class="form-input" id="f-reject-reason" placeholder="例:時間衝突已有 X 員工請假">
    </div>

    <!-- Override 區塊:late_application=true 時顯示 -->
    <div class="form-row" id="override-row" style="display:none;margin-top:10px">
      <label class="override-toggle">
        <input type="checkbox" id="f-override-check" onchange="onOverrideToggle()">
        <span>📌 同意特殊申請(override)</span>
      </label>
      <input type="text" class="form-input" id="f-override-reason" placeholder="例:員工有急事、主管確認情況核准" style="display:none;margin-top:4px">
    </div>

    <!-- P3.2 Admin Edit 區塊:HR / admin / CEO / chairman 才能展開 -->
    <div class="form-row" id="admin-edit-row" style="display:none;margin-top:10px;padding:10px;background:rgba(251,146,60,.04);border:1px solid rgba(251,146,60,.2);border-radius:6px">
      <label class="form-label" style="color:#FB923C">⚙ 進階編輯(HR / 管理層)</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px">
        <div>
          <label class="form-label" style="font-size:11px;display:block;margin-bottom:2px">假別</label>
          <select class="form-select" id="ae-leave-type" style="width:100%"></select>
        </div>
        <div>
          <label class="form-label" style="font-size:11px;display:block;margin-bottom:2px">證明狀態</label>
          <select class="form-select" id="ae-proof-status" style="width:100%">
            <option value="">(不變更)</option>
            <option value="not_required">not_required(無需證明)</option>
            <option value="required">required(待補)</option>
            <option value="submitted">submitted(已交)</option>
            <option value="expired">expired(已過期)</option>
            <option value="converted_to_personal">converted_to_personal</option>
          </select>
        </div>
        <div>
          <label class="form-label" style="font-size:11px;display:block;margin-bottom:2px">證明期限</label>
          <input type="datetime-local" class="form-input" id="ae-proof-due-at" style="width:100%">
        </div>
      </div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:8px">
        ℹ 只送有變更的欄位、所有變更會記錄到 handler_note (audit)。<br>
        ℹ 不開放改 status / 時間 / 員工(請走核准 / 退回 / 撤回 / 終止 / 代提 既有 flow)。
      </div>
    </div>

    <div class="modal-actions" style="justify-content:space-between;margin-top:14px">
      <button class="btn btn-ghost" onclick="closeModal()">關閉</button>
      <div style="display:flex;gap:8px" id="action-buttons"></div>
    </div>
  </div>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDt(iso){ if(!iso) return '—'; const d=new Date(iso); const pad=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }

// 假別中文名統一從 /api/leaves?_resource=leave_types 動態拿(見 public/js/utils.js)
// 不再 hardcode、避免新增假別(如 menstrual 生理假)時 UI 顯示英文 code

let allLeaves = [];
let empMap = {};
let currentLeave = null;

// 頂部 Tab 主分類（待我處理 / 已完成 / 全部）
// status select 變次級細篩、依 currentTab 動態調整 option list
let currentTab = 'my_pending';
const ALL_STATUS_OPTIONS = [
  { value: 'my_pending',   label: '待我審' },
  { value: 'all_pending',  label: '全部 pending' },
  { value: 'approved',     label: '已核准待歸檔' },
  { value: 'archived',     label: '已歸檔' },
  { value: 'rejected',     label: '已退回' },
  { value: 'cancelled',    label: '已撤回' },
  { value: 'expired',      label: '證明過期(待 HR 處理)' },
  { value: 'terminated',   label: '已終結(HR 終止)' },
  { value: 'history',      label: '歷史(歸檔/退回/撤回/終結)' },
  { value: '',             label: '全部' },
];
const DONE_STATUS_VALUES = ['history', 'approved', 'archived', 'rejected', 'cancelled', 'terminated'];

function applyTabToStatusSelect(tab) {
  const sel = document.getElementById('f-status');
  if (!sel) return;
  let opts, defaultVal, disabled;
  if (tab === 'my_pending') {
    opts = ALL_STATUS_OPTIONS.filter(o => o.value === 'my_pending');
    defaultVal = 'my_pending';
    disabled = true;
  } else if (tab === 'done') {
    opts = ALL_STATUS_OPTIONS.filter(o => DONE_STATUS_VALUES.includes(o.value));
    defaultVal = 'history';
    disabled = false;
  } else {
    opts = ALL_STATUS_OPTIONS.slice();
    defaultVal = '';
    disabled = false;
  }
  sel.innerHTML = opts.map(o =>
    `<option value="${o.value}"${o.value === defaultVal ? ' selected' : ''}>${o.label}</option>`
  ).join('');
  sel.disabled = disabled;
}

function onTabClick(tab) {
  if (currentTab === tab) return;
  currentTab = tab;
  document.querySelectorAll('.approval-tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  applyTabToStatusSelect(tab);
  render();
}

// caller role helpers
const ELEVATED_ROLES = ['hr', 'admin', 'ceo', 'chairman'];
function isElevated(u) { return u && ELEVATED_ROLES.includes(u.role); }
function isHR(u) { return u && (u.role === 'hr' || u.role === 'admin'); }
function isCeoOrChairman(u) { return u && (u.role === 'ceo' || u.role === 'chairman'); }
function normalizeStage(status) { return status === 'pending' ? 'pending_mgr' : status; }

// Phase 1.4.5 stop-gap:純主管(is_manager=true 且非 elevated)只看本部門員工的假單。
// 沿用 calendar.html L188-246 pattern。
let myDeptEmpIds = null;
async function waitForCurrentUser(maxMs = 5000) {
  const step = 100;
  for (let i = 0; i < maxMs / step; i++) {
    if (window.currentUser) return window.currentUser;
    await new Promise(r => setTimeout(r, step));
  }
  return null;
}
async function loadDeptScope() {
  const u = await waitForCurrentUser();
  if (!u) { myDeptEmpIds = new Set(); return; }
  if (isElevated(u)) { myDeptEmpIds = null; return; } // HR / CEO / chairman / admin 看全公司
  const deptId = u.dept_id;
  if (!deptId) { myDeptEmpIds = new Set(); return; }
  try {
    const emps = await window.api('/api/employees?status=active');
    myDeptEmpIds = new Set((emps || []).filter(e => e.dept_id === deptId).map(e => e.id));
  } catch (_) {
    myDeptEmpIds = new Set();
  }
}
function inScope(empId) {
  return myDeptEmpIds === null || myDeptEmpIds.has(empId);
}

async function load(retries = 0) {
  if (!window.api || !window.currentUser) {
    if (retries < 25) return setTimeout(()=>load(retries+1), 200);
    return;
  }
  const u = window.currentUser;
  const allowed = u && (u.is_manager === true || isElevated(u));
  if (u && !allowed) {
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('gate-blocked').style.display = '';
    return;
  }

  try {
    // 載入假別中文名 + 完整 row
    await window.HR_Utils?.loadLeaveTypeLabels?.();
    populateTypeFilter();
    applyTabToStatusSelect(currentTab);

    // Phase 1.4.5:純主管限本部門 employee id Set、HR+ 設 null(不過濾)
    await loadDeptScope();

    // 用 legacy endpoint 拿全部假單(回的 row 已含 emp 資料)
    const rows = await api('/api/leaves');
    allLeaves = rows || [];
    empMap = {};
    for (const l of allLeaves) {
      if (l.emp_name) empMap[l.employee_id] = { name: l.emp_name, dept: l.dept, dept_name: l.dept_name };
    }
    render();
  } catch(e) { toast('載入失敗:'+e.message, 'error'); }
}

function populateTypeFilter() {
  const sel = document.getElementById('f-type');
  const types = window.HR_Utils?.leaveTypes?.() || [];
  if (!types.length) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">全部類型</option>'
                + types.map(t => `<option value="${escHtml(t.code)}">${escHtml(t.name_zh)}</option>`).join('');
  if (cur) sel.value = cur;
}

// 「待我審」依 caller role 推導要 match 哪些 status
function myPendingStatuses(u) {
  if (isHR(u))           return ['pending_mgr', 'pending_ceo', 'pending'];
  if (isCeoOrChairman(u))return ['pending_ceo', 'pending_mgr', 'pending'];
  // 一般主管:只批 pending_mgr(legacy 'pending' 也視為)
  return ['pending_mgr', 'pending'];
}

function statusMatches(filter, l, u) {
  if (!filter) return true;
  if (filter === 'my_pending')   return myPendingStatuses(u).includes(l.status);
  if (filter === 'all_pending')  return ['pending', 'pending_mgr', 'pending_ceo'].includes(l.status);
  // Phase 1.6:history 群組含 terminated(已終結也是最終狀態)
  if (filter === 'history')      return ['archived', 'rejected', 'cancelled', 'terminated'].includes(l.status);
  // Phase 1.5 升級 + 1.6:expired filter 限 status pending_*(防 HR 終止後仍出現在「待處理」)
  if (filter === 'expired')      return l.proof_status === 'expired'
                                     && ['pending', 'pending_mgr', 'pending_ceo'].includes(l.status);
  return l.status === filter;
}

function render() {
  const u = window.currentUser;
  const status = document.getElementById('f-status').value;
  const type   = document.getElementById('f-type').value;
  const q      = document.getElementById('f-search').value.trim().toLowerCase();

  const rows = allLeaves.filter(l => {
    // Phase 1.4.5 stop-gap:純主管只看本部門。HR / CEO / chairman / admin inScope 永遠 true。
    if (!inScope(l.employee_id)) return false;
    if (!statusMatches(status, l, u)) return false;
    if (type && l.leave_type !== type) return false;
    if (q) {
      const txt = `${l.emp_name||''} ${l.employee_id||''}`.toLowerCase();
      if (!txt.includes(q)) return false;
    }
    return true;
  });

  const wrap = document.getElementById('list');
  if (!rows.length) {
    wrap.innerHTML = `<div style="padding:30px;text-align:center;color:var(--text-dim);font-size:13px">無假單</div>`;
    return;
  }
  const SU = window.HR_Utils;
  wrap.innerHTML = rows.map(l => {
    const tName = SU.leaveTypeLabel(l.leave_type);
    const hours = l.finalized_hours ?? l.hours ?? (l.days ? l.days * 8 : '—');
    const lateTag = l.late_application ? `<span class="mini-tag mini-tag-late">⚠</span>` : '';
    // Phase 1.5 升級:expired tag 紅色、與 required 黃 ⏳ tag 區分
    const proofTag = l.proof_status === 'required'  ? `<span class="mini-tag mini-tag-proof">⏳證明</span>`
                   : l.proof_status === 'expired'   ? `<span class="mini-tag mini-tag-expired">證明過期</span>` : '';
    // HR + status='approved' → 列表直接顯示「📦 歸檔」按鈕
    const archiveBtn = (isHR(u) && l.status === 'approved')
      ? `<button class="btn btn-primary btn-sm" onclick="quickArchive('${escHtml(l.id)}')">📦 歸檔</button>` : '';
    return `
      <div class="l-row">
        <div>${escHtml(l.emp_name || l.employee_id)}<div style="font-size:11px;color:var(--text-dim)">${escHtml(l.dept_name || l.dept || '')}</div></div>
        <div>${escHtml(tName)}${lateTag}${proofTag}</div>
        <div style="font-size:12px">${fmtDt(l.start_at || (l.start_date+'T00:00:00+08:00'))} ~ ${fmtDt(l.end_at || (l.end_date+'T00:00:00+08:00'))}</div>
        <div style="font-family:'DM Mono',monospace">${hours}h</div>
        <div><span class="pill ${SU.stageBadgeClass(l.status)}">${escHtml(SU.stageLabel(l.status))}</span></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="openDetail('${escHtml(l.id)}')">查看 / 審核</button>
          ${archiveBtn}
        </div>
      </div>
    `;
  }).join('');
}

async function quickArchive(id) {
  if (!confirm('確定歸檔此假單?')) return;
  try {
    const r = await api(`/api/leaves/${encodeURIComponent(id)}`, {
      method: 'PUT', body: JSON.stringify({ action: 'archive' }),
    });
    if (r && r.ok === false) { toast('歸檔失敗:' + (r.reason || r.error || 'unknown'), 'error'); return; }
    toast('已歸檔');
    await load();
  } catch(e) { toast('歸檔失敗:' + e.message, 'error'); }
}

async function openDetail(id) {
  currentLeave = allLeaves.find(l => l.id === id);
  if (!currentLeave) return;
  const l = currentLeave;
  const u = window.currentUser;
  const SU = window.HR_Utils;

  // P3.2:populate admin_edit leave_type dropdown + reset values(每次開 modal 都 refresh)
  const aeLeaveTypeSelect = document.getElementById('ae-leave-type');
  if (aeLeaveTypeSelect) {
    const leaveTypes = window.HR_Utils?.leaveTypes?.() || [];
    aeLeaveTypeSelect.innerHTML = '<option value="">(不變更)</option>'
      + leaveTypes.map(t => `<option value="${escHtml(t.code)}">${escHtml(t.name_zh)} (${escHtml(t.code)})</option>`).join('');
  }
  document.getElementById('admin-edit-row').style.display = 'none';
  const aeProofStatus = document.getElementById('ae-proof-status');
  if (aeProofStatus) aeProofStatus.value = '';
  const aeProofDueAt = document.getElementById('ae-proof-due-at');
  if (aeProofDueAt) aeProofDueAt.value = '';

  const tName = SU.leaveTypeLabel(l.leave_type);
  const hours = l.finalized_hours ?? l.hours ?? '—';
  const stage = normalizeStage(l.status);

  document.getElementById('modal-title').textContent = `${l.emp_name || l.employee_id} 的 ${tName} 申請`;

  const lateBlock = l.late_application
    ? `<div class="late-warn">⚠ <strong>補申請(late_application)</strong>${l.late_reason ? `<br>員工說明:${escHtml(l.late_reason)}` : ''}</div>`
    : '';
  const proofBlock = (() => {
    if (l.proof_status === 'required')
      return `<div class="proof-info">⏳ 需於 ${fmtDt(l.proof_due_at)} 前補繳證明文件</div>`;
    if (l.proof_status === 'submitted')
      return `<div class="proof-info" style="color:#4ADE80;border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.08)">✅ 已提交證明:<a href="${escHtml(l.proof_url)}" target="_blank" style="color:#7FBBFF">${escHtml(l.proof_url || '—')}</a></div>`;
    if (l.proof_status === 'expired')
      return `<div class="proof-info" style="color:#F87171;border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.08)">❌ 證明已逾期</div>`;
    if (l.proof_status === 'converted_to_personal')
      return `<div class="proof-info" style="color:#9CA3AF">⚠ 證明逾期、已自動轉事假</div>`;
    return '';
  })();
  const mgrAudit = l.mgr_decision
    ? `<div class="audit-row">
         <div class="audit-label">主管審核</div>
         <div>${l.mgr_decision === 'approved' ? '✅ 已核准' : '❌ 已退回'}
              ${l.mgr_reviewed_by ? `(${escHtml(l.mgr_reviewed_by)})` : ''}
              ${l.mgr_reviewed_at ? `<span style="color:var(--text-dim)"> · ${fmtDt(l.mgr_reviewed_at)}</span>` : ''}
              ${l.mgr_reject_reason ? `<br><span style="color:#F87171">退回原因:${escHtml(l.mgr_reject_reason)}</span>` : ''}
         </div>
       </div>` : '';
  const ceoAudit = l.ceo_decision
    ? `<div class="audit-row">
         <div class="audit-label">執行長審核</div>
         <div>${l.ceo_decision === 'approved' ? '✅ 已核准' : '❌ 已退回'}
              ${l.ceo_reviewed_by ? `(${escHtml(l.ceo_reviewed_by)})` : ''}
              ${l.ceo_reviewed_at ? `<span style="color:var(--text-dim)"> · ${fmtDt(l.ceo_reviewed_at)}</span>` : ''}
              ${l.ceo_reject_reason ? `<br><span style="color:#F87171">退回原因:${escHtml(l.ceo_reject_reason)}</span>` : ''}
         </div>
       </div>` : '';
  const overrideAudit = l.override_by
    ? `<div class="audit-row" style="background:rgba(251,146,60,.08)">
         <div class="audit-label" style="color:#FB923C">Override</div>
         <div>${escHtml(l.override_by)} · ${fmtDt(l.override_at)}<br>${escHtml(l.override_reason || '')}</div>
       </div>` : '';
  const archivedAudit = l.archived_by
    ? `<div class="audit-row">
         <div class="audit-label">HR 歸檔</div>
         <div>${escHtml(l.archived_by)} · ${fmtDt(l.archived_at)}</div>
       </div>` : '';
  // Phase 1.6:HR 終止 expired row 稽核
  const terminatedAudit = l.terminated_by
    ? `<div class="audit-row" style="background:rgba(248,113,113,.06)">
         <div class="audit-label" style="color:#F87171">HR 終止</div>
         <div>${escHtml(l.terminated_by)} · ${fmtDt(l.terminated_at)}<br>
              <span style="color:var(--text-dim);font-size:11px">原因:證明逾期、HR 個案處理</span></div>
       </div>` : '';

  document.getElementById('modal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:100px 1fr;gap:6px 12px;margin-bottom:12px">
      <div style="color:var(--text-dim)">類型</div><div>${escHtml(tName)}</div>
      <div style="color:var(--text-dim)">時間</div><div>${fmtDt(l.start_at || (l.start_date+'T00:00:00+08:00'))} ~ ${fmtDt(l.end_at || (l.end_date+'T00:00:00+08:00'))}</div>
      <div style="color:var(--text-dim)">申請時數</div><div style="font-family:'DM Mono',monospace">${hours}h</div>
      <div style="color:var(--text-dim)">狀態</div><div><span class="pill ${SU.stageBadgeClass(l.status)}">${escHtml(SU.stageLabel(l.status))}</span></div>
      <div style="color:var(--text-dim)">理由</div><div>${escHtml(l.reason || '—')}</div>
    </div>
    ${lateBlock}${proofBlock}
    ${mgrAudit}${ceoAudit}${overrideAudit}${archivedAudit}${terminatedAudit}
    ${(stage === 'pending_mgr' || stage === 'pending_ceo') ? `
      <div class="live-recalc">
        ℹ 最終核准時會依當下排班即時重算時數,可能 ≠ 申請時的時數(${hours}h)。
      </div>` : ''}
  `;

  document.getElementById('reject-row').style.display = 'none';
  // override UI:late_application=true 才顯示
  const overrideRow = document.getElementById('override-row');
  if (l.late_application && (stage === 'pending_mgr' || stage === 'pending_ceo')) {
    overrideRow.style.display = '';
    document.getElementById('f-override-check').checked = false;
    document.getElementById('f-override-reason').value = '';
    document.getElementById('f-override-reason').style.display = 'none';
  } else {
    overrideRow.style.display = 'none';
  }

  // stage-aware 按鈕
  const buttons = document.getElementById('action-buttons');
  buttons.innerHTML = '';
  // 移除前次的 hint(每次 openDetail 重置)
  const oldHint = document.getElementById('action-hint');
  if (oldHint) oldHint.remove();

  // Phase 1.6:proof_status='expired' + status pending_* → HR 終止 row(對齊 lib canTerminate)
  // 隱藏 approve / reject 按鈕、只顯示「📛 終止此申請」(後端 422 守、前端 fail-fast)
  const isExpiredPending = l.proof_status === 'expired'
                            && (stage === 'pending_mgr' || stage === 'pending_ceo');
  const canTerminateNow  = isExpiredPending && isHR(u);

  // Phase 2.x 嚴格 spec(對齊 lib canReview):
  //   pending_mgr:同部門 + is_manager=true + 非自己
  //   pending_ceo:role ∈ ('ceo','chairman') + 非自己
  // 無 elevated bypass、HR/admin 不能審(但仍可看 audit + archive)
  const isSelfReview     = u.id === l.employee_id;
  const isSameDeptMgr    = u.is_manager === true && u.dept_id && l.employee_dept_id
                           && u.dept_id === l.employee_dept_id;
  const isCeoOrChairman2 = u.role === 'ceo' || u.role === 'chairman';
  const canApproveMgr    = stage === 'pending_mgr' && isSameDeptMgr     && !isSelfReview;
  const canApproveCeo    = stage === 'pending_ceo' && isCeoOrChairman2  && !isSelfReview;
  const canApproveAny    = (canApproveMgr || canApproveCeo) && !isExpiredPending;
  const canArchiveNow    = isHR(u) && l.status === 'approved';

  if (canTerminateNow) {
    buttons.innerHTML = `<button class="btn btn-danger" onclick="onTerminate()">📛 終止此申請</button>`;
  } else if (canApproveAny) {
    const approveLabel = stage === 'pending_mgr' ? '核准(轉執行長)' : '最終核准';
    buttons.innerHTML = `
      <button class="btn btn-ghost btn-sm" onclick="onReject()">退回</button>
      <button class="btn btn-primary" onclick="onApprove()">${approveLabel}</button>
    `;
  } else if (canArchiveNow) {
    buttons.innerHTML = `<button class="btn btn-primary" onclick="onArchive()">📦 歸檔</button>`;
  } else if (stage === 'pending_mgr' || stage === 'pending_ceo') {
    // 不合法 actor 顯示 hint(優先順序:self-approval > stage hint)
    let hintText;
    if (isSelfReview) {
      hintText = 'ℹ 不可審核自己的假單';
    } else if (stage === 'pending_mgr') {
      const mgrName = l.employee_manager_name || '部門主管';
      hintText = `ℹ 此假單由 ${escHtml(mgrName)} 審核`;
    } else {
      hintText = 'ℹ 此假單由執行長 / 董事長審核';
    }
    buttons.insertAdjacentHTML('beforebegin',
      `<div id="action-hint" style="font-size:12px;color:var(--text-dim);background:rgba(91,141,239,.06);border:1px solid rgba(91,141,239,.2);padding:8px 12px;border-radius:6px;margin-right:auto">${hintText}</div>`
    );
  }

  // P3.2:HR / admin / CEO / chairman 在所有 stage 都可開「進階編輯」、與既有 button 並列
  if (isElevated(u)) {
    buttons.insertAdjacentHTML('beforeend',
      `<button class="btn btn-ghost btn-sm" style="border:1px solid rgba(251,146,60,.4);color:#FB923C" onclick="toggleAdminEdit()">⚙ 進階編輯</button>`
    );
  }
  // 軟刪除按鈕(限 admin/chairman、不看 status,即使 archived/cancelled/terminated 也可刪測試紀錄)
  if (window.Roles?.canDeleteRecord?.(u)) {
    buttons.insertAdjacentHTML('beforeend',
      `<button class="btn btn-danger btn-sm" onclick="openDeleteLeave('${escHtml(l.id)}')">🗑 刪除紀錄</button>`
    );
  }

  document.getElementById('detail-modal').classList.add('open');
}

function onOverrideToggle() {
  const check = document.getElementById('f-override-check').checked;
  document.getElementById('f-override-reason').style.display = check ? '' : 'none';
}

// Phase 1.6:HR 終止 expired row(後端走 PUT decision='terminate')
async function onTerminate() {
  const tName = window.HR_Utils.leaveTypeLabel(currentLeave.leave_type);
  if (!confirm(`確定終止 ${currentLeave.emp_name || currentLeave.employee_id} 的 ${tName} 申請?\n(因證明逾期、員工本人需另開新單)`)) return;
  try {
    const r = await api(`/api/leaves/${encodeURIComponent(currentLeave.id)}`, {
      method: 'PUT', body: JSON.stringify({ decision: 'terminate' }),
    });
    if (r && r.ok === false) { toast('終止失敗:' + (r.reason || r.error || 'unknown'), 'error'); return; }
    toast('已終止');
    closeModal();
    await load();
  } catch(e) { toast('終止失敗:' + e.message, 'error'); }
}

async function onArchive() {
  if (!confirm('確定歸檔此假單?')) return;
  try {
    const r = await api(`/api/leaves/${encodeURIComponent(currentLeave.id)}`, {
      method: 'PUT', body: JSON.stringify({ action: 'archive' }),
    });
    if (r && r.ok === false) { toast('歸檔失敗:' + (r.reason || r.error || 'unknown'), 'error'); return; }
    toast('已歸檔');
    closeModal();
    await load();
  } catch(e) { toast('歸檔失敗:' + e.message, 'error'); }
}

// ───── P3.2 Admin Edit (HR / 管理層手動修正 leave row 欄位) ─────
function toggleAdminEdit() {
  // 隱藏其他 expandable row、避免衝突
  document.getElementById('reject-row').style.display = 'none';
  document.getElementById('override-row').style.display = 'none';
  document.getElementById('admin-edit-row').style.display = '';

  // 替換 action buttons
  const buttons = document.getElementById('action-buttons');
  buttons.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="closeAdminEdit()">取消</button>
    <button class="btn btn-primary" onclick="confirmAdminEdit()">確認編輯</button>
  `;
}

function closeAdminEdit() {
  document.getElementById('admin-edit-row').style.display = 'none';
  // 重新 render 整個 detail(action-buttons 回到原狀)
  if (currentLeave) openDetail(currentLeave.id);
}

async function confirmAdminEdit() {
  if (!currentLeave) return;
  const leaveType = document.getElementById('ae-leave-type').value;
  const proofStatus = document.getElementById('ae-proof-status').value;
  const proofDueAtLocal = document.getElementById('ae-proof-due-at').value;

  const body = { action: 'admin_edit' };
  if (leaveType) body.leave_type = leaveType;
  if (proofStatus) body.proof_status = proofStatus;
  if (proofDueAtLocal) {
    // datetime-local input 是 'YYYY-MM-DDTHH:MM'(無時區)、加 +08:00 才是台灣時間
    const t = Date.parse(proofDueAtLocal + ':00+08:00');
    if (!Number.isFinite(t)) {
      toast('證明期限格式錯誤', 'error');
      return;
    }
    body.proof_due_at = new Date(t).toISOString();
  }

  // 至少要改一欄
  if (!body.leave_type && !body.proof_status && !body.proof_due_at) {
    toast('請至少選一個要改的欄位', 'warn');
    return;
  }

  // confirm dialog 列出變更
  const SU = window.HR_Utils;
  const changes = [];
  if (body.leave_type)   changes.push(`假別 → ${SU.leaveTypeLabel(body.leave_type)} (${body.leave_type})`);
  if (body.proof_status) changes.push(`證明狀態 → ${body.proof_status}`);
  if (body.proof_due_at) changes.push(`證明期限 → ${fmtDt(body.proof_due_at)}`);
  if (!confirm(`確認以 admin_edit 修改 ${currentLeave.emp_name || currentLeave.employee_id} 的假單:\n\n${changes.join('\n')}\n\n所有變更會記錄到 handler_note (audit)。`)) return;

  try {
    const r = await api(`/api/leaves/${encodeURIComponent(currentLeave.id)}`, {
      method: 'PUT', body: JSON.stringify(body),
    });
    if (r && r.ok === false) {
      toast('編輯失敗:' + (r.error || r.detail || 'unknown'), 'error');
      return;
    }
    toast('已編輯');
    closeModal();
    await load();
  } catch(e) {
    toast('編輯失敗:' + e.message, 'error');
  }
}

// ── 軟刪除假單(限 admin/chairman、必填理由)──────────────────────────────────
// prompt + confirm 兩階段、UX 簡單版;後端 PUT /api/leaves/:id action=delete 寫
// deleted_at/by/reason + handler_note。刪除後該 row 不再出現於列表 / 待審 / 排班
// overlay / 薪資結算(SELECT 全加 .is(deleted_at,null))。
async function openDeleteLeave(id) {
  const reason = prompt('請輸入刪除理由(必填):\n常見:測試資料 / 重複申請 / 申請錯誤');
  if (!reason || !reason.trim()) return;
  const trimmed = reason.trim();
  if (!confirm(`確定刪除此假單?\n理由:${trimmed}\n\n⚠ 軟刪除後將從所有列表隱藏、包括統計、排班 overlay、薪資結算。需 DB 手動還原。`)) return;
  try {
    const r = await api(`/api/leaves/${encodeURIComponent(id)}`, {
      method: 'PUT',
      body: JSON.stringify({ action: 'delete', reason: trimmed }),
    });
    if (r && r.ok === false) {
      toast('刪除失敗:' + (r.error || r.detail || 'unknown'), 'error');
      return;
    }
    toast('🗑 已刪除');
    closeModal();
    await load();
  } catch(e) {
    toast('刪除失敗:' + e.message, 'error');
  }
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('open');
  // P3.2 reset admin_edit row
  const aeRow = document.getElementById('admin-edit-row');
  if (aeRow) aeRow.style.display = 'none';
}

async function onApprove() {
  if (!confirm(`核准 ${currentLeave.emp_name || currentLeave.employee_id} 的 ${window.HR_Utils.leaveTypeLabel(currentLeave.leave_type)} 申請?`)) return;
  // override:late_application=true 且勾起來才送 override_reason
  const body = { decision: 'approve' };
  const overrideRow = document.getElementById('override-row');
  if (overrideRow.style.display !== 'none' && document.getElementById('f-override-check').checked) {
    const reason = document.getElementById('f-override-reason').value.trim();
    if (!reason) { toast('Override 原因必填','error'); return; }
    body.override_reason = reason;
  }
  try {
    const r = await api(`/api/leaves/${encodeURIComponent(currentLeave.id)}`, {
      method: 'PUT', body: JSON.stringify(body),
    });
    if (r && r.ok === false) { toast('核准失敗:'+(r.reason||r.error||'unknown'), 'error'); return; }
    toast('已核准');
    closeModal();
    await load();
  } catch(e) { toast('核准失敗:'+e.message, 'error'); }
}

function onReject() {
  document.getElementById('reject-row').style.display = '';
  const buttons = document.getElementById('action-buttons');
  buttons.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="closeModal()">取消</button>
    <button class="btn btn-danger" onclick="confirmReject()">確認退回</button>
  `;
}

async function confirmReject() {
  const reason = document.getElementById('f-reject-reason').value.trim();
  if (!reason) { toast('請填退回原因','error'); return; }
  try {
    const r = await api(`/api/leaves/${encodeURIComponent(currentLeave.id)}`, {
      method: 'PUT', body: JSON.stringify({ decision: 'reject', reject_reason: reason }),
    });
    if (r && r.ok === false) { toast('退回失敗:'+(r.reason||'unknown'), 'error'); return; }
    toast('已退回');
    closeModal();
    await load();
  } catch(e) { toast('退回失敗:'+e.message, 'error'); }
}

load();
</script>
