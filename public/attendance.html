<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>打卡 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .punch-card{background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;margin-bottom:16px}
  .seg-card{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:0.5px solid rgba(255,255,255,.08);border-radius:8px;margin-bottom:8px;background:rgba(255,255,255,.02)}
  .seg-time{font-family:'DM Mono',monospace;font-size:14px;color:#7FBBFF}
  .seg-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
  .seg-status{font-family:'DM Mono',monospace;font-size:11px;padding:3px 8px;border-radius:4px}
  .ss-normal{background:rgba(74,222,128,.15);color:#4ADE80}
  .ss-late{background:rgba(251,191,36,.15);color:#FBBF24}
  .ss-early{background:rgba(248,113,113,.12);color:#F87171}
  .ss-absent{background:rgba(248,113,113,.2);color:#F87171}
  .ss-leave{background:rgba(91,141,239,.15);color:#7FBBFF}
  .ss-anomaly{background:rgba(168,85,247,.15);color:#A855F7}
  .punch-buttons{display:flex;gap:12px;margin:14px 0}
  .punch-buttons button{flex:1;padding:14px;font-size:15px}
  .empty{padding:30px 18px;text-align:center;color:var(--text-dim);font-size:13px}
  .hist-row{display:grid;grid-template-columns:90px 1fr 1fr 80px;gap:10px;padding:8px 12px;border-bottom:0.5px solid rgba(255,255,255,.05);font-size:13px;align-items:center}
  .hist-row.head{font-weight:600;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:11px}
</style>
</head>
<body data-page="attendance">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">打卡</div>
        <div class="page-sub" id="today-label">—</div>
      </div>
    </div>

    <div class="punch-card">
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:10px">今日排班</div>
      <div id="today-segs"><div class="empty">載入中…</div></div>

      <div class="punch-buttons">
        <button class="btn btn-primary" id="btn-in"  onclick="doPunch('clock_in')"  disabled>打上班卡</button>
        <button class="btn btn-primary" id="btn-out" onclick="doPunch('clock_out')" disabled>打下班卡</button>
      </div>
      <div id="punch-msg" style="font-size:12px;color:var(--text-dim);min-height:18px"></div>
    </div>

    <div class="punch-card">
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:10px">最近 7 天</div>
      <div class="hist-row head"><div>日期</div><div>上班</div><div>下班</div><div>狀態</div></div>
      <div id="hist-list"><div class="empty">載入中…</div></div>
    </div>
  </main>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtTime(t){ if(!t) return ''; const m = String(t).match(/^(\d{1,2}):(\d{2})/); return m?`${m[1].padStart(2,'0')}:${m[2]}`:t; }
function fmtIsoLocal(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

let todaySegs = [];
let todayAtts = [];

async function load(retries = 0) {
  if (!window.api || !window.currentUser) {
    if (retries < 25) return setTimeout(()=>load(retries+1), 200);
    return;
  }
  document.getElementById('today-label').textContent = todayStr();
  await Promise.all([loadTodaySchedule(), loadHistory()]);
  render();
}

async function loadTodaySchedule() {
  const today = todayStr();
  const [y, m] = today.split('-');
  try {
    const r = await api(`/api/schedule-periods?year=${y}&month=${parseInt(m)}&employee_id=${currentUser.id}`);
    const schedules = (r.schedules || []).filter(s => s.work_date === today);
    const periods = r.periods || [];
    // 只顯示 status 為 approved 或 locked 的 period 對應 schedules
    const validIds = new Set(periods.filter(p => p.status==='approved'||p.status==='locked').map(p=>p.id));
    todaySegs = schedules.filter(s => validIds.has(s.period_id));
    todaySegs.sort((a,b) => (a.segment_no||1) - (b.segment_no||1));
  } catch(e) { todaySegs = []; }

  // 撈今天的 attendance
  try {
    const all = await api(`/api/attendance?employee_id=${currentUser.id}&date=${today}`);
    todayAtts = (all || []).filter(a => a.work_date === today);
  } catch(e) { todayAtts = []; }
}

async function loadHistory() {
  const d = new Date(); d.setDate(d.getDate() - 6);
  const start = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const end = todayStr();
  try {
    const all = await api(`/api/attendance?employee_id=${currentUser.id}&month=${end.slice(0,7)}`);
    const rows = (all || []).filter(a => a.work_date >= start && a.work_date <= end);
    rows.sort((a,b) => b.work_date.localeCompare(a.work_date));
    renderHistory(rows);
  } catch(e) { renderHistory([]); }
}

function render() {
  const wrap = document.getElementById('today-segs');
  if (!todaySegs.length) {
    wrap.innerHTML = `<div class="empty">今日無排班,無法打卡</div>`;
    document.getElementById('btn-in').disabled  = true;
    document.getElementById('btn-out').disabled = true;
    return;
  }

  // 是否已有打過上班卡(任一段)?
  const anyIn  = todayAtts.some(a => a.clock_in);
  const anyOpen = todayAtts.some(a => a.clock_in && !a.clock_out);
  document.getElementById('btn-in').disabled  = anyIn && !canClockInAnotherSeg();
  document.getElementById('btn-out').disabled = !anyOpen;

  wrap.innerHTML = todaySegs.map(s => {
    const att = todayAtts.find(a => a.segment_no === (s.segment_no||1));
    const status = att ? renderStatus(att) : '<span class="seg-status ss-normal">未打卡</span>';
    const note = s.note === '__OFF__'
      ? '<span class="seg-meta">休</span>'
      : '';
    const segLabel = s.segment_no > 1 ? `(段 ${s.segment_no})` : '';
    return `
      <div class="seg-card">
        <div>
          <div class="seg-time">${escHtml(fmtTime(s.start_time))} – ${escHtml(fmtTime(s.end_time))} ${segLabel}</div>
          <div class="seg-meta">${escHtml(s.shift_type_id||'')} ${note}</div>
        </div>
        <div>${status}</div>
      </div>
    `;
  }).join('');
}

function canClockInAnotherSeg() {
  // 多段班:可能某段還沒打 in
  for (const s of todaySegs) {
    const att = todayAtts.find(a => a.segment_no === (s.segment_no||1));
    if (!att || !att.clock_in) return true;
  }
  return false;
}

function renderStatus(att) {
  if (att.is_anomaly) return `<span class="seg-status ss-anomaly">⚠ 異常</span>`;
  if (att.status === 'absent') return `<span class="seg-status ss-absent">曠職</span>`;
  if (att.status === 'leave')  return `<span class="seg-status ss-leave">請假</span>`;
  if (att.status === 'late')   return `<span class="seg-status ss-late">遲到 ${att.late_minutes||0}分</span>`;
  if (att.status === 'early_leave') return `<span class="seg-status ss-early">早退 ${att.early_leave_minutes||0}分</span>`;
  if (att.clock_in && !att.clock_out) return `<span class="seg-status ss-normal">上班 ${fmtIsoLocal(att.clock_in)}</span>`;
  if (att.clock_out) return `<span class="seg-status ss-normal">已下班 ${fmtIsoLocal(att.clock_out)}</span>`;
  return `<span class="seg-status ss-normal">未打卡</span>`;
}

function renderHistory(rows) {
  const wrap = document.getElementById('hist-list');
  if (!rows.length) { wrap.innerHTML = `<div class="empty">無資料</div>`; return; }
  wrap.innerHTML = rows.map(a => `
    <div class="hist-row">
      <div style="font-family:'DM Mono',monospace;font-size:12px">${escHtml(a.work_date)}</div>
      <div>${fmtIsoLocal(a.clock_in)}</div>
      <div>${fmtIsoLocal(a.clock_out)}</div>
      <div>${renderStatus(a)}</div>
    </div>
  `).join('');
}

async function doPunch(action) {
  const msg = document.getElementById('punch-msg');
  msg.textContent = '處理中…';
  try {
    const r = await api('/api/attendance', { method: 'POST', body: JSON.stringify({ action }) });
    msg.textContent = action === 'clock_in' ? '上班打卡成功' : '下班打卡成功';
    toast(msg.textContent);
    await load();
  } catch(e) {
    const t = e.message || 'unknown';
    if (t.includes('NO_SCHEDULE'))        msg.textContent = '今日無排班,無法打卡';
    else if (t.includes('ALREADY_CLOCKED_IN')) msg.textContent = '此段已打過上班卡';
    else if (t.includes('NO_OPEN_ATTENDANCE')) msg.textContent = '找不到要下班的紀錄(請先打上班卡)';
    else msg.textContent = '打卡失敗:' + t;
    toast(msg.textContent, 'error');
  }
}

load();
</script>

<script src="/js/roles.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/pwa.js"></script>
<script>PWA.init();</script>
</body>
</html>
