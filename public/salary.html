<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>薪資管理 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/salary-breakdown.js"></script>
<style>
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px 10px;border-bottom:0.5px solid rgba(255,255,255,.06);text-align:right;vertical-align:middle}
  th{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;background:rgba(0,0,0,.15);text-align:center}
  th:first-child, td:first-child{text-align:left}
  .num{font-family:'DM Mono',monospace}
  .pill{padding:3px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace}
  .s-draft{background:rgba(251,191,36,.15);color:#FBBF24}
  .s-confirmed{background:rgba(91,141,239,.15);color:#7FBBFF}
  .s-paid{background:rgba(74,222,128,.15);color:#4ADE80}
  .filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .auto-cell{color:var(--text-dim)}
  .manual-cell{color:#FBBF24}
  .gen-cell{font-weight:600;color:#7FBBFF}
  .breakdown{font-size:11px;color:var(--text-dim);margin-top:2px}
  tfoot td{background:rgba(0,0,0,.15);font-weight:600;border-top:1px solid rgba(255,255,255,.18)}
  tfoot td:first-child{color:var(--text-dim);font-family:'DM Mono',monospace;font-size:11px}
</style>
</head>
<body data-page="salary">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">薪資管理</div>
        <div class="page-sub">月度結算 / 完整重算 / 確認發放</div>
      </div>
    </div>

    <div id="gate-blocked" class="empty-state" style="display:none">
      <div class="icon">🔒</div><div>無權限存取此頁面(限 HR / admin)</div>
    </div>

    <div id="main-content">
      <div class="filter-bar">
        <select class="form-select" id="f-month" onchange="load()" style="width:140px"></select>
        <input type="text" class="form-input" id="f-search" placeholder="搜尋員工" oninput="render()" style="flex:1;max-width:240px">
        <button class="btn btn-ghost" onclick="load()">↻ 重新載入</button>
        <button class="btn btn-primary" onclick="batchGenerate()">批次產生(完整重算)</button>
      </div>

      <div class="table-wrap" style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>員工</th>
              <th>底薪</th>
              <th>全勤<br>(actual)</th>
              <th>加班費<br>auto</th>
              <th>加班費<br>manual</th>
              <th>補休<br>失效</th>
              <th>結算</th>
              <th>假日<br>工作</th>
              <th>津貼</th>
              <th>扣<br>曠職</th>
              <th>扣<br>勞保</th>
              <th>扣<br>健保</th>
              <th>扣<br>稅</th>
              <th>扣<br>懲處</th>
              <th>應發</th>
              <th>實發</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
          <tfoot id="tfoot"></tfoot>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- 編輯抽屜 -->
<div class="modal-bg" id="edit-modal">
  <div class="modal" style="max-width:680px;width:95vw">
    <div class="modal-title" id="modal-title">編輯薪資</div>
    <div id="modal-meta" style="font-size:12px;color:var(--text-dim);margin-bottom:14px"></div>

    <!-- P6.2:audit history(parse admin_audit_note、有內容才顯示) -->
    <div id="audit-history-row" style="display:none;margin-bottom:14px;padding:10px;background:rgba(0,0,0,.15);border-radius:6px">
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;font-family:'DM Mono',monospace">📋 修改紀錄</div>
      <div id="audit-history-content" style="font-size:12px;line-height:1.7;color:var(--text-dim);font-family:'DM Mono',monospace;white-space:pre-wrap"></div>
    </div>

    <div style="font-size:12px;color:var(--text-dim);margin:10px 0 6px">自動計算欄位(唯讀)</div>
    <div id="auto-fields" style="display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-bottom:12px;font-size:13px"></div>

    <div style="font-size:12px;color:var(--text-dim);margin:10px 0 6px">手動覆寫(可改)</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="form-row"><label class="form-label">加班費(手動)</label><input type="number" class="form-input num" id="m-otm" step="0.01" min="0"></div>
      <div class="form-row"><label class="form-label">津貼</label><input type="number" class="form-input num" id="m-allow" step="0.01" min="0"></div>
      <div class="form-row"><label class="form-label">額外津貼</label><input type="number" class="form-input num" id="m-extra" step="0.01" min="0"></div>
      <div class="form-row"><label class="form-label">扣 勞保</label><input type="number" class="form-input num" id="m-li" step="0.01" min="0"></div>
      <div class="form-row"><label class="form-label">扣 健保</label><input type="number" class="form-input num" id="m-hi" step="0.01" min="0"></div>
      <div class="form-row"><label class="form-label">扣 稅</label><input type="number" class="form-input num" id="m-tax" step="0.01" min="0"></div>
    </div>
    <div class="form-row" style="display:flex;align-items:center;gap:8px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:6px;padding:8px 12px;margin-top:4px">
      <input type="checkbox" id="f-deduct-tax-lock" style="margin:0">
      <label for="f-deduct-tax-lock" style="font-size:12px;color:var(--text-dim);cursor:pointer;margin:0">
        🔒 鎖定扣稅(下次月結 batch 不被 calculator 覆蓋、若不勾下次重算會回到自動值)
      </label>
    </div>
    <div class="form-row"><label class="form-label">加班備註</label><input type="text" class="form-input" id="m-otn"></div>
    <div class="form-row"><label class="form-label">結算備註</label><input type="text" class="form-input" id="m-sn"></div>

    <!-- P6.2:force override checkbox(預設 hide、撞到 locked 才顯示) -->
    <div class="form-row" id="force-override-row" style="display:none;align-items:center;gap:8px;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.3);border-radius:6px;padding:8px 12px;margin-top:4px">
      <input type="checkbox" id="f-force-override" style="margin:0">
      <label for="f-force-override" style="font-size:12px;color:#F87171;cursor:pointer;margin:0">
        ⚠ 此 payroll_period 已 locked、勾選後強制覆寫(audit 會留 [FORCE] 標記)
      </label>
    </div>

    <div style="font-size:12px;color:var(--text-dim);margin:14px 0 6px">即時試算(基於本表單值)</div>
    <div id="preview" style="font-size:14px;font-weight:600;color:#7FBBFF;background:rgba(91,141,239,.06);padding:10px 14px;border-radius:6px"></div>

    <div class="modal-actions" style="justify-content:space-between;margin-top:14px">
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="recalculate()">完整重算此筆</button>
        <button class="btn btn-ghost btn-sm" id="btn-confirm" onclick="confirmRec()">確認</button>
        <button class="btn btn-primary btn-sm" id="btn-pay" onclick="payRec()" style="display:none">標記發放</button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveManual()">儲存手動欄位</button>
      </div>
    </div>
  </div>
</div>

<script>
function toast(msg,type='success'){let w=document.getElementById('toast-wrap');if(!w){w=document.createElement('div');w.id='toast-wrap';w.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px';document.body.appendChild(w);}const el=document.createElement('div');el.className='toast toast-'+type;el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),3500);}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt$(n){ if(n==null) return '—'; return new Intl.NumberFormat('zh-TW',{maximumFractionDigits:0}).format(Number(n)); }
function n0(v){ return v==null?0:Number(v); }

let allRows = [], currentRow = null;

// canonical: lib/salary/query-filter.js(vitest 抓行為、本檔保持一致)
function parseFilterFromQuery(search) {
  const params = new URLSearchParams(search || '');
  const year = parseInt(params.get('year'), 10);
  const month = parseInt(params.get('month'), 10);
  if (!Number.isInteger(year) || !Number.isInteger(month)) return null;
  if (month < 1 || month > 12) return null;
  return { year, month, value: `${year}-${String(month).padStart(2, '0')}` };
}

function buildMonthOptions(){
  const sel = document.getElementById('f-month');
  const d = new Date(); const out = [];
  for (let i = 0; i < 12; i++) {
    const v = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    out.push(`<option value="${v}"${i===0?' selected':''}>${v}</option>`);
    d.setMonth(d.getMonth()-1);
  }
  sel.innerHTML = out.join('');

  // query string ?year=&month= override(salary-period.html「📊 完整明細表」入口)
  const fromQuery = parseFilterFromQuery(window.location.search);
  if (fromQuery) {
    if (![...sel.options].some(o => o.value === fromQuery.value)) {
      // 不在預設 12 個月內 → prepend 為新 option
      const opt = document.createElement('option');
      opt.value = fromQuery.value;
      opt.textContent = fromQuery.value;
      sel.insertBefore(opt, sel.firstChild);
    }
    sel.value = fromQuery.value;
  }
}

async function load(retries=0){
  if(!window.api||!window.currentUser){if(retries<25)return setTimeout(()=>load(retries+1),200);return;}
  const u = window.currentUser;
  const allowed = u && ['hr','admin','ceo','chairman'].includes(u.role);
  if (u && !allowed) {
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('gate-blocked').style.display = '';
    return;
  }
  const month = document.getElementById('f-month').value;
  const [y, m] = month.split('-');
  try {
    const r = await api(`/api/salary?v=2&year=${y}&month=${parseInt(m)}`);
    allRows = r.records || [];
    render();
  } catch(e){ toast('載入失敗:'+e.message,'error'); }
}

function render(){
  const q = document.getElementById('f-search').value.trim().toLowerCase();
  const rows = allRows.filter(r => {
    if (!q) return true;
    return `${r.emp_name||''} ${r.employee_id||''}`.toLowerCase().includes(q);
  });
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="18" style="text-align:center;padding:30px;color:var(--text-dim)">無記錄。請點「批次產生」</td></tr>`;
    renderSummary([]);
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr data-row-id="${escHtml(r.id)}" data-detail-open="0" style="cursor:pointer" onclick="toggleDetailRow(event, '${escHtml(r.id)}')" title="點任一格(除按鈕外)展開完整明細">
      <td style="text-align:left">${escHtml(r.emp_name||r.employee_id)}<div style="font-size:11px;color:var(--text-dim)">${escHtml(r.employee_id)}</div>${r.is_final_month ? '<span class="pill" style="margin-top:3px;display:inline-block;background:rgba(248,113,113,.12);color:#F87171;border:1px solid rgba(248,113,113,.25)">✦ 離職月</span>' : ''}<span class="detail-caret" id="caret-${escHtml(r.id)}" style="margin-left:6px;color:var(--text-dim);font-size:11px">▸</span></td>
      <td class="num">${(() => {
        // 兼職時薪制(hourly_rate>0 && work_hours>0)→ 主值 prorata_base(=時薪×工時)、下方小字拆解
        const isHourlyMode = n0(r.hourly_rate) > 0 && n0(r.work_hours) > 0;
        if (isHourlyMode) {
          return `${fmt$(r.prorata_base)}<div style="font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace">時薪 ${fmt$(r.hourly_rate)} × 工時 ${r.work_hours}</div>`;
        }
        // 正職離職月(既有邏輯):base + caret → prorata_base
        if (r.is_final_month && r.prorata_base != null) {
          return `${fmt$(r.base_salary)}<div style="font-size:10px;color:#F87171;font-family:'DM Mono',monospace">→ ${fmt$(r.prorata_base)}</div>`;
        }
        // 正職一般:純 base_salary
        return fmt$(r.base_salary);
      })()}</td>
      <td class="num auto-cell">${fmt$(r.attendance_bonus_actual)}</td>
      <td class="num auto-cell">${fmt$(r.overtime_pay_auto)}</td>
      <td class="num manual-cell">${fmt$(r.overtime_pay_manual)}</td>
      <td class="num auto-cell">${fmt$(r.comp_expiry_payout)}</td>
      <td class="num auto-cell">${fmt$(r.settlement_amount)}</td>
      <td class="num auto-cell">${fmt$(r.holiday_work_pay)}</td>
      <td class="num manual-cell">${fmt$(n0(r.allowance)+n0(r.extra_allowance))}</td>
      <td class="num auto-cell">${fmt$(r.deduct_absence)}</td>
      <td class="num manual-cell">${fmt$(r.deduct_labor_ins)}</td>
      <td class="num manual-cell">${fmt$(r.deduct_health_ins)}</td>
      <td class="num manual-cell">${fmt$(r.deduct_tax)}${r.deduct_tax_manual_override ? '<span title="HR 鎖定、calculator 不會覆蓋" style="margin-left:4px;cursor:help">🔒</span>' : ((r.deduct_tax||0) > 0 ? '<span title="自動算(calculator 月結時計算)" style="margin-left:4px;opacity:.5;cursor:help">🤖</span>' : '')}</td>
      <td class="num auto-cell">${fmt$(r.attendance_penalty_total)}</td>
      <td class="num gen-cell">${fmt$(r.gross_salary)}</td>
      <td class="num gen-cell">${fmt$(r.net_salary)}</td>
      <td onclick="event.stopPropagation()"><span class="pill s-${escHtml(r.status)}">${escHtml(r.status)}</span></td>
      <td style="white-space:nowrap" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="openEdit('${escHtml(r.id)}')">編輯</button>
        <a href="/payslip.html?employee_id=${encodeURIComponent(r.employee_id)}&year=${r.year}&month=${r.month}"
           target="_blank"
           class="btn btn-ghost btn-sm"
           style="text-decoration:none;display:inline-block;margin-left:4px"
           title="列印薪資單">🖨</a>
      </td>
    </tr>
  `).join('');
  renderSummary(rows);
}

// ── 展開明細列(共用 SalaryBreakdown helper、純讀 / 不動編輯 modal)──
// 點任一筆 row(避開狀態 cell 與操作按鈕、已 stopPropagation)→ 在該列下方插一條
// detail <tr> colspan 跨滿表格,內容是「應發明細表 → 應發小計 → 扣除明細表 →
// 扣除小計 → 實發」,純顯示、不可編輯;再點一次收合。
// 同時可多列展開、互不影響。
function toggleDetailRow(event, rowId) {
  const tr = event.currentTarget;
  if (!tr || tr.tagName !== 'TR') return;
  const caret = document.getElementById('caret-' + rowId);
  const detailId = 'detail-' + rowId;
  const existing = document.getElementById(detailId);
  if (existing) {
    existing.remove();
    tr.dataset.detailOpen = '0';
    if (caret) caret.textContent = '▸';
    return;
  }
  const r = allRows.find(x => x.id === rowId);
  if (!r) return;
  const detailTr = document.createElement('tr');
  detailTr.id = detailId;
  detailTr.className = 'detail-row';
  detailTr.innerHTML = `
    <td colspan="18" style="padding:14px 18px;background:rgba(0,0,0,.18);border-bottom:1px solid rgba(255,255,255,.08);text-align:left">
      ${renderDetailContent(r)}
    </td>`;
  tr.after(detailTr);
  tr.dataset.detailOpen = '1';
  if (caret) caret.textContent = '▾';

  // 若該員工 comp_expiry_payout > 0、會渲染出 .comp-expiry-detail 容器、觸發 lazy fetch
  const expEl = detailTr.querySelector('.comp-expiry-detail');
  if (expEl) loadCompExpiryRow(expEl);
}

function renderDetailContent(r) {
  const SB = window.SalaryBreakdown;
  if (!SB) return '<div style="color:#F87171">SalaryBreakdown 未載入</div>';
  const { grossItems, grossSubtotal, deductItems, deductSubtotal, net } = SB.buildSalaryBreakdown(r);
  const cellRow = (label, value, neg) => `
    <div style="display:grid;grid-template-columns:1fr 110px;padding:4px 0;border-bottom:0.5px solid rgba(255,255,255,.04);font-size:12px">
      <div style="color:var(--text-dim)">${escHtml(label)}</div>
      <div class="num" style="text-align:right;color:${neg ? '#F87171' : '#4ADE80'}">${neg ? '−' : '+'} ${fmt$(value)}</div>
    </div>`;
  const subtotalRow = (label, value, color) => `
    <div style="display:grid;grid-template-columns:1fr 110px;padding:6px 0;margin-top:4px;border-top:1px solid rgba(255,255,255,.12);font-size:13px;font-weight:600">
      <div>${escHtml(label)}</div>
      <div class="num" style="text-align:right;color:${color}">${fmt$(value)}</div>
    </div>`;
  // 補休失效逐筆區塊(comp_expiry_payout > 0 才出);lazy fetch /api/comp-time?view=expiry
  const compExpiryBlock = n0(r.comp_expiry_payout) > 0 ? `
    <div style="margin-top:14px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);max-width:900px">
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">補休失效逐筆 (來自 /api/comp-time?view=expiry)</div>
      <div class="comp-expiry-detail"
           data-emp="${escHtml(r.employee_id)}"
           data-year="${r.year}"
           data-month="${r.month}"
           data-expected="${r.comp_expiry_payout}">
        <div style="color:var(--text-dim);font-size:12px">載入中…</div>
      </div>
    </div>` : '';

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:900px">
      <div>
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">應發明細 (${grossItems.length} 項非 0)</div>
        ${grossItems.length ? grossItems.map(it => cellRow(it.label, it.value, false)).join('') : '<div style="color:var(--text-dim);font-size:12px;padding:8px 0">無</div>'}
        ${subtotalRow('應發小計', grossSubtotal, '#7FBBFF')}
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">扣除明細 (${deductItems.length} 項非 0)</div>
        ${deductItems.length ? deductItems.map(it => cellRow(it.label, it.value, true)).join('') : '<div style="color:var(--text-dim);font-size:12px;padding:8px 0">本月無扣項</div>'}
        ${subtotalRow('扣除小計', deductSubtotal, '#F87171')}
        ${subtotalRow('實發', net, '#4ADE80')}
      </div>
    </div>
    ${compExpiryBlock}
    <div style="margin-top:10px;font-size:11px;color:var(--text-dim);text-align:right">
      共用 helper: SalaryBreakdown.buildSalaryBreakdown() | 對齊 net_salary GENERATED 公式 | 純顯示,如要編輯請按「編輯」鈕
    </div>
  `;
}

// 補休失效逐筆 lazy fetch(detail row 展開時呼;HR 可看任一員工)
async function loadCompExpiryRow(el) {
  const empId   = el.dataset.emp;
  const year    = Number(el.dataset.year);
  const month   = Number(el.dataset.month);
  const expected = Number(el.dataset.expected || 0);
  try {
    const resp = await api(`/api/comp-time?employee_id=${encodeURIComponent(empId)}&year=${year}&month=${month}&view=expiry`);
    const SB = window.SalaryBreakdown;
    const { lines, total } = SB.buildCompExpiryLines(resp.records || []);
    if (!lines.length) {
      el.innerHTML = '<div style="color:var(--text-dim);font-size:12px">本月無失效轉現紀錄</div>';
      return;
    }
    const mismatch = Math.abs(total - expected) > 0.01;
    el.innerHTML = lines.map(l => `
      <div style="padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,.06);font-size:12px">
        <div style="display:flex;justify-content:space-between">
          <span>${escHtml(l.label)}</span>
          <span class="num" style="color:#7FBBFF">+ ${fmt$(l.payout)}</span>
        </div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${escHtml(l.sub)}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${escHtml(l.meta)}</div>
      </div>
    `).join('') + `
      <div style="padding:6px 0 0;display:flex;justify-content:space-between;font-size:13px;font-weight:600">
        <span>合計 ${lines.length} 筆</span>
        <span class="num" style="color:#7FBBFF">${fmt$(total)}</span>
      </div>
      ${mismatch ? `<div style="margin-top:4px;font-size:11px;color:#FB923C">⚠ 與薪資單上的補休失效合計 ${fmt$(expected)} 不符（差 ${fmt$(Math.abs(total - expected))}）</div>` : ''}
    `;
  } catch (e) {
    el.innerHTML = `<div style="color:#F87171;font-size:12px">載入失敗：${escHtml(e.message)}</div>`;
  }
}

// 表格底部 SUM 合計列、欄位順序對齊 thead 18 欄。
// 數字加總用 n0 容忍 null;不適合加總的欄位(狀態 / 操作)填 "—"。
function renderSummary(rows){
  const tfoot = document.getElementById('tfoot');
  if (!tfoot) return;
  if (!rows.length) { tfoot.innerHTML = ''; return; }
  const sum = (key) => rows.reduce((s, r) => s + n0(r[key]), 0);
  const sumExpr = (fn) => rows.reduce((s, r) => s + fn(r), 0);
  tfoot.innerHTML = `
    <tr class="sum-row">
      <td>合計 (${rows.length} 人)</td>
      <td class="num">${fmt$(sumExpr(r => Number(r.prorata_base != null ? r.prorata_base : r.base_salary) || 0))}</td>
      <td class="num">${fmt$(sum('attendance_bonus_actual'))}</td>
      <td class="num">${fmt$(sum('overtime_pay_auto'))}</td>
      <td class="num">${fmt$(sum('overtime_pay_manual'))}</td>
      <td class="num">${fmt$(sum('comp_expiry_payout'))}</td>
      <td class="num">${fmt$(sum('settlement_amount'))}</td>
      <td class="num">${fmt$(sum('holiday_work_pay'))}</td>
      <td class="num">${fmt$(sumExpr(r => n0(r.allowance) + n0(r.extra_allowance)))}</td>
      <td class="num">${fmt$(sum('deduct_absence'))}</td>
      <td class="num">${fmt$(sum('deduct_labor_ins'))}</td>
      <td class="num">${fmt$(sum('deduct_health_ins'))}</td>
      <td class="num">${fmt$(sum('deduct_tax'))}</td>
      <td class="num">${fmt$(sum('attendance_penalty_total'))}</td>
      <td class="num gen-cell">${fmt$(sum('gross_salary'))}</td>
      <td class="num gen-cell">${fmt$(sum('net_salary'))}</td>
      <td>—</td>
      <td>—</td>
    </tr>
  `;
}

async function batchGenerate(){
  const month = document.getElementById('f-month').value;
  const [y, m] = month.split('-');
  if (!confirm(`完整重算 ${month} 全部員工的薪資?\n_manual 欄位保留;_auto 欄位重新算。`)) return;
  try {
    const r = await api('/api/salary', { method:'POST', body: JSON.stringify({
      action: 'batch_v2', year: parseInt(y), month: parseInt(m),
    })});
    toast(`批次完成:成功 ${r.success} / 失敗 ${r.failed}`);
    if (r.failed > 0) console.warn('failures', r.results.filter(x => !x.ok));
    await load();
  } catch(e){ toast('批次失敗:'+e.message,'error'); }
}

function openEdit(id){
  currentRow = allRows.find(r => r.id === id);
  if (!currentRow) return;
  document.getElementById('modal-title').textContent = `編輯 ${currentRow.emp_name||currentRow.employee_id}`;
  // B26 批次 4:離職月在 modal-meta 顯示 pill + pro-rata 資訊
  const finalMonthBadge = currentRow.is_final_month
    ? `<span class="pill" style="margin-left:6px;background:rgba(248,113,113,.12);color:#F87171;border:1px solid rgba(248,113,113,.25)">✦ 離職月</span>`
    : '';
  const proRataInfo = currentRow.is_final_month ? `
    <div style="margin-top:10px;padding:10px 14px;border:1px solid rgba(248,113,113,.2);border-radius:6px;background:rgba(248,113,113,.04);font-size:12px;line-height:1.7">
      <div style="font-weight:600;color:#F87171;margin-bottom:6px">✦ 離職月 Pro-rata 結算</div>
      <div>在職曆日:<b>${currentRow.worked_days || '—'} / ${currentRow.total_days_in_month || '—'}</b> 日(${currentRow.pro_rata_mode || 'calendar_day'})</div>
      <div>原月薪:<span class="num">${fmt$(currentRow.base_salary)}</span></div>
      <div>Pro-rata 月薪:<span class="num" style="color:#F87171"><b>${fmt$(currentRow.prorata_base)}</b></span> = ${fmt$(currentRow.base_salary)} × ${currentRow.worked_days}/${currentRow.total_days_in_month}</div>
      <div>§38 結算日薪:<span class="num">${fmt$(currentRow.daily_wage_settlement)}</span> = ${fmt$(currentRow.base_salary)} / 30</div>
      <div>特休未休折現:<span class="num">${fmt$(currentRow.settlement_amount)}</span></div>
      <div>補休餘額折現:<span class="num">${fmt$(currentRow.comp_expiry_payout)}</span></div>
      <div style="margin-top:6px;color:var(--text-dim);font-size:11px">💡 本月為預扣稅、年度結算可能差額需另行申報</div>
    </div>` : '';
  document.getElementById('modal-meta').innerHTML =
    `${currentRow.year}/${String(currentRow.month).padStart(2,'0')} · 狀態 ${currentRow.status}${finalMonthBadge}${proRataInfo}`;

  // Auto fields(唯讀)
  // 兼職時薪制:底薪行改顯「時薪 × 工時 = prorata_base」拆解、不顯示 base=0
  const _isHourly = n0(currentRow.hourly_rate) > 0 && n0(currentRow.work_hours) > 0;
  const baseLine = _isHourly
    ? `<div>底薪:<span class="num">時薪 ${fmt$(currentRow.hourly_rate)} × 工時 ${currentRow.work_hours} = <b>${fmt$(currentRow.prorata_base)}</b></span></div>`
    : `<div>底薪:<span class="num">${fmt$(currentRow.base_salary)}</span></div>`;
  document.getElementById('auto-fields').innerHTML = `
    ${baseLine}
    <div>日薪 snapshot:<span class="num">${fmt$(currentRow.daily_wage_snapshot)}</span></div>
    <div>全勤 base:<span class="num">${fmt$(currentRow.attendance_bonus_base)}</span></div>
    <div>全勤扣比:<span class="num">${(n0(currentRow.attendance_bonus_deduction_rate)*100).toFixed(1)}%</span></div>
    <div>全勤 actual:<span class="num gen-cell">${fmt$(currentRow.attendance_bonus_actual)}</span></div>
    <div>加班費 auto:<span class="num">${fmt$(currentRow.overtime_pay_auto)}</span></div>
    <div>補休失效付:<span class="num">${fmt$(currentRow.comp_expiry_payout)}</span></div>
    <div>結算金額:<span class="num">${fmt$(currentRow.settlement_amount)}</span></div>
    <div>假日工作:<span class="num">${fmt$(currentRow.holiday_work_pay)}</span></div>
    <div>曠職天數:<span class="num">${currentRow.absence_days}</span></div>
    <div>扣曠職:<span class="num">${fmt$(currentRow.deduct_absence)}</span></div>
    <div>扣懲處:<span class="num">${fmt$(currentRow.attendance_penalty_total)}</span></div>
  `;

  document.getElementById('m-otm').value   = currentRow.overtime_pay_manual ?? 0;
  document.getElementById('m-allow').value = currentRow.allowance ?? 0;
  document.getElementById('m-extra').value = currentRow.extra_allowance ?? 0;
  document.getElementById('m-li').value    = currentRow.deduct_labor_ins ?? 0;
  document.getElementById('m-hi').value    = currentRow.deduct_health_ins ?? 0;
  document.getElementById('m-tax').value   = currentRow.deduct_tax ?? 0;
  document.getElementById('f-deduct-tax-lock').checked = currentRow.deduct_tax_manual_override === true;
  document.getElementById('m-otn').value   = currentRow.overtime_pay_note ?? '';
  document.getElementById('m-sn').value    = currentRow.settlement_note ?? '';

  document.getElementById('btn-pay').style.display = currentRow.status === 'confirmed' ? '' : 'none';

  ['m-otm','m-allow','m-extra','m-li','m-hi','m-tax'].forEach(id => {
    document.getElementById(id).oninput = updatePreview;
  });
  updatePreview();

  // P6.2:render audit history + reset force override
  renderSalaryAuditHistory(currentRow.admin_audit_note);
  document.getElementById('f-force-override').checked = false;
  document.getElementById('force-override-row').style.display = 'none';

  document.getElementById('edit-modal').classList.add('open');
}

// P6.2:render audit history(parse admin_audit_note)
function renderSalaryAuditHistory(note) {
  const row = document.getElementById('audit-history-row');
  const content = document.getElementById('audit-history-content');
  if (!note || !note.trim()) {
    row.style.display = 'none';
    return;
  }
  const lines = note.split('\n').filter(l => l.trim());
  if (lines.length === 0) {
    row.style.display = 'none';
    return;
  }
  row.style.display = '';
  content.innerHTML = lines.map(l => {
    // [FORCE] 標記紅色強調
    const escaped = escHtml(l);
    return l.includes('[FORCE]')
      ? `<div style="color:#F87171">${escaped}</div>`
      : `<div>${escaped}</div>`;
  }).join('');
}

// P6.2:處理 PERIOD_LOCKED 403、progressive disclose force checkbox
function handleLockError(e) {
  const msg = e.message || '';
  // P6.1 後端回 { error: 'PERIOD_LOCKED', detail: '...' }、e.message 通常含 'PERIOD_LOCKED'
  if (msg.includes('PERIOD_LOCKED')) {
    document.getElementById('force-override-row').style.display = 'flex';
    toast('此 payroll_period 已 locked、勾選 force checkbox 後重新儲存可覆寫', 'error');
    return;
  }
  toast('操作失敗:' + msg, 'error');
}

function closeModal(){
  document.getElementById('edit-modal').classList.remove('open');
  // P6.2 reset audit history + force override
  document.getElementById('audit-history-row').style.display = 'none';
  document.getElementById('force-override-row').style.display = 'none';
  document.getElementById('f-force-override').checked = false;
}

function updatePreview(){
  if (!currentRow) return;
  const otm = parseFloat(document.getElementById('m-otm').value) || 0;
  const allow = parseFloat(document.getElementById('m-allow').value) || 0;
  const extra = parseFloat(document.getElementById('m-extra').value) || 0;
  const li = parseFloat(document.getElementById('m-li').value) || 0;
  const hi = parseFloat(document.getElementById('m-hi').value) || 0;
  const tax = parseFloat(document.getElementById('m-tax').value) || 0;
  // 套 batch_c GENERATED 公式
  const gross = n0(currentRow.base_salary) + n0(currentRow.attendance_bonus_actual)
    + allow + extra
    + (n0(currentRow.overtime_pay_auto) + otm)
    + n0(currentRow.comp_expiry_payout)
    + n0(currentRow.holiday_work_pay)
    + n0(currentRow.settlement_amount);
  const net = gross
    - n0(currentRow.deduct_absence) - li - hi - tax
    - n0(currentRow.attendance_penalty_total);
  document.getElementById('preview').innerHTML =
    `應發: $${fmt$(gross)} &nbsp;&nbsp; 實發: $${fmt$(net)}`;
}

async function saveManual(){
  if (!currentRow) return;
  const payload = {
    overtime_pay_manual: parseFloat(document.getElementById('m-otm').value) || 0,
    allowance:           parseFloat(document.getElementById('m-allow').value) || 0,
    extra_allowance:     parseFloat(document.getElementById('m-extra').value) || 0,
    deduct_labor_ins:    parseFloat(document.getElementById('m-li').value) || 0,
    deduct_health_ins:   parseFloat(document.getElementById('m-hi').value) || 0,
    deduct_tax:          parseFloat(document.getElementById('m-tax').value) || 0,
    deduct_tax_manual_override: document.getElementById('f-deduct-tax-lock').checked,
    overtime_pay_note:   document.getElementById('m-otn').value || null,
    settlement_note:     document.getElementById('m-sn').value || null,
  };
  // P6.2:force flag(撞到 locked 時、HR 主動勾才送)
  const force = document.getElementById('f-force-override').checked;
  const url = `/api/salary/${encodeURIComponent(currentRow.id)}${force ? '?force=true' : ''}`;
  try {
    await api(url, { method:'PUT', body: JSON.stringify(payload) });
    toast('已儲存手動欄位');
    closeModal();
    await load();
  } catch(e){
    handleLockError(e);
  }
}

async function recalculate(){
  if (!currentRow) return;
  if (!confirm(`完整重算此筆薪資?\n_manual 欄位保留;_auto 欄位重新算。`)) return;
  try {
    await api('/api/salary/recalculate', { method:'POST', body: JSON.stringify({
      employee_id: currentRow.employee_id, year: currentRow.year, month: currentRow.month,
    })});
    toast('已重算');
    closeModal();
    await load();
  } catch(e){ toast('重算失敗:'+e.message,'error'); }
}

async function confirmRec(){
  if (!currentRow) return;
  const force = document.getElementById('f-force-override').checked;
  const url = `/api/salary/${encodeURIComponent(currentRow.id)}?action=confirm${force ? '&force=true' : ''}`;
  try {
    await api(url, { method:'PUT' });
    toast('已確認');
    closeModal();
    await load();
  } catch(e){
    handleLockError(e);
  }
}

async function payRec(){
  if (!currentRow) return;
  if (!confirm('標記為已發放?')) return;
  const force = document.getElementById('f-force-override').checked;
  const url = `/api/salary/${encodeURIComponent(currentRow.id)}?action=pay${force ? '&force=true' : ''}`;
  try {
    await api(url, { method:'PUT' });
    toast('已標記發放');
    closeModal();
    await load();
  } catch(e){
    handleLockError(e);
  }
}

buildMonthOptions();
load();
</script>
