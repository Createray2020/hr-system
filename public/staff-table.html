<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>員工試算表 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Sheet wrapper: scrolls both axes ── */
.sheet-wrap {
  overflow: auto;
  max-height: calc(100vh - 230px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
}

.sheet-table {
  border-collapse: collapse;
  table-layout: fixed;
  width: max-content;
  min-width: 100%;
}

/* Cells */
.sheet-table th,
.sheet-table td {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 0;
  height: 34px;
  white-space: nowrap;
  overflow: hidden;
  position: relative;
}
.sheet-table tr:first-child th { border-top: none; }
.sheet-table td:first-child,
.sheet-table th:first-child  { border-left: none; }

/* Sticky header */
.sheet-table thead th {
  background: var(--surface2);
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  letter-spacing: .4px;
  color: var(--text-dim);
  text-transform: uppercase;
  position: sticky;
  top: 0;
  z-index: 2;
  padding: 0 8px;
  user-select: none;
}

/* Sticky first column */
.sheet-table th:first-child,
.sheet-table td:first-child {
  position: sticky;
  left: 0;
  z-index: 1;
  background: var(--surface2);
}
.sheet-table thead th:first-child { z-index: 3; }

/* Row alternating */
.sheet-table tbody tr:nth-child(even) td { background: rgba(255,255,255,.018); }
.sheet-table tbody tr:nth-child(even) td:first-child { background: rgba(255,255,255,.035); }

/* Resigned rows */
.sheet-table tbody tr.row-resigned td { opacity: .45; }

/* Cell inner */
.ci {
  padding: 0 8px;
  height: 34px;
  display: flex;
  align-items: center;
  font-size: 12px;
  cursor: text;
  gap: 4px;
}
.ci.ro  { cursor: default; }
.ci.acc { color: var(--accent2); font-family: 'DM Mono', monospace; font-weight: 600; }
.ci.mn  { font-family: 'DM Mono', monospace; }

/* Active edit */
.cell-edit-wrap {
  height: 34px;
  display: flex;
  align-items: stretch;
}
.cell-input {
  width: 100%;
  background: var(--bg);
  border: 2px solid var(--accent);
  color: var(--text);
  font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  padding: 0 6px;
  outline: none;
  box-sizing: border-box;
}
.cell-input.mn { font-family: 'DM Mono', monospace; }

/* Flash */
@keyframes fok  { 0%,100%{background:transparent} 40%{background:rgba(76,175,80,.28)} }
@keyframes ferr { 0%,100%{background:transparent} 40%{background:rgba(244,67,54,.28)} }
.f-ok  { animation: fok  .65s ease; }
.f-err { animation: ferr .65s ease; }

/* Resize handle */
.rh {
  position: absolute;
  top: 0; right: 0;
  width: 5px; height: 100%;
  cursor: col-resize;
  z-index: 4;
}
.rh:hover { background: var(--accent); opacity: .5; }

/* Badges */
.cbadge { display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600 }
.cb-active   { background:rgba(76,175,80,.2);  color:#81C784 }
.cb-inactive { background:rgba(255,152,0,.2);  color:#FFB74D }
.cb-resigned { background:rgba(180,180,180,.15);color:#9E9E9E }
.cb-full { color:#7EB3FF }
.cb-part { color:#FFA050 }

/* Sheet footer */
.sheet-footer {
  padding: 10px 0 0;
  display: flex; align-items: center; gap: 12px;
}
.save-hint { font-size:11px;color:var(--text-dim) }
</style>
</head>
<body data-page="staff-table">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">員工試算表</div>
        <div class="page-sub">點擊格子直接編輯，離開格子自動儲存至 Supabase</div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="搜尋姓名、Email、員工編號…" oninput="applyFilter()">
      <select id="dept-filter" onchange="applyFilter()">
        <option value="">全部部門</option>
      </select>
      <select id="status-filter" onchange="applyFilter()">
        <option value="active">在職</option>
        <option value="">全部</option>
        <option value="resigned">已離職</option>
      </select>
      <span id="row-count" class="save-hint" style="margin-left:4px"></span>
    </div>

    <!-- Spreadsheet -->
    <div class="sheet-wrap" id="sheet-wrap">
      <table class="sheet-table" id="sheet-table">
        <colgroup id="colgroup"></colgroup>
        <thead><tr id="head-row"></tr></thead>
        <tbody id="sheet-body"></tbody>
      </table>
    </div>

    <!-- Footer -->
    <div class="sheet-footer">
      <button class="btn btn-primary" onclick="openAddModal()">＋ 新增員工</button>
      <span id="save-status" class="save-hint"></span>
    </div>
  </main>
</div>

<!-- Add employee modal -->
<div class="modal-bg" id="add-modal">
  <div class="modal" style="max-width:440px">
    <div class="modal-title">＋ 新增員工</div>
    <div class="detail-grid">
      <div class="form-row"><label class="form-label">姓名 *</label><input class="form-input" id="add-name" placeholder="請輸入姓名"></div>
      <div class="form-row"><label class="form-label">職稱 *</label><input class="form-input" id="add-position" placeholder="請輸入職稱"></div>
      <div class="form-row"><label class="form-label">部門 *</label>
        <select class="form-select" id="add-dept"></select>
      </div>
      <div class="form-row"><label class="form-label">入職日期</label>
        <input class="form-input" type="date" id="add-hire">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('add-modal')">取消</button>
      <button class="btn btn-primary" onclick="addEmployee()">建立員工</button>
    </div>
  </div>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}

/* ══════════════════════════════════════════
   Column definitions
══════════════════════════════════════════ */
const COLS = [
  { key:'emp_no',            label:'員工編號',  w:102, ro:true, cls:'mn' },
  { key:'name',              label:'姓名',      w:88 },
  { key:'employment_type',   label:'雇用類型',  w:84,
    type:'select', opts:['full_time','part_time'],
    disp: v => v==='part_time'
      ? '<span class="cb-part">兼職</span>'
      : '<span class="cb-full">正職</span>',
    editVal: v => v },
  { key:'dept',              label:'部門',      w:88, type:'select-dept' },
  { key:'position',          label:'職稱',      w:108 },
  { key:'grade',             label:'職等',      w:56,
    type:'select', opts:['','一等','二等','三等'] },
  { key:'grade_level',       label:'職級',      w:48, type:'number', cls:'mn' },
  { key:'hire_date',         label:'入職日期',  w:100, type:'date', cls:'mn' },
  { key:'resign_date',       label:'離職日期',  w:100, type:'date', cls:'mn' },
  { key:'_seniority',        label:'年資',      w:72, ro:true,
    compute: e => seniority(e.hire_date) },
  { key:'base_salary',       label:'本薪',      w:86, type:'number', cls:'mn',
    disp: v => v ? '$'+Number(v).toLocaleString() : '—' },
  { key:'grade_allowance',   label:'職等加給',  w:86, type:'number', cls:'mn',
    disp: v => v ? '+$'+Number(v).toLocaleString() : '—' },
  { key:'attendance_bonus',  label:'全勤',      w:72, type:'number', cls:'mn',
    disp: v => v ? '+$'+Number(v).toLocaleString() : '—' },
  { key:'manager_allowance', label:'主管加給',  w:86, type:'number', cls:'mn',
    disp: v => v ? '+$'+Number(v).toLocaleString() : '—' },
  { key:'extra_allowance',   label:'額外加給',  w:86, type:'number', cls:'mn',
    disp: v => v ? '+$'+Number(v).toLocaleString() : '—' },
  { key:'_total',            label:'月薪合計',  w:100, ro:true, cls:'acc mn',
    compute: e => {
      const t = (e.base_salary||0)+(e.grade_allowance||0)+
                (e.attendance_bonus||0)+(e.manager_allowance||0)+(e.extra_allowance||0);
      return t ? '$'+t.toLocaleString() : '—';
    }
  },
  { key:'email',             label:'電子郵件',  w:150 },
  { key:'phone',             label:'電話',      w:110, cls:'mn' },
  { key:'status',            label:'狀態',      w:72,
    type:'select', opts:['active','inactive','resigned'],
    disp: v => {
      const m={active:'在職',inactive:'暫停',resigned:'已離職'};
      const c={active:'active',inactive:'inactive',resigned:'resigned'};
      return `<span class="cbadge cb-${c[v]||''}">${m[v]||v||'—'}</span>`;
    },
    editVal: v => v },
];

/* ══════════════════════════════════════════
   State
══════════════════════════════════════════ */
let allEmployees = [];
let allDepts     = [];
let filtered     = [];
let editing      = null; // { td, col, emp, oldRaw }

/* ── Helpers ── */
function seniority(hire) {
  if (!hire) return '—';
  const s = new Date(hire), n = new Date();
  let y = n.getFullYear()-s.getFullYear(), m = n.getMonth()-s.getMonth();
  if (m < 0) { y--; m += 12; }
  if (y < 0) return '未到職';
  return y > 0 ? `${y}年${m}月` : `${m}月`;
}

function getRaw(col, emp) {
  if (col.compute) return col.compute(emp);
  return emp[col.key] ?? '';
}

function renderVal(col, emp) {
  const raw = getRaw(col, emp);
  if (col.disp) return col.disp(raw);
  if (raw === '' || raw === null || raw === undefined) return '';
  return String(raw);
}

/* ══════════════════════════════════════════
   Init
══════════════════════════════════════════ */
window.onload = async () => {
  await new Promise(r => setTimeout(r, 600));
  try {
    [allEmployees, allDepts] = await Promise.all([
      api('/api/employees'),
      api('/api/departments'),
    ]);
    fillDeptFilter();
    buildColgroup();
    buildHead();
    applyFilter();
    document.getElementById('add-hire').value = new Date().toISOString().split('T')[0];
  } catch(e) { toast('載入失敗：'+e.message,'error'); }
};

function fillDeptFilter() {
  const opts = allDepts.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
  document.getElementById('dept-filter').innerHTML =
    '<option value="">全部部門</option>' + opts;
  const add = document.getElementById('add-dept');
  if (add) add.innerHTML = opts;
}

/* ══════════════════════════════════════════
   Table structure
══════════════════════════════════════════ */
function buildColgroup() {
  document.getElementById('colgroup').innerHTML =
    COLS.map(c => `<col style="width:${c.w}px;min-width:${c.w}px">`).join('');
}

function buildHead() {
  const tr = document.getElementById('head-row');
  COLS.forEach((col, i) => {
    const th = document.createElement('th');
    th.textContent = col.label;

    // Resize handle
    const rh = document.createElement('div');
    rh.className = 'rh';
    th.appendChild(rh);
    initResize(rh, i);

    tr.appendChild(th);
  });
}

function initResize(handle, idx) {
  let sx, sw;
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    sx = e.clientX;
    const col = document.querySelectorAll('#colgroup col')[idx];
    sw = parseInt(col.style.width) || COLS[idx].w;
    const mv = e => {
      const w = Math.max(44, sw + e.clientX - sx);
      const c = document.querySelectorAll('#colgroup col')[idx];
      c.style.width = c.style.minWidth = w + 'px';
    };
    const up = () => { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', up);
  });
}

/* ══════════════════════════════════════════
   Filter + render
══════════════════════════════════════════ */
function applyFilter() {
  const q   = document.getElementById('search-input').value.toLowerCase();
  const dept = document.getElementById('dept-filter').value;
  const st   = document.getElementById('status-filter').value;
  filtered = allEmployees.filter(e => {
    if (st   && e.status !== st)   return false;
    if (dept && e.dept   !== dept) return false;
    if (q && !e.name?.toLowerCase().includes(q) &&
        !(e.email   ||'').toLowerCase().includes(q) &&
        !(e.emp_no  ||'').toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('row-count').textContent = `${filtered.length} 筆`;
  renderBody();
}

function renderBody() {
  // Commit any active edit before re-render
  if (editing) commitEdit(false);

  const tbody = document.getElementById('sheet-body');
  tbody.innerHTML = '';

  filtered.forEach(emp => {
    const tr = document.createElement('tr');
    tr.dataset.id = emp.id;
    if (emp.status === 'resigned') tr.classList.add('row-resigned');

    COLS.forEach(col => {
      const td = document.createElement('td');
      td.dataset.id  = emp.id;
      td.dataset.key = col.key;
      renderCell(td, col, emp);
      if (!col.ro && !col.compute) {
        td.addEventListener('click', () => startEdit(td, col, emp));
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

/* ── Render a cell (display mode) ── */
function renderCell(td, col, emp) {
  const div = document.createElement('div');
  div.className = 'ci' + (col.ro || col.compute ? ' ro' : '') +
                  (col.cls ? ' ' + col.cls : '');
  div.innerHTML = renderVal(col, emp);
  td.innerHTML = '';
  td.appendChild(div);
}

/* ══════════════════════════════════════════
   Inline editing
══════════════════════════════════════════ */
function startEdit(td, col, emp) {
  // Commit any other active edit
  if (editing && editing.td !== td) commitEdit(true);
  if (editing?.td === td) return;

  const raw = emp[col.key] ?? '';

  let input;
  if (col.type === 'select' || col.type === 'select-dept') {
    input = document.createElement('select');
    input.className = 'cell-input';
    const source = col.type === 'select-dept' ? allDepts.map(d=>d.name) : col.opts;
    source.forEach(opt => {
      const o = document.createElement('option');
      o.value = opt;
      o.textContent = col.type === 'select-dept' ? opt
        : (col.editVal ? col.editVal(opt) : opt) || (opt === '' ? '（無）' : opt);
      if (opt === raw) o.selected = true;
      input.appendChild(o);
    });
    input.addEventListener('change', () => commitEdit(true));
  } else if (col.type === 'date') {
    input = document.createElement('input');
    input.type = 'date'; input.value = raw || '';
    input.className = 'cell-input mn';
  } else if (col.type === 'number') {
    input = document.createElement('input');
    input.type = 'number'; input.min = '0'; input.value = raw === '' ? '' : Number(raw);
    input.className = 'cell-input mn';
  } else {
    input = document.createElement('input');
    input.type = 'text'; input.value = String(raw);
    input.className = 'cell-input';
  }

  td.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'cell-edit-wrap';
  wrap.appendChild(input);
  td.appendChild(wrap);

  editing = { td, col, emp, oldRaw: raw };
  input.focus();
  if (input.type === 'text' || input.type === 'number') input.select();

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); commitEdit(true); }
    if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
  });
  input.addEventListener('blur', () => {
    // Delay to allow click on another cell to register first
    setTimeout(() => { if (editing?.td === td) commitEdit(true); }, 120);
  });
}

async function commitEdit(doSave) {
  if (!editing) return;
  const ctx = editing;
  editing = null;

  const { td, col, emp } = ctx;
  const input = td.querySelector('input, select');
  const newRaw = input ? input.value : ctx.oldRaw;

  // Compute typed value
  const newVal = col.type === 'number'
    ? (newRaw === '' ? null : parseFloat(newRaw) || 0)
    : (newRaw === '' || newRaw === null ? null : newRaw);

  // Optimistic update
  const updEmp = { ...emp, [col.key]: newVal };
  const ai = allEmployees.findIndex(e => e.id === emp.id);
  const fi = filtered.findIndex(e => e.id === emp.id);
  if (ai >= 0) allEmployees[ai] = updEmp;
  if (fi >= 0) filtered[fi]     = updEmp;

  // Re-render this cell and computed cells in same row
  renderCell(td, col, updEmp);
  refreshComputedCells(td.closest('tr'), updEmp);

  // Resigned styling
  if (col.key === 'status') {
    td.closest('tr').classList.toggle('row-resigned', updEmp.status === 'resigned');
  }

  // No actual change or readonly → skip API call
  const unchanged = String(newRaw ?? '') === String(ctx.oldRaw ?? '');
  if (!doSave || unchanged) return;

  const payload = { [col.key]: newVal };
  setSaveStatus('儲存中…');
  try {
    await api(`/api/employees/${emp.id}`, { method:'PUT', body: JSON.stringify(payload) });
    flash(td, 'ok');
    setSaveStatus('已儲存', 2500);
  } catch(e) {
    flash(td, 'err');
    toast('儲存失敗：' + e.message, 'error');
    setSaveStatus('儲存失敗', 2500);
    // Revert
    if (ai >= 0) allEmployees[ai] = emp;
    if (fi >= 0) filtered[fi]     = emp;
    renderCell(td, col, emp);
    refreshComputedCells(td.closest('tr'), emp);
  }
}

function cancelEdit() {
  if (!editing) return;
  const { td, col, emp } = editing;
  editing = null;
  renderCell(td, col, emp);
}

function refreshComputedCells(tr, emp) {
  if (!tr) return;
  COLS.forEach(c => {
    if (!c.compute) return;
    const ct = tr.querySelector(`td[data-key="${c.key}"]`);
    if (ct) renderCell(ct, c, emp);
  });
}

function flash(td, type) {
  td.classList.remove('f-ok','f-err');
  void td.offsetWidth;
  td.classList.add(type === 'ok' ? 'f-ok' : 'f-err');
}

let _saveTimer;
function setSaveStatus(msg, clearAfter) {
  document.getElementById('save-status').textContent = msg;
  clearTimeout(_saveTimer);
  if (clearAfter) _saveTimer = setTimeout(
    () => { document.getElementById('save-status').textContent = ''; }, clearAfter);
}

/* ══════════════════════════════════════════
   Add employee modal
══════════════════════════════════════════ */
function openAddModal() {
  document.getElementById('add-name').value     = '';
  document.getElementById('add-position').value = '';
  document.getElementById('add-hire').value     = new Date().toISOString().split('T')[0];
  if (allDepts.length) document.getElementById('add-dept').selectedIndex = 0;
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('add-name').focus(), 60);
}

async function addEmployee() {
  const name     = document.getElementById('add-name').value.trim();
  const position = document.getElementById('add-position').value.trim();
  const dept     = document.getElementById('add-dept').value;
  const hire_date= document.getElementById('add-hire').value || null;
  if (!name || !position) { toast('請填寫姓名和職稱', 'error'); return; }
  try {
    const result = await api('/api/employees', {
      method: 'POST',
      body: JSON.stringify({
        name, position, dept, hire_date,
        status: 'active', employment_type: 'full_time', base_salary: 30000,
      }),
    });
    closeModal('add-modal');
    allEmployees = await api('/api/employees');
    applyFilter();
    const hint = result.auth_email ? `  帳號：${result.auth_email} / 密碼：123456` : '';
    toast('✅ 員工已新增' + hint, 'success');
  } catch(e) { toast('新增失敗：' + e.message, 'error'); }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
</script>
<script src="/js/layout.js"></script>
</body>
</html>
