<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>我的排班 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .status-pill{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace}
  .st-draft    {background:rgba(107,114,128,.15);color:#9CA3AF}
  .st-submitted{background:rgba(251,191,36,.15);color:#FBBF24}
  .st-approved {background:rgba(74,222,128,.15);color:#4ADE80}
  .st-locked   {background:rgba(91,141,239,.15);color:#7FBBFF}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}
  .cal-h{text-align:center;font-size:11px;color:var(--text-dim);padding:6px 0;font-family:'DM Mono',monospace}
  .cal-cell{min-height:88px;background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:8px;padding:6px;cursor:pointer;display:flex;flex-direction:column;gap:4px;transition:background .12s;min-width:0;overflow:hidden}
  .cal-cell:hover{background:rgba(91,141,239,.08)}
  .cal-cell.disabled{cursor:not-allowed;opacity:.45}
  .cal-cell.other-month{opacity:.25}
  .cal-cell.has-shift{border-color:rgba(91,141,239,.4)}
  .cal-cell.day-off{border-color:rgba(107,114,128,.5);background:rgba(107,114,128,.06)}
  .cal-day-num{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
  /* 5/1 backlog (5):shift line / wish tag 補 nowrap+ellipsis、防 mobile 窄 cell 撐爆 grid。
     desktop cell 夠寬、ellipsis 不觸發、行為不變。max-width:100% 讓 inline-block tag 不超 cell。*/
  .cal-shift-line{font-size:11px;color:#7FBBFF;font-family:'DM Mono',monospace;line-height:1.3;
                  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .cal-wish-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;
                background:rgba(91,141,239,.18);color:#7FBBFF;font-weight:500;
                max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Mobile <=480px:cell 縮 padding / font 縮一級 / grid gap 縮、給 cell 多塞幾 px。
     viewport 380px 時:cell 寬從 ~43 變 ~46、content area 從 ~31 變 ~38、
     塞「希望早班」(9px Chinese × 4 ~ 36px)剛好不觸發 ellipsis。
     iPad mini 直 744px 不觸發、保留 desktop-ish UX。 */
  @media (max-width: 480px) {
    .cal-grid     { gap: 4px; }
    .cal-cell     { padding: 4px; min-height: 70px; gap: 2px; }
    .cal-day-num  { font-size: 12px; }
    .cal-shift-line { font-size: 9px;  line-height: 1.2; }
    .cal-wish-tag { font-size: 9px;  padding: 1px 4px; }
  }
  .banner{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
  .banner-info{background:rgba(91,141,239,.12);color:#7FBBFF;border:0.5px solid rgba(91,141,239,.3)}
  .banner-warn{background:rgba(251,191,36,.12);color:#FBBF24;border:0.5px solid rgba(251,191,36,.3)}
  .banner-lock{background:rgba(107,114,128,.12);color:#9CA3AF;border:0.5px solid rgba(107,114,128,.3)}

  /* ── 無側欄時 main 解除 240px 左 margin ── */
  .main.no-sidebar{margin-left:0}

  /* ── 返回按鈕（員工從 mobile bottom nav 進來時用）── */
  .back-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);
            padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;
            font-family:'Noto Sans TC',sans-serif;margin-bottom:14px;transition:border-color .15s}
  .back-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body data-page="employee-schedule">
<div class="shell">
  <main class="main no-sidebar">
    <button class="back-btn" onclick="history.length > 1 ? history.back() : (location.href='/employee-app.html')">← 返回</button>
    <div class="page-header">
      <div>
        <div class="page-title">我的排班</div>
        <div class="page-sub">每月 25 號前送出下個月排班</div>
      </div>
      <div class="header-actions" style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-ghost" onclick="changeMonth(-1)">←</button>
        <div id="month-label" style="font-family:'DM Mono',monospace;font-size:16px;min-width:90px;text-align:center"></div>
        <button class="btn btn-ghost" onclick="changeMonth(1)">→</button>
        <span id="status-pill"></span>
      </div>
    </div>

    <div id="banner-info"   class="banner banner-info"></div>
    <div id="banner-warn"   class="banner banner-warn"></div>
    <div id="banner-locked" class="banner banner-lock"></div>

    <div id="main-content">
      <div class="cal-grid" id="cal-head">
        <div class="cal-h">一</div><div class="cal-h">二</div><div class="cal-h">三</div>
        <div class="cal-h">四</div><div class="cal-h">五</div><div class="cal-h">六</div><div class="cal-h">日</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>

      <div style="display:flex;justify-content:flex-end;margin-top:18px;gap:10px">
        <button class="btn btn-ghost" id="btn-create-period" onclick="createPeriod()" style="display:none">建立此月排班</button>
        <button class="btn btn-ghost" id="btn-apply-tpl" onclick="openTemplatePicker()" style="display:none">套用範本</button>
        <button class="btn btn-primary" id="btn-submit" onclick="submitPeriod()" style="display:none">送出主管確認</button>
      </div>
    </div>
  </main>
</div>

<!-- 編輯一天 modal -->
<div class="modal-bg" id="day-modal">
  <div class="modal" style="max-width:420px;width:95vw">
    <div class="modal-title" id="modal-title">編輯排班</div>
    <input type="hidden" id="f-date">

    <div style="margin-bottom:14px;color:var(--text-dim);font-size:13px;line-height:1.5">
      你可以標記「希望休假」表達當日不希望排班。其他日子的班別由主管統一安排。
    </div>

    <!-- G1:已標休假狀態 hint(openDayModal 切換顯隱) -->
    <div id="off-status-row" style="display:none;margin-bottom:14px;padding:10px 14px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);border-radius:8px;color:#4ADE80;font-size:13px">
      ✓ 已標記為「希望休假」
    </div>

    <!-- G1:單一操作按鈕 — 標休假 / 清除(依狀態切換)-->
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:18px">
      <button type="button" class="btn btn-primary" id="btn-mark-off" onclick="markDayOff()">標記休假</button>
      <button type="button" id="btn-clear-day" onclick="clearDay()" style="display:none;background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:6px;font-size:13px;cursor:pointer">
        清除（讓主管自由排）
      </button>
    </div>

    <div class="modal-actions" style="justify-content:flex-end;gap:8px">
      <button class="btn btn-ghost" onclick="closeDayModal()">關閉</button>
    </div>
  </div>
</div>

<!-- C10 套用範本 modal -->
<div class="modal-bg" id="tpl-modal">
  <div class="modal" style="max-width:520px;width:95vw">
    <div class="modal-title">選擇要套用的範本</div>
    <div style="margin-bottom:14px;color:var(--text-dim);font-size:13px;line-height:1.5">
      套用後會填入你尚未標休假的日子（已標休假的日子會保留）、確定再點。
    </div>
    <div id="tpl-list" style="max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:18px"></div>
    <div class="modal-actions" style="justify-content:flex-end;gap:8px">
      <button class="btn btn-ghost" onclick="closeTemplatePicker()">取消</button>
    </div>
  </div>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── State ──
let currentYear, currentMonth;
let period = null;       // schedule_periods row（null = 該月還沒建）
let schedules = [];      // schedules rows
let editing  = { date: null };  // G1:員工只能標休假、不再分 mode

// Default：下個月
{
  const d = new Date(); d.setMonth(d.getMonth()+1);
  currentYear = d.getFullYear(); currentMonth = d.getMonth()+1;
}

function changeMonth(delta) {
  let m = currentMonth + delta;
  let y = currentYear;
  if (m > 12) { m -= 12; y += 1; }
  if (m < 1)  { m += 12; y -= 1; }
  currentYear = y; currentMonth = m;
  load();
}

async function load(retries = 0) {
  if (!window.api || !window.currentUser) {
    if (retries < 25) return setTimeout(() => load(retries+1), 200);
    return;
  }
  document.getElementById('month-label').textContent = `${currentYear}/${String(currentMonth).padStart(2,'0')}`;
  try {
    const r = await api(`/api/schedule-periods?year=${currentYear}&month=${currentMonth}&employee_id=${currentUser.id}`);
    period = (r.periods || [])[0] || null;
    schedules = (r.schedules || []);
    render();
  } catch(e) {
    toast('載入失敗：' + e.message, 'error');
  }
}

function todayStr(){ return new Date().toISOString().slice(0,10); }

function isReadonly() {
  if (!period) return true; // 還沒建,不可編輯
  if (period.status !== 'draft') return true;
  if (period.period_start && todayStr() >= period.period_start) return true;
  return false;
}

// ── 判定 segments 屬於誰（v2.5：靠 period.status 區分）──
// draft 期間 = 員工 wish；submitted+ = 主管定案
// 之前用 shift_type_id===ST003 判定錯了 v2.5 後員工可標 ST001/ST002 wish
function isWishSeg(_s, periodStatus) {
  return periodStatus === 'draft' || !periodStatus;
}
function isManagerSeg(_s, periodStatus) {
  return !!periodStatus && periodStatus !== 'draft';
}

function render() {
  const banInfo = document.getElementById('banner-info');
  const banWarn = document.getElementById('banner-warn');
  const banLock = document.getElementById('banner-locked');
  const pill    = document.getElementById('status-pill');
  const btnSub  = document.getElementById('btn-submit');
  const btnNew  = document.getElementById('btn-create-period');
  const btnApplyTpl = document.getElementById('btn-apply-tpl');
  banInfo.style.display = banWarn.style.display = banLock.style.display = 'none';
  btnSub.style.display = 'none'; btnNew.style.display = 'none'; btnApplyTpl.style.display = 'none';
  pill.innerHTML = '';

  if (!period) {
    banInfo.textContent = '此月還沒建立排班週期。點下方按鈕建立 draft 後開始排班。';
    banInfo.style.display = '';
    btnNew.style.display = '';
  } else {
    const s = period.status;
    pill.innerHTML = `<span class="status-pill st-${s}">${s.toUpperCase()}</span>`;
    if (s === 'draft') {
      if (period.period_start && todayStr() >= period.period_start) {
        banLock.textContent = '月份已開始,排班已凍結。請洽主管調整。';
        banLock.style.display = '';
      } else {
        banInfo.textContent = '可編輯。點任一格標記「希望早班 / 晚班 / 休假」、完成後請按下方「送出主管確認」。';
        banInfo.style.display = '';
        btnSub.style.display = '';
        btnApplyTpl.style.display = '';
      }
    } else if (s === 'submitted') {
      banWarn.textContent = '已送出,等主管確認中。確認前不可編輯。';
      banWarn.style.display = '';
    } else if (s === 'approved') {
      banWarn.textContent = '主管已定案,等待月份開始自動鎖定。';
      banWarn.style.display = '';
    } else if (s === 'locked') {
      banLock.textContent = '已鎖定,如需調整請洽主管。';
      banLock.style.display = '';
    }
  }

  renderCalendar();
}

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const first = new Date(currentYear, currentMonth - 1, 1);
  const last  = new Date(currentYear, currentMonth, 0);
  // 週一為首日:JS 週日=0,週一=1; 我們把週日視為 6,週一視為 0
  const startWd = (first.getDay() + 6) % 7;
  const total   = startWd + last.getDate();
  const cells   = Math.ceil(total / 7) * 7;

  const ro = isReadonly();
  const segByDate = {};
  for (const s of schedules) {
    (segByDate[s.work_date] = segByDate[s.work_date] || []).push(s);
  }

  for (let i = 0; i < cells; i++) {
    const day = i - startWd + 1;
    const inMonth = day >= 1 && day <= last.getDate();
    const date = inMonth
      ? `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`
      : null;

    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (inMonth ? '' : ' other-month') + (ro ? ' disabled' : '');
    if (inMonth) {
      const segs = segByDate[date] || [];
      const periodStatus = period?.status;
      const hasSeg = segs.length > 0;
      const isManager = hasSeg && segs.some(s => isManagerSeg(s, periodStatus));
      const isWish    = hasSeg && segs.some(s => isWishSeg(s, periodStatus));
      let inner = `<div class="cal-day-num">${day}</div>`;

      // 階段 B1 + Phase 1.3:approved leave 覆蓋、半日斜紋 / 全日純色
      const overlay = segs.find(s => s.leave_overlay)?.leave_overlay;
      if (overlay) {
        cell.classList.add(overlay.is_full_day ? 'schedule-leave-overlay' : 'schedule-leave-overlay-half');
        const origNames = segs.map(s => s.shift_types?.name).filter(Boolean).join('/');
        const shortLabel = overlay.is_full_day ? (overlay.leave_name || '假') : `${overlay.leave_name || '假'} (${overlay.hours}h)`;
        cell.title = `${overlay.leave_name || ''} (${overlay.leave_type}) — ${overlay.overlay_label_short || ''}`;
        inner += `<div class="cal-shift-line">${escHtml(shortLabel)}</div>`;
        if (origNames) inner += `<div class="leave-orig">原:${escHtml(origNames)}</div>`;
      } else if (isManager) {
        // 主管已排（period.status 非 draft）→ 顯示時段或班別名
        cell.classList.add('has-shift');
        const mgrSegs = segs.filter(s => isManagerSeg(s, periodStatus));
        for (const s of mgrSegs.slice(0,2)) {
          if (s.start_time && s.end_time) {
            inner += `<div class="cal-shift-line">${escHtml(fmtTime(s.start_time))}–${escHtml(fmtTime(s.end_time))}</div>`;
          } else {
            inner += `<div class="cal-shift-line">${escHtml(s.shift_types?.name || s.shift_type_id || '')}</div>`;
          }
        }
        if (mgrSegs.length > 2) inner += `<div class="cal-shift-line">+${mgrSegs.length-2} 段…</div>`;
      } else if (isWish) {
        // 員工自標 wish → 顯示「希望」+ shift_types.name
        const seg1 = segs[0];
        const wishLabel = seg1?.shift_types?.name ? '希望' + seg1.shift_types.name : '想休';
        inner += `<div class="cal-wish-tag">${escHtml(wishLabel)}</div>`;
        if (seg1?.shift_types?.is_off === true) cell.classList.add('day-off');
        else cell.classList.add('has-shift');
      }

      cell.innerHTML = inner;
      if (!ro) cell.onclick = () => openDayModal(date);
    } else {
      cell.innerHTML = `<div class="cal-day-num">${day < 1 ? new Date(currentYear, currentMonth-1, day).getDate() : day - last.getDate()}</div>`;
    }
    grid.appendChild(cell);
  }
}

function fmtTime(t) {
  if (!t) return '';
  const m = String(t).match(/^(\d{1,2}):(\d{2})/);
  return m ? `${m[1].padStart(2,'0')}:${m[2]}` : t;
}

// ── Day modal ──
function openDayModal(date) {
  const segs = (schedules.filter(s => s.work_date === date) || []);
  const periodStatus = period?.status;

  // 主管已排定（period 非 draft）→ 員工不能改、跳 toast 不開 modal
  if (segs.some(s => isManagerSeg(s, periodStatus))) {
    toast('主管已排定、如需調整請告知主管', 'warn');
    return;
  }

  // G1:該日是否已標休假(ST003 + __OFF__)
  const seg = segs.find(s => s.segment_no === 1) || segs[0];
  const isMarkedOff = seg?.shift_type_id === 'ST003' && seg?.note === '__OFF__';
  const hasAnySeg  = segs.length > 0;
  editing = { date };

  document.getElementById('modal-title').textContent = `編輯 ${date}`;
  document.getElementById('f-date').value = date;
  // 已標休假 → 顯示綠色 hint、隱藏「標記休假」、顯示「清除」
  // 未標     → 隱藏 hint、顯示「標記休假」
  // 有舊資料(非休假 wish) → 隱藏 hint、仍給「清除」當救援(防 v2.5 前 ST001/ST002 殘留)
  document.getElementById('off-status-row').style.display = isMarkedOff ? 'block' : 'none';
  document.getElementById('btn-mark-off').style.display   = isMarkedOff ? 'none'  : '';
  document.getElementById('btn-clear-day').style.display  = hasAnySeg   ? ''     : 'none';

  document.getElementById('day-modal').classList.add('open');
}

function closeDayModal(){ document.getElementById('day-modal').classList.remove('open'); }

// G1:員工只能標休假、固定送 ST003 + note='__OFF__'(對齊後端 EMPLOYEE_SHIFT_RESTRICTED)
async function markDayOff() {
  const date = editing.date;
  if (!date) return;

  // 1. 先 DELETE 既有 segments(防 conflict、含舊資料 ST001/ST002 殘留)
  const existing = schedules.filter(s => s.work_date === date);
  for (const s of existing) {
    try { await api(`/api/schedules/${encodeURIComponent(s.id)}`, { method:'DELETE' }); } catch(_){}
  }

  // 2. POST ST003 + __OFF__(後端唯一合法的員工自助 shift)
  const body = {
    period_id: period.id,
    employee_id: currentUser.id,
    work_date: date,
    shift_type_id: 'ST003',
    segment_no: 1,
    crosses_midnight: false,
    note: '__OFF__',
  };

  try {
    await api('/api/schedules', { method:'POST', body: JSON.stringify(body) });
  } catch(e) {
    toast('儲存失敗:'+e.message, 'error');
    return;
  }

  toast('已標記休假');
  closeDayModal();
  await load();
}

async function clearDay() {
  const date = editing.date || document.getElementById('f-date').value;
  if (!date) return;
  const existing = schedules.filter(s => s.work_date === date);
  try {
    for (const s of existing) {
      await api(`/api/schedules/${encodeURIComponent(s.id)}`, { method:'DELETE' });
    }
    toast('已清除（讓主管自由排）');
    closeDayModal();
    await load();
  } catch(e) {
    toast('清除失敗：' + e.message, 'error');
  }
}

// ── C10 套用範本 ──
async function openTemplatePicker() {
  if (!period) return;
  const modal = document.getElementById('tpl-modal');
  const list = document.getElementById('tpl-list');
  list.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:20px">載入中…</div>';
  modal.classList.add('open');

  try {
    const tpls = await api('/api/schedule-templates');
    if (!tpls.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:20px">尚無可用範本、請先到模板管理頁建立</div>';
      return;
    }
    list.innerHTML = tpls.map(t => `
      <div style="border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:background .12s"
           onmouseover="this.style.background='rgba(91,141,239,.08)'"
           onmouseout="this.style.background=''"
           onclick="applyTemplate('${escHtml(t.id)}', '${escHtml(t.name)}')">
        <div style="font-weight:600">${escHtml(t.name)}</div>
        ${t.description ? `<div style="font-size:12px;color:var(--text-dim);margin-top:4px">${escHtml(t.description)}</div>` : ''}
        ${t.is_shared ? '<span style="font-size:11px;color:#7FBBFF;margin-top:4px;display:inline-block">公開範本</span>' : ''}
      </div>
    `).join('');
  } catch(e) {
    list.innerHTML = `<div style="color:#F87171;padding:12px">載入失敗：${e.message}</div>`;
  }
}

function closeTemplatePicker() {
  document.getElementById('tpl-modal').classList.remove('open');
}

async function applyTemplate(templateId, templateName) {
  if (!confirm(`套用範本「${templateName}」會填入你尚未標休假的日子（已標休假的日子會保留），確定？`)) return;
  try {
    const r = await api(`/api/schedule-templates/${encodeURIComponent(templateId)}/apply`, {
      method: 'POST',
      body: JSON.stringify({ period_id: period.id }),
    });
    toast(`已套用範本「${templateName}」、${r.applied || 0} 天已填入`);
    closeTemplatePicker();
    await load();
  } catch(e) {
    toast('套用失敗：' + e.message, 'error');
  }
}

async function createPeriod() {
  try {
    await api('/api/schedule-periods', { method:'POST', body: JSON.stringify({
      year: currentYear, month: currentMonth,
    })});
    toast('已建立');
    await load();
  } catch(e) { toast('建立失敗:'+e.message,'error'); }
}

async function submitPeriod() {
  if (!period) return;
  if (!confirm(`確認送出 ${currentYear}/${String(currentMonth).padStart(2,'0')} 排班?\n送出後不可自助修改。`)) return;
  try {
    await api(`/api/schedule-periods/${encodeURIComponent(period.id)}/submit`, { method:'POST' });
    toast('已送出主管確認');
    await load();
  } catch(e) { toast('送出失敗:'+e.message, 'error'); }
}

// Init
load();
</script>
