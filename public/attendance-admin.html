<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5B8DEF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHUWA HR">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>出勤管理 — HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .att-tbl{width:100%;border-collapse:collapse}
  .att-tbl th, .att-tbl td{padding:8px 10px;border-bottom:0.5px solid rgba(255,255,255,.06);text-align:left;font-size:13px;vertical-align:middle}
  .att-tbl th{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;background:rgba(0,0,0,.15)}
  .att-tbl tr.anomaly{background:rgba(168,85,247,.06)}
  .att-tbl tr.absent{background:rgba(248,113,113,.06)}
  .pill{padding:3px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace}
  .p-normal{background:rgba(74,222,128,.15);color:#4ADE80}
  .p-late{background:rgba(251,191,36,.15);color:#FBBF24}
  .p-early_leave{background:rgba(248,113,113,.12);color:#F87171}
  .p-absent{background:rgba(248,113,113,.2);color:#F87171}
  .p-leave{background:rgba(91,141,239,.15);color:#7FBBFF}
  .p-holiday{background:rgba(74,222,128,.1);color:#4ADE80}
  .anomaly-flag{display:inline-block;padding:2px 6px;border-radius:3px;background:rgba(168,85,247,.15);color:#A855F7;font-size:10px;font-family:'DM Mono',monospace;margin-left:4px}
  .section-h{font-size:14px;font-weight:600;color:var(--text-dim);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
  .count-badge{padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.08);font-size:11px;font-family:'DM Mono',monospace}
  .filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
</style>
</head>
<body data-page="attendance-admin">
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">出勤管理</div>
        <div class="page-sub">檢視打卡紀錄、處理異常、修改 / 刪除</div>
      </div>
    </div>

    <div id="gate-blocked" class="empty-state" style="display:none">
      <div class="icon">🔒</div><div>無權限存取此頁面(限 HR / admin)</div>
    </div>

    <div id="main-content">
      <div class="filter-bar">
        <select class="form-select" id="f-month" onchange="load()" style="width:140px"></select>
        <input type="text" class="form-input" id="f-emp" placeholder="員工 ID / 名稱 篩選" oninput="render()" style="flex:1;max-width:240px">
        <button class="btn btn-ghost" onclick="load()">↻ 重新載入</button>
        <button class="btn btn-primary" onclick="openExportModal()">📤 匯出</button>
      </div>

      <div class="section-h">⚠ 異常 <span class="count-badge" id="cnt-anomaly">0</span></div>
      <div class="table-wrap">
        <table class="att-tbl">
          <thead><tr><th>日期</th><th>員工</th><th>段</th><th>上班</th><th>下班</th><th>狀態</th><th>備註</th><th>操作</th></tr></thead>
          <tbody id="tbody-anomaly"></tbody>
        </table>
      </div>

      <div class="section-h">全部 <span class="count-badge" id="cnt-all">0</span></div>
      <div class="table-wrap">
        <table class="att-tbl">
          <thead><tr><th>日期</th><th>員工</th><th>段</th><th>上班</th><th>下班</th><th>狀態</th><th>備註</th><th>操作</th></tr></thead>
          <tbody id="tbody-all"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- 編輯抽屜 -->
<div class="modal-bg" id="edit-modal">
  <div class="modal" style="max-width:520px;width:95vw">
    <div class="modal-title" id="modal-title">編輯打卡紀錄</div>
    <input type="hidden" id="f-id">

    <div style="font-size:12px;color:var(--text-dim);margin-bottom:14px" id="modal-meta"></div>

    <!-- P4.2:audit history(讀 attendance.note、parse 出 admin_edit log) -->
    <div id="audit-history-row" style="display:none;margin-bottom:14px;padding:10px;background:rgba(0,0,0,.15);border-radius:6px">
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;font-family:'DM Mono',monospace">📋 修改紀錄</div>
      <div id="audit-history-content" style="font-size:12px;line-height:1.7;color:var(--text-dim);font-family:'DM Mono',monospace;white-space:pre-wrap"></div>
    </div>

    <!-- P4.2:cascade recompute hint -->
    <div style="font-size:11px;color:#7FBBFF;background:rgba(91,141,239,.06);border:1px solid rgba(91,141,239,.2);padding:6px 10px;border-radius:4px;margin-bottom:14px">
      ℹ 改 clock_in / clock_out / status 後、儲存時系統會依排班自動重算 late_minutes / early_leave_minutes / status (若 status=leave/holiday/absent 則保留)。
    </div>

    <div class="form-row">
      <label class="form-label">上班時間 (clock_in)</label>
      <input type="datetime-local" class="form-input" id="f-clock-in">
    </div>
    <div class="form-row">
      <label class="form-label">下班時間 (clock_out)</label>
      <input type="datetime-local" class="form-input" id="f-clock-out">
    </div>
    <div class="form-row">
      <label class="form-label">狀態</label>
      <select class="form-select" id="f-status">
        <option value="normal">正常</option>
        <option value="late">遲到</option>
        <option value="early_leave">早退</option>
        <option value="absent">曠職</option>
        <option value="leave">請假</option>
        <option value="holiday">假日</option>
      </select>
    </div>
    <div class="form-row" style="display:flex;gap:14px;align-items:center">
      <label style="display:flex;gap:6px;align-items:center">
        <input type="checkbox" id="f-anomaly"> <span>標記為異常</span>
      </label>
    </div>
    <div class="form-row">
      <label class="form-label">異常備註</label>
      <input type="text" class="form-input" id="f-anomaly-note" placeholder="例:打卡機故障;有同事證明在崗">
    </div>

    <div class="modal-actions" style="justify-content:space-between">
      <button class="btn btn-danger btn-sm" onclick="deleteAtt()">刪除</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveAtt()">儲存</button>
      </div>
    </div>
  </div>
</div>

<!-- 匯出 modal -->
<div class="modal-bg" id="export-modal">
  <div class="modal" style="max-width:480px;width:95vw">
    <div class="modal-title">📤 匯出打卡狀況</div>
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:14px">
      勾選要匯出的狀態 + 部門。匯出 Excel 檔給主管 review。
    </div>

    <div class="form-row">
      <label class="form-label">月份</label>
      <input type="month" class="form-input" id="export-month">
    </div>

    <div class="form-row">
      <label class="form-label">部門</label>
      <select class="form-select" id="export-dept">
        <option value="">全部部門</option>
      </select>
    </div>

    <div class="form-row">
      <label class="form-label">狀態(勾選要匯出的)</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px">
        <label><input type="checkbox" id="ex-normal" checked> 正常</label>
        <label><input type="checkbox" id="ex-late" checked> 遲到</label>
        <label><input type="checkbox" id="ex-early_leave" checked> 早退</label>
        <label><input type="checkbox" id="ex-absent" checked> 曠職</label>
        <label><input type="checkbox" id="ex-leave" checked> 請假</label>
        <label><input type="checkbox" id="ex-holiday" checked> 假日</label>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;font-size:11px">
        <button type="button" class="btn btn-ghost btn-sm" onclick="exportSelectAll(true)">全選</button>
        <button type="button" class="btn btn-ghost btn-sm" onclick="exportSelectAll(false)">全不選</button>
        <button type="button" class="btn btn-ghost btn-sm" onclick="exportSelectAnomaly()">只選異常(遲到/早退/曠職)</button>
      </div>
    </div>

    <div class="modal-actions" style="justify-content:flex-end;gap:8px">
      <button class="btn btn-ghost" onclick="closeExportModal()">取消</button>
      <button class="btn btn-primary" onclick="doExport()">匯出 Excel</button>
    </div>
  </div>
</div>

<script>
function toast(msg, type='success') {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(wrap); }
  const el = document.createElement('div'); el.className='toast toast-'+type; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),3500);
}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtIsoLocal(iso){ if(!iso) return '—'; const d = new Date(iso); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

// 2026-05-19:status 中文 label map(對齊 backend attendance_status_check enum、
// 不動 code 端 status value、只改 display label)
const STATUS_LABELS = {
  normal:      '正常',
  late:        '遲到',
  early_leave: '早退',
  absent:      '曠職',
  leave:       '請假',
  holiday:     '假日',
};
function isoToLocalInput(iso){
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function localInputToIso(s){
  if (!s) return null;
  return new Date(s).toISOString();
}

let allRows = [];
let empMap = {};

function buildMonthOptions() {
  const sel = document.getElementById('f-month');
  const d = new Date();
  const opts = [];
  for (let i = 0; i < 6; i++) {
    const y = d.getFullYear(), m = d.getMonth()+1;
    const v = `${y}-${String(m).padStart(2,'0')}`;
    opts.push(`<option value="${v}"${i===0?' selected':''}>${v}</option>`);
    d.setMonth(d.getMonth()-1);
  }
  sel.innerHTML = opts.join('');
}

async function load(retries = 0) {
  if (!window.api || !window.currentUser) {
    if (retries < 25) return setTimeout(()=>load(retries+1), 200);
    return;
  }

  const u = window.currentUser;
  const allowed = u && ['hr', 'admin', 'ceo', 'chairman'].includes(u.role);
  if (u && !allowed) {
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('gate-blocked').style.display = '';
    return;
  }

  const month = document.getElementById('f-month').value;
  const [y, m] = month.split('-');
  const start = `${y}-${m}-01`;
  const lastDay = new Date(parseInt(y), parseInt(m), 0).getDate();
  const end = `${y}-${m}-${String(lastDay).padStart(2,'0')}`;

  try {
    const rows = await api(`/api/attendance?all=true&start=${start}&end=${end}`);
    allRows = rows || [];
    empMap = {};
    for (const r of allRows) {
      if (r.employees) empMap[r.employee_id] = r.employees;
    }
    render();
  } catch(e) {
    toast('載入失敗:'+e.message, 'error');
  }
}

function render() {
  const filter = document.getElementById('f-emp').value.trim().toLowerCase();
  const rows = allRows.filter(r => {
    if (!filter) return true;
    const emp = empMap[r.employee_id];
    return r.employee_id.toLowerCase().includes(filter) ||
           (emp?.name || '').toLowerCase().includes(filter);
  });

  const anomalies = rows.filter(r => r.is_anomaly || r.status === 'absent');
  const all = rows;

  document.getElementById('cnt-anomaly').textContent = anomalies.length;
  document.getElementById('cnt-all').textContent = all.length;
  document.getElementById('tbody-anomaly').innerHTML = renderRows(anomalies);
  document.getElementById('tbody-all').innerHTML     = renderRows(all);
}

function renderRows(rows) {
  if (!rows.length) return `<tr><td colspan="8" style="text-align:center;color:var(--text-dim);padding:20px">無資料</td></tr>`;
  return rows.map(r => {
    const emp = empMap[r.employee_id] || {};
    // 階段 B1 + Phase 1.3:approved leave 覆蓋、半日斜紋 / 全日純色
    const overlayCls = r.leave_overlay
      ? (r.leave_overlay.is_full_day ? 'schedule-leave-overlay' : 'schedule-leave-overlay-half')
      : null;
    const cls = overlayCls || (r.is_anomaly ? 'anomaly' : (r.status === 'absent' ? 'absent' : ''));
    let statusCell;
    if (r.leave_overlay) {
      const o = r.leave_overlay;
      const label = o.is_full_day ? (o.leave_name || '請假') : `${o.leave_name || '請假'} (${o.hours}h)`;
      // Task 3:post-hoc 警告 (員工已打卡 + 事後核准請假、需 HR 處理 conflict)
      const tip = r.post_hoc_leave
        ? `⚠ 員工已打卡 + 補請假 conflict、請 HR 處理:${o.leave_name||''} ${o.hours||0}h`
        : `${o.leave_name || ''} (${o.leave_type}) — ${o.overlay_label_short || ''}`;
      const warn = r.post_hoc_leave ? '<span class="anomaly-flag" style="margin-right:4px">⚠ 補請假</span>' : '';
      statusCell = `${warn}<span class="pill ${overlayCls}" title="${escHtml(tip)}">${escHtml(label)}</span>`;
    } else {
      statusCell = `<span class="pill p-${escHtml(r.status||'normal')}">${escHtml(STATUS_LABELS[r.status] || r.status || '正常')}</span>${r.is_anomaly ? '<span class="anomaly-flag">⚠ 異常</span>' : ''}`;
    }
    return `
      <tr class="${cls}">
        <td style="font-family:'DM Mono',monospace">${escHtml(r.work_date)}</td>
        <td>${escHtml(emp.name || r.employee_id)} <span style="color:var(--text-dim);font-size:11px">${escHtml(r.employee_id)}</span></td>
        <td style="font-family:'DM Mono',monospace">${r.segment_no || 1}</td>
        <td>${fmtIsoLocal(r.clock_in)}</td>
        <td>${fmtIsoLocal(r.clock_out)}</td>
        <td>${statusCell}</td>
        <td style="font-size:12px;color:var(--text-dim)">${escHtml(r.anomaly_note||r.note||'')}</td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="openEdit('${escHtml(r.id)}')">編輯</button>
          ${!r.is_anomaly && r.status === 'absent' ? `<button class="btn btn-ghost btn-sm" onclick="markAnomaly('${escHtml(r.id)}', true)">標異常</button>` : ''}
          ${r.is_anomaly ? `<button class="btn btn-ghost btn-sm" onclick="markAnomaly('${escHtml(r.id)}', false)">取消異常</button>` : ''}
        </td>
      </tr>
    `;
  }).join('');
}

function openEdit(id) {
  const r = allRows.find(x => x.id === id);
  if (!r) return;
  const emp = empMap[r.employee_id] || {};
  document.getElementById('f-id').value = r.id;
  document.getElementById('modal-title').textContent = `編輯 — ${emp.name||r.employee_id} ${r.work_date}`;
  document.getElementById('modal-meta').textContent = `id=${r.id}, segment=${r.segment_no||1}`;
  document.getElementById('f-clock-in').value  = isoToLocalInput(r.clock_in);
  document.getElementById('f-clock-out').value = isoToLocalInput(r.clock_out);
  document.getElementById('f-status').value    = r.status || 'normal';
  document.getElementById('f-anomaly').checked = !!r.is_anomaly;
  document.getElementById('f-anomaly-note').value = r.anomaly_note || '';
  // P4.2:render audit history(從 note 欄位 parse admin_edit 行)
  renderAuditHistory(r.note);
  document.getElementById('edit-modal').classList.add('open');
}

// P4.2:render audit history(parse note 內 `[YYYY-MM-DD] admin_edit by ...` 行)
function renderAuditHistory(note) {
  const row = document.getElementById('audit-history-row');
  const content = document.getElementById('audit-history-content');
  if (!note || !note.trim()) {
    row.style.display = 'none';
    return;
  }
  const lines = note.split('\n');
  const auditLines = [];
  const otherLines = [];
  const auditRe = /^\[\d{4}-\d{2}-\d{2}\]\s+admin_edit\s+by\s+/;
  for (const line of lines) {
    if (auditRe.test(line)) auditLines.push(line);
    else if (line.trim()) otherLines.push(line);
  }
  if (auditLines.length === 0 && otherLines.length === 0) {
    row.style.display = 'none';
    return;
  }
  row.style.display = '';
  let html = '';
  if (auditLines.length) {
    html += auditLines.map(l => `<div>${escHtml(l)}</div>`).join('');
  }
  if (otherLines.length) {
    html += `<div style="margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5)">其他備註:<br>${otherLines.map(escHtml).join('<br>')}</div>`;
  }
  content.innerHTML = html;
}

function closeModal(){
  document.getElementById('edit-modal').classList.remove('open');
  // P4.2:reset audit history(避免下次開 modal 時 leak 上次)
  document.getElementById('audit-history-row').style.display = 'none';
}

async function saveAtt() {
  const id = document.getElementById('f-id').value;
  const payload = {
    clock_in:    localInputToIso(document.getElementById('f-clock-in').value),
    clock_out:   localInputToIso(document.getElementById('f-clock-out').value),
    status:      document.getElementById('f-status').value,
    is_anomaly:  document.getElementById('f-anomaly').checked,
    anomaly_note: document.getElementById('f-anomaly-note').value || null,
  };
  try {
    await api(`/api/attendance/${encodeURIComponent(id)}`, { method:'PUT', body: JSON.stringify(payload) });
    toast('已儲存');
    closeModal();
    await load();
  } catch(e) { toast('儲存失敗:'+e.message, 'error'); }
}

async function deleteAtt() {
  const id = document.getElementById('f-id').value;
  if (!confirm('確定刪除此筆打卡紀錄?')) return;
  try {
    await api(`/api/attendance/${encodeURIComponent(id)}`, { method:'DELETE' });
    toast('已刪除');
    closeModal();
    await load();
  } catch(e) { toast('刪除失敗:'+e.message, 'error'); }
}

async function markAnomaly(id, flag) {
  const note = flag ? prompt('異常備註(選填)') : null;
  try {
    await api('/api/attendance/anomaly', { method:'POST', body: JSON.stringify({
      attendance_id: id, is_anomaly: flag, anomaly_note: note,
    })});
    toast(flag ? '已標記異常' : '已取消異常');
    await load();
  } catch(e) { toast('失敗:'+e.message, 'error'); }
}

// ───── 匯出功能 ─────

async function openExportModal() {
  // 預設帶當前 f-month value
  document.getElementById('export-month').value = document.getElementById('f-month').value;

  // 從 /api/departments fetch 完整部門 list(對齊 employees.html / 部門管理頁 pattern)
  // 避免上一版「從 allRows derive」漏掉沒當月出勤紀錄的部門
  const deptSel = document.getElementById('export-dept');
  deptSel.innerHTML = '<option value="">載入中…</option>';
  try {
    const depts = await api('/api/departments');
    deptSel.innerHTML = '<option value="">全部部門</option>'
      + (depts || []).map(d => `<option value="${d.id}">${escHtml(d.name)}</option>`).join('');
  } catch (e) {
    deptSel.innerHTML = '<option value="">全部部門</option>';
    toast('載入部門失敗:' + e.message, 'warn');
  }

  document.getElementById('export-modal').classList.add('open');
}

function closeExportModal() {
  document.getElementById('export-modal').classList.remove('open');
}

function exportSelectAll(checked) {
  ['normal','late','early_leave','absent','leave','holiday'].forEach(s => {
    document.getElementById('ex-' + s).checked = checked;
  });
}

function exportSelectAnomaly() {
  // 只勾「異常」(遲到/早退/曠職)、其他不勾
  const anomalyStatuses = ['late', 'early_leave', 'absent'];
  ['normal','late','early_leave','absent','leave','holiday'].forEach(s => {
    document.getElementById('ex-' + s).checked = anomalyStatuses.includes(s);
  });
}

async function doExport() {
  const month = document.getElementById('export-month').value;
  const deptId = document.getElementById('export-dept').value;
  const selectedStatuses = ['normal','late','early_leave','absent','leave','holiday']
    .filter(s => document.getElementById('ex-' + s).checked);

  if (selectedStatuses.length === 0) {
    toast('請至少勾選一個狀態', 'warn');
    return;
  }

  // 簡化:跟 f-month 對齊(allRows 已 load 該月)、不同月要 user 先切換 f-month
  if (month !== document.getElementById('f-month').value) {
    toast('請先把上方月份切換到要匯出的月份、再開匯出 modal', 'warn');
    return;
  }

  let rows = (allRows || []).filter(r => selectedStatuses.includes(r.status));
  if (deptId) {
    rows = rows.filter(r => r.employees?.dept_id === deptId);
  }

  if (rows.length === 0) {
    toast('沒有符合條件的資料', 'warn');
    return;
  }

  const deptName = deptId
    ? (document.getElementById('export-dept').selectedOptions[0]?.textContent || '部門')
    : '全公司';

  const config = {
    sheetName: '打卡狀況',
    filename: `打卡狀況_${month}_${deptName}`,
    columns: [
      { key: '_emp_no',  label: '員工編號', format: (_v, r) => r.employees?.emp_no || r.employee_id || '' },
      { key: '_name',    label: '姓名',     format: (_v, r) => r.employees?.name || '' },
      { key: '_dept',    label: '部門',     format: (_v, r) => r.employees?.departments?.name || '' },
      { key: 'work_date',label: '日期' },
      { key: '_dow',     label: '星期',     format: (_v, r) => ['日','一','二','三','四','五','六'][new Date(r.work_date).getDay()] },
      { key: 'segment_no', label: '段次' },
      { key: 'clock_in', label: '上班打卡' },
      { key: 'clock_out',label: '下班打卡' },
      { key: '_status',  label: '狀態',     format: (_v, r) => STATUS_LABELS[r.status] || r.status },
      { key: '_anomaly', label: '異常標記', format: (_v, r) => r.is_anomaly ? '是' : '' },
      { key: 'late_minutes',       label: '遲到(分)' },
      { key: 'early_leave_minutes',label: '早退(分)' },
      { key: 'work_hours',         label: '工時' },
      { key: 'overtime_hours',     label: '加班' },
      { key: 'anomaly_note',       label: '異常備註' },
      { key: 'note',               label: '其他備註' },
    ],
  };

  ExcelTools.exportData(config, rows);
  closeExportModal();
}

// Init
buildMonthOptions();
load();
</script>
